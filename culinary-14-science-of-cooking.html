<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap');
  :root{--bg:#080810;--surface:#11111f;--border:#1e1e35;--purple:#7c3aed;--purple-l:#9d5bf0;--green:#22c55e;--red:#ef4444;--text:#e8e8f0;--muted:#7070a0;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:.4;pointer-events:none;z-index:0;}
  .screen{position:relative;z-index:1;width:100%;max-width:660px;margin:0 auto;padding:24px 20px 48px;display:none;}
  .screen.active{display:block;}
  #name-screen{text-align:center;padding-top:80px;}
  .back-link{display:inline-flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);text-decoration:none;letter-spacing:1px;margin-bottom:48px;transition:color .2s;}
  .back-link:hover{color:var(--purple-l);}
  .subject-tag{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--purple-l);margin-bottom:12px;}
  #name-screen h1{font-size:clamp(22px,5vw,36px);font-weight:800;line-height:1.15;margin-bottom:8px;background:linear-gradient(135deg,#fff 30%,var(--purple-l));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  #name-screen p{color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;margin-bottom:40px;}
  .name-box{display:flex;flex-direction:column;align-items:center;gap:12px;}
  .name-box input{width:100%;max-width:320px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Syne',sans-serif;font-size:15px;outline:none;text-align:center;transition:border-color .2s;}
  .name-box input:focus{border-color:var(--purple);}
  .name-box input::placeholder{color:var(--muted);}
  .btn-primary{padding:12px 32px;background:var(--purple);color:#fff;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:background .2s,transform .1s;letter-spacing:.5px;}
  .btn-primary:hover{background:var(--purple-l);transform:translateY(-1px);}
  .quiz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
  .quiz-meta{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
  .quiz-meta span{color:var(--purple-l);font-weight:500;}
  .quiz-back{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);background:none;border:1px solid var(--border);padding:5px 10px;border-radius:6px;cursor:pointer;transition:color .2s,border-color .2s;}
  .quiz-back:hover{color:var(--text);border-color:var(--purple);}
  .progress-bar{width:100%;height:3px;background:var(--border);border-radius:2px;margin-bottom:32px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--purple-l));border-radius:2px;transition:width .3s ease;}
  .question-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--purple-l);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
  .question-text{font-size:clamp(15px,3vw,18px);font-weight:600;line-height:1.5;margin-bottom:28px;color:var(--text);}
  .options{display:flex;flex-direction:column;gap:10px;}
  .opt-btn{display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;font-weight:400;cursor:pointer;text-align:left;transition:border-color .15s,background .15s;width:100%;}
  .opt-btn:hover:not(:disabled){border-color:var(--purple);background:#16162a;}
  .opt-btn .opt-letter{flex-shrink:0;width:26px;height:26px;border-radius:6px;background:var(--border);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);transition:background .15s,color .15s;}
  .opt-btn:hover:not(:disabled) .opt-letter{background:var(--purple);color:#fff;}
  .opt-btn.correct{border-color:var(--green);background:rgba(34,197,94,.1);}
  .opt-btn.correct .opt-letter{background:var(--green);color:#fff;}
  .opt-btn.wrong{border-color:var(--red);background:rgba(239,68,68,.1);}
  .opt-btn.wrong .opt-letter{background:var(--red);color:#fff;}
  .opt-btn:disabled{cursor:default;}
  .explanation{display:none;margin-top:16px;padding:14px 16px;background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.25);border-left:3px solid var(--purple);border-radius:8px;font-size:13px;line-height:1.6;color:#c4b5fd;font-family:'DM Mono',monospace;}
  .explanation.show{display:block;}
  .action-row{display:flex;gap:10px;margin-top:24px;}
  .next-btn{flex:1;padding:13px;background:var(--purple);color:#fff;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;display:none;transition:background .2s;letter-spacing:.5px;}
  .next-btn:hover{background:var(--purple-l);}
  .next-btn.show{display:block;}
  .quit-btn{padding:13px 18px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;display:none;transition:color .2s,border-color .2s;white-space:nowrap;}
  .quit-btn:hover{color:var(--text);border-color:var(--purple);}
  .quit-btn.show{display:block;}
  #results-screen{text-align:center;padding-top:40px;}
  .result-name{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);margin-bottom:32px;}
  .score-ring{position:relative;width:160px;height:160px;margin:0 auto 28px;}
  .score-ring svg{transform:rotate(-90deg);}
  .score-ring .ring-bg{fill:none;stroke:var(--border);stroke-width:10;}
  .score-ring .ring-fill{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1s ease,stroke .5s;}
  .score-ring .ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .ring-pct{font-size:34px;font-weight:800;line-height:1;}
  .ring-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:4px;letter-spacing:1px;}
  .result-title{font-size:24px;font-weight:800;margin-bottom:8px;}
  .result-sub{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);margin-bottom:8px;}
  .result-verdict{font-family:'DM Mono',monospace;font-size:12px;padding:8px 20px;border-radius:20px;display:inline-block;margin-bottom:32px;}
  .result-verdict.pass{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.3);}
  .result-verdict.fail{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.3);}
  .result-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:40px;}
  .btn-outline{padding:11px 24px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:border-color .2s,color .2s;}
  .btn-outline:hover{border-color:var(--purple);color:var(--text);}
  .review{text-align:left;}
  .review h3{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:16px;font-family:'DM Mono',monospace;}
  .rv-item{padding:14px 16px;border-radius:8px;margin-bottom:10px;border:1px solid var(--border);}
  .rv-item.ok{border-color:rgba(34,197,94,.25);background:rgba(34,197,94,.05);}
  .rv-item.miss{border-color:rgba(239,68,68,.25);background:rgba(239,68,68,.05);}
  .rv-q{font-size:13px;font-weight:600;margin-bottom:8px;line-height:1.4;}
  .rv-a{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);line-height:1.6;}
  .rv-a .c{color:var(--green);}
  .rv-a .w{color:var(--red);}
</style>

<script>
const BANK=[
{q:"What is the Maillard reaction and at what temperature does it begin?",opts:["The Maillard reaction is the breakdown of collagen into gelatin that occurs when tough cuts of meat are cooked slowly in moist heat above 70°C for several hours","The Maillard reaction is a chemical reaction between amino acids and reducing sugars that begins around 140°C, producing brown colour and hundreds of new savoury flavour compounds on the surface of food","The Maillard reaction is the process by which starch granules absorb water and swell when heated, causing sauces and soups to thicken as the liquid temperature rises","The Maillard reaction is the emulsification of fat and water molecules that occurs when butter is vigorously whisked into a warm sauce at the end of cooking"],ans:1,exp:"The Maillard reaction begins around 140°C between amino acids (proteins) and reducing sugars. It produces the brown colour and complex savoury flavour on seared meat, toast, roasted coffee, baked bread, and fried foods. It does not occur in moist heat cooking because the water prevents surface temperature from exceeding 100°C."},
{q:"What is caramelisation and how does it differ from the Maillard reaction?",opts:["Caramelisation is the browning of proteins that occurs above 140°C, while the Maillard reaction is the browning of sugars above 180°C — both require the presence of both proteins and sugars","Caramelisation is the thermal decomposition of sugars alone above approximately 160°C, producing golden-brown colour and sweet nutty flavours — it does not require protein unlike the Maillard reaction","Caramelisation and the Maillard reaction are identical processes — both involve sugars and proteins reacting at the same temperature to produce the same brown colour","Caramelisation is a moist heat reaction occurring when sugar dissolves in liquid and reduces, while the Maillard reaction only occurs under completely dry surface conditions"],ans:1,exp:"Caramelisation is the thermal decomposition of sugars alone — no protein needed. It begins around 160°C for sucrose, producing golden to dark brown colour and flavours like butterscotch, toffee, and bitterness at higher temperatures. The Maillard reaction requires BOTH amino acids AND sugars. Both reactions often occur simultaneously during dry heat cooking."},
{q:"What is 'protein denaturation' in cooking and why is it important?",opts:["Protein denaturation is the process of adding protein-rich ingredients to a dish — it is important for calculating the nutritional value and food cost of a menu item","Protein denaturation is the unfolding and restructuring of protein molecules when exposed to heat, acid, or mechanical action — causing food to change texture from raw to cooked","Protein denaturation is the breakdown of proteins into amino acids during long slow cooking — it is the process responsible for tenderising tough cuts of meat during braising","Protein denaturation is the process of removing proteins from a stock using egg whites — it produces a clear consommé by trapping impurities in a raft of coagulated protein"],ans:1,exp:"Proteins are long folded chains. Heat, acid, salt, or mechanical action (whipping) causes them to unfold (denature) and then bond together (coagulate). This is why eggs set when cooked, meat firms up when seared, and fish turns opaque when poached. Understanding denaturation helps cooks control texture precisely."},
{q:"At what temperature do egg proteins begin to coagulate, and why does this matter for cooking eggs?",opts:["Egg whites begin to coagulate at 100°C and yolks at 85°C — both must reach boiling point to be considered fully safe and properly cooked for service","Egg whites begin to coagulate around 60°C and yolks around 65°C — knowing this allows cooks to produce soft-set whites, runny yolks, or fully set eggs by precise temperature control","Egg proteins coagulate only above 80°C — below this temperature eggs remain completely liquid regardless of cooking time or the amount of heat applied to them","Both egg white and yolk proteins coagulate at exactly 74°C — this is why the same safe temperature applies equally to eggs as it does to cooked poultry and minced meat"],ans:1,exp:"Egg white proteins begin to coagulate around 60°C and are fully set by 65°C. Yolk proteins start around 65°C and fully set around 70°C. This narrow temperature range explains why sous vide eggs cooked at 63°C have a set white and flowing yolk — precise temperature control produces exact textures impossible to achieve by conventional cooking methods."},
{q:"What is 'gelatinisation' of starch and how does it thicken sauces?",opts:["Gelatinisation is the process of adding gelatin powder to a cold liquid to produce a firm set — it is used in mousse, panna cotta, and cold dessert preparations","Gelatinisation is the process where starch granules absorb water and swell dramatically when heated, eventually bursting and releasing starch molecules that thicken the surrounding liquid","Gelatinisation is the conversion of collagen to gelatin during long slow cooking of bones and connective tissue — the gelatin produced thickens stocks and gives body to braises","Gelatinisation is the process of clarifying a starch-thickened sauce using egg whites to remove cloudiness and produce a transparent, glossy finished sauce"],ans:1,exp:"When starch granules (from flour, cornstarch, arrowroot) are heated in liquid, they absorb water and swell — a process called gelatinisation. Above approximately 70°C–80°C the granules burst, releasing amylose and amylopectin molecules that entangle and thicken the liquid. This is how roux, cornstarch slurries, and all starch-thickened sauces work."},
{q:"What is 'retrogradation' of starch and when is it observed in cooking?",opts:["Retrogradation is the rapid gelatinisation of starch granules when dry starch is added directly to boiling liquid without first mixing it with cold water","Retrogradation is the process where gelatinised starch re-crystallises and firms up as it cools — observed when bread goes stale, cold pasta becomes firm, or leftover sauce becomes gel-like in the refrigerator","Retrogradation is the breakdown of starch molecules by acid — observed when wine or lemon juice is added to a starch-thickened sauce, causing it to thin and lose its body","Retrogradation is the absorption of excess starch from food into the cooking water — observed when pasta or rice water becomes cloudy and milky during boiling"],ans:1,exp:"Retrogradation occurs when gelatinised starch cools — amylose molecules re-align and re-crystallise into a firmer, denser structure. This is why bread goes stale (starch retrograding, not drying out), cold rice becomes firm, leftover mashed potato stiffens in the fridge, and chilled starch-thickened sauces become gel-like. Reheating reverses retrogradation temporarily."},
{q:"What is an 'emulsion' in cooking and what are the two types?",opts:["An emulsion is a mixture of two dry ingredients that do not naturally blend — examples are flour and sugar before mixing, or ground spices combined in a dry rub before application","An emulsion is a stable mixture of two normally immiscible liquids — oil and water — held together by an emulsifier. Types: oil-in-water (mayonnaise, vinaigrette) and water-in-oil (butter, margarine)","An emulsion is the process of reducing a liquid to concentrate its flavour — types are full reduction (to a glaze) and partial reduction (to nappe consistency)","An emulsion is a type of sauce thickened exclusively with egg yolks without any fat — it relies on the protein structure of the yolks to create a thick, stable, spoonable consistency"],ans:1,exp:"An emulsion suspends tiny droplets of one liquid inside another that would normally separate. Oil-in-water emulsions: oil droplets suspended in a water-based liquid — mayonnaise, Hollandaise, vinaigrette. Water-in-oil emulsions: water droplets in fat — butter, margarine. An emulsifier (lecithin in egg yolk, mustard) provides a molecular bridge between the two liquids, stabilising the emulsion."},
{q:"What is 'lecithin' and why is it important in cooking?",opts:["Lecithin is a natural food colouring derived from egg yolks that gives mayonnaise and Hollandaise their characteristic pale yellow colour when prepared correctly","Lecithin is a phospholipid found naturally in egg yolks and soy that acts as an emulsifier — its molecular structure allows it to bond with both fat and water simultaneously, stabilising emulsions","Lecithin is a starch derivative used as a thickening agent in low-fat sauces and dressings as a substitute for traditional roux and cornstarch in modern cooking","Lecithin is a protein found in dairy products that coagulates when heated, causing milk to form a skin on its surface and cream sauces to thicken without any added starch"],ans:1,exp:"Lecithin is a phospholipid — one end of the molecule is attracted to fat, the other to water. This dual affinity makes it a natural emulsifier. Egg yolk lecithin is what makes mayonnaise and Hollandaise stable. Soy lecithin is used commercially in chocolate (to stabilise cocoa butter), margarine, and many processed foods. Without lecithin, oil and water would immediately separate."},
{q:"What is 'collagen' and what happens to it during long slow cooking?",opts:["Collagen is the intramuscular fat marbled through premium beef cuts — during slow cooking it melts completely into the meat, making it extremely tender and juicy","Collagen is a structural protein found in connective tissue, cartilage, and skin — during long slow moist cooking above 70°C it converts to gelatin, tenderising tough cuts and enriching the cooking liquid","Collagen is a pigment protein in meat that gives beef its red colour — during cooking it converts to a grey compound, which is why well-done meat loses its pink colour","Collagen is a carbohydrate compound found in the cell walls of root vegetables — during slow cooking it breaks down and releases natural sugars, causing the vegetables to soften and sweeten"],ans:1,exp:"Collagen is a tough, fibrous protein in connective tissue. When heated above 70°C in moist conditions for an extended time, collagen hydrolyses into gelatin — a soluble protein that gives body to stocks and sauces and transforms previously tough meat into tender, pull-apart textures. This is the scientific basis for braising and slow cooking tough cuts."},
{q:"What is the role of 'fat' in cooking beyond adding flavour?",opts:["Fat in cooking serves only as a flavour carrier — it has no structural or functional role in any cooking process beyond making food taste richer and more satisfying","Fat acts as a heat transfer medium in frying, carries fat-soluble vitamins and flavour compounds, tenderises baked goods by coating gluten strands, and creates emulsions and flaky pastry textures","Fat in cooking is used exclusively to prevent food from sticking to cooking surfaces — its only functional role is as a lubricant between food and the pan or baking tin","Fat is used in cooking only to increase the caloric density of dishes — its presence has no impact on texture, chemical reactions, or the behaviour of other ingredients"],ans:1,exp:"Fat performs multiple functions: heat transfer medium (conducts and distributes heat in frying and sautéing), flavour carrier (fat-soluble flavour compounds dissolve in fat), shortening agent (coats gluten in pastry, producing tenderness and flakiness), emulsifier component (in butter sauces and dressings), moisture retention (basting keeps meat moist), and texture contributor (richness, mouthfeel, satiety)."},
{q:"What is 'gluten' and how does it develop in bread and pastry making?",opts:["Gluten is a natural sugar found in wheat flour that caramelises during baking, giving bread its golden crust and slightly sweet flavour when toasted or baked at high temperature","Gluten is a protein network formed when glutenin and gliadin proteins in wheat flour absorb water and are worked mechanically — giving dough elasticity, strength, and the ability to trap CO2 from yeast","Gluten is a starch compound in wheat that absorbs water and swells during mixing — it is responsible for the density of bread and must be broken down by enzymes before yeast can act on it","Gluten is a fat-protein compound found only in wholemeal and rye flour — white flour contains no gluten and can therefore be used freely by people with celiac disease"],ans:1,exp:"Gluten is a viscoelastic protein network formed when glutenin and gliadin (two proteins in wheat flour) are hydrated and worked together. Kneading aligns the protein strands, developing a strong, elastic network. This network traps CO2 produced by yeast, allowing bread to rise and hold its shape. In pastry, minimal gluten development is desirable — hence the use of low-protein flour and minimal mixing."},
{q:"What is 'leavening' in baking and name three leavening agents?",opts:["Leavening is the process of adding fat to baked goods to create a tender, moist crumb — leavening agents include butter, oil, and shortening used in different quantities depending on the recipe","Leavening is the process of introducing gas into a dough or batter so it expands during baking, producing a light, airy texture. Leavening agents: yeast (biological), baking powder and baking soda (chemical), and whipped egg whites (mechanical)","Leavening is the process of browning the exterior of baked goods using high heat — leavening agents are the sugars and proteins that react to produce the Maillard reaction on the crust","Leavening is the hydration of starch granules in flour that causes dough to expand during mixing — leavening agents are the water, milk, or eggs added to achieve the correct hydration level"],ans:1,exp:"Leavening introduces gas (CO2, air, or steam) into dough or batter, causing it to expand during baking. Three types: Biological (yeast — ferments sugars to produce CO2 over time), Chemical (baking soda reacts with acid; baking powder contains both acid and base — releases CO2 immediately), Mechanical (whipping air into eggs or cream — soufflés, chiffon cakes, meringues). Steam from water in the batter also acts as a leavener."},
{q:"What is the 'smoke point' of a cooking oil and why does it matter?",opts:["The smoke point is the temperature at which an oil begins to produce visible smoke — above this temperature the oil breaks down, producing toxic compounds and off-flavours that ruin the dish","The smoke point is the temperature at which oil freezes and solidifies — it determines which oils are suitable for refrigerator storage and which must be kept at room temperature","The smoke point is the ideal frying temperature for each type of oil — all oils should be heated to exactly their smoke point before food is added for optimal frying results","The smoke point is a marketing term describing the richness of an oil's flavour — oils with a high smoke point have a stronger, smokier flavour than oils with a low smoke point"],ans:0,exp:"The smoke point is the temperature at which fat begins to decompose, producing acrolein (a toxic, acrid compound) and off-flavours. High smoke point oils (refined sunflower 230°C, refined peanut 225°C, ghee 250°C) are best for high-heat frying and searing. Low smoke point oils (extra virgin olive oil 190°C, butter 150°C) are better for lower heat or finishing. Never heat oil beyond its smoke point."},
{q:"What is the difference between 'baking soda' and 'baking powder' as leavening agents?",opts:["Baking soda and baking powder are identical products with different brand names — they can always be substituted in equal quantities in any baking recipe without affecting the result","Baking soda is pure sodium bicarbonate — it needs an acid in the recipe (buttermilk, yoghurt, lemon juice) to activate. Baking powder contains sodium bicarbonate plus a dry acid — it activates with moisture alone","Baking soda is used only in savoury cooking while baking powder is used only in sweet baking — the two products should never be combined in the same recipe under any circumstances","Baking soda requires heat to activate while baking powder reacts with cold water — baking powder should always be added to batter immediately before it goes into the oven"],ans:1,exp:"Baking soda (sodium bicarbonate) is alkaline — it needs an acid in the recipe to react and release CO2 (buttermilk, vinegar, lemon juice, brown sugar). If used without an acid the taste is soapy. Baking powder = baking soda + cream of tartar (dry acid) + starch. It activates with moisture (and sometimes with heat for double-acting versions). Both release CO2 to leaven — but the trigger is different."},
{q:"What is 'osmosis' in the context of marinating and brining meat?",opts:["Osmosis is the process of adding spices and herbs to meat — the flavour compounds are drawn into the muscle fibres through the force of osmotic pressure during marinating","Osmosis is the movement of water molecules across a semi-permeable membrane from an area of low solute concentration to high — in brining, salt draws moisture out then back in, carrying flavour and increasing water retention","Osmosis is the chemical reaction between acid in a marinade and the proteins in meat — the acid denatures the protein on the surface, creating a tenderising effect on the outer layers","Osmosis is the process by which fat in a marinade penetrates deeply into the interior muscle fibres of meat — the deeper the fat penetrates, the more tender and moist the cooked result"],ans:1,exp:"In brining: salt creates a high solute concentration outside the meat. Osmosis draws moisture out of the meat initially. The salt then diffuses into the meat via diffusion, and the equilibrium draws water back in — this time carrying dissolved flavour compounds with it. The result: the meat retains more moisture during cooking and is more thoroughly seasoned throughout. Brined chicken is significantly juicier when roasted."},
{q:"What is 'emulsification' and how does vinaigrette demonstrate it?",opts:["Emulsification is the thickening of a sauce through reduction — vinaigrette demonstrates this when the vinegar reduces to concentrate its flavour and naturally thickens the dressing","Emulsification is the process of combining two immiscible liquids into a stable mixture — vinaigrette demonstrates a temporary emulsion of oil and vinegar that separates on standing unless an emulsifier like mustard is added","Emulsification is the clarification of a sauce using egg whites — vinaigrette is clarified by adding whisked egg white and then straining to remove impurities from the oil and vinegar","Emulsification is the reduction of fat globules by vigorous whipping — vinaigrette demonstrates this when whisked oil breaks into microscopic droplets that permanently bond with the vinegar"],ans:1,exp:"A basic vinaigrette (oil + vinegar shaken together) is a temporary emulsion — it separates quickly. Adding mustard (which contains mucilage — a natural emulsifier) creates a more stable, longer-lasting emulsion. Mayonnaise is a permanent emulsion stabilised by egg yolk lecithin. The science is the same: an emulsifier reduces interfacial tension between oil and water droplets, preventing them from coalescing."},
{q:"What is 'umami' from a scientific perspective and what compounds produce it?",opts:["Umami is produced by the Maillard reaction between amino acids and sugars — it is only detectable in browned or seared foods and cannot be tasted in raw or boiled preparations","Umami is a taste sensation produced primarily by glutamates (found in aged cheese, soy sauce, tomatoes) and nucleotides (found in meat, fish, mushrooms) — these compounds activate specific taste receptors on the tongue","Umami is a flavour produced by the fermentation of sugars by bacteria — it is only found in fermented foods such as soy sauce, miso, kimchi, and aged vinegar","Umami is a fat-soluble flavour compound found exclusively in animal proteins — it cannot be detected in plant-based foods regardless of preparation method or concentration"],ans:1,exp:"Umami is triggered by glutamates (monosodium glutamate, glutamic acid) and nucleotides (inosinate from meat/fish, guanylate from mushrooms). When glutamates and nucleotides are combined, their umami effect is synergistic — multiplied many times. This explains why classic combinations (Parmesan + tomato, dashi with kombu + katsuobushi, meat stock) taste so deeply savoury."},
{q:"What is 'pH' in a food science context and how does acidity affect cooking?",opts:["pH is a measure of temperature stability in food — acidic foods (low pH) are more heat-resistant while alkaline foods (high pH) lose their structure and colour faster during cooking","pH measures the concentration of hydrogen ions in a solution — acidic foods (pH below 7) affect colour (anthocyanins turn red in acid, blue in alkali), protein denaturation, starch behaviour, and the growth of microorganisms","pH is a measure of sugar concentration in food — high pH foods are sweeter while low pH foods are more bitter and require more seasoning to balance their natural flavour","pH is a measurement used only in food preservation and has no relevance to cooking techniques — chefs use taste alone to assess whether a dish has the correct acid balance"],ans:1,exp:"pH (0–14 scale) measures acidity/alkalinity. In cooking: acid (lemon juice, vinegar, wine) denatures protein (ceviche 'cooks' fish), preserves green vegetables only if added at the end (acid turns chlorophyll brown), sets pectin in jam, prevents enzymatic browning, and inhibits microbial growth. Alkali (baking soda) accelerates Maillard reaction, turns tortillas golden, and deepens chocolate colour in Dutch-process cocoa."},
{q:"What is 'myoglobin' and how does it explain the colour changes in meat during cooking?",opts:["Myoglobin is the connective tissue protein in meat that turns from white to transparent when fully cooked — the clarity of myoglobin is used to determine whether meat is safe to eat","Myoglobin is the oxygen-storing pigment protein in muscle tissue — it is red when oxygenated, purple-red in vacuum-packed meat, and turns grey-brown (metmyoglobin) when fully cooked above 70°C","Myoglobin is the fat molecule in meat that melts during cooking — as myoglobin renders out of the muscle, the meat lightens in colour and becomes drier and firmer in texture","Myoglobin is a carbohydrate compound in red meat that breaks down during the ageing process — the breakdown of myoglobin is what gives aged beef its characteristic deep burgundy colour"],ans:1,exp:"Myoglobin stores oxygen in muscle tissue and gives meat its red colour. Oxygenated myoglobin (oxymyoglobin) = bright cherry red (fresh cut surface). Deoxygenated myoglobin = dark purple-red (vacuum-packed meat). When heated above 60°C, myoglobin denatures into metmyoglobin — grey-brown. This colour change indicates doneness. Dark meat (thigh, duck, lamb) contains more myoglobin than white meat (chicken breast, veal)."},
{q:"What is 'water activity' (aw) in food science and how does it relate to food safety?",opts:["Water activity is the total water content of a food by weight — foods with high water content always spoil faster than foods with low water content regardless of other preservation factors","Water activity measures the availability of free water in food for microbial growth — a scale of 0–1 where 1 is pure water. Most bacteria need aw above 0.91 to grow. Reducing water activity (drying, salting, adding sugar) preserves food by limiting microbial growth","Water activity is the rate at which water evaporates from food during cooking — high water activity foods lose moisture faster during roasting and require more frequent basting","Water activity is a measurement of the pH of the water content of food — acidic water (low water activity) inhibits bacterial growth while alkaline water (high water activity) promotes it"],ans:1,exp:"Water activity (aw) measures available free water — water not bound to solutes. Pure water = aw 1.0. Most pathogenic bacteria need aw above 0.91. Reducing aw through drying, salting, smoking, or adding sugar (jam) removes available water for microbial growth. Fresh meat aw ≈ 0.99 (high risk); dried meat/jerky aw ≈ 0.70 (shelf stable); jam aw ≈ 0.80 (preserved by sugar)."},
{q:"What is the role of 'salt' in cooking beyond seasoning?",opts:["Salt in cooking serves only as a flavour enhancer — it has no structural, chemical, or biological role in any cooking process other than making food taste more savoury","Salt suppresses bitterness and enhances other flavours, draws moisture from vegetables through osmosis, denatures proteins in curing and brining, controls yeast fermentation in bread, and acts as a preservative by reducing water activity","Salt is used in cooking exclusively to balance sweetness in desserts and baked goods — its role in savoury cooking is only as a direct seasoning applied at the end of cooking","Salt in cooking works by raising the boiling point of water significantly — a highly salted pasta cooking water reaches a much higher temperature than unsalted water, cooking pasta faster"],ans:1,exp:"Salt is one of the most functionally important ingredients in cooking: enhances flavour (suppresses bitterness, heightens sweetness and savouriness), osmosis (draws moisture from vegetables — degorging aubergine, wilting cucumber for salad), protein denaturation (curing salmon, making gravlax), yeast control (regulates fermentation speed in bread dough), preservation (reducing water activity), and texture modification (firming vegetable cell walls). Raising pasta water boiling point is negligible — the real reason to salt pasta water is flavour."},
{q:"What is 'tempering' chocolate and what science makes it necessary?",opts:["Tempering chocolate means adding warm milk to melted dark chocolate to lower its temperature — the milk proteins prevent the chocolate from seizing when it comes into contact with cold ingredients","Tempering chocolate is the process of carefully melting and cooling chocolate through precise temperature stages to align cocoa butter crystals into Form V — producing a glossy finish, clean snap, and resistance to bloom","Tempering chocolate means adding sugar and vanilla to melted cocoa mass — the sugar crystals provide structure and prevent the chocolate from becoming grainy when it sets at room temperature","Tempering chocolate is the process of removing excess moisture from melted chocolate by stirring it over a water bath — moisture causes chocolate to seize, so tempering dries it before moulding"],ans:1,exp:"Cocoa butter can solidify into 6 different crystal forms (I–VI). Only Form V produces glossy, snappy, bloom-resistant chocolate. Tempering: melt chocolate to 45°C (destroy all crystals), cool to 27°C (Form V crystals form), reheat to 31°C (melt unstable crystals, leaving only Form V seeds). If untempered, unstable crystals form — producing dull, soft, bloom-covered chocolate with a waxy texture."},
{q:"What causes bread to rise during baking and what happens to the structure when it sets?",opts:["Bread rises because steam from the water in the dough expands at high temperatures — the steam pushes the dough outward and upward until the exterior crust forms and traps the shape permanently","Bread rises because yeast produces CO2 during fermentation, which is trapped by the gluten network. In the oven, CO2 and steam expand further (oven spring), then gluten proteins set and starch gelatinises, locking the structure in place permanently","Bread rises because baking soda reacts with the natural acidity in flour — the reaction produces CO2 that inflates the dough before the crust sets during the final baking stage","Bread rises because the fat in the recipe coats air bubbles formed during mixing — these air bubbles expand in the oven heat and the gluten structure sets around them to hold the final shape"],ans:1,exp:"Bread rise sequence: Yeast ferments sugars → CO2 produced → trapped by gluten network (first rise). In the oven: CO2 and steam expand rapidly (oven spring, first 10–15 minutes). Above 60°C: gluten proteins coagulate and starch gelatinises — these two processes lock the structure permanently. Above 100°C: surface water evaporates, Maillard reaction browns the crust. The bread is now structurally set."},
{q:"What is 'spherification' in modern gastronomy and what science underlies it?",opts:["Spherification is a classical French technique for shaping soft cheese into perfect spheres using a round mould — the cheese sets naturally through chilling without any chemical agents","Spherification is a modernist technique using sodium alginate and calcium chloride — when alginate solution meets calcium ions, a gel membrane forms instantly on the surface, creating liquid-filled spheres","Spherification is the process of shaping hot sugar syrup into spherical forms by blowing air through it — the technique creates hollow sugar spheres used as decorative elements in pastry","Spherification is the process of clarifying a cloudy liquid into a clear sphere shape using gelatin and a spherical mould — the gelatin sets into a perfectly clear globe at refrigerator temperature"],ans:1,exp:"Spherification was popularised by Ferran Adrià at El Bulli. Basic spherification: a flavoured liquid mixed with sodium alginate is dropped into a calcium chloride bath. The calcium ions react with alginate to form a thin gel membrane on contact — creating a sphere with a liquid interior that bursts in the mouth. It is the basis of fake caviar, olive oil spheres, and juice pearls in modern gastronomy."},
{q:"What is 'sous vide' cooking from a scientific perspective and what precise results does it achieve?",opts:["Sous vide is a high-pressure cooking method that forces liquid deep into food at above boiling point temperatures — it produces very fast cooking times and exceptional flavour intensity","Sous vide cooks vacuum-sealed food in a precisely temperature-controlled water bath — the food cannot exceed the set water temperature, so proteins denature uniformly throughout without overcooking the exterior","Sous vide is a dry heat method using a sealed oven chamber at very low temperatures — the sealed environment prevents moisture loss and allows the food to cook in its own evaporated juices","Sous vide is a cold technique that uses liquid nitrogen to rapidly chill food to exact serving temperatures — controlling the texture of proteins and ice crystals in cold preparations"],ans:1,exp:"Sous vide exploits the fact that water cannot exceed its set temperature. Chicken breast cooked at 63°C for 2 hours: every part of the meat reaches exactly 63°C — no more. Proteins denature uniformly at this precise temperature, producing a consistently cooked result impossible to achieve in a hot pan where the surface reaches 180°C+ while the centre lags. The result is perfectly even texture from edge to edge."},
{q:"What is 'fermentation' in food science and give three examples of fermented foods?",opts:["Fermentation is the process of heating food above 100°C to sterilise it — examples of fermented foods are canned tomatoes, pasteurised milk, and vacuum-sealed deli meats","Fermentation is the metabolic process by which microorganisms (bacteria, yeast, moulds) convert sugars into alcohol, acids, or gases — examples: yoghurt (lactobacillus bacteria), bread (yeast), and soy sauce (multiple organisms over months)","Fermentation is the chemical process of breaking down fats using enzymes — examples of fermented products are clarified butter (ghee), rendered lard, and cold-pressed extra virgin olive oil","Fermentation is the controlled dehydration of food using salt or sugar — examples of fermented foods are sun-dried tomatoes, candied fruit, and salt-cured meat products"],ans:1,exp:"Fermentation is anaerobic or aerobic metabolic conversion of sugars by microorganisms. Alcoholic fermentation (yeast): sugars → ethanol + CO2 (bread, beer, wine). Lactic acid fermentation (bacteria): sugars → lactic acid (yoghurt, cheese, kimchi, sourdough). Acetic acid fermentation (bacteria): ethanol → acetic acid (vinegar). Fermentation preserves food, develops complex flavours, increases bioavailability of nutrients, and produces probiotics."},
{q:"What is 'reduction' from a scientific perspective and what does it do to a sauce?",opts:["Reduction is the chemical process of adding a reducing agent such as lemon juice or vinegar to a sauce — the acid reduces the pH of the sauce and concentrates its flavour through a chemical reaction","Reduction is the evaporation of water from a liquid through simmering — as water escapes, the concentration of flavour compounds, sugars, gelatin, and other solutes increases, producing a thicker, more intense sauce","Reduction is the breakdown of starch molecules in a sauce through prolonged heating — the reduction of starch concentration makes the sauce thinner over time rather than thicker","Reduction is the process of removing fat from the surface of a sauce as it cooks — by removing fat, the sauce is reduced in caloric content and the remaining liquid becomes more concentrated"],ans:1,exp:"Reduction is simple evaporation of water. As water boils off, the concentration of everything else — flavour compounds, sugars, acids, gelatin, salt, colour — increases proportionally. A sauce reduced by half has twice the concentration of all solutes. The gelatin concentration increases viscosity. Flavours intensify. Colour deepens. This is why long-reduced stocks and demi-glace have such extraordinary depth of flavour."},
{q:"What is 'acid cookery' and how does ceviche demonstrate protein denaturation without heat?",opts:["Acid cookery is the use of vinegar or citrus in pickles and preserves — ceviche demonstrates this by soaking fish in salt water until it becomes firm, using osmosis rather than denaturation","Acid cookery uses the low pH of citrus juice or vinegar to denature proteins — in ceviche, lime juice lowers pH around the fish, causing protein chains to unfold and bond together, turning the fish opaque and firm without heat","Acid cookery is a chemical leavening technique using acid to activate baking soda — ceviche is unrelated to acid cookery and is classified instead as a cold marinating technique","Acid cookery refers only to the use of acidulated water to prevent enzymatic browning — ceviche demonstrates this by submerging fish in acidulated water to preserve its pale colour before serving"],ans:1,exp:"Acid denaturation: low pH (lime juice, pH ~2) disrupts hydrogen bonds in protein chains, causing them to unfold (denature) and then bond together (coagulate). This is the same structural change that heat causes — but at room temperature, driven by pH change instead of thermal energy. The fish in ceviche turns opaque, firms up, and appears cooked — the proteins have denatured. However, acid cannot kill all pathogens like heat does."},
{q:"What is the 'water cycle' in cooking — specifically how does steam affect baking?",opts:["Steam in baking is always undesirable — it makes the crust soft and must be eliminated by keeping the oven door open during the first 10 minutes of bread baking","Steam in the oven during the first stage of bread baking keeps the dough surface moist and extensible, allowing maximum oven spring before the crust sets — then the steam is released so the crust dries and crisps","Steam in baking is produced only by eggs in the batter — the water in egg whites converts to steam during baking and is the sole reason baked goods rise in a conventional oven","Steam in baking permanently softens the crust and must be replaced by dry heat for the final 10 minutes — professional bakers never use steam in any stage of the bread baking process"],ans:1,exp:"Professional deck ovens inject steam during the first 10–15 minutes of bread baking (oven spring phase). Steam condenses on the cool dough surface, keeping it elastic and moist so it can expand fully with the rapidly expanding CO2. Once maximum volume is achieved, steam is released and dry heat sets the crust — Maillard reaction browns it. Artisan bread without steam injection produces a thicker, less glossy, less well-developed crust."},
{q:"What is 'blanching' from a food science perspective and why does it preserve the green colour of vegetables?",opts:["Blanching preserves green colour by rapidly reducing the pH of the vegetable's cell fluid through exposure to boiling water — the acidic environment stabilises the green chlorophyll pigment permanently","Blanching briefly destroys enzymes (peroxidase, chlorophyllase) in green vegetables that would otherwise break down chlorophyll into pheophytin (a drab olive-brown compound) — the subsequent ice bath stops all enzymatic activity and locks the bright green colour","Blanching preserves green colour by removing the outer waxy coating of green vegetables — without this coating, the chlorophyll pigment is more visible to the eye and appears more intensely green","Blanching preserves green colour by injecting the vegetable cells with oxygen — the oxygenated cells produce more chlorophyll to compensate for the brief heat exposure during the blanching process"],ans:1,exp:"Green vegetables contain chlorophyll (bright green) and enzymes that convert it to pheophytin (drab olive) through heat and natural degradation. Blanching destroys these enzymes rapidly. The subsequent ice bath stops all enzymatic activity and halts cooking. Result: vibrant green colour locked in. Important: do not add acidic ingredients (lemon, vinegar) before blanching — acid accelerates chlorophyll breakdown to pheophytin."},
{q:"What is 'umami synergy' and how is it applied in cooking to build depth of flavour?",opts:["Umami synergy is the process of adding multiple types of salt to a dish simultaneously — using sea salt, soy sauce, and fish sauce together multiplies the total saltiness beyond what each contributes alone","Umami synergy occurs when glutamates and nucleotides are combined — their umami effect is multiplied many times beyond their individual contributions, explaining why certain classic combinations taste remarkably rich and complex","Umami synergy is the combination of all five tastes (sweet, sour, salty, bitter, umami) in a single dish — achieving this balance simultaneously is the definition of a well-seasoned professional preparation","Umami synergy is a marketing term with no scientific basis — the five tastes are independent and do not interact with or enhance each other when combined in the same dish or preparation"],ans:1,exp:"Umami synergy (discovered by Kuninaka in 1960): glutamates + nucleotides produce a synergistic effect 5–8 times greater than either alone. Application: Parmesan (glutamates) + anchovies (nucleotides) in Caesar dressing. Dashi: kombu (glutamates) + katsuobushi/bonito (nucleotides). Tomato sauce + meat (nucleotides). Stock (glutamates from bones) + mushrooms (guanylate nucleotides). This science explains why layering umami sources creates extraordinary depth of flavour."}
];
let order=[],cur=0,picks={},playerName='',score=0;
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function goBack(){if(confirm('Quit quiz and return to subjects?'))window.location.href='index.html';}
function startQuiz(){const inp=document.getElementById('name-input').value.trim();playerName=inp||'Anonymous';order=shuffle(BANK.map((_,i)=>i));cur=0;picks={};score=0;document.getElementById('q-total').textContent=BANK.length;show('quiz-screen');render();}
function render(){const idx=order[cur],q=BANK[idx],total=BANK.length;document.getElementById('q-num').textContent=cur+1;document.getElementById('q-score').textContent=score;document.getElementById('q-label').textContent=`Question ${cur+1} of ${total}`;document.getElementById('q-text').textContent=q.q;document.getElementById('progress-fill').style.width=((cur/total)*100)+'%';document.getElementById('explanation').className='explanation';document.getElementById('explanation').textContent='';document.getElementById('next-btn').className='next-btn';document.getElementById('quit-btn').className='quit-btn';const letters=['A','B','C','D'],optEl=document.getElementById('options');optEl.innerHTML='';shuffle([0,1,2,3]).forEach((oi,li)=>{const btn=document.createElement('button');btn.className='opt-btn';btn.dataset.opt=oi;btn.innerHTML=`<span class="opt-letter">${letters[li]}</span><span>${q.opts[oi]}</span>`;btn.onclick=()=>selectAnswer(oi,idx);optEl.appendChild(btn);});}
function selectAnswer(chosen,idx){const q=BANK[idx],correct=chosen===q.ans;picks[idx]=chosen;if(correct)score++;document.getElementById('q-score').textContent=score;document.querySelectorAll('.opt-btn').forEach(btn=>{btn.disabled=true;const oi=parseInt(btn.dataset.opt);if(oi===q.ans)btn.classList.add('correct');else if(oi===chosen&&!correct)btn.classList.add('wrong');});if(!correct){const e=document.getElementById('explanation');e.textContent='✗ '+q.exp;e.classList.add('show');}const nb=document.getElementById('next-btn');nb.classList.add('show');nb.textContent=cur+1<BANK.length?'Next Question →':'See Results →';document.getElementById('quit-btn').classList.add('show');}
function nextQuestion(){cur++;if(cur>=BANK.length)showResults();else{render();window.scrollTo(0,0);}}
function showResults(){show('results-screen');const total=BANK.length,pct=Math.round((score/total)*100),passed=pct>=70;document.getElementById('result-name').textContent=playerName;document.getElementById('ring-pct').textContent=pct+'%';document.getElementById('ring-pct').style.color=passed?'var(--green)':'var(--red)';document.getElementById('ring-fill').style.stroke=passed?'var(--green)':'var(--red)';setTimeout(()=>{document.getElementById('ring-fill').style.strokeDashoffset=439.82-(439.82*pct/100);},100);document.getElementById('res-title').textContent=pct>=90?'Excellent!':pct>=70?'Passed!':'Needs Work';document.getElementById('res-sub').textContent=`${score} correct out of ${total} questions`;const v=document.getElementById('res-verdict');if(passed){v.textContent='✓ You passed — score above 70%';v.className='result-verdict pass';}else{v.textContent='✗ Below 70% — please retake the quiz';v.className='result-verdict fail';}const rv=document.getElementById('review');rv.innerHTML='<h3>Review</h3>';order.forEach(idx=>{const q=BANK[idx],ua=picks[idx],ok=ua===q.ans;const d=document.createElement('div');d.className='rv-item '+(ok?'ok':'miss');d.innerHTML=`<div class="rv-q">${q.q}</div><div class="rv-a">${ok?`<span class="c">✓ Correct: ${q.opts[q.ans]}</span>`:`<span class="w">✗ You chose: ${ua!==undefined?q.opts[ua]:'Skipped'}</span><br><span class="c">✓ Correct: ${q.opts[q.ans]}</span><br><span style="color:var(--muted)">${q.exp}</span>`}</div>`;rv.appendChild(d);});}
function retryQuiz(){order=shuffle(order);cur=0;picks={};score=0;document.getElementById('q-score').textContent=0;show('quiz-screen');render();}
document.getElementById('name-input').addEventListener('keydown',e=>{if(e.key==='Enter')startQuiz();});
</script>
