<style>

  #name-screen h1{font-size:clamp(22px,5vw,36px);font-weight:800;line-height:1.15;margin-bottom:8px;background:linear-gradient(135deg,#fff 30%,var(--purple-l));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  #name-screen p{color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;margin-bottom:40px;}
  .name-box{display:flex;flex-direction:column;align-items:center;gap:12px;}
  .name-box input{width:100%;max-width:320px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Syne',sans-serif;font-size:15px;outline:none;text-align:center;transition:border-color .2s;}

  .btn-primary{padding:12px 32px;background:var(--purple);color:#fff;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:background .2s,transform .1s;letter-spacing:.5px;}

  .opt-btn .opt-letter{flex-shrink:0;width:26px;height:26px;border-radius:6px;background:var(--border);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);transition:background .15s,color .15s;}

  .score-ring svg{transform:rotate(-90deg);}
  .score-ring .ring-bg{fill:none;stroke:var(--border);stroke-width:10;}
  .score-ring .ring-fill{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1s ease,stroke .5s;}
  .score-ring .ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .ring-pct{font-size:34px;font-weight:800;line-height:1;}
  .ring-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:4px;letter-spacing:1px;}
  .result-title{font-size:24px;font-weight:800;margin-bottom:8px;}
  .result-sub{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);margin-bottom:8px;}
  .result-verdict{font-family:'DM Mono',monospace;font-size:12px;padding:8px 20px;border-radius:20px;display:inline-block;margin-bottom:32px;}
  .result-verdict.pass{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.3);}
  .result-verdict.fail{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.3);}
  .result-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:40px;}
  .btn-outline{padding:11px 24px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:border-color .2s,color .2s;}
  .btn-outline:hover{border-color:var(--purple);color:var(--text);}
  .review{text-align:left;}
  .review h3{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:16px;font-family:'DM Mono',monospace;}
  .rv-item{padding:14px 16px;border-radius:8px;margin-bottom:10px;border:1px solid var(--border);}
  .rv-item.ok{border-color:rgba(34,197,94,.25);background:rgba(34,197,94,.05);}
  .rv-item.miss{border-color:rgba(239,68,68,.25);background:rgba(239,68,68,.05);}
  .rv-q{font-size:13px;font-weight:600;margin-bottom:8px;line-height:1.4;}
  .rv-a{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);line-height:1.6;}
  .rv-a .c{color:var(--green);}
  .rv-a .w{color:var(--red);}
</style>

<script>
const BANK = [
  {
    q: "Who is credited with creating the modern kitchen brigade system?",
    opts: [
      "Auguste Escoffier, who organised the kitchen into specialised stations with defined roles to improve efficiency in large hotel kitchens",
      "Marie-Antoine Carême, who introduced the brigade while working in the French royal court and codified classical French cuisine",
      "Paul Bocuse, who restructured kitchen roles in the 1970s to adapt classical hierarchy to modern restaurant service",
      "Fernand Point, who developed the brigade model at his restaurant La Pyramide to train a generation of French chefs"
    ],
    ans: 0,
    exp: "Auguste Escoffier developed the brigade de cuisine in the late 19th century while working at the Savoy and Ritz hotels. He reorganised kitchen labour into defined stations and ranks to improve speed, consistency, and accountability."
  },
  {
    q: "What is the correct meaning of 'brigade de cuisine'?",
    opts: [
      "A team of kitchen staff organised into a structured hierarchy with defined roles, ranks, and responsibilities for each position",
      "A French cooking competition held annually to determine the best commis chef across European hotel kitchens",
      "A brigade of service staff responsible for delivering food from the kitchen pass directly to the guest's table",
      "A cleaning rotation system where kitchen staff rotate sanitation duties across all stations at the end of service"
    ],
    ans: 0,
    exp: "'Brigade de cuisine' means 'kitchen brigade' — the hierarchical team structure of a professional kitchen where every role has a defined position, responsibility, and chain of command, modelled on military organisation."
  },
  {
    q: "In the classical brigade system, which position sits directly below the Executive Chef and takes operational command of the kitchen during service?",
    opts: [
      "The Chef de Partie, who manages a single station and directs commis chefs assigned to that area during each service",
      "The Sous Chef, who oversees daily kitchen operations, supervises all stations, and assumes full command when the Executive Chef is absent",
      "The Expeditor, who coordinates order flow between the front of house and all cooking stations during a busy service",
      "The Senior Commis Chef, who leads the junior kitchen staff and manages mise en place preparation across all sections"
    ],
    ans: 1,
    exp: "The Sous Chef (Under Chef) is second in command. They manage the brigade during service, ensure quality standards, supervise station chefs, and run the kitchen entirely when the Executive Chef is not present."
  },
  {
    q: "What is the specific responsibility of a 'Saucier' in the classical brigade?",
    opts: [
      "Preparing all cold dishes, salads, pâtés, and charcuterie items served from the cold kitchen section",
      "Managing all deep-fried and shallow-fried dishes produced on the fry station during service",
      "Producing all sauces, stocks, hot appetisers, and sautéed dishes — considered the most prestigious station in the brigade",
      "Overseeing all roasted, grilled, and broiled proteins served across the hot sections during service"
    ],
    ans: 2,
    exp: "The Saucier is widely regarded as the most skilled and prestigious hot kitchen station. They are responsible for all sauces, stocks, braised dishes, hot appetisers, and sautéed items — requiring the deepest culinary knowledge."
  },
  {
    q: "Which role in the kitchen brigade is responsible exclusively for roasted and braised meats?",
    opts: [
      "The Poissonnier, who manages all fish cookery including poaching, pan-frying, and preparing fish sauces and garnishes",
      "The Rôtisseur, who oversees all roasting, braising, and grilling of meats and their accompanying jus and roasting sauces",
      "The Entremetier, who is responsible for all vegetable dishes, egg preparations, soups, and starchy side dishes",
      "The Grillardin, who handles all grilled and broiled proteins on the char-grill station during high-volume service"
    ],
    ans: 1,
    exp: "The Rôtisseur manages the roast section — responsible for roasted, braised, and pot-roasted meats, along with their jus and sauces. In smaller kitchens, the Grillardin and Friturier may fall under the Rôtisseur."
  },
  {
    q: "What is the role of the 'Poissonnier' in the kitchen brigade?",
    opts: [
      "Managing the pastry section including all desserts, breads, and sweet preparations served throughout the meal",
      "Overseeing all vegetable cookery, egg dishes, soups, and pasta prepared for the hot sections during service",
      "Responsible for all fish and seafood cookery including poaching, grilling, frying, and producing fish sauces and stocks",
      "Managing the larder section including butchery, portioning of raw proteins, and cold food preparation"
    ],
    ans: 2,
    exp: "The Poissonnier is the fish chef, responsible for all fish and seafood preparation and cooking — including fish stocks and sauces. In hotels with high seafood volume, this is a dedicated senior station."
  },
  {
    q: "What does the 'Entremetier' position cover in a classical brigade?",
    opts: [
      "All sauce production, stock reduction, and hot appetisers served from the main hot section during service",
      "Vegetables, soups, egg dishes, and starchy sides — acting as the supporting hot section alongside the Saucier and Rôtisseur",
      "All cold starters, terrines, and charcuterie items prepared and plated in the garde manger section",
      "Breakfast cookery, room service items, and staff meals prepared separately from the main service brigade"
    ],
    ans: 1,
    exp: "The Entremetier handles vegetables, soups, egg dishes, pasta, and starchy accompaniments. In large brigades this splits into Potager (soups) and Légumier (vegetables) as separate sub-roles."
  },
  {
    q: "What is the role of the 'Garde Manger' in the brigade system?",
    opts: [
      "Supervising all hot cooking stations during service and ensuring consistent timing across all sections of the kitchen",
      "Managing the cold kitchen — producing cold appetisers, salads, charcuterie, pâtés, terrines, and cold plated presentations",
      "Overseeing all purchasing, receiving, and storage of fresh produce delivered to the kitchen each morning",
      "Preparing and portioning all raw proteins including butchery, fish fabrication, and poultry breakdown for other stations"
    ],
    ans: 1,
    exp: "The Garde Manger (Larder Chef) runs the cold kitchen — responsible for cold starters, salads, charcuterie, pâtés, terrines, canapés, and decorative cold platters. In large hotels this is a significant department."
  },
  {
    q: "What is the 'Pâtissier' responsible for in a full brigade?",
    opts: [
      "Producing all hot desserts, pastries, breads, confectionery, and sugar work served throughout the meal and for banqueting",
      "Managing the cold kitchen section including ice cream, chilled desserts, and cold plated sweet courses only",
      "Preparing breakfast pastries, bread rolls, and morning service items while the main brigade handles evening service",
      "Overseeing all baking for the hotel including staff meals, bread for functions, and pastry for the coffee shop"
    ],
    ans: 0,
    exp: "The Pâtissier leads the pastry department — producing all desserts, pastries, breads, cakes, chocolates, and sugar work. In large hotels, the pastry section operates almost as a separate kitchen with its own hierarchy."
  },
  {
    q: "Where does a 'Commis Chef' sit in the brigade hierarchy, and what is their primary function?",
    opts: [
      "At the top of the junior tier, directly supervising kitchen porters and stewarding staff while reporting to the Chef de Partie",
      "At the entry level of the brigade, assisting their assigned Chef de Partie with mise en place, basic preparation, and station maintenance",
      "As a floating chef across all stations, filling gaps during service wherever staffing shortages occur on any given day",
      "As a designated trainer for kitchen apprentices, demonstrating techniques and assessing progress under the Sous Chef"
    ],
    ans: 1,
    exp: "The Commis Chef is the entry-level role. They assist the Chef de Partie on their station — carrying out prep, basic cooking tasks, and keeping the station organised. Commis I, II, and III indicate increasing seniority."
  },
  {
    q: "What is the role of the 'Chef de Partie' (CDP) in the brigade?",
    opts: [
      "Managing the entire kitchen in the absence of both the Executive Chef and Sous Chef during critical service periods",
      "Owning and operating a specific kitchen station, managing the commis chefs assigned there, and maintaining quality and output for that section",
      "Acting as a liaison between front of house and back of house, coordinating order timing from the expeditor's position at the pass",
      "Overseeing all purchasing decisions and supplier relationships under the direction of the Executive Chef"
    ],
    ans: 1,
    exp: "The Chef de Partie (Station Chef) runs a specific section — grill, sauté, pastry, cold kitchen, etc. They are responsible for that section's output, quality, and the development of the commis chefs working under them."
  },
  {
    q: "In kitchen communication, when a chef calls 'Oui, Chef!' it means:",
    opts: [
      "A request for clarification on an order, asking the chef to repeat the instruction before the cook proceeds",
      "An acknowledgement of an instruction, confirming the cook has heard, understood, and will carry out the order",
      "A signal that the station has run out of a key ingredient and a replacement is being sourced from the store",
      "A formal greeting used only when the Executive Chef enters the kitchen at the start of each service period"
    ],
    ans: 1,
    exp: "'Oui, Chef!' is the standard acknowledgement in a professional kitchen. It confirms you heard the instruction and will execute it. Responding any other way — or not responding at all — is considered unprofessional."
  },
  {
    q: "What does the command 'Fire!' mean in kitchen brigade communication?",
    opts: [
      "An emergency signal indicating an actual fire in the kitchen requiring immediate evacuation of all kitchen personnel",
      "A command from the chef or expeditor to begin cooking a specific dish immediately so it is ready in time with the rest of the table",
      "An instruction to increase the heat on a specific burner to achieve a harder sear on the protein being cooked",
      "A signal that a dish has been finished and is ready to be plated and sent to the pass for quality checking"
    ],
    ans: 1,
    exp: "'Fire!' means start cooking that dish right now. It is called by the expeditor or chef to synchronise timing across stations so all dishes for a table arrive at the pass together."
  },
  {
    q: "What does 'All day' mean when used at the pass during service?",
    opts: [
      "A dish that has been on the menu all day and is available throughout both lunch and dinner service periods",
      "The total running count of a specific dish still outstanding across all open tickets at that moment in service",
      "An instruction that a particular preparation must be completed before the end of the current service period",
      "A signal that a station has been running continuously without a break and requires a rest period for the cook"
    ],
    ans: 1,
    exp: "'All day' tells a station the total number of a particular item still needed across all open tickets. For example, 'Four salmon all day' means four salmon dishes are still outstanding across all current orders."
  },
  {
    q: "What is the 'Aboyeur' (expeditor) responsible for during service?",
    opts: [
      "Plating all dishes at the pass according to the chef's specification and checking presentation before service to the guest",
      "Calling out orders to the kitchen, coordinating timing between all stations, and ensuring complete tables leave the pass together",
      "Managing the order of mise en place tasks assigned to each station chef before the start of service each day",
      "Receiving food deliveries at the back door and checking them against the purchase order before storing correctly"
    ],
    ans: 1,
    exp: "The Aboyeur calls orders to the kitchen, manages ticket flow, coordinates timing across stations, and ensures dishes for a table are completed simultaneously. In many kitchens this role is performed by the Sous Chef or Executive Chef."
  },
  {
    q: "Which position is responsible for preparing breakfast items, omelettes, and egg dishes in a large hotel brigade?",
    opts: [
      "The Tournant, who rotates across all stations and covers whichever section is short-staffed on any given service",
      "The Entremetier, who covers egg dishes and breakfast preparations as part of their broader vegetable and starchy sides remit",
      "The Breakfast Chef or designated morning Commis, working under the Entremetier or a senior chef for morning service only",
      "The Garde Manger chef, who extends their cold kitchen duties to include cold breakfast items and fruit platters each morning"
    ],
    ans: 2,
    exp: "In large hotel brigades, breakfast service is handled by a Breakfast Chef or senior Commis working morning shifts, typically under the Entremetier's section. This keeps breakfast operations separate from main service prep."
  },
  {
    q: "What is the 'Tournant' (relief chef) in the brigade system?",
    opts: [
      "A junior chef assigned permanently to the larder section to assist with cold food preparation and butchery tasks",
      "A senior chef who rotates across all stations, covering for absent chefs and providing support wherever it is needed during service",
      "The chef responsible for turning vegetables into barrel shapes and other classical garnish cuts for fine dining presentations",
      "An external chef brought in from a staffing agency to fill gaps during high-volume periods such as festive service"
    ],
    ans: 1,
    exp: "The Tournant (swing chef or relief chef) is a highly skilled, versatile member of the brigade who can operate effectively on any station. They cover absences and provide support wherever needed — requiring knowledge of the entire kitchen."
  },
  {
    q: "In the kitchen brigade, what is meant by the term 'mise en place check'?",
    opts: [
      "A formal inspection conducted by the Executive Chef to assess whether all stations have their preparation complete before service begins",
      "A daily inventory count of all dry goods and perishables conducted by the Sous Chef before ordering from suppliers",
      "A cleaning inspection carried out by the head kitchen steward to verify all surfaces meet hygiene standards before service",
      "A tasting session led by the Executive Chef to confirm that all sauces and preparations meet the required flavour standard"
    ],
    ans: 0,
    exp: "A mise en place check is a pre-service inspection where the Sous Chef or Executive Chef verifies each station has all its preparations complete, properly stored, labelled, and ready for the demands of service."
  },
  {
    q: "What is the correct chain of command in the classical brigade from most senior to most junior?",
    opts: [
      "Sous Chef → Executive Chef → Chef de Partie → Commis Chef → Kitchen Porter",
      "Executive Chef → Sous Chef → Chef de Partie → Commis Chef → Kitchen Porter",
      "Chef de Partie → Sous Chef → Executive Chef → Commis Chef → Kitchen Porter",
      "Executive Chef → Chef de Partie → Sous Chef → Commis Chef → Kitchen Porter"
    ],
    ans: 1,
    exp: "The classical hierarchy runs: Executive Chef → Sous Chef → Chef de Partie → Commis Chef → Kitchen Porter/Apprentice. Each level reports to the one above it, maintaining clear accountability and communication flow."
  },
  {
    q: "What does 'working the line' mean in a professional kitchen?",
    opts: [
      "Following the recipe card line by line during preparation to ensure precise replication of a standardised dish",
      "Cooking on the hot line during active service — managing orders, executing dishes, and maintaining pace on a station",
      "Receiving a queue of deliveries along the kitchen loading dock and processing them into cold store or dry store",
      "Cleaning along the kitchen floor drain lines at the end of service as part of the deep cleaning rotation"
    ],
    ans: 1,
    exp: "'Working the line' refers to cooking on the hot section during service. The 'line' is the row of cooking equipment — stoves, grills, fryers — where chefs execute dishes to order under service pressure."
  },
  {
    q: "In a modern smaller kitchen, how is the brigade system typically adapted?",
    opts: [
      "The system is abandoned entirely, with all chefs performing equal tasks without any hierarchy or designated stations",
      "The Executive Chef takes on all cooking responsibilities themselves, with commis chefs only handling cleaning and prep",
      "Roles are consolidated — one chef may cover multiple classical stations, and the hierarchy is flatter but still structured",
      "The brigade system is replaced by a rotation schedule where all staff change stations every 30 minutes during service"
    ],
    ans: 2,
    exp: "In smaller kitchens, one chef may cover the work of two or three classical stations. The hierarchy still exists but is compressed — a Chef de Partie might run both sauté and grill, for example. The structure remains, just with fewer people."

let order=[],cur=0,picks={},playerName='',score=0;
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function startQuiz(){const inp=document.getElementById('name-input').value.trim();playerName=inp||'Anonymous';order=shuffle(BANK.map((_,i)=>i));cur=0;picks={};score=0;document.getElementById('q-total').textContent=BANK.length;show('quiz-screen');render();}
function render(){
  const idx=order[cur],q=BANK[idx],total=BANK.length;
  document.getElementById('q-num').textContent=cur+1;
  document.getElementById('q-score').textContent=score;
  document.getElementById('q-label').textContent=`Question ${cur+1} of ${total}`;
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('progress-fill').style.width=((cur/total)*100)+'%';
  document.getElementById('explanation').className='explanation';
  document.getElementById('explanation').textContent='';
  document.getElementById('next-btn').className='next-btn';
  const letters=['A','B','C','D'],optEl=document.getElementById('options');
  optEl.innerHTML='';
  shuffle([0,1,2,3]).forEach((oi,li)=>{
    const btn=document.createElement('button');
    btn.className='opt-btn';btn.dataset.opt=oi;
    btn.innerHTML=`<span class="opt-letter">${letters[li]}</span><span>${q.opts[oi]}</span>`;
    btn.onclick=()=>selectAnswer(oi,idx);
    optEl.appendChild(btn);
  });
}
function selectAnswer(chosen,idx){
  const q=BANK[idx],correct=chosen===q.ans;
  picks[idx]=chosen;if(correct)score++;
  document.getElementById('q-score').textContent=score;
  document.querySelectorAll('.opt-btn').forEach(btn=>{
    btn.disabled=true;const oi=parseInt(btn.dataset.opt);
    if(oi===q.ans)btn.classList.add('correct');
    else if(oi===chosen&&!correct)btn.classList.add('wrong');
  });
  if(!correct){const e=document.getElementById('explanation');e.textContent='✗ '+q.exp;e.classList.add('show');}
  const nb=document.getElementById('next-btn');nb.classList.add('show');
  nb.textContent=cur+1<BANK.length?'Next Question →':'See Results →';
}
function nextQuestion(){cur++;if(cur>=BANK.length)showResults();else{render();window.scrollTo(0,0);}}
function showResults(){
  show('results-screen');
  const total=BANK.length,pct=Math.round((score/total)*100),passed=pct>=70;
  document.getElementById('result-name').textContent=playerName;
  document.getElementById('ring-pct').textContent=pct+'%';
  document.getElementById('ring-pct').style.color=passed?'var(--green)':'var(--red)';
  document.getElementById('ring-fill').style.stroke=passed?'var(--green)':'var(--red)';
  setTimeout(()=>{document.getElementById('ring-fill').style.strokeDashoffset=439.82-(439.82*pct/100);},100);
  document.getElementById('res-title').textContent=pct>=90?'Excellent!':pct>=70?'Passed!':'Needs Work';
  document.getElementById('res-sub').textContent=`${score} correct out of ${total} questions`;
  const v=document.getElementById('res-verdict');
  if(passed){v.textContent='✓ You passed — score above 70%';v.className='result-verdict pass';}
  else{v.textContent='✗ Below 70% — please retake the quiz';v.className='result-verdict fail';}
  const rv=document.getElementById('review');rv.innerHTML='<h3>Review</h3>';
  order.forEach(idx=>{
    const q=BANK[idx],ua=picks[idx],ok=ua===q.ans;
    const d=document.createElement('div');d.className='rv-item '+(ok?'ok':'miss');
    d.innerHTML=`<div class="rv-q">${q.q}</div><div class="rv-a">${ok
      ?`<span class="c">✓ Correct: ${q.opts[q.ans]}</span>`
      :`<span class="w">✗ You chose: ${ua!==undefined?q.opts[ua]:'Skipped'}</span><br><span class="c">✓ Correct: ${q.opts[q.ans]}</span><br><span style="color:var(--muted)">${q.exp}</span>`
    }</div>`;
    rv.appendChild(d);
  });
}
function retryQuiz(){order=shuffle(order);cur=0;picks={};score=0;document.getElementById('q-score').textContent=0;show('quiz-screen');render();}
document.getElementById('name-input').addEventListener('keydown',e=>{if(e.key==='Enter')startQuiz();});
</script>
