<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Types of Restaurants — July 2026 Exam</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍳</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap');
  :root{--bg:#080810;--surface:#11111f;--border:#1e1e35;--purple:#7c3aed;--purple-l:#9d5bf0;--green:#22c55e;--red:#ef4444;--text:#e8e8f0;--muted:#7070a0;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:.4;pointer-events:none;z-index:0;}
  .screen{position:relative;z-index:1;width:100%;max-width:660px;margin:0 auto;padding:24px 20px 48px;display:none;}
  .screen.active{display:block;}
  #name-screen{text-align:center;padding-top:80px;}
  .back-link{display:inline-flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);text-decoration:none;letter-spacing:1px;margin-bottom:48px;transition:color .2s;}
  .back-link:hover{color:var(--purple-l);}
  .subject-tag{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--purple-l);margin-bottom:12px;}
  #name-screen h1{font-size:clamp(22px,5vw,36px);font-weight:800;line-height:1.15;margin-bottom:8px;background:linear-gradient(135deg,#fff 30%,var(--purple-l));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  #name-screen p{color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;margin-bottom:40px;}
  .name-box{display:flex;flex-direction:column;align-items:center;gap:12px;}
  .name-box input{width:100%;max-width:320px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Syne',sans-serif;font-size:15px;outline:none;text-align:center;transition:border-color .2s;}
  .name-box input:focus{border-color:var(--purple);}
  .name-box input::placeholder{color:var(--muted);}
  .btn-primary{padding:12px 32px;background:var(--purple);color:#fff;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:background .2s,transform .1s;letter-spacing:.5px;}
  .btn-primary:hover{background:var(--purple-l);transform:translateY(-1px);}
  .quiz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
  .quiz-meta{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
  .quiz-meta span{color:var(--purple-l);font-weight:500;}
  .quiz-back{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);background:none;border:1px solid var(--border);padding:5px 10px;border-radius:6px;cursor:pointer;transition:color .2s,border-color .2s;}
  .quiz-back:hover{color:var(--text);border-color:var(--purple);}
  .progress-bar{width:100%;height:3px;background:var(--border);border-radius:2px;margin-bottom:32px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--purple-l));border-radius:2px;transition:width .3s ease;}
  .question-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--purple-l);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
  .question-text{font-size:clamp(15px,3vw,18px);font-weight:600;line-height:1.5;margin-bottom:28px;color:var(--text);}
  .options{display:flex;flex-direction:column;gap:10px;}
  .opt-btn{display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;font-weight:400;cursor:pointer;text-align:left;transition:border-color .15s,background .15s;width:100%;}
  .opt-btn:hover:not(:disabled){border-color:var(--purple);background:#16162a;}
  .opt-btn .opt-letter{flex-shrink:0;width:26px;height:26px;border-radius:6px;background:var(--border);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);transition:background .15s,color .15s;}
  .opt-btn:hover:not(:disabled) .opt-letter{background:var(--purple);color:#fff;}
  .opt-btn.correct{border-color:var(--green);background:rgba(34,197,94,.1);}
  .opt-btn.correct .opt-letter{background:var(--green);color:#fff;}
  .opt-btn.wrong{border-color:var(--red);background:rgba(239,68,68,.1);}
  .opt-btn.wrong .opt-letter{background:var(--red);color:#fff;}
  .opt-btn:disabled{cursor:default;}
  .explanation{display:none;margin-top:16px;padding:14px 16px;background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.25);border-left:3px solid var(--purple);border-radius:8px;font-size:13px;line-height:1.6;color:#c4b5fd;font-family:'DM Mono',monospace;}
  .explanation.show{display:block;}
  .action-row{display:flex;gap:10px;margin-top:24px;}
  .next-btn{flex:1;padding:13px;background:var(--purple);color:#fff;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;display:none;transition:background .2s;letter-spacing:.5px;}
  .next-btn:hover{background:var(--purple-l);}
  .next-btn.show{display:block;}
  .quit-btn{padding:13px 18px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;display:none;transition:color .2s,border-color .2s;white-space:nowrap;}
  .quit-btn:hover{color:var(--text);border-color:var(--purple);}
  .quit-btn.show{display:block;}
  #results-screen{text-align:center;padding-top:40px;}
  .result-name{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);margin-bottom:32px;}
  .score-ring{position:relative;width:160px;height:160px;margin:0 auto 28px;}
  .score-ring svg{transform:rotate(-90deg);}
  .score-ring .ring-bg{fill:none;stroke:var(--border);stroke-width:10;}
  .score-ring .ring-fill{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1s ease,stroke .5s;}
  .score-ring .ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .ring-pct{font-size:34px;font-weight:800;line-height:1;}
  .ring-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:4px;letter-spacing:1px;}
  .result-title{font-size:24px;font-weight:800;margin-bottom:8px;}
  .result-sub{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);margin-bottom:8px;}
  .result-verdict{font-family:'DM Mono',monospace;font-size:12px;padding:8px 20px;border-radius:20px;display:inline-block;margin-bottom:32px;}
  .result-verdict.pass{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.3);}
  .result-verdict.fail{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.3);}
  .result-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:40px;}
  .btn-outline{padding:11px 24px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:border-color .2s,color .2s;}
  .btn-outline:hover{border-color:var(--purple);color:var(--text);}
  .review{text-align:left;}
  .review h3{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:16px;font-family:'DM Mono',monospace;}
  .rv-item{padding:14px 16px;border-radius:8px;margin-bottom:10px;border:1px solid var(--border);}
  .rv-item.ok{border-color:rgba(34,197,94,.25);background:rgba(34,197,94,.05);}
  .rv-item.miss{border-color:rgba(239,68,68,.25);background:rgba(239,68,68,.05);}
  .rv-q{font-size:13px;font-weight:600;margin-bottom:8px;line-height:1.4;}
  .rv-a{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);line-height:1.6;}
  .rv-a .c{color:var(--green);}
  .rv-a .w{color:var(--red);}
</style>
</head>

  <div class="name-box">

<script>
const BANK=[{q:"What is a 'café' in the context of food service establishments?",opts:["A large, formal dining establishment serving multi-course meals with full table service, typically requiring reservations and offering an extensive wine list","A casual, informal establishment offering light meals, snacks, hot and cold beverages, and limited table service in a relaxed, comfortable atmosphere","A specialist establishment serving only coffee and cold beverages with no food offering, targeting commuters and office workers during peak morning hours","A fast food outlet operating under a franchise model, serving standardised menu items at low price points with counter service and no table waiting staff"],ans:1,exp:"A café is a casual, informal food service establishment offering light meals (sandwiches, pastries, salads), snacks, and hot and cold beverages — primarily coffee and tea. Service is typically counter-based or light table service. Cafés focus on relaxed atmosphere, accessibility, and affordability rather than formal dining."},{q:"What is a 'bistro' and what are its defining characteristics?",opts:["A bistro is a high-end tasting menu restaurant serving 8–12 small courses with wine pairing, typically run by a celebrity chef with Michelin aspirations","A bistro is a small, unpretentious French-origin restaurant offering simple, hearty food, a limited but well-chosen menu, modest décor, and a warm neighbourhood atmosphere","A bistro is a large-capacity establishment seating over 200 covers, specialising in set-price buffet dining with multiple food stations and themed cuisine sections","A bistro is a licensed bar establishment that serves food only as a secondary function to its primary business of selling alcoholic beverages to regular patrons"],ans:1,exp:"A bistro originates from French culture — small, neighbourhood restaurants with simple hearty food, modest prices, a short seasonal menu, chalkboard specials, and a warm informal atmosphere. Classic bistro dishes: steak frites, onion soup, croque monsieur, roast chicken. The focus is on honest, well-executed comfort food rather than haute cuisine."},{q:"What is a 'brasserie' and how does it differ from a bistro?",opts:["A brasserie is identical to a bistro — the two terms are completely interchangeable in both French and international culinary and hospitality contexts","A brasserie is a larger, more animated French-style establishment serving a broader menu throughout the day, typically with a bar and a louder, more bustling atmosphere than a bistro","A brasserie is a specialist seafood restaurant offering only fish and shellfish dishes, typically located near a port or coastline in the French Atlantic tradition","A brasserie is a premium fine dining restaurant with formal service, an extensive wine cellar, and a tasting menu — positioned above a bistro in the dining hierarchy"],ans:1,exp:"A brasserie (French for 'brewery') is larger and livelier than a bistro — open all day, serving breakfast through dinner with a broader menu. Classic brasserie items: choucroute garnie, moules frites, steak tartare. The atmosphere is lively and bustling, with tablecloths, mirrored walls, and professional waitstaff. It sits between a bistro and a formal restaurant."},{q:"What is 'fine dining' and what are its key characteristics?",opts:["Fine dining is any restaurant with a printed menu and table service — it covers all establishments above fast food level regardless of price, formality, or service standard","Fine dining is a premium restaurant experience characterised by exceptional food quality, formal service, elegant décor, extensive wine lists, refined plating, and typically higher price points","Fine dining is a government-regulated restaurant category requiring a minimum Michelin star rating, a minimum of 10 courses, and sommelier service at every table","Fine dining is a style of restaurant that serves only classical French cuisine in a formal setting — restaurants serving other national cuisines cannot be classified as fine dining"],ans:1,exp:"Fine dining is defined by: exceptional food quality and technical execution, formal table service (often silver service or French service), elegant décor and ambience, extensive wine and beverage programs, refined plating, personalised hospitality, and premium price points. Examples: Michelin-starred restaurants, hotel signature restaurants, and classical establishments like Joël Robuchon or Nobu."},{q:"What is a 'fast food' restaurant and what distinguishes it from other restaurant types?",opts:["A fast food restaurant is any restaurant that serves food in under 30 minutes — it covers all quick-service dining options including casual dining, cafés, and food courts","A fast food restaurant offers a limited, standardised menu prepared in advance or very quickly, served at a counter without table service, at low price points — prioritising speed and consistency over culinary complexity","A fast food restaurant is a restaurant operating only during lunch hours for the office market — dinner service is always reserved for more formal restaurant categories","A fast food restaurant is a mobile food truck or market stall serving street food — distinguished from a fixed restaurant by its lack of permanent premises and seating"],ans:1,exp:"Fast food (quick service restaurant/QSR) characteristics: standardised menu with limited choices, food prepared rapidly (often pre-cooked or assembled), counter service with no waiting staff, low price points, high volume and throughput, consistent brand standards across locations. Examples: McDonald's, KFC, Subway, Domino's. The focus is speed, value, and consistency — not culinary craft."},{q:"What is a 'casual dining' restaurant and how does it sit between fast food and fine dining?",opts:["Casual dining is identical to fine dining but with slightly lower prices — the food quality, service formality, and décor are the same as a Michelin-starred restaurant","Casual dining offers table service, a moderately priced menu with broader choices than fast food, a comfortable relaxed atmosphere, and a reasonable dining experience without the formality of fine dining","Casual dining is a style of fast food where customers order at the counter but carry their trays to a seated dining area rather than taking food away or eating standing","Casual dining is a government-defined restaurant category requiring a minimum seating capacity of 50 covers, full alcohol licensing, and a minimum of 3 menu courses at all times"],ans:1,exp:"Casual dining sits between fast food and fine dining: full table service, moderately priced menu (broader and more complex than fast food), comfortable relaxed atmosphere, no strict dress code, and a family-friendly environment. Examples: TGI Friday's, Nando's, Chili's, local family restaurants. The goal is a complete dining experience without intimidation or high cost."},{q:"What is a 'banquet' in the context of food service and what are its key operational characteristics?",opts:["A banquet is an informal shared meal for a small group of 6–10 people, typically held in a private dining room within a hotel with a pre-set family-style menu","A banquet is a large-scale, pre-planned food service event for a group — served simultaneously to a set menu at a fixed price, requiring significant advance preparation and team coordination","A banquet is a type of buffet service where guests collect their food from a central station and return to assigned tables — common for hotel breakfast service","A banquet is a special tasting menu event hosted by the Executive Chef featuring rare or seasonal ingredients, limited to 20 covers per sitting at a premium price"],ans:1,exp:"Banquet service is a large-scale, pre-planned food service event — weddings, corporate dinners, galas, conferences. All guests receive the same pre-set menu simultaneously. Key characteristics: advance planning, bulk production, synchronised service, fixed price per head, and high-volume team execution. The kitchen produces everything in advance and serves it all at the same time — very different from à la carte service."},{q:"What is 'institutional catering' and give three examples of where it operates?",opts:["Institutional catering is high-end contract catering for luxury corporate headquarters, serving premium à la carte menus to executive staff at subsidised prices","Institutional catering is the large-scale provision of food to captive or semi-captive populations in non-commercial settings — examples include hospitals, schools, prisons, and military bases","Institutional catering refers only to airline catering operations where food is prepared in central kitchens and loaded onto aircraft for in-flight service","Institutional catering is a style of catering where all food is produced by a central kitchen and distributed to multiple satellite outlets — used only in large hotel groups"],ans:1,exp:"Institutional catering serves captive or semi-captive populations in non-commercial settings. Examples: hospitals (patient meals, staff cafeterias), schools and universities (student canteens), prisons, military bases, and care homes. Key characteristics: large volume, controlled budget, nutritional requirements, repetitive menus, and feeding people who have little or no choice of where to eat."},{q:"What is a 'buffet' service style and what are its advantages for a large food service operation?",opts:["Buffet service is a formal style where waitstaff serve each guest individually from silver platters — it is the most labour-intensive service style used in luxury hotel dining","Buffet service is a self-service style where food is displayed on counters for guests to help themselves — reducing labour costs, accommodating diverse preferences, and serving large numbers quickly","Buffet service is a pre-plated service style where identical dishes are placed on the table for all guests simultaneously — used only for wedding banquets and corporate dinner events","Buffet service is a delivery service style where food is boxed individually and delivered to guests at their tables — used in canteen and institutional settings for speed and hygiene"],ans:1,exp:"Buffet service: food displayed on counters or stations, guests self-serve at their own pace. Advantages: fewer waiting staff needed (lower labour cost), suits diverse dietary preferences, accommodates large numbers quickly, reduces per-head service time, allows guests to control portion size. Used in: hotel breakfasts, banquets, corporate events, institutional catering, and restaurants specialising in variety."},{q:"What is a 'pop-up restaurant' and why has it become popular in the modern food industry?",opts:["A pop-up restaurant is a permanent restaurant that occasionally closes its regular menu and runs a special themed event for one night only, charging a premium ticket price","A pop-up restaurant is a temporary dining concept operating in a non-traditional space for a limited time — allowing chefs to test concepts, build reputation, and reach audiences without the cost of a permanent location","A pop-up restaurant is a food truck that parks in a fixed location on a permanent basis — classified separately from a regular restaurant because it lacks permanent indoor seating","A pop-up restaurant is an online restaurant that operates exclusively through food delivery apps with no physical dining space — producing food in a ghost kitchen for delivery only"],ans:1,exp:"A pop-up restaurant operates temporarily — in a borrowed space (gallery, warehouse, rooftop, another restaurant off-hours) for days, weeks, or a specific event. Benefits: low overhead, creative freedom, brand building, testing concepts before permanent investment, and creating exclusivity. Many successful permanent restaurants began as pop-ups. It is a key trend in modern food entrepreneurship."},{q:"What is a 'ghost kitchen' (dark kitchen or cloud kitchen) and how does it differ from a traditional restaurant?",opts:["A ghost kitchen is a large central production kitchen serving all food outlets within a hotel — it has no dining room but supplies prepared food to all in-house restaurants and bars","A ghost kitchen is a delivery-only food operation with no dining room or front of house — food is produced in a kitchen and sent exclusively through delivery platforms with no walk-in customers","A ghost kitchen is a kitchen that operates only at night, producing food for the breakfast and lunch service the following day in high-volume institutional catering operations","A ghost kitchen is an unlicensed home kitchen used by food entrepreneurs to produce and sell food before they can afford a commercial kitchen — common in the street food industry"],ans:1,exp:"A ghost kitchen (dark/cloud kitchen) produces food exclusively for delivery — no dining room, no FOH staff, no walk-in customers. Multiple virtual restaurant brands can operate from the same kitchen simultaneously. Benefits: low rent (no premium location needed), low labour (no FOH), multiple brands from one space. The rise of food delivery apps (Uber Eats, Deliveroo) has made ghost kitchens commercially viable."},{q:"What is a 'café' versus a 'coffee shop' in modern food service terminology?",opts:["A café and a coffee shop are completely different types of establishment — cafés serve only hot food while coffee shops serve only cold beverages and packaged snacks","A café typically offers light meals and a broader food menu alongside beverages, while a coffee shop focuses primarily on coffee and its variants with a lighter, more limited food offering","A café serves alcohol alongside food and beverages while a coffee shop never holds an alcohol licence under any circumstances in any country","A café operates only during breakfast and lunch while a coffee shop operates only during afternoon and evening hours — the two formats serve entirely different dayparts"],ans:1,exp:"In modern usage: a café offers light meals, snacks, and beverages with a broader food focus — eggs, sandwiches, salads, pastries. A coffee shop (like Starbucks or Costa) focuses on coffee varieties and speciality drinks, with a lighter food offering of packaged snacks and pastries. The distinction blurs in practice but the food-to-beverage ratio differs."},{q:"What is 'room service' in a hotel food service context?",opts:["Room service is the hotel department responsible for cleaning and turning over guest rooms between check-in and check-out of successive guests","Room service is the delivery of food and beverages ordered by a hotel guest directly to their room — operating under the F&B department, available 24 hours in full-service hotels","Room service is the term for the meal service provided to patients in a hospital — food is delivered to the bedside by the catering team at set mealtimes","Room service is a specialised restaurant concept where guests dine inside a replica hotel room — used as a themed dining concept in boutique hotels"],ans:1,exp:"Room service (in-room dining) is the delivery of food and beverages to a hotel guest's room. It operates under the F&B department and requires: a dedicated menu, order-taking system (phone, app, or TV), kitchen production, a service team, and equipment (trays, cloche covers, trolleys). Full-service hotels offer 24-hour room service. It is typically the least profitable F&B outlet but an expected guest amenity."},{q:"What is a 'theme restaurant' and give two examples?",opts:["A theme restaurant is any restaurant with a printed menu and branded uniforms — all chain restaurants are therefore classified as theme restaurants by definition","A theme restaurant is a dining concept built around a specific concept, era, culture, or experience — where décor, menu, music, and service all reinforce a unified theme. Examples: a medieval banquet restaurant or a sports-themed dining bar","A theme restaurant is a restaurant that changes its entire concept seasonally — offering a completely different menu, décor, and service style each quarter of the year","A theme restaurant is a restaurant located within a theme park or entertainment complex — classified separately from all other restaurant types due to its captive audience"],ans:1,exp:"Theme restaurants create an immersive dining experience where every element — décor, menu, costumes, music, and entertainment — supports a central theme. Examples: Hard Rock Cafe (rock music memorabilia), medieval banquet restaurants (period costumes and entertainment), Rainforest Café (jungle theme with animatronics), and Pakistani dhaba-style restaurants recreating a roadside truck stop aesthetic."},{q:"What is a 'dhaba' in the South Asian food service context?",opts:["A dhaba is a formal sit-down restaurant in Pakistan and India serving classical Mughal cuisine in an air-conditioned environment with uniformed waiting staff","A dhaba is an informal roadside eatery in Pakistan and India serving simple, hearty, home-style food to truck drivers and travellers — known for affordable, flavourful cooking in a basic setting","A dhaba is a licensed catering company operating out of a central kitchen and delivering food to corporate offices and construction sites across major South Asian cities","A dhaba is a traditional Pakistani cooking school where culinary students learn regional recipes under the guidance of experienced home cooks and grandmothers"],ans:1,exp:"A dhaba is a roadside eatery found throughout Pakistan and India — originally serving truck drivers and travellers. Characteristics: basic furniture (charpoys, plastic chairs), simple but richly flavoured food (daal, sabzi, naan, karahi), open kitchens, clay pots and wood fires, affordable prices. Dhaba-style cooking is celebrated for its robust, authentic flavours and has been elevated into upscale restaurant concepts globally."},{q:"What is 'contract catering' and in what environments does it typically operate?",opts:["Contract catering is a catering company hired to supply food to a single high-profile event such as a wedding or corporate gala — it is always a one-time arrangement","Contract catering is when a specialist catering company is hired to manage and operate the food service at a client's premises on an ongoing basis — common in offices, factories, schools, and hospitals","Contract catering is the supply of food and beverages to airline flights — prepared in central kitchens and delivered to aircraft under strict time and temperature controls","Contract catering is the term for a restaurant group that operates multiple branded outlets under a single management contract across a hotel chain or shopping mall"],ans:1,exp:"Contract catering: a specialist company (e.g. Compass Group, Sodexo, Aramark) is contracted to manage food service at a client's premises. Common in: corporate offices, factories, universities, schools, hospitals, sports stadiums, and government buildings. The client pays a management fee and/or subsidy; the caterer manages all operations, staffing, and procurement under agreed service levels."},{q:"What is a 'food court' in a commercial context?",opts:["A food court is a large professional kitchen in a hotel or stadium that produces food for multiple outlets simultaneously — it is not accessible to the public","A food court is a shared dining area within a shopping mall, airport, or entertainment complex where multiple independent food vendors operate separate counters around a common seating area","A food court is a type of outdoor farmers' market where local producers sell fresh and prepared food directly to consumers on weekends in a temporary setting","A food court is a dedicated section of a fine dining restaurant offering a lower-priced express menu for guests who want a shorter dining experience during a lunch break"],ans:1,exp:"A food court is a communal dining space — typically in a shopping mall, airport, or entertainment venue — where multiple food operators (fast food chains, local vendors, specialist counters) each operate their own service point around a shared seating area. Guests choose from multiple cuisines and share the same dining space. It maximises footfall and variety in a high-traffic location."},{q:"What is the key difference between 'à la carte' and 'table d'hôte' service?",opts:["À la carte service is only available in fine dining restaurants while table d'hôte service is only available in fast food and casual dining establishments","À la carte: guests choose individual dishes from a menu, each priced separately — maximum flexibility. Table d'hôte: a fixed-price set menu with limited choices per course — efficient for the kitchen and good value for guests","À la carte service requires no reservation while table d'hôte service always requires a reservation made at least 24 hours before the intended dining time","À la carte service includes all beverages in the price of the meal while table d'hôte service charges separately for all drinks including water and bread"],ans:1,exp:"À la carte: individual dishes priced separately, guests build their own meal — maximum guest flexibility but slower kitchen production. Table d'hôte (prix fixe): fixed price for a set number of courses with limited choice — easier to plan, produce, and cost for the kitchen. Table d'hôte is standard for banquets, hotel packages, and set lunch menus. Both service styles appear across restaurant types."},{q:"What is a 'supper club' in modern restaurant culture?",opts:["A supper club is a government-registered restaurant operating only after 10pm — licensed to serve food until 3am for late-night diners in major city entertainment districts","A supper club is an informal, invitation-based dining experience hosted in a private home or unconventional space by a chef or food enthusiast — operating outside the formal restaurant industry","A supper club is a premium membership club within a fine dining restaurant — where members pay an annual fee for priority reservations and exclusive menu access throughout the year","A supper club is a restaurant concept where all guests eat at a single communal table simultaneously — based on the tradition of sharing food in extended family households"],ans:1,exp:"A supper club is an underground or semi-private dining experience — hosted in someone's home, a pop-up space, or an unlicensed venue. Guests pay to attend what feels like a dinner party hosted by a talented chef. It is intimate (usually 10–30 covers), BYOB in some cases, and reservation-based. Supper clubs have launched the careers of many professional chefs and food entrepreneurs."},{q:"What is 'institutional catering' nutrition planning and why does it differ from commercial restaurant menus?",opts:["Institutional catering nutrition planning is identical to commercial restaurant menu planning — both prioritise flavour and presentation above nutritional content and dietary requirements","Institutional catering must plan menus around strict nutritional standards, therapeutic dietary requirements, budget constraints, and the specific needs of the population served — unlike commercial restaurants which prioritise guest preference and profit","Institutional catering nutrition planning is only relevant in hospitals — schools, prisons, and military canteens are not required to meet any specific nutritional guidelines","Institutional catering nutrition planning is managed exclusively by dietitians who have no contact with kitchen staff — the chef's only role is to execute the recipes provided without modification"],ans:1,exp:"Institutional catering must meet specific nutritional standards set by health authorities — hospital patients may need therapeutic diets (low sodium, diabetic, texture-modified), school menus must meet government nutritional guidelines, care homes must address malnutrition risk in elderly residents. Budget is tightly controlled. Commercial restaurants prioritise guest satisfaction and profit — nutrition is secondary unless specifically marketed."},{q:"What is a 'tasting menu' restaurant and what distinguishes it from other fine dining formats?",opts:["A tasting menu restaurant is a fast casual concept where guests taste 2–3 small versions of popular dishes before committing to a full-sized order from the regular menu","A tasting menu restaurant serves a multi-course sequence of small, highly crafted dishes — typically 6–12 courses — designed by the chef to tell a culinary story, with no à la carte option","A tasting menu restaurant is a restaurant offering free tasting samples of all menu items before guests order — used to reduce complaints and increase customer satisfaction","A tasting menu restaurant serves only tapas-style shared dishes — guests order multiple small plates to share, creating their own tasting experience from the à la carte menu"],ans:1,exp:"A tasting menu (dégustation menu) is a multi-course sequence — typically 6–12 or more small, highly refined courses — designed by the chef as a single unified culinary narrative. Guests surrender choice and trust the chef's vision. Often paired with wine. No à la carte alternative. Examples: El Bulli, Noma, Heston Blumenthal's The Fat Duck, and most Michelin 2 and 3-star restaurants. It represents the highest level of culinary ambition."},{q:"What is 'ethnic cuisine restaurant' and why is cultural authenticity important to its identity?",opts:["An ethnic cuisine restaurant is any restaurant not serving European food — it is classified as ethnic regardless of whether the food is authentic or adapted for local tastes","An ethnic cuisine restaurant specialises in the cuisine of a specific culture or region — authenticity of ingredients, technique, and presentation is central to its identity and what differentiates it from generic international restaurants","An ethnic cuisine restaurant is a restaurant located in a neighbourhood where a specific immigrant community lives — the classification is geographical rather than based on the food served","An ethnic cuisine restaurant is a restaurant that employs only chefs from a specific country — the nationality of the kitchen team is what determines whether a restaurant is classified as ethnic"],ans:1,exp:"An ethnic cuisine restaurant specialises in the food of a specific culture — Pakistani, Thai, Italian, Japanese, Moroccan. Authenticity matters: traditional recipes, imported ingredients where possible, authentic cooking techniques, and cultural presentation. Guests visit specifically for the cultural experience. Fusion adaptations exist but a restaurant claiming to serve authentic cuisine must maintain fidelity to the source tradition."},{q:"What is a 'staff canteen' in an institutional food service context?",opts:["A staff canteen is the name for the kitchen area in a small café or bistro where food is prepared — it is not a dining area and is not accessible to any customers","A staff canteen is a subsidised or free food service facility provided by an employer for its staff — offering daily meals in a dedicated dining area within or near the workplace","A staff canteen is a luxury dining room reserved exclusively for senior management — lower-level employees use the public restaurant located on the ground floor of the building","A staff canteen is a mobile catering unit that visits construction sites and outdoor events — serving hot meals from a van or truck to workers with no fixed workplace"],ans:1,exp:"A staff canteen (staff restaurant or employee dining) is a workplace food facility — often subsidised by the employer — providing hot meals, snacks, and beverages to employees during work hours. It may be run in-house or contracted to a specialist catering company. It improves staff welfare, productivity, and retention. Common in hospitals, factories, corporate offices, schools, and government buildings."},{q:"What is a 'grab and go' concept in modern food service?",opts:["Grab and go is a fine dining concept where individual amuse-bouche items are presented on a tray for guests to pick up and eat while viewing the kitchen during a chef's table experience","Grab and go is a food service format where pre-packaged, ready-to-eat items — sandwiches, salads, fruit, snacks, drinks — are available for customers to select and pay for without waiting for preparation","Grab and go is a delivery service model where restaurant food is pre-packed the night before and collected by drivers early in the morning for same-day delivery across the city","Grab and go is a term for the action of clearing plates during banquet service — servers grab used items and go to the kitchen without disturbing the flow of conversation at the table"],ans:1,exp:"Grab and go is a self-service, no-wait food format — items are pre-packaged and ready to take immediately: sandwiches, wraps, sushi boxes, salad bowls, fruit cups, bottled drinks. Popular in: airports, train stations, hospital corridors, office lobbies, petrol stations, and convenience stores. It targets time-poor consumers who prioritise speed over a sit-down dining experience."},{q:"What is the key operational difference between a 'restaurant' and a 'catering company'?",opts:["A restaurant and a catering company are identical business models — both produce food for paying customers and are subject to the same licensing and operational requirements","A restaurant operates from a fixed premises where guests come to eat — a catering company brings food and service to the client's chosen location for private events, corporate functions, and special occasions","A restaurant always employs more staff than a catering company — the difference is purely in team size, with catering companies operating with fewer than 10 staff at all times","A restaurant is always profit-driven while a catering company always operates on a not-for-profit basis — the distinction is purely financial and relates to tax registration"],ans:1,exp:"Restaurant: fixed premises, guests come to the location, daily service, consistent team and menu. Catering company: mobile operation, food and service taken to the client's location for specific events (weddings, corporate functions, private parties, stadium events). A catering company may also run a central production kitchen and deliver food to multiple sites. Both require food hygiene registration and licensing."},{q:"What is 'hotel dining' and how does it differ from a standalone restaurant?",opts:["Hotel dining is always of lower quality than a standalone restaurant because hotel chefs are generalists who lack the specialist skills of independent restaurant chefs","Hotel dining encompasses all food service within a hotel property — restaurants, bars, room service, banqueting, and pool dining — managed under the F&B department with different guest expectations and operational demands than a standalone restaurant","Hotel dining refers specifically to the complimentary breakfast served to all hotel guests — all other food and beverage services within a hotel are classified as standard restaurant operations","Hotel dining is a style of formal service used only at luxury five-star properties where guests are served at their table by butler-trained staff in full formal attire"],ans:1,exp:"Hotel dining covers all F&B operations within a property: main restaurant (often multiple), bar and lounge, room service, banqueting, poolside or terrace dining, and staff cafeteria. Hotel F&B must serve breakfast (often buffet), lunch, dinner, and room service — often 24 hours. Unlike standalone restaurants, hotel kitchens serve multiple outlets simultaneously and must cater to diverse international guests with varying dietary needs."},{q:"What is a 'QSR' (Quick Service Restaurant) and how has it evolved in the modern food industry?",opts:["QSR stands for Quality Service Restaurant — it refers exclusively to Michelin-starred establishments that are known for maintaining exceptionally high service standards","QSR stands for Quick Service Restaurant — the professional term for fast food, encompassing counter service, standardised menus, rapid production, and high volume. It has evolved to include healthier options, digital ordering, and delivery integration","QSR stands for Qualified Service Rating — a government scoring system used to classify all food service establishments by their hygiene, service speed, and customer satisfaction scores","QSR stands for Queue System Restaurant — a format where customers stand in a single queue and are directed to the next available server, used in fast casual and institutional settings"],ans:1,exp:"QSR (Quick Service Restaurant) is the industry-preferred term for fast food. Evolution: originally limited to burgers and fried food, QSRs now include healthier options (salads, wraps, grain bowls), digital self-ordering kiosks, mobile app ordering, loyalty programmes, drive-throughs, and full delivery integration. The QSR sector is the largest segment of the global food service industry by revenue and outlet count."},{q:"What is the role of a 'maître d'' in a formal restaurant setting?",opts:["The maître d' (maître d'hôtel) is the head chef responsible for all food production — they oversee the kitchen brigade, manage food costs, and develop the seasonal menu","The maître d' is the senior front-of-house manager responsible for welcoming guests, managing reservations, overseeing table allocation, supervising service staff, and ensuring the overall dining experience meets the restaurant's standards","The maître d' is the restaurant's head sommelier responsible for the wine list, staff wine training, and all beverage recommendations during the dining service period","The maître d' is a junior FOH staff member assigned to greet guests at the entrance, manage the waiting area, and escort guests to their assigned tables during service"],ans:1,exp:"The maître d'hôtel (maître d') is the head of front-of-house operations in a formal restaurant. Responsibilities: greeting VIP guests, managing reservations and table allocation, supervising the service team, handling special requests and complaints, overseeing the overall flow of service, and ensuring the dining experience meets the restaurant's standard. In fine dining they are as important as the Executive Chef."},{q:"What distinguishes a 'Michelin-starred restaurant' from other high-quality restaurants?",opts:["A Michelin star is awarded by the restaurant's own management team as a self-certification of quality — any restaurant can apply for and receive a star by meeting the published criteria","A Michelin star is awarded by anonymous inspectors from the Michelin Guide — one star (very good), two stars (excellent, worth a detour), three stars (exceptional, worth a special journey) — based on food quality, consistency, and technique","A Michelin star is a marketing certification awarded by the national tourism board of each country to restaurants that generate the most international visitor revenue per year","A Michelin star is awarded only to French restaurants — restaurants serving non-European cuisines are assessed under a separate international rating system with different criteria"],ans:1,exp:"Michelin stars are awarded by anonymous inspectors from the Michelin Guide (established 1900). Criteria focus exclusively on the food: quality of ingredients, mastery of technique, harmony of flavours, personality of the chef in the cuisine, and consistency across multiple visits. One star = very good. Two = excellent, worth a detour. Three = exceptional cooking, worth a special journey. Only about 3 restaurants in 100 rated hold any star."},{q:"What is a 'commissary kitchen' or 'central production kitchen' and who uses it?",opts:["A commissary kitchen is the main line kitchen in a restaurant where all cooking for service takes place — it is the term used for the hot section of the kitchen during service","A commissary kitchen is a licensed, shared commercial kitchen facility used by food businesses — catering companies, food trucks, ghost kitchens, and small food producers — to produce food at scale without the cost of a dedicated kitchen","A commissary kitchen is a kitchen within a prison or correctional facility — named after the commissary store where inmates purchase personal items and food","A commissary kitchen is a high-security food production facility that produces emergency ration packs for military and disaster relief operations under government contract"],ans:1,exp:"A commissary kitchen (central production kitchen) is a licensed commercial kitchen used by multiple food businesses. Common users: food trucks (who produce and prep here then sell elsewhere), catering companies (prep large volumes for events), ghost kitchens (delivery-only brands), small food producers (making products for retail or wholesale). It provides the infrastructure of a professional kitchen without the capital cost of building one."},{q:"What is the key challenge of 'banquet kitchen' production compared to à la carte kitchen production?",opts:["Banquet kitchens are easier to manage than à la carte kitchens because all dishes are identical and the team only needs to execute one recipe for the entire service","Banquet production requires cooking and holding large quantities of identical dishes to be served simultaneously to hundreds of guests — demanding precise timing, batch cooking, careful temperature management, and coordinated team effort","Banquet kitchens have fewer food safety requirements than à la carte kitchens because all food is pre-plated and held in controlled conditions before service begins","Banquet production is simpler because there is no pass communication required — all dishes are delivered directly by kitchen staff to tables without passing through a quality check"],ans:1,exp:"Banquet production challenges: cooking hundreds of identical portions that must all be at the correct temperature simultaneously, holding food safely without it deteriorating, coordinating a large team to plate and serve at exactly the same moment, managing multiple courses with precise timing, and executing consistently under extreme volume pressure. Unlike à la carte (which is ordered on demand), everything must be ready at a single point in time."}];
let order=[],cur=0,picks={},playerName='',score=0;
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function goBack(){if(confirm('Quit quiz and return to subjects?'))window.location.href='index.html';}
function startQuiz(){const inp=document.getElementById('name-input').value.trim();playerName=inp||'Anonymous';order=shuffle(BANK.map((_,i)=>i));cur=0;picks={};score=0;document.getElementById('q-total').textContent=BANK.length;show('quiz-screen');render();}
function render(){const idx=order[cur],q=BANK[idx],total=BANK.length;document.getElementById('q-num').textContent=cur+1;document.getElementById('q-score').textContent=score;document.getElementById('q-label').textContent=`Question ${cur+1} of ${total}`;document.getElementById('q-text').textContent=q.q;document.getElementById('progress-fill').style.width=((cur/total)*100)+'%';document.getElementById('explanation').className='explanation';document.getElementById('explanation').textContent='';document.getElementById('next-btn').className='next-btn';document.getElementById('quit-btn').className='quit-btn';const letters=['A','B','C','D'],optEl=document.getElementById('options');optEl.innerHTML='';shuffle([0,1,2,3]).forEach((oi,li)=>{const btn=document.createElement('button');btn.className='opt-btn';btn.dataset.opt=oi;btn.innerHTML=`<span class="opt-letter">${letters[li]}</span><span>${q.opts[oi]}</span>`;btn.onclick=()=>selectAnswer(oi,idx);optEl.appendChild(btn);});}
function selectAnswer(chosen,idx){const q=BANK[idx],correct=chosen===q.ans;picks[idx]=chosen;if(correct)score++;document.getElementById('q-score').textContent=score;document.querySelectorAll('.opt-btn').forEach(btn=>{btn.disabled=true;const oi=parseInt(btn.dataset.opt);if(oi===q.ans)btn.classList.add('correct');else if(oi===chosen&&!correct)btn.classList.add('wrong');});if(!correct){const e=document.getElementById('explanation');e.textContent='✗ '+q.exp;e.classList.add('show');}const nb=document.getElementById('next-btn');nb.classList.add('show');nb.textContent=cur+1<BANK.length?'Next Question →':'See Results →';document.getElementById('quit-btn').classList.add('show');}
function nextQuestion(){cur++;if(cur>=BANK.length)showResults();else{render();window.scrollTo(0,0);}}
function showResults(){show('results-screen');const total=BANK.length,pct=Math.round((score/total)*100),passed=pct>=70;document.getElementById('result-name').textContent=playerName;document.getElementById('ring-pct').textContent=pct+'%';document.getElementById('ring-pct').style.color=passed?'var(--green)':'var(--red)';document.getElementById('ring-fill').style.stroke=passed?'var(--green)':'var(--red)';setTimeout(()=>{document.getElementById('ring-fill').style.strokeDashoffset=439.82-(439.82*pct/100);},100);document.getElementById('res-title').textContent=pct>=90?'Excellent!':pct>=70?'Passed!':'Needs Work';document.getElementById('res-sub').textContent=`${score} correct out of ${total} questions`;const v=document.getElementById('res-verdict');if(passed){v.textContent='✓ You passed — score above 70%';v.className='result-verdict pass';}else{v.textContent='✗ Below 70% — please retake the quiz';v.className='result-verdict fail';}const rv=document.getElementById('review');rv.innerHTML='<h3>Review</h3>';order.forEach(idx=>{const q=BANK[idx],ua=picks[idx],ok=ua===q.ans;const d=document.createElement('div');d.className='rv-item '+(ok?'ok':'miss');d.innerHTML=`<div class="rv-q">${q.q}</div><div class="rv-a">${ok?`<span class="c">✓ Correct: ${q.opts[q.ans]}</span>`:`<span class="w">✗ You chose: ${ua!==undefined?q.opts[ua]:'Skipped'}</span><br><span class="c">✓ Correct: ${q.opts[q.ans]}</span><br><span style="color:var(--muted)">${q.exp}</span>`}</div>`;rv.appendChild(d);});}
function retryQuiz(){order=shuffle(order);cur=0;picks={};score=0;document.getElementById('q-score').textContent=0;show('quiz-screen');render();}
document.getElementById('name-input').addEventListener('keydown',e=>{if(e.key==='Enter')startQuiz();});
</script>
