<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telling the Time & Numbers — July 2026 Exam</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap');
  :root{--bg:#080810;--surface:#11111f;--border:#1e1e35;--purple:#7c3aed;--purple-l:#9d5bf0;--green:#22c55e;--red:#ef4444;--text:#e8e8f0;--muted:#7070a0;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:.4;pointer-events:none;z-index:0;}
  .screen{position:relative;z-index:1;width:100%;max-width:660px;margin:0 auto;padding:24px 20px 48px;display:none;}
  .screen.active{display:block;}
  #name-screen{text-align:center;padding-top:80px;}
  .back-link{display:inline-flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);text-decoration:none;letter-spacing:1px;margin-bottom:48px;transition:color .2s;}
  .back-link:hover{color:var(--purple-l);}
  .subject-tag{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--purple-l);margin-bottom:12px;}
  #name-screen h1{font-size:clamp(22px,5vw,36px);font-weight:800;line-height:1.15;margin-bottom:8px;background:linear-gradient(135deg,#fff 30%,var(--purple-l));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  #name-screen p{color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;margin-bottom:40px;}
  .name-box{display:flex;flex-direction:column;align-items:center;gap:12px;}
  .name-box input{width:100%;max-width:320px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Syne',sans-serif;font-size:15px;outline:none;text-align:center;transition:border-color .2s;}
  .name-box input:focus{border-color:var(--purple);}
  .name-box input::placeholder{color:var(--muted);}
  .btn-primary{padding:12px 32px;background:var(--purple);color:#fff;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:background .2s,transform .1s;letter-spacing:.5px;}
  .btn-primary:hover{background:var(--purple-l);transform:translateY(-1px);}
  .quiz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
  .quiz-meta{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
  .quiz-meta span{color:var(--purple-l);font-weight:500;}
  .quiz-back{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);background:none;border:1px solid var(--border);padding:5px 10px;border-radius:6px;cursor:pointer;transition:color .2s,border-color .2s;}
  .quiz-back:hover{color:var(--text);border-color:var(--purple);}
  .progress-bar{width:100%;height:3px;background:var(--border);border-radius:2px;margin-bottom:32px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--purple-l));border-radius:2px;transition:width .3s ease;}
  .question-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--purple-l);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
  .question-text{font-size:clamp(15px,3vw,18px);font-weight:600;line-height:1.5;margin-bottom:28px;color:var(--text);}
  .options{display:flex;flex-direction:column;gap:10px;}
  .opt-btn{display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;font-weight:400;cursor:pointer;text-align:left;transition:border-color .15s,background .15s;width:100%;}
  .opt-btn:hover:not(:disabled){border-color:var(--purple);background:#16162a;}
  .opt-btn .opt-letter{flex-shrink:0;width:26px;height:26px;border-radius:6px;background:var(--border);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);transition:background .15s,color .15s;}
  .opt-btn:hover:not(:disabled) .opt-letter{background:var(--purple);color:#fff;}
  .opt-btn.correct{border-color:var(--green);background:rgba(34,197,94,.1);}
  .opt-btn.correct .opt-letter{background:var(--green);color:#fff;}
  .opt-btn.wrong{border-color:var(--red);background:rgba(239,68,68,.1);}
  .opt-btn.wrong .opt-letter{background:var(--red);color:#fff;}
  .opt-btn:disabled{cursor:default;}
  .explanation{display:none;margin-top:16px;padding:14px 16px;background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.25);border-left:3px solid var(--purple);border-radius:8px;font-size:13px;line-height:1.6;color:#c4b5fd;font-family:'DM Mono',monospace;}
  .explanation.show{display:block;}
  .action-row{display:flex;gap:10px;margin-top:24px;}
  .next-btn{flex:1;padding:13px;background:var(--purple);color:#fff;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;display:none;transition:background .2s;letter-spacing:.5px;}
  .next-btn:hover{background:var(--purple-l);}
  .next-btn.show{display:block;}
  .quit-btn{padding:13px 18px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;display:none;transition:color .2s,border-color .2s;white-space:nowrap;}
  .quit-btn:hover{color:var(--text);border-color:var(--purple);}
  .quit-btn.show{display:block;}
  #results-screen{text-align:center;padding-top:40px;}
  .result-name{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);margin-bottom:32px;}
  .score-ring{position:relative;width:160px;height:160px;margin:0 auto 28px;}
  .score-ring svg{transform:rotate(-90deg);}
  .score-ring .ring-bg{fill:none;stroke:var(--border);stroke-width:10;}
  .score-ring .ring-fill{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1s ease,stroke .5s;}
  .score-ring .ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .ring-pct{font-size:34px;font-weight:800;line-height:1;}
  .ring-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:4px;letter-spacing:1px;}
  .result-title{font-size:24px;font-weight:800;margin-bottom:8px;}
  .result-sub{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);margin-bottom:8px;}
  .result-verdict{font-family:'DM Mono',monospace;font-size:12px;padding:8px 20px;border-radius:20px;display:inline-block;margin-bottom:32px;}
  .result-verdict.pass{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.3);}
  .result-verdict.fail{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.3);}
  .result-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:40px;}
  .btn-outline{padding:11px 24px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:border-color .2s,color .2s;}
  .btn-outline:hover{border-color:var(--purple);color:var(--text);}
  .review{text-align:left;}
  .review h3{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:16px;font-family:'DM Mono',monospace;}
  .rv-item{padding:14px 16px;border-radius:8px;margin-bottom:10px;border:1px solid var(--border);}
  .rv-item.ok{border-color:rgba(34,197,94,.25);background:rgba(34,197,94,.05);}
  .rv-item.miss{border-color:rgba(239,68,68,.25);background:rgba(239,68,68,.05);}
  .rv-q{font-size:13px;font-weight:600;margin-bottom:8px;line-height:1.4;}
  .rv-a{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);line-height:1.6;}
  .rv-a .c{color:var(--green);}
  .rv-a .w{color:var(--red);}
</style>
</head>
<body>
<div class="screen active" id="name-screen">
  <a class="back-link" href="index.html">← Back to subjects</a>
  <div class="subject-tag">English · Chapter 2</div>
  <h1>Telling the Time & Numbers</h1>
  <p>25 questions · O'clock, half past, quarter to/past, numbers in words</p>
  <div class="name-box">
    <input type="text" id="name-input" placeholder="Enter your name" maxlength="30" autocomplete="off">
    <button class="btn-primary" onclick="startQuiz()">Start Quiz</button>
  </div>
</div>
<div class="screen" id="quiz-screen">
  <div class="quiz-header">
    <div class="quiz-meta">Question <span id="q-num">1</span> of <span id="q-total">25</span></div>
    <div class="quiz-meta">Score <span id="q-score">0</span></div>
    <button class="quiz-back" onclick="goBack()">← Quit</button>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="question-num" id="q-label"></div>
  <div class="question-text" id="q-text"></div>
  <div class="options" id="options"></div>
  <div class="explanation" id="explanation"></div>
  <div class="action-row">
    <button class="quit-btn" id="quit-btn" onclick="goBack()">← Back to subjects</button>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">Next Question →</button>
  </div>
</div>
<div class="screen" id="results-screen">
  <div class="result-name" id="result-name"></div>
  <div class="score-ring">
    <svg viewBox="0 0 160 160" width="160" height="160">
      <circle class="ring-bg" cx="80" cy="80" r="70"/>
      <circle class="ring-fill" id="ring-fill" cx="80" cy="80" r="70" stroke-dasharray="439.82" stroke-dashoffset="439.82" stroke="var(--green)"/>
    </svg>
    <div class="ring-text">
      <div class="ring-pct" id="ring-pct">0%</div>
      <div class="ring-label">SCORE</div>
    </div>
  </div>
  <div class="result-title" id="res-title"></div>
  <div class="result-sub" id="res-sub"></div>
  <div class="result-verdict" id="res-verdict"></div>
  <div class="result-actions">
    <button class="btn-primary" onclick="retryQuiz()">Retry →</button>
    <button class="btn-outline" onclick="window.location.href='index.html'">All Subjects</button>
  </div>
  <div class="review" id="review"></div>
</div>
<script>
const BANK=[
{q:"How do you say 3:00 in English?",opts:["It's half past three","It's quarter to three","It's three o'clock","It's three past zero"],ans:2,exp:"3:00 = 'It's three o'clock.' O'clock is used only for exact hours — when the minutes are :00."},
{q:"How do you say 7:30 in English?",opts:["It's quarter past seven","It's half past seven","It's seven thirty-five","It's quarter to seven"],ans:1,exp:"7:30 = 'It's half past seven.' Half past means 30 minutes after the hour."},
{q:"How do you say 11:15 in English?",opts:["It's quarter to eleven","It's half past eleven","It's quarter past eleven","It's eleven fifteen past"],ans:2,exp:"11:15 = 'It's quarter past eleven.' Quarter past means 15 minutes after the hour."},
{q:"How do you say 6:45 in English?",opts:["It's quarter past seven","It's quarter to seven","It's half past six","It's six forty-five past"],ans:1,exp:"6:45 = 'It's quarter to seven.' Quarter to means 15 minutes before the next hour."},
{q:"How do you say 9:50 in English?",opts:["It's nine fifty past ten","It's ten past ten","It's ten to ten","It's quarter to nine"],ans:2,exp:"9:50 = 'It's ten to ten.' Ten to means 10 minutes before the next hour (10:00)."},
{q:"How do you say 4:10 in English?",opts:["It's ten past four","It's ten to four","It's quarter past four","It's four and ten"],ans:0,exp:"4:10 = 'It's ten past four.' Ten past means 10 minutes after the hour."},
{q:"How do you say 12:03 in English?",opts:["It's three past twelve","It's just after twelve","It's nearly quarter past twelve","It's three to twelve"],ans:1,exp:"12:03 = 'It's just after twelve.' When the time is very close to the hour, we say 'just after'."},
{q:"How do you say 11:58 in English?",opts:["It's nearly twelve o'clock","It's two past twelve","It's twelve almost","It's two to twelve but nearly"],ans:0,exp:"11:58 = 'It's nearly twelve o'clock.' When the time is very close to the next hour we say 'nearly'."},
{q:"How do you say 2:45 in English?",opts:["It's quarter past two","It's half past two","It's quarter to three","It's nearly three past"],ans:2,exp:"2:45 = 'It's quarter to three.' 45 minutes past the hour = 15 minutes before the next hour = quarter to."},
{q:"Which phrase means exactly 30 minutes past the hour?",opts:["Quarter past","Quarter to","Half past","O'clock"],ans:2,exp:"'Half past' means exactly 30 minutes past the hour. Example: half past six = 6:30."},
{q:"Which phrase means 15 minutes before the next hour?",opts:["Quarter past","Half past","Quarter to","Just after"],ans:2,exp:"'Quarter to' means 15 minutes before the next hour. Example: quarter to eight = 7:45."},
{q:"How do you write the number 21 in words?",opts:["Twelve","Twenty-one","Two and one","Twone"],ans:1,exp:"21 = twenty-one. Numbers 21–99 are written with a hyphen: twenty-one, thirty-five, forty-eight."},
{q:"How do you write 15 in words?",opts:["Fifty","Fiveteen","Fifteen","Fifthteen"],ans:2,exp:"15 = fifteen. Note the spelling — not 'fiveteen'. Numbers 13–19 end in -teen."},
{q:"How do you write 100 in words?",opts:["Ten hundred","One hundred","A hundred and zero","Hundred"],ans:1,exp:"100 = one hundred (or a hundred). We say 'one hundred' or 'a hundred' — never just 'hundred' alone."},
{q:"How do you write 1,000 in words?",opts:["One thousand","Ten hundred","A thousand hundred","One million"],ans:0,exp:"1,000 = one thousand. We use a comma to separate thousands from hundreds in writing numbers above 999."},
{q:"How do you write 1,250 in words?",opts:["One thousand two fifty","Twelve hundred fifty","One thousand two hundred and fifty","One two five zero"],ans:2,exp:"1,250 = one thousand two hundred and fifty. We use 'and' between hundreds and the remaining number in British English."},
{q:"How do you say the number 42,500 in words?",opts:["Four two five hundred","Forty-two thousand five hundred","Four hundred twenty-five","Forty thousand two hundred fifty"],ans:1,exp:"42,500 = forty-two thousand five hundred. For large numbers: say the thousands first, then the hundreds."},
{q:"What does 'about' mean when talking about numbers?",opts:["Exactly that number — no more and no less","A little more or a little less than the number — an approximation","Double the number mentioned","Half of the number mentioned"],ans:1,exp:"'About' means approximately — a little more or a little less. 'About 20 students' means roughly 20, not exactly 20. Used when you are not sure of the exact number."},
{q:"How do you write 3,000,000 in words?",opts:["Three thousand million","Three billion","Three million","Thirty million"],ans:2,exp:"3,000,000 = three million. In large numbers: 1,000 = thousand; 1,000,000 = million; 1,000,000,000 = billion."},
{q:"How do you say 11,302 in words?",opts:["Eleven thousand three hundred and two","Eleven three hundred two","One thousand one hundred and two","Eleven thousand thirty-two"],ans:0,exp:"11,302 = eleven thousand three hundred and two. Break it down: 11,000 (eleven thousand) + 300 (three hundred) + 2 (and two)."},
{q:"How do you say the time 8:25 in English?",opts:["Eight twenty-five past","Twenty-five past eight","Twenty-five to eight","Eight and twenty-five"],ans:1,exp:"8:25 = 'twenty-five past eight.' For times that are not o'clock, half past, or quarter past/to, we say the minutes first then 'past' and the hour."},
{q:"What is the correct way to ask someone the time in English?",opts:["Tell me the time now","What's the time? / What time is it?","When is it the time?","How much is the time?"],ans:1,exp:"The correct questions are 'What's the time?' or 'What time is it?' Both are natural and widely used. 'Excuse me, what's the time?' is the polite version."},
{q:"How do you say 5:55 in English?",opts:["Five fifty-five past","Five to six","Five past six","Nearly five o'clock"],ans:1,exp:"5:55 = 'five to six.' 55 minutes past = 5 minutes before the next hour. So we say 'five to six.' Alternatively: 'nearly six o'clock.'"},
{q:"In British English, what do we put between hundreds and smaller numbers?",opts:["A comma — e.g. one hundred, fifty","Nothing — just say the numbers together","And — e.g. one hundred and fifty","But — e.g. one hundred but fifty"],ans:2,exp:"In British English we use 'and' between the hundreds and the rest of the number: one hundred and fifty (150), two thousand three hundred and forty-five (2,345)."},
{q:"How do you say 7:15 in English?",opts:["Seven and fifteen","Quarter to seven","Quarter past seven","Half past seven"],ans:2,exp:"7:15 = 'quarter past seven.' 15 minutes after the hour = quarter past. 7:45 would be 'quarter to eight.'"}
];
let order=[],cur=0,picks={},playerName='',score=0;
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function goBack(){if(confirm('Quit quiz?'))window.location.href='index.html';}
function startQuiz(){playerName=document.getElementById('name-input').value.trim()||'Anonymous';order=shuffle(BANK.map((_,i)=>i));cur=0;picks={};score=0;document.getElementById('q-total').textContent=BANK.length;show('quiz-screen');render();}
function render(){const idx=order[cur],q=BANK[idx],total=BANK.length;document.getElementById('q-num').textContent=cur+1;document.getElementById('q-score').textContent=score;document.getElementById('q-label').textContent=`Question ${cur+1} of ${total}`;document.getElementById('q-text').textContent=q.q;document.getElementById('progress-fill').style.width=((cur/total)*100)+'%';document.getElementById('explanation').className='explanation';document.getElementById('next-btn').className='next-btn';document.getElementById('quit-btn').className='quit-btn';const optEl=document.getElementById('options');optEl.innerHTML='';shuffle([0,1,2,3]).forEach((oi,li)=>{const btn=document.createElement('button');btn.className='opt-btn';btn.dataset.opt=oi;btn.innerHTML=`<span class="opt-letter">${'ABCD'[li]}</span><span>${q.opts[oi]}</span>`;btn.onclick=()=>select(oi,idx);optEl.appendChild(btn);});}
function select(chosen,idx){const q=BANK[idx],ok=chosen===q.ans;picks[idx]=chosen;if(ok)score++;document.getElementById('q-score').textContent=score;document.querySelectorAll('.opt-btn').forEach(b=>{b.disabled=true;const oi=parseInt(b.dataset.opt);if(oi===q.ans)b.classList.add('correct');else if(oi===chosen&&!ok)b.classList.add('wrong');});if(!ok){const e=document.getElementById('explanation');e.textContent='✗ '+q.exp;e.classList.add('show');}const nb=document.getElementById('next-btn');nb.classList.add('show');nb.textContent=cur+1<BANK.length?'Next →':'See Results →';document.getElementById('quit-btn').classList.add('show');}
function nextQuestion(){cur++;if(cur>=BANK.length)showResults();else{render();window.scrollTo(0,0);}}
function showResults(){show('results-screen');const total=BANK.length,pct=Math.round((score/total)*100),passed=pct>=70;document.getElementById('result-name').textContent=playerName;document.getElementById('ring-pct').textContent=pct+'%';document.getElementById('ring-pct').style.color=passed?'var(--green)':'var(--red)';document.getElementById('ring-fill').style.stroke=passed?'var(--green)':'var(--red)';setTimeout(()=>{document.getElementById('ring-fill').style.strokeDashoffset=439.82-(439.82*pct/100);},100);document.getElementById('res-title').textContent=pct>=90?'Excellent!':pct>=70?'Passed!':'Needs Work';document.getElementById('res-sub').textContent=`${score} correct out of ${total}`;const v=document.getElementById('res-verdict');v.textContent=passed?'✓ Passed — above 70%':'✗ Below 70% — please retry';v.className='result-verdict '+(passed?'pass':'fail');const rv=document.getElementById('review');rv.innerHTML='<h3>Review</h3>';order.forEach(idx=>{const q=BANK[idx],ua=picks[idx],ok=ua===q.ans;const d=document.createElement('div');d.className='rv-item '+(ok?'ok':'miss');d.innerHTML=`<div class="rv-q">${q.q}</div><div class="rv-a">${ok?`<span class="c">✓ ${q.opts[q.ans]}</span>`:`<span class="w">✗ ${ua!==undefined?q.opts[ua]:'—'}</span><br><span class="c">✓ ${q.opts[q.ans]}</span><br><span style="color:var(--muted)">${q.exp}</span>`}</div>`;rv.appendChild(d);});}
function retryQuiz(){order=shuffle(order);cur=0;picks={};score=0;document.getElementById('q-score').textContent=0;show('quiz-screen');render();}
document.getElementById('name-input').addEventListener('keydown',e=>{if(e.key==='Enter')startQuiz();});
</script>
</body>
</html>
