<style>

  .result-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:40px;}
  .btn-outline{padding:11px 24px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:border-color .2s,color .2s;}

<script>
const BANK=[
{q:"What is the 'blade' of a knife and what are its two main faces?",opts:["The blade is the metal part of the knife excluding the handle — its two main faces are the cutting edge (sharp side) and the spine (thick, blunt top), with the flat sides called the flats or cheeks","The blade is the decorative part of the knife where the manufacturer's logo is engraved — its two faces are the front face (visible to the cook) and the back face (facing the cutting board)","The blade is the narrow pointed section at the tip of the knife only — the two faces refer to the left bevel and right bevel of the cutting edge where sharpening takes place","The blade refers only to the cutting edge of the knife — the two main faces are the primary bevel (ground angle) and the secondary bevel (final sharpened edge)"],ans:0,exp:"The blade is the entire metal working portion of the knife, from the bolster (or heel) to the tip. The two flat sides are called the flats or cheeks. The cutting edge runs along the bottom, and the spine runs along the top. Understanding blade anatomy is fundamental to correct sharpening, use, and maintenance."},
{q:"What is the 'spine' of a knife and what is its function?",opts:["The spine is the decorative groove running along the flat side of the blade — it channels food away from the cutting edge and reduces the suction that occurs when slicing dense ingredients","The spine is the thick, blunt, unsharpened top edge of the blade — it provides structural rigidity and strength to the blade, and its thickness determines how the knife flexes during cutting","The spine is the pointed tip of the knife used for precision work such as scoring, piercing, and removing seeds from small fruits and vegetables","The spine is the junction between the blade and the handle — it is the thickest and most reinforced section of the knife where the greatest mechanical stress occurs during cutting"],ans:1,exp:"The spine is the thick, unsharpened top edge of the blade running from heel to tip. It gives the blade structural rigidity — a thicker spine means a stiffer, stronger blade. The spine's thickness also influences how the knife cuts through dense food. Chefs sometimes use the spine side to crush garlic or scrape a cutting board."},
{q:"What is the 'cutting edge' of a knife and what are the two types of edge geometry?",opts:["The cutting edge is the sharpened bottom portion of the blade — the two types are the single bevel edge (sharpened on one side only, common in Japanese knives) and the double bevel edge (sharpened on both sides, common in Western knives)","The cutting edge is the entire length of the blade from heel to tip — the two types are the straight edge (no serrations) and the hollow-ground edge (with a concave indentation along the flat)","The cutting edge is the tip section of the knife only — the two types are the pointed tip (for piercing) and the rounded tip (for safety in certain kitchen environments)","The cutting edge is the microscopic serration pattern on the blade — the two types are fine serrations (for bread) and coarse serrations (for tomatoes and soft fruits)"],ans:0,exp:"The cutting edge is the sharpened bottom of the blade. Single bevel: sharpened on one side only, creating an extremely acute, razor-sharp angle — used in traditional Japanese knives (yanagiba, deba). Double bevel: sharpened symmetrically on both sides — standard in Western chef's knives. Single-bevel edges are sharper but more fragile; double-bevel edges are more robust for general kitchen work."},
{q:"What is the 'bolster' of a knife and why is it important?",opts:["The bolster is the decorative end cap at the base of the handle — it prevents the hand from sliding off the handle during heavy cutting tasks and adds aesthetic value to the knife","The bolster is the thick metal collar or band where the blade meets the handle — it provides balance, adds weight to the front of the knife, protects the fingers, and adds structural strength at the most stressed junction","The bolster is the groove or fuller that runs along the flat of the blade — it reduces the surface area in contact with food, preventing sliced items from sticking to the blade","The bolster is the riveted metal strip along the spine of the blade — it reinforces the top edge of the blade and prevents it from bending during heavy chopping tasks"],ans:1,exp:"The bolster is the thick metal junction between blade and handle. Functions: provides forward balance (weight toward the blade), acts as a finger guard preventing the hand from slipping onto the cutting edge, adds structural strength at the highest-stress point, and indicates a forged knife (stamped knives often have no bolster or a plastic bolster). A full bolster extends the full height of the blade."},
{q:"What is the 'heel' of a knife?",opts:["The heel is the pointed tip at the front of the blade — it is used for precision work, scoring, piercing, and intricate cuts that require a fine point rather than the full length of the edge","The heel is the widest, thickest part of the cutting edge closest to the handle and bolster — it is the strongest section of the blade, used for cutting through dense foods like squash or hard cheese","The heel is the flat spine at the top of the blade — it provides rigidity and is used to crush garlic cloves by pressing down firmly with the palm of the hand","The heel is the area where the blade transitions into the tang inside the handle — it is a structural component not visible from the outside of the assembled knife"],ans:1,exp:"The heel is the rear portion of the cutting edge — the widest, heaviest part of the blade near the bolster. It is the strongest section for cutting through dense, hard, or tough materials. When rocking a chef's knife in the classic chopping motion, the heel stays on the board as the tip pivots. The heel generates the most downward force of any part of the blade."},
{q:"What is the 'tip' (or point) of a knife and what tasks is it used for?",opts:["The tip is the thickest part of the blade near the handle — it is used for heavy-duty tasks such as splitting squash, cracking lobster shells, and cutting through bone","The tip is the pointed front end of the blade — it is used for precision tasks such as scoring, piercing, trimming, deveining prawns, and starting cuts on round vegetables","The tip is the top corner of the blade at the spine end — it is used as a guide point when honing the blade on a sharpening steel at the correct angle","The tip is the flat section of the blade directly behind the bolster — it acts as a pivot point during the rocking chopping motion used for mincing herbs and garlic"],ans:1,exp:"The tip is the pointed front end of the blade. It is used for: fine precision work (scoring fish skin, trimming meat), piercing (starting a cut into a round tomato without it sliding), deveining prawns, removing eyes from potatoes, intricate butchery close to bone, and starting cuts. Keeping the tip sharp is important for detailed work — many chefs neglect the tip when honing."},
{q:"What is the 'flat' (or cheek) of a knife blade and how is it used in cooking?",opts:["The flat is the cutting edge of the blade — it is used for all slicing, dicing, and chopping tasks and is the only part of the blade that comes into contact with food","The flat is the broad, smooth side surface of the blade — it is used for crushing garlic (pressing down with the flat), transferring chopped ingredients from board to pan, and smearing butter or pâté","The flat is the decorative section of the blade where the manufacturer stamps the knife's name, steel grade, and country of origin for identification purposes","The flat is the concave hollow ground into the side of some knife blades — it reduces drag when slicing and prevents food from sticking to the blade surface during cutting"],ans:1,exp:"The flat (cheek) is the broad side of the blade. Uses: crushing garlic by pressing the flat firmly with the palm — the impact splits the clove without the blade edge needing to penetrate, scooping and transferring chopped ingredients from board to pot, and spreading soft ingredients. The flat also acts as a guide surface when the knuckles of the claw grip slide along it for consistent slice thickness."},
{q:"What is the 'tang' of a knife and what are the two main types?",opts:["The tang is the decorative cap at the very end of the handle — it seals the handle and prevents moisture from entering the joint between the blade and handle materials","The tang is the extension of the blade metal that runs into or through the handle — a full tang runs the entire length and width of the handle; a partial tang extends only partway into the handle","The tang is the sharpened secondary bevel at the very tip of the cutting edge — full tang edges are sharpened to a finer angle than partial tang edges for more precision cutting","The tang is the rivet or pin that secures the handle scales to the metal — full tang knives have three rivets while partial tang knives have only one or two securing points"],ans:1,exp:"The tang is the unsharpened extension of the blade metal that extends into the handle. Full tang: the metal runs the full length and width of the handle — visible as a metal strip between the handle scales. Stronger, better balanced, preferred for professional knives. Partial (rat-tail) tang: a narrow extension that does not fill the handle — lighter but weaker at the handle junction. Most professional kitchen knives have a full tang."},
{q:"What are 'rivets' on a knife and what is their purpose?",opts:["Rivets are the decorative engraved patterns on the blade flat — they identify the knife's manufacturer, steel grade, and country of origin without affecting structural integrity","Rivets are the metal pins that secure the handle scales (slabs) to the full tang of the knife — they prevent the handle from separating from the tang during heavy use","Rivets are the serrated points along the spine of some bread knives — they prevent the bread from tearing by gripping the crust before the serrated edge begins cutting","Rivets are the small raised studs on the bolster that grip the index finger during the pinch grip — they improve control and reduce hand fatigue during extended use"],ans:1,exp:"Rivets are metal pins (typically brass, stainless steel, or copper) that pass through both the handle scales and the full tang, locking them permanently together. Three rivets is the classic professional knife standard. They must be flush with the handle surface — proud or sunken rivets create gaps that harbour bacteria and are a food hygiene concern. Well-made rivets last the lifetime of the knife."},
{q:"What are 'handle scales' on a knife?",opts:["Handle scales are the measurement markings on the blade flat — they indicate portion sizes and cutting depths for standardised vegetable and meat preparation tasks","Handle scales are the two slabs of material (wood, composite, plastic, or Micarta) attached to either side of the full tang to form the grip — they determine the handle's texture, weight, and feel","Handle scales are the decorative etchings applied to the blade of high-end knives — they indicate the blade's Rockwell hardness rating, steel composition, and manufacturer warranty","Handle scales are the weighted metal plates attached to the handle end to balance a blade-heavy knife — they adjust the knife's centre of gravity toward the handle for improved control"],ans:1,exp:"Handle scales are the two slabs of material riveted or bonded to each flat side of the full tang to create the grip. Materials: wood (traditional, warm feel, requires oiling — avoid dishwasher), pakkawood (stabilised resin-impregnated wood — durable and water resistant), composite/G10 (extremely durable, hygienic), polypropylene (easy to clean, common in commercial kitchens). The material affects grip, hygiene, weight, and aesthetics."},
{q:"What is the 'bolster' versus the 'finger guard' on a knife?",opts:["Bolster and finger guard are identical terms describing the same feature — a thick metal band at the blade-handle junction that prevents finger contact with the cutting edge","The bolster is the thick collar where blade meets handle — it may act as a finger guard but is primarily a structural and balance feature. A dedicated finger guard is a raised lip specifically designed to stop the index finger from slipping onto the blade during gripping","The bolster is located at the tip of the knife while the finger guard is located at the heel — they serve opposite functions, with the bolster controlling cutting direction and the guard controlling grip","The bolster is a feature of Western knives only while a finger guard appears only on Japanese knives — the two knife traditions use completely different anatomical features at the blade-handle junction"],ans:1,exp:"The bolster is the thick collar at the blade-handle junction — primarily structural (balance, strength) but often also acts as a passive finger guard. A dedicated finger guard is a distinct raised feature specifically shaped to stop the index finger from sliding forward onto the edge. Some Japanese knives have no bolster at all and rely entirely on the cook's correct grip technique for finger safety."},
{q:"What does 'forged' versus 'stamped' mean when describing knife construction?",opts:["Forged knives are made from multiple pieces of steel welded together under high pressure, while stamped knives are cast from liquid metal poured into blade-shaped moulds","Forged knives are shaped from a single piece of heated steel using hammers and dies — producing a denser, harder, better-balanced blade with a natural bolster. Stamped knives are cut from a flat sheet of steel — lighter, more flexible, less expensive, with no natural bolster","Forged knives are made exclusively in Germany while stamped knives are made exclusively in Japan — the construction method is determined entirely by the country of manufacture","Forged knives have a serrated edge created by a forging die that impresses teeth into the blade, while stamped knives always have a straight smooth edge with no serrations"],ans:1,exp:"Forged: a single piece of steel is heated and shaped under pressure using hammers and dies — creating a denser grain structure, natural taper from spine to edge, integral bolster, and better balance. More expensive to produce. Stamped: cut from a flat sheet of rolled steel like a cookie cutter — uniform thickness throughout, no integral bolster, lighter. Good stamped knives (Victorinox) are excellent value; poor ones lack edge retention."},
{q:"What is the 'Rockwell Hardness Scale' (HRC) in relation to knife steel?",opts:["The Rockwell Hardness Scale measures the weight of a knife in grams — a higher HRC number indicates a heavier knife better suited to heavy chopping tasks such as butchery and vegetable prep","The Rockwell Hardness Scale measures the resistance of steel to deformation — a higher HRC number means harder steel that holds a sharper edge longer but is more brittle and prone to chipping","The Rockwell Hardness Scale measures the flexibility of a knife blade — higher HRC knives are more flexible and better suited to filleting fish, while lower HRC knives are stiffer for heavy chopping","The Rockwell Hardness Scale measures the thickness of the blade spine in millimetres — a higher HRC number indicates a thicker, more robust spine designed for heavy-duty commercial kitchen use"],ans:1,exp:"HRC (Rockwell C scale) measures steel hardness. Most professional Western kitchen knives: HRC 52–58. Japanese knives: HRC 60–66+. Higher HRC = harder steel = holds a sharper edge longer + takes a finer angle. Trade-off: harder steel is more brittle — it can chip rather than roll when hitting hard surfaces. Softer steel dulls faster but rolls rather than chips and is easier to resharpen."},
{q:"What is the difference between high-carbon steel and stainless steel in knife blades?",opts:["High-carbon steel contains more carbon than stainless steel, making it harder, capable of taking a finer edge, and easier to resharpen — but it rusts and discolours if not dried immediately after use","High-carbon steel is always softer than stainless steel — it is preferred for cheaper kitchen knives while stainless steel is used exclusively in professional-grade knives","High-carbon steel contains chromium while stainless steel does not — the chromium content is what makes high-carbon steel resistant to corrosion in wet kitchen environments","High-carbon steel and stainless steel are identical compositions — the terms are interchangeable marketing names used by different manufacturers for the same product"],ans:0,exp:"High-carbon steel: higher carbon content = harder, takes a finer, sharper edge, easier to resharpen — but reacts with acidic foods and water (discolouration, rust if not dried). Stainless steel: contains chromium (minimum 10.5%) which resists corrosion — more forgiving to maintain but typically softer, harder to get as sharp. High-carbon stainless steel combines both: corrosion resistance with reasonable hardness — most modern professional knives use this."},
{q:"What does 'edge retention' mean in knife terminology?",opts:["Edge retention is the ability of a knife blade to resist bending or flexing when pressure is applied during heavy cutting tasks on dense ingredients","Edge retention is how long a knife blade maintains its sharpness during use before requiring honing or sharpening — harder steel retains its edge longer than softer steel","Edge retention is the degree to which a knife returns to its original straight shape after being bent — knives with high edge retention are preferred for filleting and flexible cutting","Edge retention is the resistance of a knife handle to absorbing moisture and odours during prolonged immersion in water during the dishwashing process"],ans:1,exp:"Edge retention is how long a blade stays sharp during regular use. Determined by: steel hardness (HRC), blade geometry (edge angle), and steel composition. A knife with excellent edge retention requires less frequent sharpening — critical in a busy professional kitchen where stopping to sharpen disrupts workflow. High-carbon Japanese knives typically have superior edge retention to softer Western knives."},
{q:"What is the 'bevel' of a knife blade?",opts:["The bevel is the decorative etching on the blade flat that shows the manufacturer's brand and the knife's specific model name and series number","The bevel is the angled surface ground into the blade to form the cutting edge — the angle of the bevel determines how sharp and how durable the edge will be","The bevel is the curved shape of the blade profile from heel to tip — a curved bevel allows rocking chopping while a straight bevel is better for push-cutting through vegetables","The bevel is the recess or groove cut into the flat of some blades to reduce friction and prevent food from sticking during slicing tasks"],ans:1,exp:"The bevel is the angled surface that forms the cutting edge. Primary bevel: the main ground angle that shapes the edge (e.g. 15–20° per side for Western, 10–15° for Japanese). Secondary bevel (micro-bevel): a tiny additional angle at the very tip of the edge that adds durability. The angle of the bevel determines sharpness versus durability: lower angle = sharper but more fragile; higher angle = more durable but less acute."},
{q:"What is a 'full bolster' versus a 'half bolster' and how does it affect sharpening?",opts:["A full bolster covers the entire blade from spine to cutting edge at the heel — over time it prevents the heel from being sharpened and creates a notch above the bolster as the blade is repeatedly ground","A full bolster and half bolster are identical features — the only difference is the material used: full bolsters are always stainless steel while half bolsters are always brass or copper","A full bolster runs from the cutting edge to the spine while a half bolster runs from the spine to the midpoint of the blade — both prevent finger contact with the cutting edge equally effectively","A full bolster is found only on stamped knives while a half bolster is found only on forged knives — the type of bolster indicates the construction method used by the manufacturer"],ans:0,exp:"A full bolster extends the full height of the blade at the heel — it protects the fingers well and adds balance, but creates a sharpening problem: as the blade is repeatedly sharpened, the edge recedes but the bolster does not, leaving a notch. A half bolster extends only partway down — it allows the full edge including the heel to be sharpened easily throughout the knife's life. Many professional chefs prefer half-bolstered knives for this reason."},
{q:"What is the 'balance point' of a knife and why does it matter?",opts:["The balance point is the location on the blade where the manufacturer's logo is stamped — it identifies which part of the blade was subjected to the most heat during the forging process","The balance point is where the knife balances horizontally when placed on a single finger — ideally at or just in front of the bolster, allowing controlled, fatigue-free cutting","The balance point is the exact midpoint of the blade length — all professional knives must have their balance point at the geometric centre to comply with industry standards","The balance point is the point of maximum blade thickness — located at the spine directly above the heel, it is where the greatest downward force is generated during chopping"],ans:1,exp:"The balance point is where the knife balances on a single outstretched finger. Ideal position: at or just in front of the bolster (slightly blade-heavy). This means less wrist effort is needed to control the knife and cutting fatigue is reduced over long sessions. A handle-heavy knife tires the wrist; an excessively blade-heavy knife loses control. Personal preference varies, but the bolster area is the professional standard."},
{q:"What is the difference between the 'cutting edge' and the 'micro-bevel'?",opts:["The cutting edge is the entire length of the sharpened blade, while the micro-bevel is the tiny additional angle applied at the very tip of the edge to add strength and durability without significantly reducing sharpness","The cutting edge and micro-bevel are the same feature — micro-bevel is the technical term used by Japanese knife manufacturers for what Western manufacturers call the cutting edge","The cutting edge is the lower bevel angle used for delicate slicing tasks, while the micro-bevel is a steeper angle applied to the same blade for heavy chopping and butchery work","The cutting edge is the visible sharpened surface of the blade, while the micro-bevel is the invisible microscopic serration that forms on any blade after it has been used on a cutting board"],ans:0,exp:"The primary bevel forms the main cutting angle (e.g. 15° per side). The micro-bevel is a tiny secondary angle added at the very apex of the edge (e.g. 20°) — a few degrees steeper than the primary. It sacrifices a tiny amount of sharpness for significantly increased edge durability. Professional sharpeners add a micro-bevel as the final step on knives that will be used heavily in a commercial kitchen."},
{q:"What is a 'hollow ground' blade and what are its advantages and disadvantages?",opts:["A hollow ground blade has a convex curved cross-section that concentrates material at the edge — making it the strongest blade geometry available for heavy-duty kitchen tasks","A hollow ground blade has a concave cross-section on the flat sides of the blade, creating a very thin, razor-sharp edge — it is extremely sharp but more fragile and difficult to resharpen","A hollow ground blade is a blade with multiple bevels ground at different angles — it combines the sharpness of a Japanese knife with the durability of a Western knife in one design","A hollow ground blade is a blade with a raised central ridge (like a traditional Japanese single bevel) — it directs sliced food away from the blade to prevent sticking during high-speed slicing"],ans:1,exp:"Hollow grinding creates a concave cross-section on the blade sides — the blade is thinner behind the edge, making it very easy to slice through food with minimal resistance. Advantages: razor-sharp, reduces drag, beautiful finish. Disadvantages: the thin geometry makes it fragile — prone to chipping on hard surfaces, difficult to resharpen on a flat whetstone without special tools. Common on straight razors and some high-end slicing knives."},
{q:"What is a 'serrated edge' and what tasks is it best suited for?",opts:["A serrated edge is a blade with microscopic indentations from regular use on hard cutting boards — all knives eventually develop a serrated edge through normal wear during professional kitchen service","A serrated edge has a series of saw-like teeth along the cutting edge — it grips and cuts through foods with a hard exterior and soft interior (bread, tomatoes) without compressing them","A serrated edge is a blade with a corrugated flat surface — the waves in the metal reduce friction during slicing and prevent food from sticking to the blade during high-volume preparation","A serrated edge is an edge that has been sharpened at alternating angles — every second tooth faces left and the next faces right, creating a more aggressive cutting action on tough proteins"],ans:1,exp:"A serrated edge has teeth that grip the food surface before cutting. Best for: bread (the crust resists a straight edge — serrations grip and saw through it without compressing the crumb), tomatoes (the skin resists a straight blade — teeth grip it), and any food with a hard exterior and soft interior. Disadvantages: serrated edges are difficult to resharpen and cannot be used for clean precision cuts on vegetables or meat."},
{q:"What is a 'Japanese-style' knife versus a 'Western-style' knife in terms of blade geometry?",opts:["Japanese-style knives are always longer than Western-style knives — the length difference is the only meaningful distinction between the two traditions in professional kitchen use","Japanese-style knives typically use harder steel, thinner blades, and a more acute edge angle (10–15°) — designed for precision, push-cutting, and delicate work. Western-style knives use softer steel, thicker blades, and a wider edge angle (15–20°) — designed for durability and the rocking chopping technique","Japanese-style knives always have a single-bevel edge while Western-style knives always have a double-bevel edge — there are no exceptions to this distinction in professional knife classification","Japanese-style knives are made exclusively from ceramic while Western-style knives are made exclusively from stainless steel — the material is the defining characteristic of each tradition"],ans:1,exp:"Japanese knives: harder steel (HRC 60–66+), thinner blade geometry, finer edge angle (10–15° per side), designed for the push-cut technique — extremely sharp but more fragile. Western knives: softer steel (HRC 52–58), thicker, more robust geometry, wider edge angle (15–20°), suited to the rocking chop — more durable and easier to maintain. Each tradition reflects its culinary technique and material culture."},
{q:"What is a 'choil' on a knife and what purpose does it serve?",opts:["The choil is the decorative etching at the base of the blade where the manufacturer's name appears — it helps users identify genuine professional-grade knives from inferior imitations","The choil is the small unsharpened notch or curve between the cutting edge and the bolster or heel — it allows the full length of the blade to be sharpened without the bolster blocking the whetstone","The choil is the curved tip profile of a Japanese knife — it replaces the pointed Western tip and is preferred for rocking chopping techniques used in traditional Japanese vegetable preparation","The choil is the area of the blade directly behind the bolster where the cook's index finger rests during the pinch grip — it is sometimes finger-grooved to improve grip comfort and control"],ans:1,exp:"The choil is the small unsharpened recess or notch just above where the cutting edge meets the bolster or heel. Its purpose: allows the whetstone to reach the full length of the cutting edge during sharpening without being blocked by the bolster. On some knives (especially Japanese), the choil is large enough to place a finger in for an alternative choking-up grip."},
{q:"What is the purpose of the 'spine' thickness varying from heel to tip?",opts:["The spine is the same thickness throughout the blade — any apparent variation in thickness is a manufacturing defect that reduces the blade's structural integrity and cutting performance","The spine is thickest at the heel (for strength and rigidity during heavy cutting) and tapers progressively thinner toward the tip (for flexibility and precision) — this distal taper improves cutting performance","The spine is thinnest at the heel because this area receives the most sharpening and the metal is gradually reduced by the whetstone over the knife's working lifetime","The spine thickness variation serves only an aesthetic purpose — blades with a visible taper are considered more elegant by professional chefs but it has no functional impact on performance"],ans:1,exp:"Distal taper: the spine is thickest and heaviest at the heel (provides power and rigidity for hard cutting tasks) and progressively thins toward the tip (allows flexibility and finesse for precision work). The tip is also thinner from spine to edge (height taper). These tapers make the same knife versatile — using the heel for hard tasks, the tip for delicate ones — and give forged knives their characteristic feel and performance."},
{q:"What is the 'handle material' impact on kitchen hygiene?",opts:["Handle material has no hygiene impact — all handle materials used in professional knives provide the same level of bacterial resistance and can be cleaned equally effectively","Wood handles are the most hygienic option — natural oils in the wood have antimicrobial properties that continuously kill bacteria without any cleaning required during storage","Porous materials like untreated wood absorb moisture, blood, and food particles — creating an environment where bacteria multiply. Non-porous materials (polypropylene, composite, G10) are more hygienic and easier to sanitise","All knife handles must be replaced annually regardless of material — bacteria permanently bond to the handle surface after 12 months of use and cannot be removed by any cleaning method"],ans:2,exp:"Handle material significantly affects hygiene. Untreated natural wood: porous — absorbs moisture, blood, and juices, providing a harbour for bacteria. It cannot be dishwashed (swells and cracks) and requires regular oiling. Synthetic materials (polypropylene, G10, composite): non-porous, dishwasher safe (check the blade), easy to sanitise, and will not absorb bacteria or odours. In commercial kitchens, non-porous synthetic handles are the hygiene-preferred choice."},
{q:"What is a 'santoku' knife and how does its anatomy differ from a Western chef's knife?",opts:["A santoku is a Japanese single-bevel slicing knife with a pointed tip and a very long, narrow blade designed exclusively for filleting whole fish from head to tail","A santoku is a versatile Japanese all-purpose knife with a shorter, wider blade, a rounded tip (sheep's foot profile), and often a granton edge — suited to slicing, dicing, and mincing without the rocking technique","A santoku is a German-style chef's knife with a double bolster and an extra-wide blade spine designed for heavy chopping through root vegetables and hard squash","A santoku is a French-style tournée knife with a curved, narrow blade and a pointed tip used for carving barrel-shaped turned vegetables for classical fine dining garnishes"],ans:1,exp:"Santoku (Japanese for 'three virtues' — slicing, dicing, mincing): shorter blade (16–18cm vs 20–25cm chef's knife), wider blade, rounded sheep's foot tip (no pointed tip for piercing), often granton (hollow-ground oval recesses on the flat to reduce sticking). Designed for the push-cut technique rather than rocking. More compact and lighter than a Western chef's knife — popular with cooks who prefer a smaller, more manoeuvrable blade."},
{q:"What is a 'nakiri' knife and what is it designed for?",opts:["A nakiri is a long, thin Japanese slicing knife with a single-bevel edge designed for cutting raw fish into very thin, precise slices for sashimi service in Japanese restaurants","A nakiri is a Japanese-style rectangular vegetable knife with a straight cutting edge and a blunt tip — designed for straight push-cuts through vegetables without a rocking motion","A nakiri is a heavy, wide-bladed Japanese cleaver used for breaking down whole poultry and cutting through cartilage and soft bone in a Japanese butchery context","A nakiri is a flexible Japanese filleting knife with a long narrow blade designed to run along fish bones and remove fillets cleanly with minimal flesh loss"],ans:1,exp:"Nakiri (Japanese for 'vegetable cutter') has a rectangular blade with a straight cutting edge and a squared blunt tip. Designed exclusively for vegetables using a straight push-cut — the straight edge contacts the entire cutting board simultaneously for clean, uniform cuts. No rocking motion needed. The blunt tip eliminates risk from the tip being used for non-vegetable tasks. Both Western (usuba) and home-cook (nakiri) versions exist."},
{q:"What is a 'granton edge' (also called a kullenschliff) and what does it do?",opts:["A granton edge is a blade with alternating left and right bevels — the asymmetric sharpening creates a more aggressive cutting action for hard and fibrous proteins","A granton edge has oval hollow-ground recesses along the flat of the blade — they create air pockets that break the suction between blade and food, reducing sticking when slicing wet or sticky ingredients","A granton edge is a very fine serrated edge created by a laser — it combines the precision of a straight edge with the gripping power of a serrated edge for universal kitchen use","A granton edge is the traditional German name for a full-bolster blade — the granton mark on the bolster indicates the knife was forged in Solingen, the German knife-making capital"],ans:1,exp:"Granton (or kullenschliff) edges have oval hollow-ground recesses (dimples) on the flat side of the blade. When slicing, these create tiny air pockets between the blade and the food — breaking the suction that causes thin slices of salmon, cucumber, or cheese to stick to the blade. Particularly useful on slicing knives and santoku blades. Not to be confused with a serrated edge — the recesses are on the flat, not the edge."},
{q:"What does 'full tang' construction mean for the long-term durability of a knife?",opts:["Full tang means the blade steel extends the full length and width through the handle — this provides maximum strength at the handle-blade junction, even weight distribution, and eliminates the risk of the handle separating under heavy use","Full tang means the blade is made from a single layer of steel without any welded or laminated sections — it indicates the highest quality forging process and maximum blade purity","Full tang means the knife can be fully submerged in water for cleaning — partial tang knives must never be soaked as water enters through the handle junction and causes internal corrosion","Full tang is a marketing term with no structural meaning — all knives sold for professional kitchen use have identical structural integrity regardless of whether they are described as full or partial tang"],ans:0,exp:"Full tang: the blade steel extends the full length and full width of the handle. The handle scales are attached to both sides of this tang. Result: maximum structural strength — the handle cannot separate from the blade under stress, even during the heaviest tasks. Better balance (more weight in the handle to counterbalance the blade). Full tang is visible as a strip of metal along the top and bottom edges of the handle. It is the gold standard for professional kitchen knives."},
{q:"What is the correct method for testing the sharpness of a knife edge?",opts:["Press the blade edge firmly against the thumbnail and drag it across the nail — if it catches and grips rather than sliding off, the knife is sharp and ready for use","Hold the edge up to a bright light source — a sharp edge reflects no light at all along its length; any bright reflection indicates a dull or rolled section that needs honing or sharpening","Cut through a piece of raw beef fat with the knife — if the fat cuts cleanly without tearing, the knife is sharp; if it tears or drags, the edge requires immediate sharpening on a whetstone","Wave the knife rapidly through the air near the ear — a sharp knife produces a distinct high-pitched whistling sound, while a dull knife produces a lower, duller sound"],ans:1,exp:"The light test (also called the sharpness test): hold the blade edge up at eye level toward a light source. A sharp edge has no flat spots — it reflects no light along its entire length. Any bright white or silver reflection along the edge indicates a dull, rolled, or chipped section. The thumbnail test (edge catches slightly on the nail without sliding) is also used by professionals. Never run a finger along the edge — run it carefully across (perpendicular) to feel for rolls."}
];
let order=[],cur=0,picks={},playerName='',score=0;
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function goBack(){if(confirm('Quit quiz and return to subjects?'))window.location.href='index.html';}
function startQuiz(){const inp=document.getElementById('name-input').value.trim();playerName=inp||'Anonymous';order=shuffle(BANK.map((_,i)=>i));cur=0;picks={};score=0;document.getElementById('q-total').textContent=BANK.length;show('quiz-screen');render();}
function render(){const idx=order[cur],q=BANK[idx],total=BANK.length;document.getElementById('q-num').textContent=cur+1;document.getElementById('q-score').textContent=score;document.getElementById('q-label').textContent=`Question ${cur+1} of ${total}`;document.getElementById('q-text').textContent=q.q;document.getElementById('progress-fill').style.width=((cur/total)*100)+'%';document.getElementById('explanation').className='explanation';document.getElementById('explanation').textContent='';document.getElementById('next-btn').className='next-btn';document.getElementById('quit-btn').className='quit-btn';const letters=['A','B','C','D'],optEl=document.getElementById('options');optEl.innerHTML='';shuffle([0,1,2,3]).forEach((oi,li)=>{const btn=document.createElement('button');btn.className='opt-btn';btn.dataset.opt=oi;btn.innerHTML=`<span class="opt-letter">${letters[li]}</span><span>${q.opts[oi]}</span>`;btn.onclick=()=>selectAnswer(oi,idx);optEl.appendChild(btn);});}
function selectAnswer(chosen,idx){const q=BANK[idx],correct=chosen===q.ans;picks[idx]=chosen;if(correct)score++;document.getElementById('q-score').textContent=score;document.querySelectorAll('.opt-btn').forEach(btn=>{btn.disabled=true;const oi=parseInt(btn.dataset.opt);if(oi===q.ans)btn.classList.add('correct');else if(oi===chosen&&!correct)btn.classList.add('wrong');});if(!correct){const e=document.getElementById('explanation');e.textContent='✗ '+q.exp;e.classList.add('show');}const nb=document.getElementById('next-btn');nb.classList.add('show');nb.textContent=cur+1<BANK.length?'Next Question →':'See Results →';document.getElementById('quit-btn').classList.add('show');}
function nextQuestion(){cur++;if(cur>=BANK.length)showResults();else{render();window.scrollTo(0,0);}}
function showResults(){show('results-screen');const total=BANK.length,pct=Math.round((score/total)*100),passed=pct>=70;document.getElementById('result-name').textContent=playerName;document.getElementById('ring-pct').textContent=pct+'%';document.getElementById('ring-pct').style.color=passed?'var(--green)':'var(--red)';document.getElementById('ring-fill').style.stroke=passed?'var(--green)':'var(--red)';setTimeout(()=>{document.getElementById('ring-fill').style.strokeDashoffset=439.82-(439.82*pct/100);},100);document.getElementById('res-title').textContent=pct>=90?'Excellent!':pct>=70?'Passed!':'Needs Work';document.getElementById('res-sub').textContent=`${score} correct out of ${total} questions`;const v=document.getElementById('res-verdict');if(passed){v.textContent='✓ You passed — score above 70%';v.className='result-verdict pass';}else{v.textContent='✗ Below 70% — please retake the quiz';v.className='result-verdict fail';}const rv=document.getElementById('review');rv.innerHTML='<h3>Review</h3>';order.forEach(idx=>{const q=BANK[idx],ua=picks[idx],ok=ua===q.ans;const d=document.createElement('div');d.className='rv-item '+(ok?'ok':'miss');d.innerHTML=`<div class="rv-q">${q.q}</div><div class="rv-a">${ok?`<span class="c">✓ Correct: ${q.opts[q.ans]}</span>`:`<span class="w">✗ You chose: ${ua!==undefined?q.opts[ua]:'Skipped'}</span><br><span class="c">✓ Correct: ${q.opts[q.ans]}</span><br><span style="color:var(--muted)">${q.exp}</span>`}</div>`;rv.appendChild(d);});}
function retryQuiz(){order=shuffle(order);cur=0;picks={};score=0;document.getElementById('q-score').textContent=0;show('quiz-screen');render();}
document.getElementById('name-input').addEventListener('keydown',e=>{if(e.key==='Enter')startQuiz();});
</script>
