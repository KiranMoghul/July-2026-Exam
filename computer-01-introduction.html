<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Introduction to Computer — July 2026 Exam</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💻</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap');
  :root{--bg:#080810;--surface:#11111f;--border:#1e1e35;--purple:#7c3aed;--purple-l:#9d5bf0;--green:#22c55e;--red:#ef4444;--text:#e8e8f0;--muted:#7070a0;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:.4;pointer-events:none;z-index:0;}
  .screen{position:relative;z-index:1;width:100%;max-width:660px;margin:0 auto;padding:24px 20px 48px;display:none;}
  .screen.active{display:block;}
  #name-screen{text-align:center;padding-top:80px;}
  .back-link{display:inline-flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);text-decoration:none;letter-spacing:1px;margin-bottom:48px;transition:color .2s;}
  .back-link:hover{color:var(--purple-l);}
  .subject-tag{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--purple-l);margin-bottom:12px;}
  #name-screen h1{font-size:clamp(22px,5vw,36px);font-weight:800;line-height:1.15;margin-bottom:8px;background:linear-gradient(135deg,#fff 30%,var(--purple-l));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  #name-screen p{color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;margin-bottom:40px;}
  .name-box{display:flex;flex-direction:column;align-items:center;gap:12px;}
  .name-box input{width:100%;max-width:320px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Syne',sans-serif;font-size:15px;outline:none;text-align:center;transition:border-color .2s;}
  .name-box input:focus{border-color:var(--purple);}
  .name-box input::placeholder{color:var(--muted);}
  .btn-primary{padding:12px 32px;background:var(--purple);color:#fff;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:background .2s,transform .1s;letter-spacing:.5px;}
  .btn-primary:hover{background:var(--purple-l);transform:translateY(-1px);}
  .quiz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
  .quiz-meta{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
  .quiz-meta span{color:var(--purple-l);font-weight:500;}
  .quiz-back{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);background:none;border:1px solid var(--border);padding:5px 10px;border-radius:6px;cursor:pointer;transition:color .2s,border-color .2s;}
  .quiz-back:hover{color:var(--text);border-color:var(--purple);}
  .progress-bar{width:100%;height:3px;background:var(--border);border-radius:2px;margin-bottom:32px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--purple-l));border-radius:2px;transition:width .3s ease;}
  .question-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--purple-l);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
  .question-text{font-size:clamp(15px,3vw,18px);font-weight:600;line-height:1.5;margin-bottom:28px;color:var(--text);}
  .options{display:flex;flex-direction:column;gap:10px;}
  .opt-btn{display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;font-weight:400;cursor:pointer;text-align:left;transition:border-color .15s,background .15s;width:100%;}
  .opt-btn:hover:not(:disabled){border-color:var(--purple);background:#16162a;}
  .opt-btn .opt-letter{flex-shrink:0;width:26px;height:26px;border-radius:6px;background:var(--border);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);transition:background .15s,color .15s;}
  .opt-btn:hover:not(:disabled) .opt-letter{background:var(--purple);color:#fff;}
  .opt-btn.correct{border-color:var(--green);background:rgba(34,197,94,.1);}
  .opt-btn.correct .opt-letter{background:var(--green);color:#fff;}
  .opt-btn.wrong{border-color:var(--red);background:rgba(239,68,68,.1);}
  .opt-btn.wrong .opt-letter{background:var(--red);color:#fff;}
  .opt-btn:disabled{cursor:default;}
  .explanation{display:none;margin-top:16px;padding:14px 16px;background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.25);border-left:3px solid var(--purple);border-radius:8px;font-size:13px;line-height:1.6;color:#c4b5fd;font-family:'DM Mono',monospace;}
  .explanation.show{display:block;}
  .action-row{display:flex;gap:10px;margin-top:24px;}
  .next-btn{flex:1;padding:13px;background:var(--purple);color:#fff;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;display:none;transition:background .2s;letter-spacing:.5px;}
  .next-btn:hover{background:var(--purple-l);}
  .next-btn.show{display:block;}
  .quit-btn{padding:13px 18px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;display:none;transition:color .2s,border-color .2s;white-space:nowrap;}
  .quit-btn:hover{color:var(--text);border-color:var(--purple);}
  .quit-btn.show{display:block;}
  #results-screen{text-align:center;padding-top:40px;}
  .result-name{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);margin-bottom:32px;}
  .score-ring{position:relative;width:160px;height:160px;margin:0 auto 28px;}
  .score-ring svg{transform:rotate(-90deg);}
  .score-ring .ring-bg{fill:none;stroke:var(--border);stroke-width:10;}
  .score-ring .ring-fill{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1s ease,stroke .5s;}
  .score-ring .ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .ring-pct{font-size:34px;font-weight:800;line-height:1;}
  .ring-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:4px;letter-spacing:1px;}
  .result-title{font-size:24px;font-weight:800;margin-bottom:8px;}
  .result-sub{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);margin-bottom:8px;}
  .result-verdict{font-family:'DM Mono',monospace;font-size:12px;padding:8px 20px;border-radius:20px;display:inline-block;margin-bottom:32px;}
  .result-verdict.pass{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.3);}
  .result-verdict.fail{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.3);}
  .result-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:40px;}
  .btn-outline{padding:11px 24px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:border-color .2s,color .2s;}
  .btn-outline:hover{border-color:var(--purple);color:var(--text);}
  .review{text-align:left;}
  .review h3{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:16px;font-family:'DM Mono',monospace;}
  .rv-item{padding:14px 16px;border-radius:8px;margin-bottom:10px;border:1px solid var(--border);}
  .rv-item.ok{border-color:rgba(34,197,94,.25);background:rgba(34,197,94,.05);}
  .rv-item.miss{border-color:rgba(239,68,68,.25);background:rgba(239,68,68,.05);}
  .rv-q{font-size:13px;font-weight:600;margin-bottom:8px;line-height:1.4;}
  .rv-a{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);line-height:1.6;}
  .rv-a .c{color:var(--green);}
  .rv-a .w{color:var(--red);}
</style>
</head>

<div class="screen active" id="name-screen">
  <a class="back-link" href="index.html">← Back to subjects</a>
  <div class="subject-tag">Computer · Topic 01</div>

  <p>36 questions · Every point from your syllabus · Order shuffles each attempt</p>
  <div class="name-box">
    <input type="text" id="name-input" placeholder="Enter your name" maxlength="30" autocomplete="off">
    <button class="btn-primary" onclick="startQuiz()">Start Quiz</button>
  </div>
</div>
<div class="screen" id="quiz-screen">
  <div class="quiz-header">
    <div class="quiz-meta">Question <span id="q-num">1</span> of <span id="q-total">36</span></div>
    <div class="quiz-meta">Score <span id="q-score">0</span></div>
    <button class="quiz-back" onclick="goBack()">← Quit</button>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="question-num" id="q-label"></div>

  <div class="options" id="options"></div>
  <div class="explanation" id="explanation"></div>
  <div class="action-row">
    <button class="quit-btn" id="quit-btn" onclick="goBack()">← Back to subjects</button>

  </div>
</div>
<div class="screen" id="results-screen">
  <div class="result-name" id="result-name"></div>
  <div class="score-ring">
    <svg viewBox="0 0 160 160" width="160" height="160">
      <circle class="ring-bg" cx="80" cy="80" r="70"/>
      <circle class="ring-fill" id="ring-fill" cx="80" cy="80" r="70" stroke-dasharray="439.82" stroke-dashoffset="439.82" stroke="var(--green)"/>
    </svg>
    <div class="ring-text">
      <div class="ring-pct" id="ring-pct">0%</div>
      <div class="ring-label">SCORE</div>

  <div class="result-actions">
    <button class="btn-primary" onclick="retryQuiz()">Retry →</button>
    <button class="btn-outline" onclick="window.location.href='index.html'">All Subjects</button>
  </div>
  <div class="review" id="review"></div>
</div>
<script>
const BANK=[
{q:"Who is known as the Father of the Computer?",opts:["Alan Turing — the British mathematician who developed the theoretical model of modern computing","Bill Gates — the founder of Microsoft who designed the first personal computer operating system","Charles Babbage — the 19th century mathematician who designed the first mechanical computing engine","Tim Berners-Lee — the British scientist who invented the World Wide Web and internet protocols"],ans:2,exp:"Charles Babbage is known as the Father of the Computer. He designed the Difference Engine and the Analytical Engine in the 19th century — the first mechanical computing machines."},
{q:"What is the binary language used by computers?",opts:["The decimal system using digits 0 through 9 to represent all data and instructions","The hexadecimal system using digits 0–9 and letters A–F to represent memory addresses","The binary system using only two digits — 0 and 1 — to represent all data and instructions","The octal system using digits 0 through 7 to represent data in compact computer memory"],ans:2,exp:"Computers use binary language — a system of only two digits: 0 and 1. All data, instructions, and programs are ultimately represented as combinations of 0s and 1s at the hardware level."},
{q:"How many generations of computers are there, and what distinguishes them?",opts:["Three generations — distinguished by screen size, keyboard design, and the introduction of colour displays","Four generations — distinguished by the type of storage device used from punch cards to solid-state drives","Five generations — each distinguished by a different time period and the key invention or technology used","Six generations — distinguished by the operating system version installed on the computers of each era"],ans:2,exp:"There are 5 generations of computers, each defined by its time period and key technology: 1st (vacuum tubes), 2nd (transistors), 3rd (integrated circuits), 4th (microprocessors), 5th (artificial intelligence and parallel processing)."},
{q:"Which type of computer is the fastest?",opts:["Mainframe computer — a large, powerful system used by corporations and governments for bulk data processing","Minicomputer — a mid-range system more powerful than a personal computer but smaller than a mainframe","Personal computer — the standard desktop or laptop used by individuals for everyday computing tasks","Supercomputer — the fastest and most powerful type of computer, used for complex scientific calculations"],ans:3,exp:"A Supercomputer is the fastest type of computer. It is used for highly complex tasks such as weather forecasting, nuclear simulations, scientific research, and code breaking."},
{q:"Which of the following are examples of Input devices?",opts:["Monitor, speaker, and printer — devices that receive processed data and present it to the user","Hard disk, RAM, and ROM — storage devices that hold data and programs for the processor to access","Keyboard, mouse, scanner, and touchscreen — devices that send data and commands into the computer","Motherboard, CPU, and GPU — internal processing components that handle computation and display"],ans:2,exp:"Input devices send data into the computer: keyboard (typing), mouse (pointing and clicking), scanner (digitising documents), and touchscreen (touch-based input). They allow the user to communicate with the computer."},
{q:"Which of the following are examples of Output devices?",opts:["Keyboard, mouse, scanner, and microphone — devices used to enter data and commands into the system","RAM, ROM, hard disk, and flash drive — storage devices that hold data for the processor to access","Motherboard, CPU, power supply, and cooling fan — internal hardware components of the computer","Monitor, speaker, and printer — devices that present processed results from the computer to the user"],ans:3,exp:"Output devices present processed information from the computer to the user: monitor (visual display), speaker (audio output), and printer (physical printed output)."},
{q:"What is a mouse and what is its primary function?",opts:["A storage device that saves files and folders on a magnetic disk inside the computer unit","An output device that displays the results of computer processing on a screen or printout","An input device used for moving a pointer on the display — the standard pointing device in a Graphical User Environment","A processing component that controls the flow of data between the CPU and connected peripherals"],ans:2,exp:"A mouse is an input device used for moving a pointer on the display screen. It is the standard pointing device in a Graphical User Interface (GUI) environment, allowing users to click, drag, and interact with on-screen elements."},
{q:"What does CPU stand for, and what is it called in relation to the computer?",opts:["Central Program Unit — the component that stores all installed programs and makes them available to run","Computer Processing Utility — the hardware module that converts electrical power for use by other components","Central Processing Unit — known as the brain of the computer, responsible for executing all instructions","Core Power Unit — the component that regulates and distributes electrical power to all computer parts"],ans:2,exp:"CPU stands for Central Processing Unit. It is known as the brain of the computer — it executes all instructions, performs calculations, and manages data flow between components."},
{q:"In what units is CPU speed measured?",opts:["Kilobytes (KB) and Megabytes (MB) — the units used to measure the storage capacity of memory chips","Volts (V) and Watts (W) — the units used to measure the power consumption of the processor","Megahertz (MHz) and Gigahertz (GHz) — the units used to measure the processing speed of the CPU","Pixels (px) and Dots per inch (DPI) — the units used to measure the display resolution of monitors"],ans:2,exp:"CPU speed is measured in Megahertz (MHz) and Gigahertz (GHz). 1 GHz = 1,000 MHz. A higher GHz value means the CPU can process more instructions per second."},
{q:"What is a Motherboard?",opts:["The main display screen of the computer that shows the operating system's graphical user interface","The external casing that houses and protects all internal computer components from physical damage","The basic processing hardware to which all peripherals and internal components of the computer are connected","The primary storage drive that holds the operating system, applications, and all user data files"],ans:2,exp:"The Motherboard is the main circuit board of the computer — the basic processing hardware to which all components connect: CPU, RAM, storage drives, graphics card, and all peripheral ports."},
{q:"What does BIOS stand for?",opts:["Binary Input Output System — the language interpreter that converts binary code for the operating system","Basic Integrated Operating Software — the software layer between the hardware and the user interface","Basic Input Output System — the firmware that initialises hardware when the computer is powered on","Built-In Operating System — the pre-installed system software included with every new computer"],ans:2,exp:"BIOS stands for Basic Input Output System. It is firmware stored on a chip on the motherboard that initialises and tests hardware components when the computer is first switched on, before the operating system loads."},
{q:"What does the term 'memory' apply to in computing?",opts:["The processing speed of the CPU measured in GHz and the number of cores available","The display resolution of the monitor and the refresh rate of the screen","Storage — both temporary (RAM) and permanent (ROM, hard disk) data holding capacity","The internet connection speed and the bandwidth available to the network adapter"],ans:2,exp:"In computing, the term 'memory' applies to storage — it refers to the capacity to hold data and programs, whether temporarily (RAM) or permanently (ROM, hard disk)."},
{q:"What is the smallest unit of computer memory?",opts:["Byte (B) — the standard unit used to measure the storage capacity of files and drives","Kilobyte (KB) — the unit equal to 1,024 bytes used for measuring small file sizes","Nibble — a unit equal to 4 bits used in low-level programming and network addressing","Bit — the smallest unit of computer memory, representing a single binary value of 0 or 1"],ans:3,exp:"A Bit is the smallest unit of computer memory. It holds a single binary value — either 0 or 1. Eight bits make one Byte."},
{q:"What is the typical unit used for measuring memory capacity?",opts:["Bit (b) — the smallest unit of data representing a single binary value of 0 or 1","Hertz (Hz) — the unit of frequency used to measure processor and network clock speeds","Pixel (px) — the unit of screen resolution used to measure display density and image clarity","Byte (B) — the typical unit for measuring memory capacity, equal to 8 bits"],ans:3,exp:"The Byte (B) is the typical unit used to measure memory capacity. Common multiples: 1 Kilobyte (KB) = 1,024 Bytes, 1 Megabyte (MB) = 1,024 KB, 1 Gigabyte (GB) = 1,024 MB."},
{q:"How many Megabytes (MB) equal one Gigabyte (GB)?",opts:["512 MB — half a gigabyte, the storage size of early memory cards and compact flash media","1,000 MB — the decimal approximation used by hard drive manufacturers for marketing purposes","1,024 MB — the exact binary measurement where 1 Gigabyte equals 1,024 Megabytes","2,048 MB — the storage capacity of two gigabytes of RAM in a standard computer system"],ans:2,exp:"1,024 Megabytes (MB) = 1 Gigabyte (GB). This follows the binary system where each unit is 2¹⁰ (1,024) times the previous unit."},
{q:"What does RAM stand for, and is it permanent memory?",opts:["Read Access Memory — permanent storage that retains data after the computer is switched off","Random Access Memory — temporary memory that loses all data when the computer is powered off","Rapid Application Memory — semi-permanent memory that retains some data between sessions","Readable and Modifiable memory — permanent memory that can be written to and read from repeatedly"],ans:1,exp:"RAM stands for Random Access Memory. It is NOT permanent — it is volatile memory that loses all stored data when the computer is switched off. It temporarily holds data that the CPU is actively using."},
{q:"What does ROM stand for, and is it permanent memory?",opts:["Random Output Memory — temporary memory used to store display data for the monitor output","Read Only Memory — permanent memory that retains its data even when the computer is powered off","Rewritable Operating Memory — semi-permanent memory that can be partially updated by the user","Removable Optional Memory — external storage that can be added or removed as needed by the user"],ans:1,exp:"ROM stands for Read Only Memory. It IS permanent memory — it retains its data even when the computer is switched off. It typically contains the BIOS firmware and other essential system instructions."},
{q:"What is the storage capacity of a standard Floppy Disk?",opts:["650 MB to 700 MB — sufficient to store small software programs and collections of documents","4.7 GB to 8.5 GB — the same capacity range as a standard single or dual-layer DVD","1.44 MB — the standard capacity of a 3.5-inch floppy disk used in older computer systems","25 GB to 50 GB — the high capacity of modern Blu-ray optical discs used for HD content"],ans:2,exp:"A standard 3.5-inch floppy disk has a storage capacity of 1.44 MB. Floppy disks were widely used in the 1980s and 1990s but are now obsolete."},
{q:"What is the storage capacity of a CD (Compact Disc)?",opts:["1.44 MB — the same as a standard floppy disk, used for small documents and simple programs","4.7 GB to 8.5 GB — the same capacity as a DVD, used for full-length movies and large software","25 GB to 50 GB — the high capacity of Blu-ray discs used for HD and 4K video content","650 MB to 700 MB — the standard capacity of a CD used for music, software, and data"],ans:3,exp:"A CD (Compact Disc) has a storage capacity of 650 MB to 700 MB. CDs are used for music, software distribution, and data storage."},
{q:"What does DVD stand for, and what is its storage capacity?",opts:["Digital Video Disc — capacity of 650 MB to 700 MB, the same as a standard compact disc","Digital Versatile Disc — capacity of 4.7 GB to 8.5 GB, used for movies, software, and data","Digital Versatile Disc — capacity of 25 GB to 50 GB, used for high-definition video content","Dynamic Video Drive — capacity of 1.44 MB to 4.7 GB, covering floppy to standard DVD range"],ans:1,exp:"DVD stands for Digital Versatile Disc. Its storage capacity is 4.7 GB (single layer) to 8.5 GB (dual layer). DVDs are used for movies, software, and large data files."},
{q:"What is the storage capacity of a Blu-ray disc?",opts:["650 MB to 700 MB — the same optical disc capacity as a standard audio or data CD","1.44 MB to 4.7 GB — covering the range from floppy disk to standard single-layer DVD","4.7 GB to 8.5 GB — the standard single and dual layer capacity of DVD optical discs","25 GB to 50 GB — the high-capacity storage of Blu-ray discs used for HD and 4K content"],ans:3,exp:"Blu-ray discs have a storage capacity of 25 GB (single layer) to 50 GB (dual layer). They are used for high-definition movies, large software, and data archiving."},
{q:"What type of storage is a Hard Disk classified as?",opts:["Primary storage — the same category as RAM, holding data that the CPU actively processes","Cache storage — the fastest type of storage built directly into or adjacent to the CPU chip","Secondary storage — a non-volatile storage device that permanently holds data and programs","Tertiary storage — an archival storage category used for long-term offline data preservation"],ans:2,exp:"A Hard Disk is classified as secondary storage — it is non-volatile (retains data when powered off) and is used to permanently store the operating system, applications, and user data."},
{q:"How many keys does a standard QWERTY layout keyboard have?",opts:["88 keys — the same number as a standard full-size piano keyboard with all octaves","96 keys — the extended keyboard layout used for professional data entry and programming","101 keys — the older AT-style keyboard layout used before the Windows keys were added","104 keys — the standard QWERTY keyboard layout including function keys, numpad, and Windows keys"],ans:3,exp:"A standard QWERTY layout keyboard has 104 keys — including the function keys (F1–F12), alphanumeric keys, numpad, arrow keys, and two Windows keys added to older 101-key layouts."},
{q:"What type of network covers a sizeable geographical area using communication based on the telephone system?",opts:["LAN (Local Area Network) — a network connecting devices within a single building or campus","MAN (Metropolitan Area Network) — a network spanning a city or large campus environment","PAN (Personal Area Network) — a very short-range network connecting personal devices within metres","WAN (Wide Area Network) — a network covering a large geographical area using telephone systems"],ans:3,exp:"A WAN (Wide Area Network) covers a sizeable geographical area and typically uses telephone system infrastructure for communication. The internet is the largest example of a WAN."},
{q:"What does Modem stand for?",opts:["Memory Output Device and Electronic Module — a hardware unit that manages RAM allocation","Monitor Output Display and Ethernet Module — a device that connects the display to the network","Modulator Demodulator — a device that converts digital signals to analogue for transmission and back","Modern Output Data Encoding Module — a device that compresses data for faster internet transfer"],ans:2,exp:"Modem stands for Modulator Demodulator. It converts digital computer signals into analogue signals for transmission over telephone lines (modulation) and converts them back at the receiving end (demodulation)."},
{q:"What happens if a computer does not have an operating system installed?",opts:["It runs more efficiently using only the BIOS, which handles all basic computing functions","It can still run individual applications directly but cannot manage multiple programs at once","It cannot boot — the computer cannot start up or function without an operating system","It operates in safe mode using the ROM firmware until an operating system is installed"],ans:2,exp:"A computer cannot boot if it does not have an operating system. The OS is essential for starting up the computer, managing hardware, and providing the environment in which all applications run."},
{q:"What is System Software responsible for?",opts:["Running specific user tasks such as word processing, spreadsheet calculations, and browsing","Providing entertainment content including games, media players, and streaming applications","Managing computer hardware and providing essential services that other software relies on","Connecting the computer to the internet and managing network security and firewall settings"],ans:2,exp:"System Software is responsible for managing computer hardware and providing essential services — it includes the operating system, device drivers, and utility programs that allow application software to run."},
{q:"What is Application Software?",opts:["Software that manages hardware resources and provides core computing services to all programs","Software built into the computer's ROM chip that initialises components when the computer starts","Software developed specifically for different users to perform particular tasks such as writing or calculating","Software that controls network communication and manages data transfer between connected devices"],ans:2,exp:"Application Software is developed specifically for users to perform particular tasks — examples include MS Word (documents), MS Excel (spreadsheets), web browsers, email clients, and games."},
{q:"What type of software is Windows?",opts:["Application software — a program designed for specific user tasks such as word processing","Firmware — software permanently stored in ROM that controls basic hardware operations","Network software — software that manages internet connections and wireless network protocols","System software (Operating System) — software that manages hardware and provides a platform for applications"],ans:3,exp:"Windows is an Operating System — a type of System Software. It manages the computer's hardware resources and provides the platform on which all application software runs."},
{q:"Which of the following is NOT an item of computer hardware?",opts:["The keyboard — a physical input device with keys used to type text and enter commands","The monitor — a physical output device that displays visual information from the computer","The hard disk — a physical storage device that permanently stores data and operating system files","An icon — a small on-screen image representing a file, folder, or application — not physical hardware"],ans:3,exp:"An icon is NOT hardware — it is a graphical element displayed on screen. Hardware refers to physical components you can touch. Icons are small pictures that represent files and folders in the GUI."},
{q:"What are Icons in a computer operating system?",opts:["Physical buttons on the keyboard that activate specific system functions when pressed","Hardware components on the motherboard that control data routing between peripherals","The label text displayed beneath folders and files in the file explorer window","Small pictures that represent files, folders, applications, or shortcuts on the desktop"],ans:3,exp:"Icons are small pictures (graphical symbols) that represent files, folders, applications, or shortcuts. Clicking or double-clicking an icon opens the associated file or program."},
{q:"What does GUI stand for?",opts:["General Utility Interface — the set of tools available in the system settings control panel","Global Update Installation — the process of downloading and applying system software patches","Graphical User Interface — a visual interface using icons, windows, and menus for user interaction","Generated Unix Interface — the command-line based environment used in Linux operating systems"],ans:2,exp:"GUI stands for Graphical User Interface. It allows users to interact with the computer using visual elements like icons, windows, buttons, and menus — rather than typing text commands."},
{q:"What does the 'User Interface' control in an operating system?",opts:["The speed at which the CPU processes instructions and executes programs on the system","The amount of RAM allocated to each running application for temporary data storage","The process of interaction between the user and the operating system — how users communicate with the computer","The security settings that determine which users have permission to access files and folders"],ans:2,exp:"The User Interface controls the process of interaction between the user and the operating system — it determines how users give commands and receive information from the computer."},
{q:"When you copy and paste a file in a computer, what happens?",opts:["The original file is moved to the new location and removed from the original folder permanently","The file is compressed into a smaller format and saved in both the original and new location","A duplicate of the file is created and placed in the new location while the original remains unchanged","The file is linked to the new location — changes in one location automatically update the other"],ans:2,exp:"When you copy and paste a file, a duplicate of the file is created and placed in the new location. The original file remains unchanged in its original location. This is different from Cut and Paste, which moves the file."},
{q:"What is a Folder in a computer system?",opts:["A physical storage device that organises data on the hard disk using magnetic sectors","A compressed archive file that combines multiple files into a single smaller package","A named storage area in which files are located — used to organise and manage files on a computer","A shortcut icon placed on the desktop that provides quick access to a frequently used program"],ans:2,exp:"A Folder is a named storage area in which files are located. Folders are used to organise files on a computer — just like physical folders in a filing cabinet organise paper documents."},
{q:"What are Function Keys (F1, F2, etc.) and where are they located?",opts:["Number keys located on the right side of the keyboard in the numeric keypad section","Arrow keys located at the bottom centre of the keyboard used for cursor and navigation control","Letter keys in the main alphanumeric section used for typing text and entering commands","Special keys located at the top of the keyboard used for controlling system software, launching applications, performing various tasks, and adjusting screen brightness"],ans:3,exp:"Function keys (F1 through F12) are located at the top row of the keyboard. They are used for: controlling system software, launching applications, performing various tasks, and adjusting settings like screen brightness."},
{q:"What is the ESC key used for in a computer?",opts:["To confirm and save the current action or command being entered by the user","To switch between open applications and windows in the taskbar of the operating system","To close a selected drop-down list, cancel a command, or close a dialog box","To take a screenshot of the current screen and save it to the clipboard or a file"],ans:2,exp:"The ESC (Escape) key is used to close a selected drop-down list, cancel a command in progress, or close a dialog box — essentially allowing the user to exit or cancel the current action."}
];
let order=[],cur=0,picks={},playerName='',score=0;
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function goBack(){if(confirm('Quit quiz and return to subjects?'))window.location.href='index.html';}
function startQuiz(){const inp=document.getElementById('name-input').value.trim();playerName=inp||'Anonymous';order=shuffle(BANK.map((_,i)=>i));cur=0;picks={};score=0;document.getElementById('q-total').textContent=BANK.length;show('quiz-screen');render();}
function render(){const idx=order[cur],q=BANK[idx],total=BANK.length;document.getElementById('q-num').textContent=cur+1;document.getElementById('q-score').textContent=score;document.getElementById('q-label').textContent=`Question ${cur+1} of ${total}`;document.getElementById('q-text').textContent=q.q;document.getElementById('progress-fill').style.width=((cur/total)*100)+'%';document.getElementById('explanation').className='explanation';document.getElementById('explanation').textContent='';document.getElementById('next-btn').className='next-btn';document.getElementById('quit-btn').className='quit-btn';const letters=['A','B','C','D'],optEl=document.getElementById('options');optEl.innerHTML='';shuffle([0,1,2,3]).forEach((oi,li)=>{const btn=document.createElement('button');btn.className='opt-btn';btn.dataset.opt=oi;btn.innerHTML=`<span class="opt-letter">${letters[li]}</span><span>${q.opts[oi]}</span>`;btn.onclick=()=>selectAnswer(oi,idx);optEl.appendChild(btn);});}
function selectAnswer(chosen,idx){const q=BANK[idx],correct=chosen===q.ans;picks[idx]=chosen;if(correct)score++;document.getElementById('q-score').textContent=score;document.querySelectorAll('.opt-btn').forEach(btn=>{btn.disabled=true;const oi=parseInt(btn.dataset.opt);if(oi===q.ans)btn.classList.add('correct');else if(oi===chosen&&!correct)btn.classList.add('wrong');});if(!correct){const e=document.getElementById('explanation');e.textContent='✗ '+q.exp;e.classList.add('show');}const nb=document.getElementById('next-btn');nb.classList.add('show');nb.textContent=cur+1<BANK.length?'Next Question →':'See Results →';document.getElementById('quit-btn').classList.add('show');}
function nextQuestion(){cur++;if(cur>=BANK.length)showResults();else{render();window.scrollTo(0,0);}}
function showResults(){show('results-screen');const total=BANK.length,pct=Math.round((score/total)*100),passed=pct>=70;document.getElementById('result-name').textContent=playerName;document.getElementById('ring-pct').textContent=pct+'%';document.getElementById('ring-pct').style.color=passed?'var(--green)':'var(--red)';document.getElementById('ring-fill').style.stroke=passed?'var(--green)':'var(--red)';setTimeout(()=>{document.getElementById('ring-fill').style.strokeDashoffset=439.82-(439.82*pct/100);},100);document.getElementById('res-title').textContent=pct>=90?'Excellent!':pct>=70?'Passed!':'Needs Work';document.getElementById('res-sub').textContent=`${score} correct out of ${total} questions`;const v=document.getElementById('res-verdict');if(passed){v.textContent='✓ You passed — score above 70%';v.className='result-verdict pass';}else{v.textContent='✗ Below 70% — please retake the quiz';v.className='result-verdict fail';}const rv=document.getElementById('review');rv.innerHTML='<h3>Review</h3>';order.forEach(idx=>{const q=BANK[idx],ua=picks[idx],ok=ua===q.ans;const d=document.createElement('div');d.className='rv-item '+(ok?'ok':'miss');d.innerHTML=`<div class="rv-q">${q.q}</div><div class="rv-a">${ok?`<span class="c">✓ Correct: ${q.opts[q.ans]}</span>`:`<span class="w">✗ You chose: ${ua!==undefined?q.opts[ua]:'Skipped'}</span><br><span class="c">✓ Correct: ${q.opts[q.ans]}</span><br><span style="color:var(--muted)">${q.exp}</span>`}</div>`;rv.appendChild(d);});}
function retryQuiz(){order=shuffle(order);cur=0;picks={};score=0;document.getElementById('q-score').textContent=0;show('quiz-screen');render();}
document.getElementById('name-input').addEventListener('keydown',e=>{if(e.key==='Enter')startQuiz();});
</script>
