<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap');
  :root{--bg:#080810;--surface:#11111f;--border:#1e1e35;--purple:#7c3aed;--purple-l:#9d5bf0;--green:#22c55e;--red:#ef4444;--text:#e8e8f0;--muted:#7070a0;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;}

  .name-box{display:flex;flex-direction:column;align-items:center;gap:12px;}
  .name-box input{width:100%;max-width:320px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Syne',sans-serif;font-size:15px;outline:none;text-align:center;transition:border-color .2s;}

  .quiz-back:hover{color:var(--text);border-color:var(--purple);}
  .progress-bar{width:100%;height:3px;background:var(--border);border-radius:2px;margin-bottom:32px;overflow:hidden;}

  #results-screen{text-align:center;padding-top:40px;}
  .result-name{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);margin-bottom:32px;}
  .score-ring{position:relative;width:160px;height:160px;margin:0 auto 28px;}
  .score-ring svg{transform:rotate(-90deg);}
  .score-ring .ring-bg{fill:none;stroke:var(--border);stroke-width:10;}
  .score-ring .ring-fill{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1s ease,stroke .5s;}
  .score-ring .ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .ring-pct{font-size:34px;font-weight:800;line-height:1;}

  .result-title{font-size:24px;font-weight:800;margin-bottom:8px;}

  .result-verdict.pass{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.3);}
  .result-verdict.fail{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.3);}
  .result-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:40px;}
  .btn-outline{padding:11px 24px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:border-color .2s,color .2s;}
  .btn-outline:hover{border-color:var(--purple);color:var(--text);}

  .review h3{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:16px;font-family:'DM Mono',monospace;}
  .rv-item{padding:14px 16px;border-radius:8px;margin-bottom:10px;border:1px solid var(--border);}
  .rv-item.ok{border-color:rgba(34,197,94,.25);background:rgba(34,197,94,.05);}
  .rv-item.miss{border-color:rgba(239,68,68,.25);background:rgba(239,68,68,.05);}
  .rv-q{font-size:13px;font-weight:600;margin-bottom:8px;line-height:1.4;}
  .rv-a{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);line-height:1.6;}
  .rv-a .c{color:var(--green);}
  .rv-a .w{color:var(--red);}

<script>
const BANK=[
{q:"Why is personal hygiene considered one of the most critical food safety controls in a professional kitchen?",opts:["Personal hygiene is primarily about maintaining a professional appearance — its impact on food safety is minimal compared to temperature control and HACCP","Food handlers are a direct source of contamination — bacteria on hands, skin, hair, and respiratory droplets can transfer directly into food, making personal hygiene a primary food safety control","Personal hygiene is important only for front-of-house staff who interact with guests — kitchen staff rarely touch food directly with bare hands during professional cooking","Personal hygiene matters only when handling raw proteins — once food is cooked, any contamination introduced by a food handler is destroyed by the cooking process"],ans:1,exp:"Food handlers are one of the leading causes of foodborne illness. Hands carry transient bacteria picked up from surfaces, raw food, and the body. Skin, hair, sneezing, coughing, and infected wounds can all introduce pathogens directly into food. Personal hygiene is a primary preventive control — it cannot be replaced by any other food safety measure."},
{q:"What are the correct steps for handwashing in a food handling environment?",opts:["Rinse hands under cold water for 5 seconds, apply soap and rub palms together only, rinse under warm water, and dry with a shared kitchen cloth near the sink","Wet hands with warm running water, apply soap, scrub all surfaces (palms, backs, between fingers, under nails, wrists) for at least 20 seconds, rinse thoroughly, and dry with a single-use disposable towel","Apply hand sanitiser gel to dry hands and rub together for 3 seconds — this replaces handwashing entirely and is more effective than soap and water in all situations","Wet hands briefly, apply soap to palms only, rinse for 5 seconds under any temperature water, and dry on the clean side of the apron during a busy service period"],ans:1,exp:"Correct handwashing: wet with warm water, apply soap, scrub ALL surfaces — palms, backs of hands, between fingers, under nails, and wrists — for minimum 20 seconds, rinse thoroughly under running water, dry with a single-use paper towel. This process removes over 99% of transient microorganisms. A shared cloth recontaminates clean hands immediately."},
{q:"At what times must a food handler wash their hands during a kitchen shift?",opts:["Hands must be washed only at the beginning and end of the shift — washing too frequently during service causes dermatitis and skin breakdown that increases contamination risk","Hands must be washed before handling food, after handling raw meat or fish, after using the toilet, after touching the face or hair, after handling waste, and after any activity that could contaminate them","Hands only need washing after visibly soiling them with food — if hands look clean between tasks, washing is unnecessary and wastes time during a busy service period","Hands must be washed every 30 minutes regardless of activity — a fixed interval system is the only reliable way to ensure consistent hand hygiene throughout the shift"],ans:1,exp:"Critical handwashing moments: before starting work, before handling food, after touching raw meat/fish/poultry, after using the toilet, after touching face/hair/phone, after handling waste or rubbish, after cleaning, after handling chemicals, after sneezing or coughing, after handling money, and after any break. Each of these represents a contamination risk if hands are not washed."},
{q:"Why is hand sanitiser alone not sufficient as a hygiene control in a professional kitchen?",opts:["Hand sanitiser is entirely ineffective against all bacteria and viruses — it provides no protection whatsoever and should never be used in a food handling environment","Hand sanitiser does not remove physical soil, grease, or organic matter — it is only effective on clean hands and cannot penetrate through food residue to reach bacteria underneath","Hand sanitiser is effective against all pathogens including Norovirus and bacterial spores — the only reason it is not used alone is that food safety regulations require soap and water regardless of effectiveness","Hand sanitiser causes allergic reactions in most food handlers — its use is therefore restricted to front-of-house staff and is prohibited in kitchen environments by food safety law"],ans:1,exp:"Hand sanitiser kills many bacteria and some viruses on clean hands but cannot work through organic matter (food, grease, blood). Soil physically protects bacteria from the sanitiser. It also does not remove Norovirus effectively. In kitchens where hands become soiled with food, soap and water is always the primary requirement. Sanitiser can be used as an additional step after washing — never as a replacement."},
{q:"What is the correct type of plaster to use on a cut in a professional kitchen and why?",opts:["A standard fabric plaster in skin colour is correct — it blends with the hand and is less distracting to guests if spotted during table service in the dining room","A blue waterproof detectable plaster must be used — blue is highly visible in food, not naturally found in ingredients, and detectable by metal detection equipment in food production","Any available plaster is acceptable as long as the wound is fully covered — the colour and material are irrelevant as long as contamination from blood is prevented during service","A clear transparent plaster is most appropriate — it is invisible to guests and inspectors, reduces visual distraction during service, and provides the same protection as coloured plasters"],ans:1,exp:"Blue waterproof detectable plasters are mandatory in professional food environments. Three reasons: blue does not occur naturally in food so it is immediately visible if it falls in; the plaster is waterproof so it stays on during wet work; and in commercial food production, metal strips in the plaster are detectable by food-grade metal detectors. Clear or fabric plasters are not acceptable."},
{q:"What jewellery rules apply to food handlers working in a professional kitchen?",opts:["Food handlers may wear any jewellery they choose as long as it is covered by their uniform during food preparation and service activities","No jewellery should be worn except a plain wedding band — rings with stones, watches, bracelets, earrings, and necklaces harbour bacteria and can fall into food","Food handlers are encouraged to wear a watch during service to monitor cooking times accurately — wrist watches are exempt from jewellery restrictions in all professional kitchens","Jewellery rules apply only to front-of-house staff who are visible to guests — kitchen staff working out of sight of the dining room are not subject to jewellery restrictions"],ans:1,exp:"Jewellery rules: no rings with stones or settings (harbour bacteria, cannot be cleaned effectively), no watches or bracelets (trap moisture and bacteria, can fall into food), no earrings (can fall into food), no necklaces (can dangle into food or equipment). Exception: a plain, smooth wedding band may be permitted. All jewellery provides surfaces where bacteria accumulate and cannot be properly cleaned during handwashing."},
{q:"What are the hair hygiene requirements for food handlers in a professional kitchen?",opts:["Hair must be washed daily but does not need to be covered during cooking — modern kitchen ventilation systems prevent hair from falling into food during normal service","All hair must be fully contained under a hat, hairnet, or chef's toque — loose hair can fall into food, and hands touching hair during service transfer bacteria directly to food","Only long hair needs to be tied back — short hair does not require a covering as it is unlikely to fall into food during the food preparation and cooking process","Hair coverings are required only when working with cold food — in the hot kitchen, the heat prevents hair from falling out and no covering is therefore necessary"],ans:1,exp:"All hair must be fully covered or contained: long hair tied back and covered with a hat or hairnet, short hair covered with a chef's toque or cap. Hair carries bacteria, yeasts, and moulds from the scalp. If a hand touches hair during service, it immediately requires rewashing. A hair in food is a physical contamination incident that can result in guest complaints and regulatory action."},
{q:"What uniform standards are expected of a commis chef in a professional kitchen?",opts:["A commis chef may wear any clean clothing of their choice — the specific uniform is a personal preference and varies by individual rather than being set by the establishment","A commis chef should wear: clean chef's jacket (changed if soiled), checked or dark trousers, apron, non-slip safety shoes, hat or toque, and a side cloth — all clean at the start of each shift","A commis chef must wear a formal suit and tie under their apron — the uniform standards for kitchen staff are identical to those required for front-of-house and management staff","A commis chef's uniform is purely decorative — its only purpose is to identify kitchen staff to guests and management and it has no functional food safety role"],ans:1,exp:"Standard commis chef uniform: white or coloured chef's jacket (double-breasted, protects from spills and heat), checked trousers (traditional; dark colours increasingly common), apron (protects uniform and provides a barrier), non-slip safety shoes (prevent slips, protect from dropped knives and hot liquids), hat or toque (covers hair), and a side cloth. The uniform must be clean at the start of every shift — a soiled uniform is a contamination risk."},
{q:"Why must a chef's uniform be changed if it becomes heavily soiled during service?",opts:["A heavily soiled uniform must be changed purely for presentational reasons — guest perception of kitchen staff appearance affects the restaurant's reputation and star ratings","A soiled uniform harbours bacteria from food spills, blood, and raw proteins — continued wearing of a contaminated uniform transfers these bacteria to surfaces, equipment, and food throughout the remainder of service","A soiled uniform only needs to be changed at the end of service — bacteria on clothing cannot transfer to food because the uniform acts as a physical barrier between the cook and the food","A soiled uniform must be changed only if the chef will be visible to guests — in a closed kitchen with no customer access, uniform cleanliness has no food safety implications"],ans:1,exp:"A soiled uniform is a direct contamination risk. Blood or raw protein on a jacket harbours Salmonella or E. coli. When a cook leans over a preparation surface, soiled clothing contacts the food contact area. When wiping hands on an apron, bacteria transfer to hands. The uniform must be changed when heavily soiled — this is both a hygiene requirement and a professional standard."},
{q:"What nail hygiene standards must a food handler maintain?",opts:["Food handlers may wear nail varnish in any colour as long as nails are kept short — the varnish creates a smooth, sealed surface that is easier to clean than bare nails","Nails must be kept short, clean, and unvarnished — long nails harbour bacteria and debris, and nail varnish or false nails can chip and contaminate food","Food handlers may wear clear nail varnish only — clear varnish is invisible to guests and inspectors and provides the same hygienic protection as bare nails","Nail hygiene applies only to female food handlers — male kitchen staff are not subject to the same nail cleanliness requirements under food safety regulations"],ans:1,exp:"Nail standards: short (no longer than the fingertip), clean (no visible dirt or food debris), and unvarnished (no nail polish — even clear). Reasons: long nails harbour bacteria that cannot be removed by handwashing, nail varnish chips and becomes a physical food contaminant, false nails can detach entirely into food. Chipped nail varnish in food is a serious contamination incident."},
{q:"What is the food safety rule regarding a food handler who is suffering from vomiting or diarrhoea?",opts:["A food handler with vomiting or diarrhoea may continue working if they wash their hands more frequently — the increased handwashing frequency compensates for any additional contamination risk","A food handler with vomiting or diarrhoea must not work in the kitchen — they are actively shedding pathogens and must remain off work for at least 48 hours after all symptoms have fully resolved","A food handler with vomiting or diarrhoea may continue working if they work only in cold food preparation — the lower temperatures of the cold kitchen reduce the risk of bacterial spread","A food handler with vomiting or diarrhoea must inform their supervisor and then continue working with gloves — gloves provide sufficient barrier protection to allow them to continue handling food safely"],ans:1,exp:"A symptomatic food handler MUST stay home. Norovirus and Salmonella are shed in enormous quantities through faeces and vomit. Even thorough handwashing cannot guarantee zero transmission when a person is actively ill. The legal and professional standard: stay home, report to the supervisor, and do not return until 48 hours after all symptoms have completely resolved."},
{q:"What skin conditions require a food handler to be excluded from handling open food?",opts:["Only open wounds and cuts require exclusion — all other skin conditions including rashes, eczema flare-ups, and infected spots allow normal food handling as long as the area is covered","Infected wounds, boils, septic cuts, skin rashes in an active flare, and weeping or discharging skin conditions require exclusion from open food handling until the condition resolves or is fully covered","Skin conditions never require exclusion — even severely infected wounds can be covered with a glove and the food handler may continue with all food preparation tasks without restriction","Only conditions affecting the hands require exclusion — skin conditions on the arms, neck, or face are not considered a food safety risk because they are unlikely to come into contact with food"],ans:1,exp:"Staphylococcus aureus lives naturally on skin and in infected wounds. A boil, septic cut, or infected skin produces large quantities of Staph — which can be transferred to food and produce heat-stable toxins. Conditions requiring exclusion or coverage: boils, carbuncles, infected cuts, weeping eczema, and any discharging skin condition. The food handler must inform their supervisor immediately."},
{q:"Why is smoking, eating, or drinking not permitted in food preparation areas?",opts:["Smoking, eating, and drinking are prohibited in food prep areas only for presentational reasons — seeing staff eat or drink would create a negative impression for any guest who visits the kitchen","Smoking introduces ash and bacteria from the mouth, eating introduces saliva and hand-to-mouth contact, and drinking risks spillage — all increase the risk of contaminating food and food contact surfaces","Smoking is the only prohibited activity — eating and drinking are permitted in food prep areas as long as they take place during designated break times approved by the supervisor","Smoking, eating, and drinking are prohibited only in the dry store and refrigeration areas — in the main preparation kitchen they are permitted as long as they take place away from raw food"],ans:1,exp:"Smoking: introduces ash particles, brings hands to the mouth repeatedly (faecal-oral contamination route), and requires touching the face. Eating: introduces saliva, bacteria from the mouth, and food debris to the environment. Drinking: risks spilling liquid onto food or food contact surfaces. All increase the likelihood of hand-to-mouth contact and the transfer of oral bacteria into food. All are prohibited in food preparation areas by law and regulation."},
{q:"What is the purpose of a 'personal hygiene policy' in a professional kitchen?",opts:["A personal hygiene policy is a list of rules intended only to maintain the professional appearance of the kitchen team when the establishment is being inspected by food safety officers","A personal hygiene policy sets clear, documented standards for all food handlers — covering handwashing, uniform, illness reporting, wounds, jewellery, and grooming — ensuring consistent compliance and providing a framework for training and enforcement","A personal hygiene policy is a voluntary document that individual chefs can choose to follow or ignore depending on personal preference and the traditions of their home country","A personal hygiene policy applies only to new staff — experienced chefs with more than two years of kitchen experience are exempt from mandatory personal hygiene requirements"],ans:1,exp:"A personal hygiene policy documents all hygiene expectations for food handlers: when and how to wash hands, what to wear, what to do when ill, how to report wounds, jewellery restrictions, hair requirements, and prohibited behaviours. It provides a clear training framework, a standard against which compliance can be measured, and documented evidence of due diligence if a food safety incident occurs."},
{q:"What should a food handler do if they accidentally sneeze or cough near food?",opts:["Continue working immediately after sneezing or coughing — the brief exposure to airborne droplets poses no significant food safety risk in a well-ventilated professional kitchen","Turn away from food, cover the mouth and nose with a tissue or the crook of the elbow, discard the tissue immediately, wash hands thoroughly, and assess whether any food nearby was contaminated","Sneeze or cough into a side cloth and then return to work — the cloth prevents droplets from reaching the food and no handwashing is required after using the cloth for this purpose","Sneeze or cough into cupped hands, rinse hands briefly under cold water, and return to work — this is the accepted protocol for managing sneezing and coughing during a busy service"],ans:1,exp:"Correct sneeze/cough protocol: turn away from food and all food contact surfaces, cover with a tissue or elbow (not hands), discard the tissue immediately, and WASH HANDS thoroughly before returning to food handling. Respiratory droplets carry bacteria and viruses — Staphylococcus aureus in particular is commonly carried in the nose and throat of healthy individuals. If food nearby was directly exposed, it must be assessed and potentially discarded."},
{q:"What is the role of the chef's apron in personal hygiene and kitchen safety?",opts:["The chef's apron is purely decorative — it identifies kitchen staff to guests during open kitchen service and has no functional hygiene or safety role in a professional kitchen","The apron protects the chef's uniform from food spills and splashes, provides a barrier between the body and food contact surfaces, and can be used as a pot holder — it must be changed if heavily soiled","The apron is used exclusively as a side cloth for wiping hands during service — it replaces the dedicated side cloth in smaller kitchens where linen supplies are limited during busy service","The apron must be worn only when working with raw proteins — during vegetable preparation and sauce making, the apron can be removed to allow greater freedom of movement"],ans:1,exp:"The apron provides: physical protection of the uniform from spills (keeping the uniform cleaner for longer), a barrier between the body and food, and a surface for brief hand wiping during service. However, it accumulates contamination quickly and must be changed when heavily soiled — a dirty apron pressed against a preparation surface transfers bacteria. It is not a substitute for a dedicated clean side cloth."},
{q:"What does 'clean as you go' (CAYG) mean in a kitchen environment?",opts:["'Clean as you go' means washing all pots, pans, and equipment at the end of the shift before leaving — a thorough end-of-service clean that prepares the kitchen for the following day's service","'Clean as you go' means cleaning workstations, equipment, and spills immediately as they occur throughout the shift — maintaining a hygienic and organised work environment continuously rather than only at the end of service","'Clean as you go' is a rota system where different staff members are assigned cleaning zones at the start of each shift and are responsible only for their designated area","'Clean as you go' means asking the kitchen porter to follow each chef around the kitchen throughout service, cleaning each station immediately after it is used during cooking"],ans:1,exp:"CAYG is the practice of cleaning workstations, equipment, and spills as they occur — continuously throughout the shift rather than leaving everything until the end. Benefits: prevents bacteria multiplying on soiled surfaces, reduces pest attraction, maintains an organised workspace, reduces the risk of cross-contamination from accumulated debris, and makes the end-of-service deep clean faster and more effective."},
{q:"What is the correct procedure for handling a suspected case of a reportable illness in a food handler?",opts:["A reportable illness should be managed privately between the food handler and their direct supervisor — no external reporting is required unless multiple staff members become ill simultaneously","The food handler must be excluded from work immediately, the illness reported to the supervisor and potentially to the relevant public health authority, and the kitchen's food safety records reviewed for any link to recent production","A reportable illness in a food handler only needs to be reported if the handler has worked with high-risk foods such as raw chicken or unpasteurised dairy in the preceding 48 hours","Reportable illnesses in food handlers are managed exclusively by the HR department — kitchen management and food safety personnel have no role in the reporting or investigation process"],ans:1,exp:"Certain illnesses (Salmonella, E. coli O157, Norovirus, typhoid, hepatitis A) are legally notifiable in most countries. Procedure: exclude the food handler immediately, report to the supervisor, notify the relevant public health authority if legally required, review production records for any potentially affected food, and cooperate fully with any investigation. Failure to report can result in further illness cases and legal consequences."},
{q:"What is the difference between 'transient' and 'resident' bacteria on the hands?",opts:["Transient bacteria are always harmless commensals while resident bacteria are always pathogenic — handwashing eliminates resident bacteria but has no effect on transient bacteria","Transient bacteria are picked up from surfaces, raw food, or the environment and are removed effectively by handwashing — resident bacteria live deep in skin pores and folds and cannot be completely removed by normal handwashing","Transient bacteria only survive on the hands for a few seconds before dying — they pose no food safety risk because they are destroyed by the natural pH of skin before they can transfer to food","Transient and resident bacteria are identical terms describing the same organisms — the distinction is a theoretical classification used only in academic microbiology with no practical kitchen application"],ans:1,exp:"Transient bacteria: picked up from the environment (raw food, surfaces, other people) — they sit on the surface of the skin and are removed effectively by proper handwashing. Resident bacteria: part of the skin's normal flora living in deeper skin layers — they cannot be completely eliminated but are generally harmless commensals. The food safety concern is transient bacteria — handwashing is designed specifically to remove them before they transfer to food."},
{q:"Why must food handlers not wear strong perfume or aftershave in a professional kitchen?",opts:["Strong fragrances are prohibited in kitchens only for safety reasons — the alcohol content in perfume is flammable and creates a fire risk near open gas flames and hot surfaces","Strong fragrances can transfer to food and alter its flavour — particularly in delicate preparations such as cold starters, pastry, and refined sauces where subtle aromas are important","Strong perfume is prohibited only when working with fish and seafood — in all other areas of the kitchen, personal fragrance is a matter of individual professional discretion","Fragrances are prohibited only for health reasons — some guests have fragrance allergies, so kitchen staff are restricted to prevent any fragrance entering the dining room through food"],ans:1,exp:"Strong fragrance on a food handler can transfer to food — particularly to delicate, neutral-flavoured preparations like cream sauces, fresh pastry, cold starters, and desserts. A chef who applies heavy cologne and then works with cream, butter, or delicate garnishes risks imparting that scent to the food. Professional kitchens require neutral personal care products — unscented or lightly scented only."},
{q:"What hygiene precautions should a food handler take when returning from a toilet break?",opts:["The food handler should rinse hands briefly with cold water before returning to the kitchen — a full handwash is only required after the first toilet visit of each shift","The food handler must wash hands thoroughly with soap and warm water at the designated handwashing sink before returning to food handling — not at the toilet sink, at the kitchen handwashing point","The food handler should apply hand sanitiser after leaving the toilet — this is sufficient hygiene control and replaces the need for soap and water handwashing in this specific situation","The food handler does not need to take any specific action beyond normal hygiene — toilet visits are a natural biological function and pose no additional food safety risk compared to other activities"],ans:1,exp:"After using the toilet: wash hands in the toilet facility (removes the majority of faecal contamination), then wash hands AGAIN at the designated kitchen handwashing sink before touching food or food contact surfaces. The faecal-oral contamination route — where faecal bacteria transfer via hands to food — is one of the most common causes of foodborne illness. This double-wash protocol is the professional standard."},
{q:"What is the food safety significance of a food handler touching their face or hair during service?",opts:["Touching the face or hair is a minor hygiene breach with no significant food safety impact — bacteria from the face and hair are generally harmless and pose no real risk to food safety","Touching the face or hair transfers bacteria from the nose (Staph aureus), scalp (fungi and bacteria), and skin to the hands — which can then transfer directly to food if hands are not washed immediately","Touching the face is acceptable if the food handler has recently applied hand sanitiser — the sanitiser on the hands prevents bacteria from the face being picked up during brief contact","Face and hair touching is prohibited only during raw food preparation — once food is cooked, touching the face between tasks poses no contamination risk to the finished dish"],ans:1,exp:"The face and hair harbour significant bacterial loads: the nose and throat carry Staphylococcus aureus in up to 50% of the population, the scalp carries yeasts and bacteria, and skin carries various commensals. When hands touch the face or hair, these organisms transfer to the hands and then to food or food contact surfaces. Any face or hair touch during service requires immediate handwashing before resuming food handling."},
{q:"What is a 'hygiene induction' and when should it be given to new kitchen staff?",opts:["A hygiene induction is an annual refresher course required for all food handlers regardless of experience — it covers the same material every year without reference to the individual's specific role","A hygiene induction is training given to all new food handlers before they begin working with food — covering handwashing, uniform requirements, illness reporting, food safety basics, and the specific hygiene policies of that kitchen","A hygiene induction is given only to staff who have received a food safety complaint — it is a remedial training measure rather than a preventive standard for all new kitchen employees","A hygiene induction is voluntary for experienced chefs with a recognised culinary qualification — only staff with no formal culinary training are required to complete it before starting work"],ans:1,exp:"All new food handlers must receive a hygiene induction BEFORE they start working with food — regardless of previous experience or qualifications. It covers: the establishment's specific personal hygiene policy, handwashing procedure and facilities, uniform requirements, illness and wound reporting procedure, prohibited behaviours, and the legal obligations of food handlers. Good induction practice includes a signed acknowledgement that the training was received and understood."},
{q:"What is the correct way to handle a situation where a food handler notices a colleague not following hygiene standards?",opts:["Ignore the breach completely — correcting a colleague's behaviour is not a commis chef's responsibility, and raising the issue risks creating conflict in a high-pressure kitchen environment","Quietly remind the colleague of the correct procedure if appropriate, or report the breach to a supervisor if it is serious — food safety is a team responsibility and hygiene failures affect everyone","Document the breach in a personal notebook and present evidence to management only after observing the same colleague make the same mistake five or more times","Correct the colleague loudly in front of the whole brigade — public accountability is the most effective way to ensure hygiene standards are maintained during a busy service"],ans:1,exp:"Hygiene is a collective responsibility. If a colleague is not following standards, a quiet reminder from a peer is often effective and appropriate for minor issues. Serious or repeated breaches (not washing hands after toilet, working while ill, handling food with infected wounds) must be reported to the supervisor immediately — not out of malice, but because the consequences for guest health are serious."},
{q:"What are the hygiene requirements for mobile phones in a professional kitchen?",opts:["Mobile phones may be freely used in the kitchen at any time — they are not considered a contamination risk as long as the chef washes their hands after each use","Mobile phones must not be used in food preparation areas — they carry high bacterial loads on their surfaces, and hand-to-phone-to-food contact is a direct contamination route. Phones should be stored in a locker","Mobile phones are permitted in the kitchen only for music and timing purposes — they must be placed on a clean surface away from food preparation and never handled with bare hands","Mobile phones are prohibited only in the cold kitchen — in the hot kitchen, high temperatures destroy any bacteria that may transfer from the phone screen to food during handling"],ans:1,exp:"Mobile phones carry some of the highest bacterial loads of any everyday object — they are regularly touched with unwashed hands, placed on many different surfaces, and rarely cleaned. In a kitchen: phones must be stored away from the preparation area, not handled during service, and any chef who uses their phone must wash hands thoroughly before returning to food handling. Phone use during service is generally prohibited in professional kitchens."},
{q:"What does 'fitness to work' mean in the context of a food handler's health?",opts:["Fitness to work means passing an annual physical fitness test — kitchen staff must demonstrate sufficient physical stamina to work long shifts before being permitted to handle food","Fitness to work means that a food handler is free from any illness, infection, or condition that could result in them contaminating food — and that they are in a physical state to perform their duties safely","Fitness to work applies only to food handlers over the age of 50 — younger kitchen staff are presumed to be fit to work unless they report a specific medical condition to management","Fitness to work is a legal term relating only to occupational health and injury recovery — it has no application to food hygiene or the prevention of foodborne illness in a kitchen environment"],ans:1,exp:"In food safety, fitness to work means: free from gastrointestinal illness (no vomiting, diarrhoea), no infected wounds or skin conditions that cannot be fully covered, no jaundice (hepatitis A indicator), no typhoid carrier status, and physically capable of performing the role safely. Supervisors have a legal responsibility to check that food handlers are fit to work — and food handlers have a legal responsibility to report any condition that could compromise food safety."},
{q:"What is the minimum recommended frequency for changing a chef's uniform in a professional kitchen?",opts:["A chef's uniform should be changed once per week — modern uniforms are made from antimicrobial fabric that prevents bacterial growth between weekly washing cycles","A chef's uniform should be changed after every shift and laundered before the next use — wearing the same uniform on consecutive days allows bacteria and food debris to accumulate and multiply","A chef's uniform should be changed only when visibly heavily soiled — if it appears clean at the start of a shift it is acceptable to wear for a second consecutive shift without washing","A chef's uniform should be changed monthly — professional laundering services used by hotels and restaurants operate on a monthly collection schedule that determines the change frequency"],ans:1,exp:"A chef's uniform should be clean at the start of every shift — meaning it must be laundered after each wearing. A uniform worn two days in a row accumulates food debris, bacteria, and moisture that multiply between shifts. Some establishments provide fresh uniforms each shift; others require chefs to bring a clean uniform daily. The standard is: clean uniform, every shift, without exception."},
{q:"What personal hygiene standard applies to eating before a kitchen shift and why?",opts:["Food handlers must not eat for at least 4 hours before a shift — the digestion process increases bacterial activity in the gut and raises the risk of foodborne illness transmission","There is no specific hygiene standard relating to eating before a shift — food handlers may eat whatever and whenever they choose before arriving at work without any food safety implications","Food handlers should eat a meal before the shift to reduce the temptation to eat during service — eating during service is the primary food hygiene concern, not eating beforehand","Food handlers must brush their teeth and use mouthwash before starting a shift — oral bacteria are the most significant source of food contamination in professional kitchens"],ans:1,exp:"There is no restriction on eating before a shift, but food handlers must: not eat in the food preparation area during the shift, report any gastrointestinal symptoms that develop before or during the shift, and maintain full personal hygiene standards throughout. Eating a meal before the shift is good practice — it reduces the likelihood of nibbling or eating in the kitchen during service, which is prohibited."},
{q:"What is the hygiene significance of a food handler's state of general health and wellbeing?",opts:["General health and wellbeing have no food safety significance — only acute gastrointestinal illness and infected wounds require action from a food safety perspective","A food handler who is fatigued, unwell, or run-down has a weakened immune system and is more likely to carry and shed pathogens — they should inform their supervisor and may need to be assessed for fitness to work","General health only matters for kitchen managers and chefs de partie — commis chefs and kitchen porters are not considered sources of food contamination regardless of their health status","A food handler's general health is a private matter — employers have no right to inquire about a food handler's health status beyond what is voluntarily disclosed by the employee"],ans:1,exp:"A food handler who is run-down, fatigued, or fighting a minor illness has a compromised immune system and may be more susceptible to carrying pathogens at higher levels. They are also more likely to touch their face, sneeze, or cough during service. While not all illness requires exclusion, a food handler who feels unwell should inform their supervisor and be assessed for fitness to work. Food safety is a shared professional responsibility."},
{q:"What is the hygiene rule regarding tasting food during preparation in a professional kitchen?",opts:["Food tasting is prohibited entirely in professional kitchens — all quality checks must be conducted using standardised recipe cards and food should never be tasted during preparation","Food may be tasted during preparation using a clean spoon each time — the spoon must never be double-dipped into the dish and must be placed in the dishwasher or washing-up bowl after a single use","Food may be tasted directly from the spoon used for stirring or mixing — tasting the cooking spoon is an accepted professional practice that does not constitute a food hygiene breach","Food handlers may taste from shared tasting spoons that are kept on the side of the stove and wiped between uses — the heat of the food destroys any bacteria introduced by the tasting spoon"],ans:1,exp:"Tasting is an essential quality control step in professional cooking — but it must be done hygienically. Use a clean tasting spoon each time. Never double-dip (the spoon goes from mouth to food — introducing oral bacteria including Staph aureus). Immediately place the used spoon in the washing-up area. Never taste directly from serving spoons or stir with a spoon that has been in your mouth. This simple practice prevents oral contamination of large batches of food."}
];
let order=[],cur=0,picks={},playerName='',score=0;
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function goBack(){if(confirm('Quit quiz and return to subjects?'))window.location.href='index.html';}
function startQuiz(){const inp=document.getElementById('name-input').value.trim();playerName=inp||'Anonymous';order=shuffle(BANK.map((_,i)=>i));cur=0;picks={};score=0;document.getElementById('q-total').textContent=BANK.length;show('quiz-screen');render();}
function render(){const idx=order[cur],q=BANK[idx],total=BANK.length;document.getElementById('q-num').textContent=cur+1;document.getElementById('q-score').textContent=score;document.getElementById('q-label').textContent=`Question ${cur+1} of ${total}`;document.getElementById('q-text').textContent=q.q;document.getElementById('progress-fill').style.width=((cur/total)*100)+'%';document.getElementById('explanation').className='explanation';document.getElementById('explanation').textContent='';document.getElementById('next-btn').className='next-btn';document.getElementById('quit-btn').className='quit-btn';const letters=['A','B','C','D'],optEl=document.getElementById('options');optEl.innerHTML='';shuffle([0,1,2,3]).forEach((oi,li)=>{const btn=document.createElement('button');btn.className='opt-btn';btn.dataset.opt=oi;btn.innerHTML=`<span class="opt-letter">${letters[li]}</span><span>${q.opts[oi]}</span>`;btn.onclick=()=>selectAnswer(oi,idx);optEl.appendChild(btn);});}
function selectAnswer(chosen,idx){const q=BANK[idx],correct=chosen===q.ans;picks[idx]=chosen;if(correct)score++;document.getElementById('q-score').textContent=score;document.querySelectorAll('.opt-btn').forEach(btn=>{btn.disabled=true;const oi=parseInt(btn.dataset.opt);if(oi===q.ans)btn.classList.add('correct');else if(oi===chosen&&!correct)btn.classList.add('wrong');});if(!correct){const e=document.getElementById('explanation');e.textContent='✗ '+q.exp;e.classList.add('show');}const nb=document.getElementById('next-btn');nb.classList.add('show');nb.textContent=cur+1<BANK.length?'Next Question →':'See Results →';document.getElementById('quit-btn').classList.add('show');}
function nextQuestion(){cur++;if(cur>=BANK.length)showResults();else{render();window.scrollTo(0,0);}}
function showResults(){show('results-screen');const total=BANK.length,pct=Math.round((score/total)*100),passed=pct>=70;document.getElementById('result-name').textContent=playerName;document.getElementById('ring-pct').textContent=pct+'%';document.getElementById('ring-pct').style.color=passed?'var(--green)':'var(--red)';document.getElementById('ring-fill').style.stroke=passed?'var(--green)':'var(--red)';setTimeout(()=>{document.getElementById('ring-fill').style.strokeDashoffset=439.82-(439.82*pct/100);},100);document.getElementById('res-title').textContent=pct>=90?'Excellent!':pct>=70?'Passed!':'Needs Work';document.getElementById('res-sub').textContent=`${score} correct out of ${total} questions`;const v=document.getElementById('res-verdict');if(passed){v.textContent='✓ You passed — score above 70%';v.className='result-verdict pass';}else{v.textContent='✗ Below 70% — please retake the quiz';v.className='result-verdict fail';}const rv=document.getElementById('review');rv.innerHTML='<h3>Review</h3>';order.forEach(idx=>{const q=BANK[idx],ua=picks[idx],ok=ua===q.ans;const d=document.createElement('div');d.className='rv-item '+(ok?'ok':'miss');d.innerHTML=`<div class="rv-q">${q.q}</div><div class="rv-a">${ok?`<span class="c">✓ Correct: ${q.opts[q.ans]}</span>`:`<span class="w">✗ You chose: ${ua!==undefined?q.opts[ua]:'Skipped'}</span><br><span class="c">✓ Correct: ${q.opts[q.ans]}</span><br><span style="color:var(--muted)">${q.exp}</span>`}</div>`;rv.appendChild(d);});}
function retryQuiz(){order=shuffle(order);cur=0;picks={};score=0;document.getElementById('q-score').textContent=0;show('quiz-screen');render();}
document.getElementById('name-input').addEventListener('keydown',e=>{if(e.key==='Enter')startQuiz();});
</script>
