<style>

<script>
const BANK=[{q:"What are the 'primal cuts' of beef and how do they differ from secondary cuts?",opts:["Primal cuts are the smallest, most tender portions taken from the centre of the carcass, while secondary cuts come from the legs and shoulders only","Primal cuts are the large primary sections divided from the whole carcass — such as chuck, rib, loin, and round — from which all secondary and portioned cuts are taken","Primal cuts are cuts that have been aged for a minimum of 28 days, while secondary cuts are used immediately after slaughter without any ageing period","Primal cuts refer only to cuts from the hindquarter of the animal, while secondary cuts refer exclusively to forequarter cuts used for slow cooking"],ans:1,exp:"Primal cuts are the large sections first divided from the carcass — chuck, rib, short loin, sirloin, round, brisket, plate, and flank. Secondary cuts are then portioned from these primals. For example, the short loin primal yields T-bone, Porterhouse, and tenderloin steaks."},{q:"Which part of the beef carcass does the fillet (tenderloin) come from, and why is it the most tender cut?",opts:["The fillet comes from the chuck section behind the neck — it is tender because the neck muscles are used only for feeding, not heavy movement","The fillet runs beneath the backbone in the short loin and sirloin region — it is the least-used muscle on the carcass, resulting in very little connective tissue and extreme tenderness","The fillet comes from the brisket at the front of the animal — its tenderness comes from the high fat content surrounding the muscle fibres","The fillet comes from the rump at the rear of the animal — it is tender because rump muscles are used only for standing, not for walking or running"],ans:1,exp:"The fillet (tenderloin) runs beneath the backbone in the short loin and sirloin region. Because this muscle does almost no work during the animal's life, it has very little connective tissue — making it the most tender cut. It is also one of the leanest cuts on the carcass."},{q:"What is the 'chuck' primal of beef and what cooking method suits it best?",opts:["Chuck is located in the hindquarter near the rump — it is a lean, tender cut best suited to quick grilling and pan-frying over high heat","Chuck is the shoulder and neck region of the forequarter — it is high in collagen and connective tissue, making it best suited to slow braising or stewing","Chuck is located along the backbone between the rib and loin — it yields tender steaks best cooked quickly on a char-grill or in a hot pan","Chuck is the lower leg region of the animal — an extremely tough cut requiring a minimum of 12 hours of slow cooking to become palatable"],ans:1,exp:"Chuck is the forequarter shoulder and neck region. Heavy in connective tissue and collagen, it is tough when cooked quickly. Long, slow moist heat — braising or stewing — converts the collagen to gelatin, making it tender and producing a rich sauce. Common cuts: chuck roast, stewing beef, diced beef."},{q:"What is the 'brisket' cut of beef and in which culinary traditions is it most commonly used?",opts:["Brisket is a tender hindquarter cut from near the rump, commonly used for quick-grilled steaks in South American and Australian BBQ traditions","Brisket is the breast and lower chest of the forequarter — a tough, fatty cut used for slow braising, corned beef, BBQ smoking, and Pakistani slow-cooked dishes","Brisket is a lean loin cut located along the back of the animal, used for roasting whole at high temperature in classical European cooking","Brisket is a prime rib cut from the upper back of the animal, commonly used for standing rib roasts in fine dining and classical French preparations"],ans:1,exp:"Brisket is the breast of the animal — the pectoral muscle that supports much of the animal's weight, making it very tough and high in collagen. Used for: slow-braised pot roast, corned beef (cured brisket), Texas-style smoked BBQ brisket, and in Pakistani cooking for nihari and slow-cooked dishes."},{q:"In Pakistani culinary tradition, what cut of beef is most commonly used for 'nihari'?",opts:["The fillet (tenderloin) is used for nihari because its tenderness allows it to cook quickly in the spiced broth without becoming dry or stringy","The shank (nalli) and marrow bones are the traditional cuts for nihari — the long slow cooking extracts rich gelatin and bone marrow into the thick spiced broth","The sirloin is used for nihari because it holds its shape during long cooking and produces a cleaner, less fatty broth than other cuts","The rib eye is the preferred nihari cut because the intramuscular fat melts during cooking, adding richness to the thin spiced broth"],ans:1,exp:"Nihari is traditionally made from beef shank (nalli) and marrow bones. The long overnight slow cooking extracts deep gelatin and marrow from the bones, creating the thick, rich, heavily spiced broth that defines the dish. Originally cooked after Fajr prayer and eaten at Zohar time."},{q:"What does 'marbling' in beef refer to and how does it affect cooking quality?",opts:["Marbling refers to the dark red colour of aged beef caused by myoglobin oxidation — more marbling indicates longer ageing and stronger flavour","Marbling refers to the white flecks of intramuscular fat distributed through the lean muscle — more marbling means more flavour, moisture, and tenderness when cooked","Marbling refers to the pattern of muscle grain visible when a cut is sliced against the grain — cuts with fine marbling are always more tender","Marbling refers to connective tissue visible as white lines running through a cut — more marbling indicates a tougher cut requiring longer cooking"],ans:1,exp:"Marbling is intramuscular fat distributed as white flecks within the lean muscle. During cooking, marbling melts and bastes the meat from within — contributing to flavour, juiciness, and tenderness. Highly marbled cuts (Wagyu, prime rib, ribeye) are considered premium. Marbling is a key factor in beef quality grading."},{q:"What is the correct way to identify fresh, high-quality beef at the point of delivery?",opts:["Fresh beef should be white or pale grey with a sweet milky smell — bright red colour indicates the meat has been exposed to too much oxygen during transport","Fresh beef should be bright cherry-red (or dark purple-red if vacuum-packed), firm to the touch, with a clean mild smell and no stickiness or discolouration","Fresh beef should be dark brown on all surfaces with a slight sour smell — this indicates proper ageing and is a sign of premium quality product","Fresh beef should be pale pink with high moisture content visible as pooling liquid in the packaging — the wetter the meat, the fresher the product"],ans:1,exp:"Fresh beef indicators: bright cherry-red colour (vacuum-packed beef is dark purple but brightens on air exposure — this is normal myoglobin behaviour), firm texture, clean mild smell, no stickiness or sliminess, and no grey or brown discolouration. Reject any beef with off odour, slimy surface, or excessive liquid."},{q:"What is the difference between the 'sirloin' and the 'rump' in beef butchery?",opts:["Sirloin is from the hindquarter between the short loin and rump — more tender with a fat cap; rump is further back, firmer and more flavourful but slightly less tender","Sirloin is a forequarter cut from the shoulder while rump is a hindquarter cut — both are equally tender and interchangeable for grilling and pan-frying","Sirloin is always sold boneless while rump always contains the hip bone — the bone is what gives rump its characteristic flavour advantage over sirloin","Sirloin is a premium cut that must be aged for 28 days minimum, while rump is a fresh cut that must be cooked within 3 days of butchering"],ans:0,exp:"Sirloin sits between the short loin and rump in the hindquarter — relatively tender with a fat cap, ideal for grilling. Rump is further back toward the hip — firmer, more flavourful, but slightly less tender. Both suit grilling and pan-frying but rump benefits from slightly longer resting time after cooking."},{q:"What are the visible differences between beef forequarter and hindquarter cuts in terms of tenderness and use?",opts:["Forequarter cuts are always more tender than hindquarter cuts because the front muscles do less work — they are preferred for quick cooking methods","Forequarter cuts (chuck, brisket, shank) are tougher with more connective tissue due to heavy muscle use — suited to slow cooking. Hindquarter cuts (sirloin, rump, fillet) are more tender — suited to quick dry heat methods","Forequarter and hindquarter cuts are identical in tenderness — the only difference is their position on the carcass, which affects portion size but not texture","Hindquarter cuts are always tougher than forequarter cuts because the rear legs support the full weight of the animal during all movement and activity"],ans:1,exp:"Forequarter muscles (shoulder, neck, chest) work constantly — high collagen, tough, best for braising and stewing. Hindquarter muscles (loin, sirloin, rump) do less work — less collagen, more tender, best for grilling, roasting, and pan-frying. The more a muscle works, the tougher the cut — a fundamental butchery principle."},{q:"What is 'offal' and name four examples used in Pakistani cuisine?",opts:["Offal refers to the cheapest secondary cuts of beef such as brisket and shank — historically given to servants rather than served to paying guests","Offal (variety meats) refers to the internal organs and extremities of the animal — including liver (kaleji), kidney (gurda), tripe (ojhri), tongue (zabaan), and trotters (paya)","Offal is the term for all beef that has been minced or ground — including burgers and meatballs — as opposed to whole muscle cuts for steaks","Offal refers specifically to bones and cartilage used for stock-making — as opposed to lean muscle meat used for direct cooking and serving"],ans:1,exp:"Offal (variety meats/organ meats) includes: liver (kaleji), kidney (gurda), heart, tongue (zabaan), tripe (ojhri), brain (maghaz), and trotters (paya). In Pakistani cooking, offal dishes like kaleji masala, gurda kapura, paya curry, and maghaz are popular, culturally significant, and highly nutritious."},{q:"How are vegetables classified into categories in a professional kitchen?",opts:["Vegetables are classified only by colour — green, red, yellow, and white — which determines how they should be cooked and stored in the kitchen","Vegetables are classified by the part of the plant used — root, bulb, stem, leaf, flower, seed/pod, and fruit vegetables — each with different storage and cooking requirements","Vegetables are classified by their country of origin — European, Asian, and tropical — which determines their appropriate place on an international menu","Vegetables are classified by their water content — high water vegetables must be refrigerated while low water vegetables are stored at ambient temperature"],ans:1,exp:"Vegetable classification by plant part: Root (carrot, parsnip, turnip), Bulb (onion, garlic, fennel), Stem (celery, asparagus, leek), Leaf (spinach, cabbage, lettuce), Flower (broccoli, cauliflower, artichoke), Seed/Pod (peas, beans, lentils), Fruit vegetables (tomato, capsicum, courgette, aubergine)."},{q:"What category of vegetable is a tomato, and why does this sometimes cause confusion?",opts:["A tomato is a root vegetable because it grows underground and stores energy in a swollen rounded structure similar to other root vegetables","A tomato is botanically a fruit — it contains seeds and develops from a flower — but is classified as a vegetable in culinary practice due to its savoury flavour profile","A tomato is a flower vegetable because it develops directly from the flower of the plant without forming a seed-bearing structure inside the flesh","A tomato is a stem vegetable because it grows on a vine attached to the main stem of the plant, which is the defining feature of stem vegetables"],ans:1,exp:"Botanically, a tomato is a fruit — it develops from the flower and contains seeds. Culinarily, it is treated as a vegetable because of its savoury flavour. The same applies to capsicum, courgette, cucumber, aubergine, and pumpkin — all botanically fruits but all culinary vegetables."},{q:"What are 'root vegetables' and give four examples found in Pakistani and international kitchens?",opts:["Root vegetables grow above ground on vines and include tomato, capsicum, aubergine, and courgette — used widely in Pakistani and European cooking","Root vegetables are the edible underground storage organs of plants — examples include carrot (gajar), turnip (shalgam), radish (mooli), and beetroot (chukandar)","Root vegetables are leafy greens that grow close to the ground — examples include spinach, methi, kale, and mustard leaves used in South Asian cooking","Root vegetables are defined by their high starch content — examples include potato, rice, wheat, and corn which are staple carbohydrate sources globally"],ans:1,exp:"Root vegetables are edible underground storage organs. Pakistani/international examples: carrot (gajar), turnip (shalgam), radish (mooli/daikon), beetroot (chukandar), parsnip, sweet potato (shakarkandi), and yam. They store well at cool temperatures and are rich in starch, sugars, or fibre."},{q:"What are 'alliums' and name four commonly used in professional cooking?",opts:["Alliums are tropical fruit vegetables with a sweet flavour profile — examples include mango, papaya, jackfruit, and lychee used in Asian fusion cooking","Alliums are bulb vegetables in the genus Allium characterised by a pungent sulphuric flavour — examples include onion, garlic, leek, shallot, and spring onion","Alliums are leafy green vegetables used as herbs — examples include parsley, coriander, mint, and dill used as garnishes across international cuisines","Alliums are root vegetables characterised by their deep purple or red colour — examples include beetroot, red cabbage, purple carrot, and radicchio"],ans:1,exp:"Alliums (family Alliaceae) are bulb vegetables with characteristic pungent sulphuric flavour from compounds released when cut. Key examples: onion (pyaz), garlic (lahsun), leek (gandana), shallot, spring onion/scallion (hara pyaz), and chives. They form the aromatic base of cooking across almost every culinary tradition."},{q:"What are 'brassicas' (cruciferous vegetables) and give four examples?",opts:["Brassicas are tropical starchy tubers characterised by smooth skin and high carbohydrate content — examples include cassava, taro, yam, and plantain","Brassicas are a family of vegetables characterised by a cross-shaped four-petal flower — examples include cabbage, broccoli, cauliflower, Brussels sprouts, and bok choy","Brassicas are seed vegetables growing inside pods — examples include peas, broad beans, runner beans, and edamame used in Asian and European cooking","Brassicas are leafy salad vegetables with high water content and mild flavour — examples include iceberg lettuce, cos lettuce, and watercress"],ans:1,exp:"Brassicas (Brassicaceae family) are characterised by their four-petalled cross-shaped flowers. Examples: cabbage (patta gobhi), broccoli, cauliflower (phool gobhi), Brussels sprouts, bok choy, kale, kohlrabi, and turnip. High in fibre, vitamins C and K, widely used in Pakistani and international cooking."},{q:"How should most fresh vegetables be stored to maintain quality and safety?",opts:["All vegetables should be stored at room temperature in open crates away from direct sunlight — refrigeration damages their cell structure and destroys natural flavour","Most fresh vegetables should be refrigerated at 4°C–8°C, away from raw meat and fish, unwashed until use, and stored separately from ethylene-producing fruits","All vegetables should be stored in sealed airtight containers submerged in water to prevent moisture loss and maintain their crisp texture during storage","Vegetables must be washed, peeled, and portioned immediately upon delivery and stored covered in the refrigerator ready for use during service"],ans:1,exp:"Most fresh vegetables: refrigerate at 4°C–8°C, unwashed (washing accelerates spoilage), away from raw meat (contamination risk), away from ethylene-producing fruits like apples and bananas. Exceptions: potatoes, onions, and garlic store best at cool ambient temperature — refrigeration causes starch conversion and sprouting."},{q:"What is the culinary difference between a 'legume' and a 'pulse'?",opts:["Legumes and pulses are identical terms — both refer to any plant that fixes nitrogen in the soil and the terms are fully interchangeable in all kitchens","A legume is the whole plant family (including fresh pods and beans), while a pulse specifically refers to the dried seeds of legumes such as lentils, chickpeas, and dried beans","Legumes are always eaten fresh and green while pulses are always eaten cooked from dried form — they come from completely different plant families","A legume is any plant-based protein source including nuts and seeds, while a pulse refers only to beans and lentils grown specifically in South Asian regions"],ans:1,exp:"Legume = the whole plant family Fabaceae, including fresh green beans, peas in pods, and their dried seeds. Pulse = specifically the dried seed of a legume. All pulses are legumes but not all legumes are pulses. Common Pakistani pulses: masoor dal (red lentil), chana dal (split chickpea), moong dal (mung bean), urad dal (black lentil)."},{q:"What is 'yield percentage' in the context of vegetables and how is it calculated?",opts:["Yield percentage is the amount of a vegetable that can safely be stored after delivery, expressed as a percentage of the total delivered quantity","Yield percentage is the usable amount of a vegetable remaining after trimming, peeling, and preparation — calculated as (usable weight divided by original weight) multiplied by 100","Yield percentage is the percentage of a vegetable's total weight that is water — used to determine how much the vegetable will shrink during cooking","Yield percentage is the proportion of a vegetable harvest that meets quality standards at the point of delivery to the professional kitchen"],ans:1,exp:"Yield % = (usable weight after trimming ÷ original weight) × 100. Example: 1kg of carrots yields 800g after peeling and topping — yield = 80%. A higher yield % means less waste and lower effective cost. Yield percentage directly affects recipe costing — always calculate based on usable weight, not purchased weight."},{q:"What are the signs of spoilage in vegetables that indicate they should not be used?",opts:["A vegetable has spoiled when its colour becomes more vibrant and saturated — intensified colour indicates enzyme activity that makes it unsafe to eat","Signs of spoilage: wilting, soft or mushy texture, discolouration (yellowing, browning, black spots), mould growth, off or fermented odour, or sliminess","A vegetable has spoiled only when visible mould is present — surface discolouration and soft spots are normal and can be trimmed away safely before use","A vegetable has spoiled when it loses weight during storage — any moisture loss from the product indicates bacterial contamination and it must be discarded"],ans:1,exp:"Vegetable spoilage indicators: wilting/limpness (moisture loss), soft or mushy areas (cell breakdown), yellowing or browning (chlorophyll degradation), black spots or mould growth, slimy surface, and off or fermented smell. Extensive discolouration, slime, or mould means the item should be discarded — minor surface blemishes can usually be trimmed."},{q:"How is poultry defined in a professional kitchen and what types fall under this category?",opts:["Poultry refers exclusively to farm-raised chickens used in commercial food production — all other birds such as duck, turkey, and quail are classified as game birds","Poultry refers to all domesticated birds raised for meat and eggs — including chicken, turkey, duck, goose, guinea fowl, and quail (bater)","Poultry refers only to birds with white meat — chicken and turkey — while birds with dark meat such as duck and goose are classified as game","Poultry refers to any bird smaller than a chicken — larger birds such as turkey and goose are classified as red meat due to their darker flesh colour"],ans:1,exp:"Poultry covers all domesticated birds raised for culinary use: chicken (most common), turkey, duck, goose, guinea fowl, quail (bater — very popular in Pakistan), and squab (pigeon). Each has distinct flavour, fat content, and cooking requirements. In Pakistan, chicken and quail are the most widely used poultry."},{q:"What are the signs of fresh, high-quality raw chicken at the point of receiving a delivery?",opts:["Fresh chicken should be grey or beige with a strong poultry smell — bright pink flesh indicates the bird was too young and insufficiently matured for cooking","Fresh chicken should have moist pinkish-white flesh, a clean mild smell, firm texture, no stickiness, and no grey discolouration or off odour on any surface","Fresh chicken should feel very wet and slippery on the surface — excessive moisture indicates the bird was properly chilled throughout the entire supply chain","Fresh chicken should be pale yellow with visible fat deposits under the skin — yellow skin indicates free-range high-quality birds fed a corn-based diet"],ans:1,exp:"Fresh chicken quality indicators: pinkish-white moist flesh, clean mild smell (no sourness or ammonia odour), firm texture that springs back when pressed, no stickiness or sliminess on the surface, no grey or greenish discolouration, and tightly attached skin. Reject any chicken with an off odour, slimy skin, or greenish patches."},{q:"What is the safe minimum internal temperature for cooked chicken and where should the probe be inserted to verify it?",opts:["Chicken must reach 63°C internal temperature — the probe should be inserted into the thickest part of the breast away from the bone for an accurate reading","Chicken must reach 74°C (165°F) throughout — the probe should be inserted into the thickest part of the thigh, away from bone, to verify the coolest point has been reached","Chicken must reach 70°C internal temperature — the probe is inserted into the centre of any stuffing if the bird is stuffed, not into the flesh itself","Chicken must reach 85°C internal temperature — measured at the surface of the breast using an infrared thermometer before the bird is carved for service"],ans:1,exp:"Chicken must reach 74°C (165°F) throughout — verified by inserting a calibrated probe thermometer into the thickest part of the thigh, away from bone. The thigh is the last part to reach safe temperature. Checking the breast only is insufficient. The juices should run clear, but always confirm with a thermometer."},{q:"What are the primary parts of a whole chicken used in a professional kitchen?",opts:["A whole chicken is divided into three parts only — breast, leg, and carcass — with the wings always discarded as they have insufficient meat for service","A whole chicken yields: two breasts, two wings, two drumsticks, two thighs, the carcass (for stock), and giblets — each part with different cooking applications","A whole chicken is always cooked whole and never broken down into parts in a professional kitchen — portioning is done only after roasting at the table","A whole chicken yields only white meat (breast and wing) and dark meat (leg) — the carcass and giblets are considered waste and discarded after butchering"],ans:1,exp:"A whole chicken broken down yields: 2 breasts (supreme with wing for fine dining), 2 wings, 2 drumsticks, 2 thighs, the carcass (essential for chicken stock), and giblets (liver, heart, gizzard — used for gravy, pâté, or stock). Nothing is wasted in a professional kitchen."},{q:"What is a 'supreme' of chicken and how is it used in professional cooking?",opts:["A supreme is a whole chicken leg with the thigh and drumstick attached — the largest single portion of chicken used in a professional kitchen setting","A supreme is a skin-on chicken breast with the first wing bone (drummette) still attached and frenched — used for elegant presentation in fine dining and hotel service","A supreme is a boneless, skinless chicken breast that has been pounded flat — used for quick cooking methods such as pan-frying and grilling at high heat","A supreme is the term for a whole baby chicken (poussin) served as an individual portion — roasted whole and presented on the plate with its legs crossed"],ans:1,exp:"A chicken supreme is the skin-on breast with the wing bone (drummette) trimmed and frenched still attached. It is considered the most elegant presentation of chicken. Used in classical dishes like Chicken Kiev, Chicken Suprême, and fine dining plated service. The bone adds visual elegance and helps retain moisture during cooking."},{q:"What is the difference between white meat and dark meat in poultry, and which parts of the chicken are each?",opts:["White meat and dark meat differ only in colour due to different seasoning — white meat parts are brined while dark meat parts are marinated before cooking","White meat (breast and wing) has less fat and myoglobin — it cooks faster and dries out more easily. Dark meat (thigh and drumstick) has more fat and myoglobin — it is more forgiving and remains moist at higher temperatures","White meat comes from female chickens while dark meat comes from male chickens — the difference is purely hormonal and has no effect on cooking method or temperature","White meat parts must be cooked to 74°C while dark meat parts only need to reach 63°C — the safe cooking temperatures differ between the two types"],ans:1,exp:"White meat (breast, wing): low fat, low myoglobin — cooks fast, dries out easily if overcooked, best for poaching, roasting, and careful pan-frying. Dark meat (thigh, drumstick): higher fat and myoglobin — stays moist at higher temperatures, more forgiving, better for braising, slow roasting, and frying. Both must reach 74°C."},{q:"What is 'quail' (bater) in a culinary context and how is it typically prepared in Pakistani and international cooking?",opts:["Quail is a large domesticated bird similar in size to a small chicken — it is always roasted whole at high temperature and served as the main protein for two guests","Quail is a small game bird weighing 100–200g with delicate slightly gamey dark meat — typically marinated in spices and grilled whole, fried, or roasted in Pakistani cooking","Quail is a type of sea bird found along the Arabian coastline — its eggs are larger than chicken eggs and widely used in Pakistani bakery products","Quail is a classification of duck — specifically the smallest variety farmed in Pakistan — and its preparation is identical to duck in all culinary applications"],ans:1,exp:"Quail (bater) is a small game bird weighing 100–200g — one bird is typically a single serving. Its dark, slightly gamey meat is popular in Pakistan as masala bater (spiced and fried or grilled whole). Internationally, quail is roasted, pan-roasted, or cooked on the grill. Quail eggs are a delicacy used as garnish in fine dining."},{q:"What is 'trussing' a whole bird and why is it done before roasting?",opts:["Trussing means cutting the bird into portions before cooking — the breast is removed first, then the legs, so each part can be cooked to a different temperature","Trussing means tying the bird's legs and wings close to the body with kitchen twine so it holds a compact shape, cooks evenly, and presents well on the plate","Trussing means marinating the whole bird in a wet brine solution for 24 hours before roasting to ensure moisture is retained throughout the cooking process","Trussing means scoring the skin of the bird in a crosshatch pattern to allow fat to render out during roasting and ensure the skin becomes uniformly crispy"],ans:1,exp:"Trussing is tying the bird with kitchen twine — legs pulled in toward the breast and wings tucked under the body. This creates a compact uniform shape that: cooks more evenly (no thin wing tips burning), holds stuffing in if used, and produces a neater presentation when brought to the table or carved during service."},{q:"What is the correct storage position for raw poultry in a refrigerator relative to other foods?",opts:["Raw poultry should be stored on the top shelf of the refrigerator so it is easily accessible and away from the cold air that circulates near the floor level","Raw poultry must be stored on the lowest shelf of the refrigerator, covered, so that any drips cannot fall onto and contaminate food stored below it","Raw poultry should be stored on the middle shelf alongside raw fish — both are poultry-category proteins and can safely share the same refrigerator space","Raw poultry should be stored on the shelf directly above cooked meats so that it benefits from the warmest part of the refrigerator for proper ageing"],ans:1,exp:"Raw poultry goes on the lowest shelf — it is the highest-risk raw protein (Salmonella, Campylobacter). Any drips from poultry onto food below can cause cross-contamination and serious illness. Correct refrigerator order top to bottom: ready-to-eat → whole fish → whole beef/pork → minced meat → raw poultry (bottom)."},{q:"What is a 'poussin' and how does it differ from a standard chicken in professional kitchen use?",opts:["A poussin is a large heritage breed chicken weighing over 3kg — it requires longer cooking than a standard bird and is used for banquets of 10 or more guests","A poussin is a very young chicken aged 4–6 weeks and weighing 400–500g — it is served as a single portion, has delicate mild flavour, and is typically roasted whole","A poussin is a French term for a female chicken that has not yet laid eggs — it is used specifically for making classical French white chicken stock","A poussin is a cross between a chicken and a guinea fowl — it has dark meat throughout and a slightly gamey flavour similar to pheasant or partridge"],ans:1,exp:"A poussin (spring chicken) is a very young chicken aged 4–6 weeks, weighing 400–500g. One bird = one portion. Its flesh is extremely delicate and mild. It is roasted whole, spatchcocked and grilled, or poached. It cooks much faster than a standard chicken and requires careful attention to avoid drying out the delicate flesh."},{q:"What is the correct way to defrost a whole frozen chicken safely in a professional kitchen?",opts:["Place the frozen chicken in a bowl of warm water at 40°C for 2 hours — the warm water speeds defrosting and reduces the risk of the outer layer entering the danger zone","Defrost in the refrigerator at 4°C for 24–48 hours depending on size, keeping the chicken covered on the bottom shelf to catch any drips during thawing","Defrost the chicken at room temperature on the kitchen bench overnight — the ambient temperature is sufficient to thaw the bird safely in 8–10 hours","Place the frozen chicken directly in a hot oven at 180°C — the oven will defrost and cook the bird simultaneously, saving preparation time before service"],ans:1,exp:"Safe chicken defrosting: refrigerator at 4°C for 24–48 hours (safest — allows controlled even thawing). The bird must be covered, on the bottom shelf, in a tray to catch drips. Never defrost at room temperature — the outer layers enter the danger zone (5°C–63°C) before the centre thaws. Never cook from frozen unless the product is specifically designed for it."},{q:"What is 'butchery yield' and why does it matter for kitchen cost control?",opts:["Butchery yield is the total weight of a carcass before any cutting — used to verify that the supplier delivered the correct quantity as stated on the purchase order","Butchery yield is the usable meat weight remaining after trimming, boning, and portioning a whole carcass or primal cut — directly affecting the true cost per portion","Butchery yield is the number of portions that can be served from a single animal — used only by catering managers when planning banquet menus for large events","Butchery yield is the amount of waste fat and bone produced during butchery — tracked only to ensure correct disposal in accordance with waste management regulations"],ans:1,exp:"Butchery yield is the usable meat weight remaining after trimming fat, removing bone, and portioning. If a 5kg sirloin primal has a 75% yield, only 3.75kg is usable meat. The true cost per kg of usable meat = purchase price ÷ yield %. This is critical for accurate menu pricing and food cost control."}];
let order=[],cur=0,picks={},playerName='',score=0;
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function startQuiz(){const inp=document.getElementById('name-input').value.trim();playerName=inp||'Anonymous';order=shuffle(BANK.map((_,i)=>i));cur=0;picks={};score=0;document.getElementById('q-total').textContent=BANK.length;show('quiz-screen');render();}
function render(){const idx=order[cur],q=BANK[idx],total=BANK.length;document.getElementById('q-num').textContent=cur+1;document.getElementById('q-score').textContent=score;document.getElementById('q-label').textContent=`Question ${cur+1} of ${total}`;document.getElementById('q-text').textContent=q.q;document.getElementById('progress-fill').style.width=((cur/total)*100)+'%';document.getElementById('explanation').className='explanation';document.getElementById('explanation').textContent='';document.getElementById('next-btn').className='next-btn';const letters=['A','B','C','D'],optEl=document.getElementById('options');optEl.innerHTML='';shuffle([0,1,2,3]).forEach((oi,li)=>{const btn=document.createElement('button');btn.className='opt-btn';btn.dataset.opt=oi;btn.innerHTML=`<span class="opt-letter">${letters[li]}</span><span>${q.opts[oi]}</span>`;btn.onclick=()=>selectAnswer(oi,idx);optEl.appendChild(btn);});}
function selectAnswer(chosen,idx){const q=BANK[idx],correct=chosen===q.ans;picks[idx]=chosen;if(correct)score++;document.getElementById('q-score').textContent=score;document.querySelectorAll('.opt-btn').forEach(btn=>{btn.disabled=true;const oi=parseInt(btn.dataset.opt);if(oi===q.ans)btn.classList.add('correct');else if(oi===chosen&&!correct)btn.classList.add('wrong');});if(!correct){const e=document.getElementById('explanation');e.textContent='✗ '+q.exp;e.classList.add('show');}const nb=document.getElementById('next-btn');nb.classList.add('show');nb.textContent=cur+1<BANK.length?'Next Question →':'See Results →';}
function nextQuestion(){cur++;if(cur>=BANK.length)showResults();else{render();window.scrollTo(0,0);}}
function showResults(){show('results-screen');const total=BANK.length,pct=Math.round((score/total)*100),passed=pct>=70;document.getElementById('result-name').textContent=playerName;document.getElementById('ring-pct').textContent=pct+'%';document.getElementById('ring-pct').style.color=passed?'var(--green)':'var(--red)';document.getElementById('ring-fill').style.stroke=passed?'var(--green)':'var(--red)';setTimeout(()=>{document.getElementById('ring-fill').style.strokeDashoffset=439.82-(439.82*pct/100);},100);document.getElementById('res-title').textContent=pct>=90?'Excellent!':pct>=70?'Passed!':'Needs Work';document.getElementById('res-sub').textContent=`${score} correct out of ${total} questions`;const v=document.getElementById('res-verdict');if(passed){v.textContent='✓ You passed — score above 70%';v.className='result-verdict pass';}else{v.textContent='✗ Below 70% — please retake the quiz';v.className='result-verdict fail';}const rv=document.getElementById('review');rv.innerHTML='<h3>Review</h3>';order.forEach(idx=>{const q=BANK[idx],ua=picks[idx],ok=ua===q.ans;const d=document.createElement('div');d.className='rv-item '+(ok?'ok':'miss');d.innerHTML=`<div class="rv-q">${q.q}</div><div class="rv-a">${ok?`<span class="c">✓ Correct: ${q.opts[q.ans]}</span>`:`<span class="w">✗ You chose: ${ua!==undefined?q.opts[ua]:'Skipped'}</span><br><span class="c">✓ Correct: ${q.opts[q.ans]}</span><br><span style="color:var(--muted)">${q.exp}</span>`}</div>`;rv.appendChild(d);});}
function retryQuiz(){order=shuffle(order);cur=0;picks={};score=0;document.getElementById('q-score').textContent=0;show('quiz-screen');render();}
document.getElementById('name-input').addEventListener('keydown',e=>{if(e.key==='Enter')startQuiz();});
</script>
