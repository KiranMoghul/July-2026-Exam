<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MS PowerPoint Advanced — July 2026 Exam</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💻</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap');
  :root{--bg:#080810;--surface:#11111f;--border:#1e1e35;--purple:#7c3aed;--purple-l:#9d5bf0;--green:#22c55e;--red:#ef4444;--text:#e8e8f0;--muted:#7070a0;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:.4;pointer-events:none;z-index:0;}
  .screen{position:relative;z-index:1;width:100%;max-width:660px;margin:0 auto;padding:24px 20px 48px;display:none;}
  .screen.active{display:block;}
  #name-screen{text-align:center;padding-top:80px;}
  .back-link{display:inline-flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);text-decoration:none;letter-spacing:1px;margin-bottom:48px;transition:color .2s;}
  .back-link:hover{color:var(--purple-l);}
  .subject-tag{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--purple-l);margin-bottom:12px;}
  #name-screen h1{font-size:clamp(22px,5vw,36px);font-weight:800;line-height:1.15;margin-bottom:8px;background:linear-gradient(135deg,#fff 30%,var(--purple-l));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  #name-screen p{color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;margin-bottom:40px;}
  .name-box{display:flex;flex-direction:column;align-items:center;gap:12px;}
  .name-box input{width:100%;max-width:320px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Syne',sans-serif;font-size:15px;outline:none;text-align:center;transition:border-color .2s;}
  .name-box input:focus{border-color:var(--purple);}
  .name-box input::placeholder{color:var(--muted);}
  .btn-primary{padding:12px 32px;background:var(--purple);color:#fff;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:background .2s,transform .1s;letter-spacing:.5px;}
  .btn-primary:hover{background:var(--purple-l);transform:translateY(-1px);}
  .quiz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
  .quiz-meta{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
  .quiz-meta span{color:var(--purple-l);font-weight:500;}
  .quiz-back{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);background:none;border:1px solid var(--border);padding:5px 10px;border-radius:6px;cursor:pointer;transition:color .2s,border-color .2s;}
  .quiz-back:hover{color:var(--text);border-color:var(--purple);}
  .progress-bar{width:100%;height:3px;background:var(--border);border-radius:2px;margin-bottom:32px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--purple-l));border-radius:2px;transition:width .3s ease;}
  .question-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--purple-l);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
  .question-text{font-size:clamp(15px,3vw,18px);font-weight:600;line-height:1.5;margin-bottom:28px;color:var(--text);}
  .options{display:flex;flex-direction:column;gap:10px;}
  .opt-btn{display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;font-weight:400;cursor:pointer;text-align:left;transition:border-color .15s,background .15s;width:100%;}
  .opt-btn:hover:not(:disabled){border-color:var(--purple);background:#16162a;}
  .opt-btn .opt-letter{flex-shrink:0;width:26px;height:26px;border-radius:6px;background:var(--border);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);transition:background .15s,color .15s;}
  .opt-btn:hover:not(:disabled) .opt-letter{background:var(--purple);color:#fff;}
  .opt-btn.correct{border-color:var(--green);background:rgba(34,197,94,.1);}
  .opt-btn.correct .opt-letter{background:var(--green);color:#fff;}
  .opt-btn.wrong{border-color:var(--red);background:rgba(239,68,68,.1);}
  .opt-btn.wrong .opt-letter{background:var(--red);color:#fff;}
  .opt-btn:disabled{cursor:default;}
  .explanation{display:none;margin-top:16px;padding:14px 16px;background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.25);border-left:3px solid var(--purple);border-radius:8px;font-size:13px;line-height:1.6;color:#c4b5fd;font-family:'DM Mono',monospace;}
  .explanation.show{display:block;}
  .action-row{display:flex;gap:10px;margin-top:24px;}
  .next-btn{flex:1;padding:13px;background:var(--purple);color:#fff;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;display:none;transition:background .2s;letter-spacing:.5px;}
  .next-btn:hover{background:var(--purple-l);}
  .next-btn.show{display:block;}
  .quit-btn{padding:13px 18px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;display:none;transition:color .2s,border-color .2s;white-space:nowrap;}
  .quit-btn:hover{color:var(--text);border-color:var(--purple);}
  .quit-btn.show{display:block;}
  #results-screen{text-align:center;padding-top:40px;}
  .result-name{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);margin-bottom:32px;}
  .score-ring{position:relative;width:160px;height:160px;margin:0 auto 28px;}
  .score-ring svg{transform:rotate(-90deg);}
  .score-ring .ring-bg{fill:none;stroke:var(--border);stroke-width:10;}
  .score-ring .ring-fill{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1s ease,stroke .5s;}
  .score-ring .ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .ring-pct{font-size:34px;font-weight:800;line-height:1;}
  .ring-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:4px;letter-spacing:1px;}
  .result-title{font-size:24px;font-weight:800;margin-bottom:8px;}
  .result-sub{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);margin-bottom:8px;}
  .result-verdict{font-family:'DM Mono',monospace;font-size:12px;padding:8px 20px;border-radius:20px;display:inline-block;margin-bottom:32px;}
  .result-verdict.pass{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.3);}
  .result-verdict.fail{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.3);}
  .result-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:40px;}
  .btn-outline{padding:11px 24px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:border-color .2s,color .2s;}
  .btn-outline:hover{border-color:var(--purple);color:var(--text);}
  .review{text-align:left;}
  .review h3{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:16px;font-family:'DM Mono',monospace;}
  .rv-item{padding:14px 16px;border-radius:8px;margin-bottom:10px;border:1px solid var(--border);}
  .rv-item.ok{border-color:rgba(34,197,94,.25);background:rgba(34,197,94,.05);}
  .rv-item.miss{border-color:rgba(239,68,68,.25);background:rgba(239,68,68,.05);}
  .rv-q{font-size:13px;font-weight:600;margin-bottom:8px;line-height:1.4;}
  .rv-a{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);line-height:1.6;}
  .rv-a .c{color:var(--green);}
  .rv-a .w{color:var(--red);}
</style>
</head>
<body>
<div class="screen active" id="name-screen">
  <a class="back-link" href="index.html">← Back to subjects</a>
  <div class="subject-tag">Computer · Topic 04B</div>
  <h1>MS PowerPoint Advanced</h1>
  <p>30 questions · Interface, tabs, tools, views, animation & advanced features</p>
  <div class="name-box">
    <input type="text" id="name-input" placeholder="Enter your name" maxlength="30" autocomplete="off">
    <button class="btn-primary" onclick="startQuiz()">Start Quiz</button>
  </div>
</div>
<div class="screen" id="quiz-screen">
  <div class="quiz-header">
    <div class="quiz-meta">Question <span id="q-num">1</span> of <span id="q-total">30</span></div>
    <div class="quiz-meta">Score <span id="q-score">0</span></div>
    <button class="quiz-back" onclick="goBack()">← Quit</button>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="question-num" id="q-label"></div>
  <div class="question-text" id="q-text"></div>
  <div class="options" id="options"></div>
  <div class="explanation" id="explanation"></div>
  <div class="action-row">
    <button class="quit-btn" id="quit-btn" onclick="goBack()">← Back to subjects</button>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">Next Question →</button>
  </div>
</div>
<div class="screen" id="results-screen">
  <div class="result-name" id="result-name"></div>
  <div class="score-ring">
    <svg viewBox="0 0 160 160" width="160" height="160">
      <circle class="ring-bg" cx="80" cy="80" r="70"/>
      <circle class="ring-fill" id="ring-fill" cx="80" cy="80" r="70" stroke-dasharray="439.82" stroke-dashoffset="439.82" stroke="var(--green)"/>
    </svg>
    <div class="ring-text">
      <div class="ring-pct" id="ring-pct">0%</div>
      <div class="ring-label">SCORE</div>
    </div>
  </div>
  <div class="result-title" id="res-title"></div>
  <div class="result-sub" id="res-sub"></div>
  <div class="result-verdict" id="res-verdict"></div>
  <div class="result-actions">
    <button class="btn-primary" onclick="retryQuiz()">Retry →</button>
    <button class="btn-outline" onclick="window.location.href='index.html'">All Subjects</button>
  </div>
  <div class="review" id="review"></div>
</div>
<script>
const BANK=[
{q:"In PowerPoint 2016, what replaced the traditional menus and toolbars?",opts:["A floating command panel that appears when you right-click anywhere on the slide editing area","The Office Button, Quick Access Toolbar, and the Ribbon — which organise commands into groups for ease of navigation","A single unified toolbar that combines all functions into one horizontal bar across the top of the screen","A side panel that lists all available commands alphabetically for quick access during presentation editing"],ans:1,exp:"PowerPoint 2016 replaced the familiar menus and toolbars with the Office Button (File Tab), Quick Access Toolbar, and the Ribbon — which organises commands into tabs and groups for easier navigation."},
{q:"What does the Quick Access Toolbar in PowerPoint 2016 provide?",opts:["A full listing of every PowerPoint command organised alphabetically for rapid searching and access","Access to common commands via an icon toolbar that stays visible regardless of which Ribbon tab is active","A customisable right-click menu that appears only when text or an object on the slide is selected","A floating palette of recently used commands that appears automatically during slide editing sessions"],ans:1,exp:"The Quick Access Toolbar provides access to common commands (such as Save, Undo, Redo) via an icon toolbar that is always visible at the top of the screen, regardless of which Ribbon tab is currently active."},
{q:"What are the three view buttons in the bottom right corner of the PowerPoint window used for?",opts:["Controlling the zoom level of the current slide only — increasing or decreasing the magnification percentage","Switching between Normal View, Slide Sorter View, and Reading View to change how the presentation is displayed","Navigating between slides by moving to the previous, current, or next slide in the presentation sequence","Toggling the visibility of the Notes pane, Slide panel, and Outline pane independently of each other"],ans:1,exp:"The three buttons in the bottom right corner allow you to change the view: Normal View (editing), Slide Sorter View (miniature thumbnails for reordering), and Reading View (full-screen preview). A Zoom slider is also in this area."},
{q:"What does Normal View contain in PowerPoint 2016?",opts:["A single large slide editing pane only — all other panels are hidden to maximise the available editing space","Two panes: the slide editing pane and the notes pane — the outline panel was removed in PowerPoint 2016","Three panes: the outline pane, the slide pane, and the notes pane — providing a complete editing environment","Four panes: the slide pane, outline, notes, and a live preview pane showing the presentation as it will appear"],ans:2,exp:"Normal View contains three panes: the outline pane (left, showing slide text structure), the slide pane (centre, the main editing area), and the notes pane (bottom, for speaker notes)."},
{q:"What is Slide Sorter View used for in PowerPoint 2016?",opts:["Editing the text content of individual slides one at a time with the full formatting toolbar visible","Displaying miniature versions of all slides for changing their order, transitions, and timing settings","Viewing the presentation as a full-screen slide show that plays automatically with set timings","Showing a single slide with its complete notes section below for presenter reference during editing"],ans:1,exp:"Slide Sorter View displays miniature thumbnail versions of all slides simultaneously — making it easy to rearrange their order, apply transitions, and adjust timing without having to edit each slide individually."},
{q:"What is the difference between Save and Save As in PowerPoint 2016?",opts:["Save always creates a new file in a new location; Save As overwrites the existing file without any dialog","Save and Save As perform identical functions — both always open the Save dialog box asking for a name","Save saves a previously saved document quickly without a dialog; Save As saves a new document or saves an existing one under a different name or format","Save stores the file in the cloud automatically; Save As stores the file only on the local hard drive"],ans:2,exp:"Save quickly saves a previously saved document (using Ctrl+S or the disk icon) without opening any dialog. Save As is used to save a new document for the first time, or to save a copy of an existing document under a different name, location, or file format."},
{q:"What is the keyboard shortcut to perform a quick Save in PowerPoint 2016?",opts:["Ctrl+A — which selects all objects on the current slide before triggering the automatic save function","Ctrl+P — which opens the Print dialog but also triggers an automatic background save of the document","Ctrl+S — which performs a quick save of the document without opening any dialog or interrupting work","Ctrl+Z — which saves a backup copy of the document before undoing the most recent change made"],ans:2,exp:"Ctrl+S performs a quick save in PowerPoint 2016. Clicking the disk icon in the Quick Access Toolbar does the same thing. Both save the document without opening a dialog box."},
{q:"What are Templates in PowerPoint 2016?",opts:["Blank slides with no formatting that must be completely designed from scratch by the user","Pre-formatted documents that save time by providing a ready-made layout, design, and style to start from","Compressed backup files automatically created by PowerPoint to prevent data loss during editing","Password-protected files that restrict who can edit the presentation content and formatting"],ans:1,exp:"Templates are pre-formatted documents that save time getting started on typical presentation types. They include ready-made layouts, colour schemes, fonts, and graphics that can be customised for the specific content."},
{q:"How do you access PowerPoint Templates when creating a new presentation?",opts:["Click on the Design tab in the Ribbon and select Templates from the Themes group on the right side","Click on the Insert tab and choose Template from the Illustrations group to browse available designs","Select New from the File Tab — templates are available from local Available Templates and Themes or can be searched and downloaded from Office.com","Right-click on an existing slide and choose Apply Template from the context menu that appears"],ans:2,exp:"To access templates: select New from the File Tab. In the centre section you can choose from locally available templates and themes, or search online Office.com templates to download and use."},
{q:"What does the Undo tool do in PowerPoint, and what is its keyboard shortcut?",opts:["It saves the current version as a backup then deletes all recent changes permanently — shortcut Ctrl+S","It reverses the last change made and can be used multiple times to step back through editing history — shortcut Ctrl+Z","It repeats or redoes the last action that was undone, restoring the change that was reversed — shortcut Ctrl+Y","It creates a duplicate copy of the current slide and places it immediately after the original — shortcut Ctrl+D"],ans:1,exp:"The Undo tool reverses the last change made. You can click the black down-arrow next to the Undo tool to view and select from a history of recent actions. Keyboard shortcut: Ctrl+Z. The Redo tool (Ctrl+Y) reverses the last Undo."},
{q:"How do you add a new slide in PowerPoint 2016?",opts:["Press Ctrl+N to create a new slide at the end of the presentation using the default blank layout","Right-click anywhere on the slide editing area and select Insert Slide from the context menu","Click the Home tab, click the New Slide tool, then use the slide layout thumbnails to select the layout for the new slide","Press the Enter key at the end of the last line of text to automatically generate a new slide"],ans:2,exp:"To add a new slide: click the Home tab → click the New Slide tool → use the slide layout thumbnails to select the desired layout. To change a layout on an existing slide, select the slide, click Layout, and choose a replacement."},
{q:"How do you delete a slide in PowerPoint 2016 using the left-side slide panel?",opts:["Press Ctrl+Delete while the slide is visible in the main editing pane to remove it permanently","Click the slide once to select it then press the Backspace key to delete it from the presentation","Right-click on the selected slide in the left column and select Delete Slide from the menu, or press the Delete key","Drag the slide thumbnail out of the slide panel and drop it into the Recycle Bin on the desktop"],ans:2,exp:"To delete a slide: right-click on the slide in the left slide panel and select Delete Slide from the context menu. Alternatively, select the slide and press the Delete key on the keyboard."},
{q:"What does the Format Painter tool do in PowerPoint 2016?",opts:["It applies a new background colour and theme to the selected slide based on the most recently used design","It converts selected text into a pre-formatted SmartArt graphic automatically without any manual adjustment","It copies formatting (bold, italics, font, size, etc.) from selected text and applies it to other selected text — without copying the actual text content","It formats all text on the current slide to match the Slide Master's default font, colour, and size settings"],ans:2,exp:"Format Painter copies formatting (bold, italics, font, point size, colour, etc.) from selected text and applies it to newly selected text. Important: it copies formatting only — not the text itself. Double-click the Format Painter to apply it to multiple selections."},
{q:"What are Contextual Tabs in PowerPoint 2016?",opts:["Tabs that appear in the Ribbon only when a specific type of object (image, table, chart, SmartArt) is selected — providing object-specific formatting tools","Permanent tabs added to the Ribbon by the user through the Customize Ribbon option in PowerPoint Options","Tabs that change colour based on the current theme applied to the presentation for visual consistency","Hidden tabs that appear only when the presentation is in Slide Show mode to control playback settings"],ans:0,exp:"Contextual Tabs appear in the Ribbon automatically when a specific inserted object is selected — for example, Picture Tools when an image is selected, Table Tools for tables, Chart Tools for charts. They provide tools specific to that object type."},
{q:"What is Live Preview in PowerPoint 2016?",opts:["A video recording feature that captures the presenter's face using the webcam during the slide show","A real-time thumbnail preview of the entire presentation that plays automatically when the file is opened","A feature that previews how a style, theme, or format will look on the selected object when you hover the cursor over it — before you actually apply it","A side-by-side comparison mode showing the current slide design alongside the proposed new design"],ans:2,exp:"Live Preview allows you to see how a style, theme, or formatting option will look on the selected object before applying it — simply by hovering the cursor over the option. This helps users make better design decisions without trial and error."},
{q:"What is SmartArt in PowerPoint 2016 and what is it used for?",opts:["A built-in clip art library containing thousands of pre-drawn illustrations for decorating slides","A tool for converting existing charts and graphs into animated versions for more dynamic presentations","Pre-formatted graphics used to visually illustrate lists, processes, hierarchies, cycles, and simple org charts","A drawing tool that generates shapes automatically based on the text typed into the slide's text box"],ans:2,exp:"SmartArt is a feature for adding pre-formatted graphics to illustrate concepts visually — including lists, processes, hierarchies, cycles, relationships, and org charts. After selecting a SmartArt layout, you enter text and the graphic formats automatically."},
{q:"What happens when you insert a Chart into a PowerPoint 2016 slide?",opts:["A static image of a chart is placed on the slide which cannot be edited or updated after insertion","The chart is inserted on the slide and Excel opens automatically so you can edit the chart data and display criteria","A dialog box appears asking you to type all the chart data values directly into the PowerPoint text fields","A link is created to an existing Excel file which must be saved separately on the same computer"],ans:1,exp:"When you insert a chart in PowerPoint 2016, the chart object is placed on the slide and Excel opens automatically so you can enter and edit the chart data. Close the Excel window when finished. You can return to edit data by clicking Edit Data in the Chart Tools Contextual Tab."},
{q:"What is the Slide Master feature in PowerPoint 2016 used for?",opts:["Creating a master list of all bullet points and key messages to be covered across every slide in the presentation","Locking selected slides so they cannot be edited by other users who receive the presentation file","Applying a consistent style, format, logo, header, footer, or typeface to all slides in a presentation simultaneously","Recording a voiceover narration that plays automatically on every slide during an unattended presentation"],ans:2,exp:"Slide Master allows you to make formatting changes on one master slide that automatically apply to all slides in the presentation. Uses include: changing default typeface/colour for all slides, adding a company logo, and adding headers, footers, and dates to every slide."},
{q:"Where is the Slide Master option located in PowerPoint 2016?",opts:["In the Design tab under the Themes group on the right side of the Ribbon","In the Insert tab under the Text group alongside the Header & Footer and WordArt tools","In the View tab under the Presentation Views group — click Slide Master then Close Master View when done","In the Home tab under the Slides group alongside the New Slide and Layout tools"],ans:2,exp:"The Slide Master is accessed from the View tab → Presentation Views group → Slide Master. Make desired changes, then click Close Master View to return to normal editing. Changes automatically apply to all slides."},
{q:"What are the three types of Animation effects available in PowerPoint 2016?",opts:["Open, Run, and Close — corresponding to how objects appear on screen, perform during the slide, and leave","Insert, Modify, and Delete — the three stages of the animation workflow from creation to removal","Entrance, Emphasis, and Exit — controlling how objects arrive on the slide, draw attention, and leave the slide","Start, During, and After — the three timing phases that control when animation begins relative to the slide load"],ans:2,exp:"PowerPoint 2016 offers three types of animation: Entrance (how objects appear on screen), Emphasis (effects that draw attention while the object is on screen), and Exit (how objects leave the screen). All three are found in the Animations tab."},
{q:"What does the Animation Pane tool allow you to do in PowerPoint 2016?",opts:["Preview the entire slide show from the beginning to check that all animations play in the correct sequence","Customise applied animations in terms of timing, order, and triggers — controlling exactly when and how each animation plays","Delete all animations from the current slide with a single click to start the animation design from scratch","Record a custom audio track that plays alongside each animation as it appears on the selected slide"],ans:1,exp:"The Animation Pane allows you to customise animations after they are applied — adjusting the timing, changing the start trigger (on click, with previous, after previous), reordering animations, and setting durations for each effect."},
{q:"In the Transitions tab, what does 'Apply to All' do?",opts:["Applies the currently selected slide's content layout to all other slides in the presentation","Applies the selected transition effect and its settings to every slide in the entire presentation simultaneously","Copies all animations from the current slide and applies identical animations to all other slides","Selects all slides in the Slide Sorter panel so they can all be deleted or moved at once"],ans:1,exp:"'Apply to All' in the Transitions tab applies the currently selected transition effect — including its Effect Options and timing settings — to every slide in the presentation, not just the current one."},
{q:"What does the Review tab in PowerPoint 2016 contain?",opts:["Tools for setting up the slide show, including rehearsing timings and recording narration for automated playback","Tools for changing the view, zoom level, and showing or hiding gridlines, rulers, and the notes panel","Tools for proofing the document — including spell check, thesaurus, and comment management tools","Tools for inserting tables, charts, SmartArt, and media clips into the current slide"],ans:2,exp:"The Review tab contains proofing tools — including Spelling and Grammar check, Thesaurus, and New Comment. Automatic spell checking underlines misspelled words in red; right-clicking a misspelled word shows correction options."},
{q:"What does the Design tab in PowerPoint 2016 allow you to do?",opts:["Add animations to individual slide objects and control the timing and sequence of each effect","Insert tables, images, SmartArt, hyperlinks, text boxes, and media clips into the current slide","Set the slide size (4:3 or 16:9), apply a preformatted theme, set background colour, and create custom themes","Manage the slide show playback settings including looping, narration, and presenter view options"],ans:2,exp:"The Design tab contains tools for formatting the layout and overall look of the presentation — setting slide size (4:3 vs 16:9), applying themes, setting background colour/fill, and creating custom colours, fonts, and effects."},
{q:"How do you set up a custom background in PowerPoint 2016?",opts:["Right-click on the slide thumbnail in the left panel and select Background from the context menu","In the Design tab, click Customize → Format Background — where you can set solid, gradient, picture/texture, or pattern fill","In the Home tab, click the Drawing group and select Background Fill from the shape format options","In the Insert tab, click Background from the Illustrations group to open the background design palette"],ans:1,exp:"To set a custom background: Design tab → Customize → Format Background. From here you can choose a solid colour, gradient, picture or texture, or pattern fill as the slide background."},
{q:"What image file formats does PowerPoint 2016 recommend for insertion, and why?",opts:["BMP and TIFF — because they are uncompressed formats that maintain the highest possible image quality","GIF and PNG only — because they support transparent backgrounds that are essential for slide design","JPG or JPEG files — because they are compressed file formats that result in smaller PowerPoint file sizes","SVG and EPS files — because they are vector formats that scale perfectly without any loss of quality"],ans:2,exp:"PowerPoint 2016 recommends using JPG or JPEG image files for insertion because they are compressed file formats — resulting in smaller overall PowerPoint file sizes compared to uncompressed formats like BMP or TIFF."},
{q:"What is the Photo Album feature in PowerPoint 2016?",opts:["A gallery of clip art images organised by category that can be searched and inserted into any slide","A feature that allows you to create a series of slides or an entire presentation based on images selected from your computer","A built-in stock photo library connected to Office.com that provides royalty-free images for presentations","A slide layout option that arranges multiple images in a grid or collage arrangement on a single slide"],ans:1,exp:"The Photo Album tool (Insert tab → Images group) allows you to create a series of slides — or an entire presentation — based on images you select from your computer. You can also set frames, captions, and layout options for the photo album."},
{q:"What is WordArt in PowerPoint 2016?",opts:["A grammar checking tool that evaluates the choice of words on each slide and suggests improvements","A feature for creating visually styled, decorative text objects with special effects applied to the lettering","A built-in dictionary and thesaurus tool that provides synonyms and definitions for selected words","A text-to-speech feature that reads slide content aloud during presentation editing for proofreading"],ans:1,exp:"WordArt is a tool for creating visually interesting, decorative text objects with special styles and effects. Found in the Insert tab → Text group. After inserting WordArt, it can be customised further through the Drawing Tools Contextual Tab."},
{q:"How do you save a PowerPoint 2016 presentation as a PDF?",opts:["Click File Tab → Save As → and select PDF from the Save As Type dropdown menu in the dialog","Click File Tab → Export → Create PDF/XPS Document → click Create PDF/XPS icon to publish","Right-click the title bar at the top of the screen and select Export to PDF from the context menu","In the Review tab, click Export to PDF in the proofing group to save a read-only version of the file"],ans:1,exp:"To save as PDF in PowerPoint 2016: File Tab → Export → Create PDF/XPS Document → click the Create PDF/XPS icon. You can then set the save location, quality level, and configure options before clicking Publish to finish."},
{q:"What printing option in PowerPoint 2016 is best for audiences to take notes alongside slides?",opts:["Full Page Slides — printing one full slide per page at maximum size for clarity during the presentation","Notes Pages — printing each slide with its full speaker notes below for presenter reference only","Outline view print — printing only the text content of slides in a structured outline format without images","Handouts with 3 slides per page — which provides a lined note-taking space alongside miniature versions of each slide"],ans:3,exp:"Printing Handouts with 3 slides per page is recommended for audiences — it provides miniature slide images on the right side and lined blank spaces on the left for note-taking alongside each slide."},
{q:"How do you add a Footer with slide numbers and date to all slides in PowerPoint 2016?",opts:["In the Design tab, click Slide Number from the Customize group to open the footer configuration options","In the View tab, click Slide Master and add footer placeholders manually to the master slide layout","In the Insert tab, click Header & Footer from the Text group → choose the Slides tab → select date, slide number, and text footer → click Apply to All","In the Home tab, click the Paragraph group link and select Footer Settings from the paragraph options dialog"],ans:2,exp:"To add a footer: Insert tab → Text group → Header & Footer → click the Slides tab. Select the options you want (date, slide number, custom text footer) then click Apply to All to add them to every slide, or Apply for just the current slide."}
];
let order=[],cur=0,picks={},playerName='',score=0;
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function goBack(){if(confirm('Quit quiz and return to subjects?'))window.location.href='index.html';}
function startQuiz(){const inp=document.getElementById('name-input').value.trim();playerName=inp||'Anonymous';order=shuffle(BANK.map((_,i)=>i));cur=0;picks={};score=0;document.getElementById('q-total').textContent=BANK.length;show('quiz-screen');render();}
function render(){const idx=order[cur],q=BANK[idx],total=BANK.length;document.getElementById('q-num').textContent=cur+1;document.getElementById('q-score').textContent=score;document.getElementById('q-label').textContent=`Question ${cur+1} of ${total}`;document.getElementById('q-text').textContent=q.q;document.getElementById('progress-fill').style.width=((cur/total)*100)+'%';document.getElementById('explanation').className='explanation';document.getElementById('explanation').textContent='';document.getElementById('next-btn').className='next-btn';document.getElementById('quit-btn').className='quit-btn';const letters=['A','B','C','D'],optEl=document.getElementById('options');optEl.innerHTML='';shuffle([0,1,2,3]).forEach((oi,li)=>{const btn=document.createElement('button');btn.className='opt-btn';btn.dataset.opt=oi;btn.innerHTML=`<span class="opt-letter">${letters[li]}</span><span>${q.opts[oi]}</span>`;btn.onclick=()=>selectAnswer(oi,idx);optEl.appendChild(btn);});}
function selectAnswer(chosen,idx){const q=BANK[idx],correct=chosen===q.ans;picks[idx]=chosen;if(correct)score++;document.getElementById('q-score').textContent=score;document.querySelectorAll('.opt-btn').forEach(btn=>{btn.disabled=true;const oi=parseInt(btn.dataset.opt);if(oi===q.ans)btn.classList.add('correct');else if(oi===chosen&&!correct)btn.classList.add('wrong');});if(!correct){const e=document.getElementById('explanation');e.textContent='✗ '+q.exp;e.classList.add('show');}const nb=document.getElementById('next-btn');nb.classList.add('show');nb.textContent=cur+1<BANK.length?'Next Question →':'See Results →';document.getElementById('quit-btn').classList.add('show');}
function nextQuestion(){cur++;if(cur>=BANK.length)showResults();else{render();window.scrollTo(0,0);}}
function showResults(){show('results-screen');const total=BANK.length,pct=Math.round((score/total)*100),passed=pct>=70;document.getElementById('result-name').textContent=playerName;document.getElementById('ring-pct').textContent=pct+'%';document.getElementById('ring-pct').style.color=passed?'var(--green)':'var(--red)';document.getElementById('ring-fill').style.stroke=passed?'var(--green)':'var(--red)';setTimeout(()=>{document.getElementById('ring-fill').style.strokeDashoffset=439.82-(439.82*pct/100);},100);document.getElementById('res-title').textContent=pct>=90?'Excellent!':pct>=70?'Passed!':'Needs Work';document.getElementById('res-sub').textContent=`${score} correct out of ${total} questions`;const v=document.getElementById('res-verdict');if(passed){v.textContent='✓ You passed — score above 70%';v.className='result-verdict pass';}else{v.textContent='✗ Below 70% — please retake the quiz';v.className='result-verdict fail';}const rv=document.getElementById('review');rv.innerHTML='<h3>Review</h3>';order.forEach(idx=>{const q=BANK[idx],ua=picks[idx],ok=ua===q.ans;const d=document.createElement('div');d.className='rv-item '+(ok?'ok':'miss');d.innerHTML=`<div class="rv-q">${q.q}</div><div class="rv-a">${ok?`<span class="c">✓ Correct: ${q.opts[q.ans]}</span>`:`<span class="w">✗ You chose: ${ua!==undefined?q.opts[ua]:'Skipped'}</span><br><span class="c">✓ Correct: ${q.opts[q.ans]}</span><br><span style="color:var(--muted)">${q.exp}</span>`}</div>`;rv.appendChild(d);});}
function retryQuiz(){order=shuffle(order);cur=0;picks={};score=0;document.getElementById('q-score').textContent=0;show('quiz-screen');render();}
document.getElementById('name-input').addEventListener('keydown',e=>{if(e.key==='Enter')startQuiz();});
</script>
