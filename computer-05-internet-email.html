<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Internet & Electronic Mail — July 2026 Exam</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💻</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap');
  :root{--bg:#080810;--surface:#11111f;--border:#1e1e35;--purple:#7c3aed;--purple-l:#9d5bf0;--green:#22c55e;--red:#ef4444;--text:#e8e8f0;--muted:#7070a0;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:.4;pointer-events:none;z-index:0;}
  .screen{position:relative;z-index:1;width:100%;max-width:660px;margin:0 auto;padding:24px 20px 48px;display:none;}
  .screen.active{display:block;}
  #name-screen{text-align:center;padding-top:80px;}
  .back-link{display:inline-flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);text-decoration:none;letter-spacing:1px;margin-bottom:48px;transition:color .2s;}
  .back-link:hover{color:var(--purple-l);}
  .subject-tag{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--purple-l);margin-bottom:12px;}
  #name-screen h1{font-size:clamp(22px,5vw,36px);font-weight:800;line-height:1.15;margin-bottom:8px;background:linear-gradient(135deg,#fff 30%,var(--purple-l));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  #name-screen p{color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;margin-bottom:40px;}
  .name-box{display:flex;flex-direction:column;align-items:center;gap:12px;}
  .name-box input{width:100%;max-width:320px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Syne',sans-serif;font-size:15px;outline:none;text-align:center;transition:border-color .2s;}
  .name-box input:focus{border-color:var(--purple);}
  .name-box input::placeholder{color:var(--muted);}
  .btn-primary{padding:12px 32px;background:var(--purple);color:#fff;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:background .2s,transform .1s;letter-spacing:.5px;}
  .btn-primary:hover{background:var(--purple-l);transform:translateY(-1px);}
  .quiz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
  .quiz-meta{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
  .quiz-meta span{color:var(--purple-l);font-weight:500;}
  .quiz-back{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);background:none;border:1px solid var(--border);padding:5px 10px;border-radius:6px;cursor:pointer;transition:color .2s,border-color .2s;}
  .quiz-back:hover{color:var(--text);border-color:var(--purple);}
  .progress-bar{width:100%;height:3px;background:var(--border);border-radius:2px;margin-bottom:32px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--purple-l));border-radius:2px;transition:width .3s ease;}
  .question-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--purple-l);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
  .question-text{font-size:clamp(15px,3vw,18px);font-weight:600;line-height:1.5;margin-bottom:28px;color:var(--text);}
  .options{display:flex;flex-direction:column;gap:10px;}
  .opt-btn{display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;font-weight:400;cursor:pointer;text-align:left;transition:border-color .15s,background .15s;width:100%;}
  .opt-btn:hover:not(:disabled){border-color:var(--purple);background:#16162a;}
  .opt-btn .opt-letter{flex-shrink:0;width:26px;height:26px;border-radius:6px;background:var(--border);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);transition:background .15s,color .15s;}
  .opt-btn:hover:not(:disabled) .opt-letter{background:var(--purple);color:#fff;}
  .opt-btn.correct{border-color:var(--green);background:rgba(34,197,94,.1);}
  .opt-btn.correct .opt-letter{background:var(--green);color:#fff;}
  .opt-btn.wrong{border-color:var(--red);background:rgba(239,68,68,.1);}
  .opt-btn.wrong .opt-letter{background:var(--red);color:#fff;}
  .opt-btn:disabled{cursor:default;}
  .explanation{display:none;margin-top:16px;padding:14px 16px;background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.25);border-left:3px solid var(--purple);border-radius:8px;font-size:13px;line-height:1.6;color:#c4b5fd;font-family:'DM Mono',monospace;}
  .explanation.show{display:block;}
  .action-row{display:flex;gap:10px;margin-top:24px;}
  .next-btn{flex:1;padding:13px;background:var(--purple);color:#fff;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;display:none;transition:background .2s;letter-spacing:.5px;}
  .next-btn:hover{background:var(--purple-l);}
  .next-btn.show{display:block;}
  .quit-btn{padding:13px 18px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;display:none;transition:color .2s,border-color .2s;white-space:nowrap;}
  .quit-btn:hover{color:var(--text);border-color:var(--purple);}
  .quit-btn.show{display:block;}
  #results-screen{text-align:center;padding-top:40px;}
  .result-name{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);margin-bottom:32px;}
  .score-ring{position:relative;width:160px;height:160px;margin:0 auto 28px;}
  .score-ring svg{transform:rotate(-90deg);}
  .score-ring .ring-bg{fill:none;stroke:var(--border);stroke-width:10;}
  .score-ring .ring-fill{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1s ease,stroke .5s;}
  .score-ring .ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .ring-pct{font-size:34px;font-weight:800;line-height:1;}
  .ring-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:4px;letter-spacing:1px;}
  .result-title{font-size:24px;font-weight:800;margin-bottom:8px;}
  .result-sub{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);margin-bottom:8px;}
  .result-verdict{font-family:'DM Mono',monospace;font-size:12px;padding:8px 20px;border-radius:20px;display:inline-block;margin-bottom:32px;}
  .result-verdict.pass{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.3);}
  .result-verdict.fail{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.3);}
  .result-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:40px;}
  .btn-outline{padding:11px 24px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:border-color .2s,color .2s;}
  .btn-outline:hover{border-color:var(--purple);color:var(--text);}
  .review{text-align:left;}
  .review h3{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:16px;font-family:'DM Mono',monospace;}
  .rv-item{padding:14px 16px;border-radius:8px;margin-bottom:10px;border:1px solid var(--border);}
  .rv-item.ok{border-color:rgba(34,197,94,.25);background:rgba(34,197,94,.05);}
  .rv-item.miss{border-color:rgba(239,68,68,.25);background:rgba(239,68,68,.05);}
  .rv-q{font-size:13px;font-weight:600;margin-bottom:8px;line-height:1.4;}
  .rv-a{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);line-height:1.6;}
  .rv-a .c{color:var(--green);}
  .rv-a .w{color:var(--red);}
</style>
</head>

  <div class="name-box">

  <div class="quiz-header">
    <div class="quiz-meta">Question <span id="q-num">1</span> of <span id="q-total">30</span></div>
    <div class="quiz-meta">Score <span id="q-score">0</span></div>

  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>

      <circle class="ring-bg" cx="80" cy="80" r="70"/>
      <circle class="ring-fill" id="ring-fill" cx="80" cy="80" r="70" stroke-dasharray="439.82" stroke-dashoffset="439.82" stroke="var(--green)"/>

    <button class="btn-primary" onclick="retryQuiz()">Retry →</button>
    <button class="btn-outline" onclick="window.location.href='index.html'">All Subjects</button>
  </div>

<script>
const BANK=[
{q:"What is the Internet?",opts:["A private network owned by Microsoft that connects only Windows computers around the world","A single large computer located in the United States that stores all websites and manages all global communications","A global network of interconnected computers and networks that allows sharing of information and resources worldwide","A software application installed on a computer that creates a local copy of the web for offline use"],ans:2,exp:"The Internet is a global network of interconnected computers and networks spanning the entire world. It allows billions of devices to communicate and share information, files, emails, and web pages across countries and continents using standard protocols."},
{q:"What does WWW stand for and what is it?",opts:["WWW stands for World Wide Web — a system of interlinked hypertext documents and multimedia content accessed via the Internet using a browser","WWW stands for Wireless Wide Wave — a radio frequency system used to transmit internet signals between countries","WWW stands for World Work Web — a productivity software suite developed by Microsoft for office use","WWW stands for Wide Web Window — the screen area of a browser where web content is displayed"],ans:0,exp:"WWW stands for World Wide Web. It is a system of interlinked hypertext documents, web pages, images, videos, and other multimedia content accessed via the Internet using a web browser. The WWW is one of the services that runs on the Internet — not the Internet itself."},
{q:"What is a Web Browser and give two examples?",opts:["A web browser is a programming language used to create websites — examples are HTML and CSS","A web browser is an application software used to access, view, and navigate websites on the Internet — examples are Internet Explorer and Netscape Navigator","A web browser is a hardware device that connects a computer to the Internet — examples are a modem and router","A web browser is a search engine that indexes web pages — examples are Google and Bing"],ans:1,exp:"A web browser is application software that allows users to access, view, and navigate web pages on the World Wide Web. Early examples: Internet Explorer (Microsoft) and Netscape Navigator. Modern browsers include Google Chrome, Mozilla Firefox, Microsoft Edge, and Safari."},
{q:"What is Internet Explorer and who developed it?",opts:["Internet Explorer is a programming language developed by Apple for building websites on the Macintosh platform","Internet Explorer is a web browser developed by Microsoft — it was the dominant browser included with Windows operating systems","Internet Explorer is an email client developed by Google for sending and receiving messages online","Internet Explorer is a search engine developed by Yahoo for finding web pages and online resources"],ans:1,exp:"Internet Explorer (IE) is a web browser developed by Microsoft. It was bundled with Windows operating systems and became the most widely used browser in the early 2000s. It has since been replaced by Microsoft Edge. IE was accessed from the Start menu or the desktop shortcut."},
{q:"What is Netscape Navigator and what was its historical significance?",opts:["Netscape Navigator was a Microsoft email program that introduced web-based email to home users in the 1990s","Netscape Navigator was the first search engine, introduced in 1994, which later became Google","Netscape Navigator was one of the first widely used web browsers, released in 1994, which helped popularise the World Wide Web for general public use","Netscape Navigator was an operating system developed as an alternative to Windows for internet-connected computers"],ans:2,exp:"Netscape Navigator was one of the first widely used commercial web browsers, released in 1994. It played a major role in popularising the World Wide Web for general public use. At its peak it held over 90% of web browser market share before Internet Explorer took over in the late 1990s."},
{q:"What is a URL (Uniform Resource Locator)?",opts:["A username and password combination required to access a secure website or online service","A type of computer virus that redirects the browser to malicious websites automatically","The web address of a specific page or resource on the Internet — typed into the browser's address bar to navigate to it","A programming command used to retrieve data from a web server in response to a user request"],ans:2,exp:"A URL (Uniform Resource Locator) is the web address of a specific page or resource on the Internet. For example: http://www.google.com. A URL consists of the protocol (http:// or https://), the domain name (www.google.com), and sometimes a path to a specific page."},
{q:"What does HTTP stand for and what is it used for?",opts:["HTTP stands for High Transfer Text Protocol — used for compressing large files before sending them over the Internet","HTTP stands for HyperText Transfer Protocol — the set of rules used for transmitting web pages between a web server and a browser","HTTP stands for Home Terminal Transfer Page — the protocol used to connect home computers to internet service providers","HTTP stands for Hybrid Text Transfer Program — software used to convert web page code into readable content"],ans:1,exp:"HTTP stands for HyperText Transfer Protocol. It is the set of rules (protocol) that governs how web pages are transmitted between a web server and a user's browser. HTTPS (HTTP Secure) is the encrypted version — indicated by a padlock icon in the browser."},
{q:"What is a Hyperlink and how is it typically identified on a web page?",opts:["A hyperlink is a type of web browser extension that blocks unwanted advertisements and pop-up windows","A hyperlink is a clickable element on a web page — typically underlined text or an image — that takes you to another page, section, or resource when clicked","A hyperlink is the home page that loads automatically when a web browser is first opened","A hyperlink is a username embedded in a web page that identifies the author of the content"],ans:1,exp:"A hyperlink (link) is a clickable element on a web page. It is typically underlined text (often in blue) or a clickable image. When clicked, it navigates to another web page, a different section of the same page, a file, or another resource. The mouse pointer changes to a hand icon when hovering over a link."},
{q:"How do you select and follow a hyperlink in a web browser?",opts:["Hold Ctrl and press the letter H to activate hyperlinks — clicking without Ctrl only highlights the text","Right-click the hyperlink and choose 'Activate Link' from the context menu to navigate to the destination","Click once on the hyperlink — the browser navigates to the linked page or resource. Links can also be right-clicked to open in a new tab","Double-click on the hyperlink — a single click only previews the destination URL in the status bar"],ans:2,exp:"To follow a hyperlink: click once on it. The browser navigates to the linked page. Right-clicking a link gives options including 'Open in New Tab' (opens without leaving the current page) and 'Copy Link Address'. The cursor changes to a pointing hand when hovering over a clickable link."},
{q:"What is the Address Bar in a web browser used for?",opts:["The Address Bar displays the current time and date — it cannot be used for typing or navigation","The Address Bar is where you type a URL to navigate to a specific website, and it also shows the current page's web address","The Address Bar is the toolbar at the top of the browser containing the Back, Forward, and Refresh buttons","The Address Bar is the section at the bottom of the browser window that shows the page loading progress"],ans:1,exp:"The Address Bar (also called the Location Bar or Omnibox) is the text field near the top of the browser where you type a URL to navigate to a website. It also displays the address of the page you are currently viewing. Pressing Enter after typing a URL loads the page."},
{q:"What is a Search Engine and give three examples?",opts:["A search engine is a web browser that provides access to the Internet — examples are Internet Explorer, Chrome, and Firefox","A search engine is a website that indexes web pages and allows users to search for information by typing keywords — examples are Google, Yahoo, and Bing","A search engine is the hardware device that processes internet requests — examples are modem, router, and switch","A search engine is an email service that searches your inbox for specific messages — examples are Gmail, Yahoo Mail, and Outlook"],ans:1,exp:"A search engine is a website that automatically indexes billions of web pages and allows users to find information by entering keywords. Examples: Google (most widely used), Yahoo, Bing (Microsoft), and DuckDuckGo. Search results are ranked by relevance to the search terms entered."},
{q:"How do you search the web using a search engine?",opts:["Open a word processing document, type your question, save it as a .htm file, then upload it to the search engine server","Open a web browser, type the search engine's URL in the address bar (e.g. www.google.com), type your keywords in the search box, and press Enter or click the Search button","Call your Internet Service Provider and ask them to find the information on your behalf using their internal database","Open your email program, write your question to search@google.com, and wait for an automated response with results"],ans:1,exp:"To search the web: open a browser → type the search engine address (e.g. www.google.com) → type keywords in the search box → press Enter or click Search. The search engine returns a list of relevant web pages ranked by relevance. Use specific keywords for better results."},
{q:"What is a Homepage in a web browser?",opts:["The homepage is the last web page visited before closing the browser — it is automatically saved for next time","The homepage is the default web page that loads automatically when a web browser is opened or when the Home button is clicked","The homepage is the main page of a search engine — it cannot be changed by the user","The homepage is the web page stored in the browser's cache from the most recent browsing session"],ans:1,exp:"The Homepage is the default web page that automatically loads when you open the browser or click the Home button. It can be set to any web page you choose — for example, Google, a news site, or your school's website. It is configured in the browser's Settings/Options."},
{q:"What do the Back and Forward buttons do in a web browser?",opts:["Back downloads the current page for offline viewing — Forward uploads the page to the browser's cloud storage","Back refreshes the current page to load the latest version — Forward moves to the next page in the search results","Back returns to the previously visited page — Forward moves ahead to a page you went back from. Both navigate through your browsing history","Back closes the current tab — Forward opens a new tab in the browser window"],ans:2,exp:"Back (←) navigates to the previously visited page in your browsing history. Forward (→) moves to the page you went back from — it is only available after using Back. Both buttons allow you to move through your session's browsing history without retyping URLs."},
{q:"What is a Favourite (Bookmark) in a web browser?",opts:["A favourite is a web page that the browser's algorithm identifies as the most visited site on the Internet","A favourite is a saved shortcut to a web page — allowing you to return to it quickly without retyping the URL","A favourite is the browser's default homepage that cannot be changed by the user","A favourite is a temporary copy of a web page stored in the browser's cache for faster loading"],ans:1,exp:"A Favourite (called Bookmark in some browsers) is a saved shortcut to a web page. When you bookmark a page, it is saved in your browser's Favourites/Bookmarks list. You can then return to that page with a single click without needing to remember or retype the URL."},
{q:"What does FTP stand for and what is it used for?",opts:["FTP stands for File Transfer Protocol — a communication protocol that allows computers to share files and resources over a network","FTP stands for Fast Text Processing — software that speeds up the loading of text-heavy web pages in a browser","FTP stands for Frequency Transfer Protocol — the standard used to stream audio and video content over the Internet","FTP stands for Format Transfer Page — a template used to create consistently formatted web pages"],ans:0,exp:"FTP stands for File Transfer Protocol. It is a communication protocol used to transfer files between computers over a network (typically the Internet). It is used to upload website files to a web server, or to download large files from a server. FTP requires an FTP client program or can be accessed through a browser."},
{q:"What is Electronic Mail (Email)?",opts:["Email is a physical letter sent through the postal service that has been digitised using a scanner","Email is a messaging system that allows users to send and receive digital messages instantly over the Internet between any connected devices","Email is a video conferencing tool used for face-to-face communication between users in different locations","Email is a voice message recorded and transmitted over a telephone network between mobile devices"],ans:1,exp:"Email (Electronic Mail) is a system for sending and receiving digital messages over the Internet. Messages can include text, attachments (documents, photos, files), and links. Email is delivered almost instantly regardless of the distance between sender and recipient — from one country to another in seconds."},
{q:"What is the structure of an email address and give an example?",opts:["An email address uses a colon to separate the username from the ISP — example: username:provider.com","An email address uses the # symbol to separate the username from the domain — example: username#provider.com","An email address uses the @ symbol to separate the user's name from the ISP/domain — example: username@provider.com","An email address uses a forward slash to separate the username from the server — example: username/provider.com"],ans:2,exp:"An email address uses the @ (at) symbol to separate the user's name from the ISP or domain name. Example: kiran@gmail.com — 'kiran' is the username, '@' separates them, 'gmail.com' is the email provider/domain. This format is universal across all email services."},
{q:"What is an Email Client and give two examples?",opts:["An email client is the server computer that stores and manages all email messages sent and received","An email client is a software application used to send, receive, manage, and organise email messages — examples are Microsoft Outlook and Mozilla Thunderbird","An email client is the internet service provider that provides email accounts to registered users","An email client is a web page that displays only the inbox — it cannot be used to compose or send messages"],ans:1,exp:"An email client is software used to send, receive, and manage email. Desktop clients: Microsoft Outlook, Mozilla Thunderbird. Web-based clients (webmail): Gmail, Yahoo Mail, Hotmail/Outlook.com. Email clients retrieve messages from the mail server and allow composing, sending, and organising emails."},
{q:"What are the main parts of an email message?",opts:["Header, Sidebar, Footer, and Attachment — the four structural sections of every email message","To (recipient), CC (carbon copy), BCC (blind carbon copy), Subject, Body, and Attachment — the main components of an email","From, Reply-To, Forward, and Signature — the four required fields that must be completed before sending","Inbox, Outbox, Sent, and Drafts — the four folders that together make up an email message structure"],ans:1,exp:"The main parts of an email: To (recipient's email address), CC (Carbon Copy — secondary recipients who can see each other), BCC (Blind Carbon Copy — hidden recipients), Subject (brief title of the message), Body (the main message content), and Attachment (optional files attached to the message)."},
{q:"What is CC in an email and how does it differ from BCC?",opts:["CC stands for Carbon Copy — all recipients in CC can see each other's addresses. BCC stands for Blind Carbon Copy — BCC recipients are hidden from all other recipients including CC","CC stands for Copy and Confirm — used to send the same email twice to the primary recipient. BCC stands for Broadcast Copy — sends the email to a mailing list","CC and BCC are identical — both send a copy to additional recipients and both hide the addresses from the main recipient","CC stands for Close Contact — used for internal company emails only. BCC is used only for external recipients outside the organisation"],ans:0,exp:"CC (Carbon Copy): sends a copy to additional recipients who can all see each other's email addresses — and the To recipient can also see who was CC'd. BCC (Blind Carbon Copy): sends a copy to recipients whose addresses are hidden from all other recipients. Use BCC for privacy when emailing large groups."},
{q:"What is the Subject line in an email and why is it important?",opts:["The Subject line is the body of the email — it contains the full text of the message being sent","The Subject line is the sender's email address automatically filled in by the email client","The Subject line is a brief title or description of the email's content — it helps the recipient understand what the email is about before opening it","The Subject line is a security password that must be entered to access encrypted email messages"],ans:2,exp:"The Subject line is a short title summarising the email's content. It appears in the recipient's inbox alongside the sender's name. A clear subject line helps the recipient understand the email's purpose at a glance and decide how urgently to respond. Example: 'Assignment Submission — Computer Topic 5'."},
{q:"How do you create and send a new email message?",opts:["Open the web browser → type the recipient's postal address in the address bar → type your message → press Enter to send","Open the email client → click Compose/New Message → enter the recipient's email in the To field → type a Subject → type the message in the Body → click Send","Open the word processor → write your message → save it as .eml format → the email client sends it automatically","Open the email client → click Reply → change the recipient's address → type the new message → click Forward"],ans:1,exp:"To create and send an email: Open your email client (Gmail, Outlook, etc.) → click Compose or New Message → enter the recipient's email address in the To field → type a Subject → type your message in the Body → attach files if needed → click Send. The message is delivered almost instantly."},
{q:"What does 'Reply' do in an email client?",opts:["Reply forwards the email to a new recipient who was not part of the original conversation","Reply sends an automatic out-of-office response to all incoming messages for a set period","Reply opens a new message addressed back to the original sender — keeping the original message in the thread","Reply deletes the email and notifies the sender that their message was not accepted"],ans:2,exp:"Reply opens a new email addressed back to the original sender. The original message is typically quoted below your reply so the sender can see the conversation context. Reply does NOT include people who were CC'd — to include them, use Reply All."},
{q:"What is the difference between 'Reply' and 'Reply All'?",opts:["Reply and Reply All are identical — both send the response to the original sender and all CC recipients","Reply sends the response only to the original sender — Reply All sends the response to the sender AND all CC recipients","Reply sends to the sender and CC — Reply All sends only to the sender without including CC recipients","Reply responds to the last message only — Reply All responds to every message in the entire thread at once"],ans:1,exp:"Reply sends your response only to the original sender. Reply All sends your response to the original sender AND everyone who was CC'd on the message. Use Reply All carefully — in professional settings, replying to everyone when only the sender needs your response is considered bad email etiquette."},
{q:"What does 'Forward' do in an email client?",opts:["Forward automatically resends an email to the same recipients on a scheduled recurring basis","Forward sends a copy of the received email to a new recipient of your choosing — sharing the message and any attachments with someone who was not on the original email","Forward returns the email to the original sender with a note explaining why it could not be delivered","Forward moves the email from the Inbox to the Sent folder to indicate it has been processed"],ans:1,exp:"Forward allows you to send a received email to a new recipient who was not part of the original conversation. You can add your own comments before forwarding. The original message and any attachments are included. Example: your teacher emails important information and you forward it to a classmate."},
{q:"What is an Email Attachment and what types of files can be attached?",opts:["An email attachment is a short automated signature added to the bottom of every outgoing email","An email attachment is a file (document, photo, spreadsheet, PDF, audio, video) sent along with an email message","An email attachment is a web link embedded in the email body that opens a specific web page","An email attachment is a security certificate that verifies the identity of the email sender"],ans:1,exp:"An email attachment is a file sent along with an email message. Any file type can be attached: Word documents, Excel spreadsheets, PDF files, photos (JPG, PNG), audio files, videos, or ZIP archives. Most email services have an attachment size limit (typically 25 MB per email). Click the paperclip icon to attach files."},
{q:"What is the Inbox in an email client?",opts:["The Inbox is the folder where all sent emails are stored after they have been successfully delivered","The Inbox is the main folder where all incoming received emails arrive and are displayed","The Inbox is a temporary holding area for emails that are being composed but not yet sent","The Inbox is the folder where deleted emails are stored before being permanently removed"],ans:1,exp:"The Inbox is the main folder in an email client where all incoming messages from other people arrive. New unread emails typically appear in bold. Other standard folders include: Sent (copies of emails you sent), Drafts (unfinished emails), Spam/Junk (suspected spam), and Trash/Deleted Items."},
{q:"What is Spam email and how should it be handled?",opts:["Spam is an important email from your bank or government that requires urgent action within 24 hours","Spam is unsolicited, unwanted junk email — typically advertising, scams, or phishing attempts — that should be moved to the Spam folder and deleted without opening suspicious attachments","Spam is an email accidentally sent to the wrong recipient that must be recalled using the Undo Send feature","Spam is a copy of an email that was delivered more than once due to a server error — both copies are legitimate"],ans:1,exp:"Spam is unsolicited, unwanted junk email — sent in bulk to millions of addresses without permission. It includes advertising, scams, phishing (fake bank/account emails), and malware. Best practice: do not open suspicious attachments, do not click unknown links, mark as Spam, and delete. Most email clients filter spam automatically."},
{q:"What is a Search Engine used for when browsing the Internet, and name the most widely used one?",opts:["A search engine is used to create web pages — the most widely used is Microsoft Word","A search engine is used to block advertisements — the most widely used is AdBlock","A search engine is used to find information on the Internet by entering keywords — the most widely used is Google","A search engine is used to send emails — the most widely used is Microsoft Outlook"],ans:2,exp:"A search engine is used to find information on the Internet by entering keywords or questions. It searches billions of indexed web pages and returns relevant results ranked by relevance. Google is the most widely used search engine globally, handling over 90% of all web searches. Others: Bing, Yahoo, DuckDuckGo."},
{q:"What is an Internet Service Provider (ISP) and why is it needed?",opts:["An ISP is a hardware manufacturer that produces routers, modems, and network cables for home internet use","An ISP is a company that provides individuals and organisations with access to the Internet — without an ISP, a user cannot connect to the Internet","An ISP is a government department that regulates the content that can be published on websites","An ISP is a software application that manages all files downloaded from the Internet"],ans:1,exp:"An Internet Service Provider (ISP) is a company that provides access to the Internet. Without subscribing to an ISP, a user's computer cannot connect to the Internet. The ISP assigns an IP address, provides a connection (broadband, fibre, mobile data), and routes traffic between the user and the Internet. Examples: PTCL, Nayatel (Pakistan), BT, Virgin Media (UK)."},
{q:"What is the difference between Downloading and Uploading on the Internet?",opts:["Downloading and Uploading are identical — both transfer files between a computer and the Internet in the same direction","Downloading means transferring data FROM the Internet TO your computer — Uploading means transferring data FROM your computer TO the Internet","Downloading sends files to another user's email — Uploading retrieves files from another user's email","Downloading increases your internet speed — Uploading decreases your internet speed permanently"],ans:1,exp:"Downloading transfers data FROM the Internet TO your computer — for example, saving a file, loading a web page, or receiving an email. Uploading transfers data FROM your computer TO the Internet — for example, posting a photo on social media, sending an email attachment, or submitting a form online."}
];
let order=[],cur=0,picks={},playerName='',score=0;
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function goBack(){if(confirm('Quit quiz and return to subjects?'))window.location.href='index.html';}
function startQuiz(){const inp=document.getElementById('name-input').value.trim();playerName=inp||'Anonymous';order=shuffle(BANK.map((_,i)=>i));cur=0;picks={};score=0;document.getElementById('q-total').textContent=BANK.length;show('quiz-screen');render();}
function render(){const idx=order[cur],q=BANK[idx],total=BANK.length;document.getElementById('q-num').textContent=cur+1;document.getElementById('q-score').textContent=score;document.getElementById('q-label').textContent=`Question ${cur+1} of ${total}`;document.getElementById('q-text').textContent=q.q;document.getElementById('progress-fill').style.width=((cur/total)*100)+'%';document.getElementById('explanation').className='explanation';document.getElementById('explanation').textContent='';document.getElementById('next-btn').className='next-btn';document.getElementById('quit-btn').className='quit-btn';const letters=['A','B','C','D'],optEl=document.getElementById('options');optEl.innerHTML='';shuffle([0,1,2,3]).forEach((oi,li)=>{const btn=document.createElement('button');btn.className='opt-btn';btn.dataset.opt=oi;btn.innerHTML=`<span class="opt-letter">${letters[li]}</span><span>${q.opts[oi]}</span>`;btn.onclick=()=>selectAnswer(oi,idx);optEl.appendChild(btn);});}
function selectAnswer(chosen,idx){const q=BANK[idx],correct=chosen===q.ans;picks[idx]=chosen;if(correct)score++;document.getElementById('q-score').textContent=score;document.querySelectorAll('.opt-btn').forEach(btn=>{btn.disabled=true;const oi=parseInt(btn.dataset.opt);if(oi===q.ans)btn.classList.add('correct');else if(oi===chosen&&!correct)btn.classList.add('wrong');});if(!correct){const e=document.getElementById('explanation');e.textContent='✗ '+q.exp;e.classList.add('show');}const nb=document.getElementById('next-btn');nb.classList.add('show');nb.textContent=cur+1<BANK.length?'Next Question →':'See Results →';document.getElementById('quit-btn').classList.add('show');}
function nextQuestion(){cur++;if(cur>=BANK.length)showResults();else{render();window.scrollTo(0,0);}}
function showResults(){show('results-screen');const total=BANK.length,pct=Math.round((score/total)*100),passed=pct>=70;document.getElementById('result-name').textContent=playerName;document.getElementById('ring-pct').textContent=pct+'%';document.getElementById('ring-pct').style.color=passed?'var(--green)':'var(--red)';document.getElementById('ring-fill').style.stroke=passed?'var(--green)':'var(--red)';setTimeout(()=>{document.getElementById('ring-fill').style.strokeDashoffset=439.82-(439.82*pct/100);},100);document.getElementById('res-title').textContent=pct>=90?'Excellent!':pct>=70?'Passed!':'Needs Work';document.getElementById('res-sub').textContent=`${score} correct out of ${total} questions`;const v=document.getElementById('res-verdict');if(passed){v.textContent='✓ You passed — score above 70%';v.className='result-verdict pass';}else{v.textContent='✗ Below 70% — please retake the quiz';v.className='result-verdict fail';}const rv=document.getElementById('review');rv.innerHTML='<h3>Review</h3>';order.forEach(idx=>{const q=BANK[idx],ua=picks[idx],ok=ua===q.ans;const d=document.createElement('div');d.className='rv-item '+(ok?'ok':'miss');d.innerHTML=`<div class="rv-q">${q.q}</div><div class="rv-a">${ok?`<span class="c">✓ Correct: ${q.opts[q.ans]}</span>`:`<span class="w">✗ You chose: ${ua!==undefined?q.opts[ua]:'Skipped'}</span><br><span class="c">✓ Correct: ${q.opts[q.ans]}</span><br><span style="color:var(--muted)">${q.exp}</span>`}</div>`;rv.appendChild(d);});}
function retryQuiz(){order=shuffle(order);cur=0;picks={};score=0;document.getElementById('q-score').textContent=0;show('quiz-screen');render();}
document.getElementById('name-input').addEventListener('keydown',e=>{if(e.key==='Enter')startQuiz();});
</script>
