<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap');
  :root{--bg:#080810;--surface:#11111f;--border:#1e1e35;--purple:#7c3aed;--purple-l:#9d5bf0;--green:#22c55e;--red:#ef4444;--text:#e8e8f0;--muted:#7070a0;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:.4;pointer-events:none;z-index:0;}
  .screen{position:relative;z-index:1;width:100%;max-width:660px;margin:0 auto;padding:24px 20px 48px;display:none;}
  .screen.active{display:block;}
  #name-screen{text-align:center;padding-top:80px;}
  .back-link{display:inline-flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);text-decoration:none;letter-spacing:1px;margin-bottom:48px;transition:color .2s;}
  .back-link:hover{color:var(--purple-l);}
  .subject-tag{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--purple-l);margin-bottom:12px;}
  #name-screen h1{font-size:clamp(22px,5vw,36px);font-weight:800;line-height:1.15;margin-bottom:8px;background:linear-gradient(135deg,#fff 30%,var(--purple-l));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  #name-screen p{color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;margin-bottom:40px;}
  .name-box{display:flex;flex-direction:column;align-items:center;gap:12px;}
  .name-box input{width:100%;max-width:320px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Syne',sans-serif;font-size:15px;outline:none;text-align:center;transition:border-color .2s;}
  .name-box input:focus{border-color:var(--purple);}
  .name-box input::placeholder{color:var(--muted);}
  .btn-primary{padding:12px 32px;background:var(--purple);color:#fff;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:background .2s,transform .1s;letter-spacing:.5px;}
  .btn-primary:hover{background:var(--purple-l);transform:translateY(-1px);}
  .quiz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
  .quiz-meta{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
  .quiz-meta span{color:var(--purple-l);font-weight:500;}
  .quiz-back{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);background:none;border:1px solid var(--border);padding:5px 10px;border-radius:6px;cursor:pointer;transition:color .2s,border-color .2s;}
  .quiz-back:hover{color:var(--text);border-color:var(--purple);}
  .progress-bar{width:100%;height:3px;background:var(--border);border-radius:2px;margin-bottom:32px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--purple-l));border-radius:2px;transition:width .3s ease;}
  .question-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--purple-l);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
  .question-text{font-size:clamp(15px,3vw,18px);font-weight:600;line-height:1.5;margin-bottom:28px;color:var(--text);}
  .options{display:flex;flex-direction:column;gap:10px;}
  .opt-btn{display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;font-weight:400;cursor:pointer;text-align:left;transition:border-color .15s,background .15s;width:100%;}
  .opt-btn:hover:not(:disabled){border-color:var(--purple);background:#16162a;}
  .opt-btn .opt-letter{flex-shrink:0;width:26px;height:26px;border-radius:6px;background:var(--border);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);transition:background .15s,color .15s;}
  .opt-btn:hover:not(:disabled) .opt-letter{background:var(--purple);color:#fff;}
  .opt-btn.correct{border-color:var(--green);background:rgba(34,197,94,.1);}
  .opt-btn.correct .opt-letter{background:var(--green);color:#fff;}
  .opt-btn.wrong{border-color:var(--red);background:rgba(239,68,68,.1);}
  .opt-btn.wrong .opt-letter{background:var(--red);color:#fff;}
  .opt-btn:disabled{cursor:default;}
  .explanation{display:none;margin-top:16px;padding:14px 16px;background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.25);border-left:3px solid var(--purple);border-radius:8px;font-size:13px;line-height:1.6;color:#c4b5fd;font-family:'DM Mono',monospace;}
  .explanation.show{display:block;}
  .action-row{display:flex;gap:10px;margin-top:24px;}
  .next-btn{flex:1;padding:13px;background:var(--purple);color:#fff;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;display:none;transition:background .2s;letter-spacing:.5px;}
  .next-btn:hover{background:var(--purple-l);}
  .next-btn.show{display:block;}
  .quit-btn{padding:13px 18px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;display:none;transition:color .2s,border-color .2s;white-space:nowrap;}
  .quit-btn:hover{color:var(--text);border-color:var(--purple);}
  .quit-btn.show{display:block;}
  #results-screen{text-align:center;padding-top:40px;}
  .result-name{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);margin-bottom:32px;}
  .score-ring{position:relative;width:160px;height:160px;margin:0 auto 28px;}
  .score-ring svg{transform:rotate(-90deg);}
  .score-ring .ring-bg{fill:none;stroke:var(--border);stroke-width:10;}
  .score-ring .ring-fill{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1s ease,stroke .5s;}
  .score-ring .ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .ring-pct{font-size:34px;font-weight:800;line-height:1;}
  .ring-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:4px;letter-spacing:1px;}
  .result-title{font-size:24px;font-weight:800;margin-bottom:8px;}
  .result-sub{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);margin-bottom:8px;}
  .result-verdict{font-family:'DM Mono',monospace;font-size:12px;padding:8px 20px;border-radius:20px;display:inline-block;margin-bottom:32px;}
  .result-verdict.pass{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.3);}
  .result-verdict.fail{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.3);}
  .result-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:40px;}
  .btn-outline{padding:11px 24px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:border-color .2s,color .2s;}
  .btn-outline:hover{border-color:var(--purple);color:var(--text);}
  .review{text-align:left;}
  .review h3{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:16px;font-family:'DM Mono',monospace;}
  .rv-item{padding:14px 16px;border-radius:8px;margin-bottom:10px;border:1px solid var(--border);}
  .rv-item.ok{border-color:rgba(34,197,94,.25);background:rgba(34,197,94,.05);}
  .rv-item.miss{border-color:rgba(239,68,68,.25);background:rgba(239,68,68,.05);}
  .rv-q{font-size:13px;font-weight:600;margin-bottom:8px;line-height:1.4;}
  .rv-a{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);line-height:1.6;}
  .rv-a .c{color:var(--green);}
  .rv-a .w{color:var(--red);}
</style>

<script>
const BANK=[
{q:"What is the difference between a Formula and a Function in MS Excel?",opts:["A formula uses only numbers while a function uses only cell references — they cannot be combined","A formula and a function are completely identical — the two terms are interchangeable in Excel","A formula is an expression that calculates the value of a cell — a function is a predefined formula already available in Excel that acts as a shortcut for common calculations","A formula can only add values while a function can perform any type of calculation including subtraction"],ans:2,exp:"A formula is an expression you write yourself that calculates a value (e.g. =A1+A2). A function is a predefined formula already built into Excel (e.g. =SUM(A1:A2)) that acts as a shortcut for common calculations. Functions are a type of formula."},
{q:"What three types of content can you type into an Excel cell?",opts:["Text, Image, and Hyperlink — the three content types supported in any Excel cell","Number, Date, and Time — the three data types that can be entered into a spreadsheet cell","Label (words/letters), Value (numbers), and Formula (a statement that performs a calculation)","Header, Body, and Footer — the three structural content zones available in any Excel cell"],ans:2,exp:"A cell can contain three things: a Label (words or letters — text), a Value (numbers), or a Formula (a statement beginning with = that performs a calculation). These are the fundamental content types in Excel."},
{q:"What is Operator Precedence in MS Excel and which operation is performed first?",opts:["Operator Precedence means Excel always performs operations from right to left regardless of the operator used","Operator Precedence means Excel performs all operations simultaneously in parallel for maximum speed","Excel uses a default order: Parentheses first, then Exponents, then Multiplication and Division, then Addition and Subtraction","Operator Precedence means the operator that appears last in the formula is always calculated first"],ans:2,exp:"Excel follows PEMDAS/BODMAS order: Parentheses → Exponents → Multiplication/Division → Addition/Subtraction. If part of a formula is in parentheses, that part is calculated first. Example: 5+2*7 = 19 (multiplication first), but (5+2)*7 = 49 (parentheses first)."},
{q:"What is the result of the formula 5+2*7 in Excel, and why?",opts:["49 — because Excel always adds before multiplying, so 5+2=7, then 7*7=49","19 — because Excel performs multiplication before addition: 2*7=14, then 5+14=19","35 — because Excel multiplies all numbers first: 5*7=35, ignoring the addition operation","7 — because Excel divides the result by the number of operators present in the formula"],ans:1,exp:"Result is 19. Excel performs multiplication before addition (operator precedence). First: 2*7=14. Then: 5+14=19. If the formula were (5+2)*7, the result would be 49 because parentheses are calculated first."},
{q:"What happens when you copy a formula to another cell in MS Excel?",opts:["The formula stays exactly the same — all cell references remain fixed pointing to the original cells","Excel automatically adjusts the cell references for each new cell the formula is copied to","Excel converts the formula to a static value so the copy does not change if source cells change","Excel asks whether to keep the original references or update them before completing the copy"],ans:1,exp:"When you copy a formula, Excel automatically adjusts the cell references relative to the new position. For example, if =A1+A2 is in cell A3 and you copy it to B3, it becomes =B1+B2. This is called relative cell referencing."},
{q:"What does the Paste Special option do in MS Excel that regular Paste cannot?",opts:["Paste Special pastes content from external applications like Word and PowerPoint into Excel","Paste Special is a faster version of regular Paste that completes in half the time","Paste Special offers many more paste options — such as pasting only Values, only Formulas, or only Formatting — through a dialog box","Paste Special automatically formats the pasted content to match the destination cell style"],ans:2,exp:"Paste Special (right-click → Paste Special) opens a dialog with many paste options: Paste (everything), Values (result only, not formula), Formulas (formula only), Formatting (format only), and many more. Regular Paste pastes everything at once."},
{q:"What does the 'Values' paste option do in MS Excel?",opts:["It pastes both the formula and its current value — showing both in the cell at the same time","It pastes only the result of the formula as a fixed number — not the formula itself","It pastes only the formatting and cell colour without copying any data or formula","It pastes the formula and automatically locks all cell references to prevent them changing"],ans:1,exp:"The Values paste option pastes only the result (the calculated number) of the formula — not the formula itself. This is useful when you want to freeze a calculated result so it doesn't change if source data changes."},
{q:"What does the 'Formulas' paste option do in MS Excel?",opts:["It pastes the formula and all associated cell formatting — colours, borders, and font styles","It pastes both the formula and its current calculated result into the destination cell","It pastes only the formula — without any formatting from the source cell","It pastes only the cell formatting and ignores the formula or value completely"],ans:2,exp:"The Formulas paste option pastes only the formula — without any cell formatting (colours, borders, fonts). This is different from regular Paste which copies everything, and from Values which copies only the result."},
{q:"How do you insert a Function using the Insert Function button in MS Excel?",opts:["Click on the cell → type the function name directly starting with = → press Tab to autocomplete","Click Insert → Table → select the function type from the dropdown and configure parameters","Select a cell → Click the Insert Function button → search for or select a function from a category → Click OK → fill in Function Arguments → Click OK","Press Ctrl+F to open the Find dialog → search for the function name → click Insert to add it"],ans:2,exp:"To insert a function: Select a cell → Click the Insert Function button (fx) → search for or select a function from a category → Click OK → the Function Arguments dialog opens → fill in the required arguments (range, criteria, etc.) → Click OK."},
{q:"What does the COUNT function do in MS Excel?",opts:["It counts all cells in a range regardless of whether they contain numbers, text, or are empty","It counts the number of cells in a range that contain numbers only — ignoring text and blank cells","It counts only the cells that meet a specific condition specified in the function criteria","It counts the total characters across all cells in the specified range including spaces"],ans:1,exp:"COUNT counts only cells that contain numbers in the specified range — it ignores cells with text and empty cells. Example: =COUNT(A1:A10) returns how many cells in A1:A10 contain numeric values."},
{q:"What is the difference between COUNTIF and COUNT in MS Excel?",opts:["COUNTIF and COUNT are identical functions — COUNTIF is simply a newer name for COUNT","COUNT counts numbers only — COUNTIF counts cells based on one specific condition/criteria, and can count cells containing text as well","COUNTIF counts all cells including empty ones — COUNT only counts cells with numbers above zero","COUNT works on a single cell only — COUNTIF works on entire columns and rows"],ans:1,exp:"COUNT counts only numeric cells. COUNTIF counts cells that meet one condition — and importantly, cells can contain text as well. Example: =COUNTIF(A1:A10,\">9\") counts cells where the value is greater than 9."},
{q:"What does the COUNTIFS function do in MS Excel and how does it differ from COUNTIF?",opts:["COUNTIFS is identical to COUNTIF — the S is added only for grammatical consistency in multiple-sheet scenarios","COUNTIFS counts cells based on multiple criteria simultaneously — while COUNTIF only handles one condition at a time","COUNTIFS sums values that meet a condition — while COUNTIF only counts the number of cells","COUNTIFS applies to an entire workbook — while COUNTIF only works within a single worksheet"],ans:1,exp:"COUNTIFS counts cells based on multiple criteria at the same time. Example: =COUNTIFS(A1:A10,\"Green\",B1:B10,\">9\") counts cells that are both Green AND have a value higher than 9. COUNTIF handles one criterion only."},
{q:"What does the SUMIF function do in MS Excel?",opts:["SUMIF adds all values in a range regardless of any conditions — identical in result to the SUM function","SUMIF sums cells that meet multiple criteria specified across multiple ranges simultaneously","SUMIF sums cells based on one condition/criteria — for example, summing only values higher than 9","SUMIF calculates a conditional average rather than a sum based on the specified criteria"],ans:2,exp:"SUMIF sums cells that meet one condition. Example: =SUMIF(A1:A10,\">9\",B1:B10) sums the values in B1:B10 where the corresponding values in A1:A10 are greater than 9. The first argument is the range to check, second is the condition, third is the range to sum."},
{q:"What does the SUMIFS function do, and what is the order of its arguments?",opts:["SUMIFS sums a range based on one condition — the first argument is the criteria, the second is the range to sum","SUMIFS sums cells based on multiple criteria — the FIRST argument is the range to sum, followed by condition range and criteria pairs","SUMIFS calculates the average of cells meeting multiple conditions — it does not perform any addition","SUMIFS sums all values in multiple ranges and adds them together into one total result"],ans:1,exp:"SUMIFS sums based on multiple criteria. Crucially, the FIRST argument is the range to sum — unlike SUMIF where the sum range comes last. Example: =SUMIFS(C1:C10, A1:A10,\"Blue\", B1:B10,\"Green\") sums C values where A is Blue AND B is Green."},
{q:"What does the IF function do in MS Excel?",opts:["The IF function calculates the average of a range only if the values meet a minimum threshold","The IF function checks whether a condition is met and returns one value if TRUE and another value if FALSE","The IF function counts the number of cells that satisfy a given logical condition in the range","The IF function automatically fills a range of cells with a sequence based on a logical pattern"],ans:1,exp:"The IF function tests a condition and returns different values based on the result. Syntax: =IF(condition, value_if_true, value_if_false). Example: =IF(A1>10,\"Correct\",\"Incorrect\") returns 'Correct' if A1 is greater than 10, otherwise 'Incorrect'."},
{q:"What does the AND function return in MS Excel, and when does it return FALSE?",opts:["AND returns a number — the count of conditions that are true. It returns 0 when all conditions are false","AND returns TRUE if ALL conditions are true — it returns FALSE if ANY one of the conditions is false","AND returns TRUE if ANY condition is true — it returns FALSE only if ALL conditions are simultaneously false","AND returns the text 'AND' if conditions match and returns a blank cell if any condition fails"],ans:1,exp:"AND returns TRUE only when ALL conditions it tests are true. If even one condition is false, it returns FALSE. Example: =AND(A1>0, B1>5) returns TRUE only if both A1 is greater than 0 AND B1 is greater than 5. AND and OR can check up to 255 conditions."},
{q:"What does the OR function return in MS Excel, and when does it return FALSE?",opts:["OR returns TRUE only when ALL conditions are true — exactly the same behaviour as the AND function","OR returns TRUE if ANY of the conditions is TRUE — it returns FALSE only if ALL conditions are false","OR returns the number of conditions that evaluated to TRUE rather than a simple TRUE or FALSE","OR returns FALSE when any condition fails — identical to the AND function but with different syntax"],ans:1,exp:"OR returns TRUE if ANY condition is true. It returns FALSE only when ALL conditions are false. Example: =OR(A1>10, B1>5) returns TRUE if either A1 is greater than 10 OR B1 is greater than 5 (or both). AND and OR can check up to 255 conditions."},
{q:"What does the AVERAGE function calculate in MS Excel?",opts:["It finds the highest value in the specified range — the maximum of all included cells","It finds the middle value in a sorted range — splitting the range into two equal halves","It calculates the arithmetic mean — adding all values in the range and dividing by the count","It finds the most frequently occurring value in the specified range of cells"],ans:2,exp:"AVERAGE calculates the arithmetic mean of a range — it adds all values and divides by the count. Example: =AVERAGE(A1:A5) sums all values in A1 through A5 and divides by 5. It ignores empty cells and cells containing text."},
{q:"What does the AVERAGEIF function do, and what does the condition <> mean?",opts:["AVERAGEIF calculates the average of all values including zeros — <> means 'equals zero'","AVERAGEIF averages cells based on one condition — <> means 'not equal to', so <> 0 means excluding zeros","AVERAGEIF averages cells across multiple conditions — <> means 'greater than or equal to' a value","AVERAGEIF calculates the average only for positive values — <> means 'strictly greater than' zero"],ans:1,exp:"AVERAGEIF averages cells that meet one condition. <> means 'not equal to'. Example: =AVERAGEIF(A1:A10,\"<>0\") calculates the average of all values in A1:A10 excluding zeros — the condition \"<>0\" means 'not equal to zero'."},
{q:"What does the MEDIAN function find in MS Excel?",opts:["The most frequently occurring number in the range — the value that appears more than any other","The arithmetic mean of all values — the total divided by the count of numbers in the range","The largest value in the range — the maximum number across all included cells","The middle number in a sorted range — if even count, the average of the two middle numbers"],ans:3,exp:"MEDIAN finds the middle value when numbers are arranged in order. If there is an odd count, it returns the middle number. If even count, it returns the average of the two middle numbers. Example: for {1,2,3,4,5} the median is 3."},
{q:"What does the MODE function find in MS Excel?",opts:["The average of all values in the range — calculated by summing and dividing by the count","The middle value in a sorted range — splitting the dataset into two equal halves","The minimum value in the range — the smallest number across all included cells","The most frequently occurring number in the range — the value that appears most often"],ans:3,exp:"MODE finds the most frequently occurring value in a range. Example: in {1,2,2,3,4,2,5} the mode is 2 because it appears three times — more than any other value. If no value repeats, MODE returns an error."},
{q:"What does the STDEV function (STEDV) calculate in MS Excel?",opts:["It calculates the arithmetic mean of all values in the specified range of cells","It calculates the standard deviation — a measure of how spread out or dispersed the values are","It calculates the variance — the average of the squared differences from the mean","It counts how many values fall within one standard deviation of the mean value"],ans:1,exp:"STDEV (sometimes written STEDV) calculates the standard deviation of a range — a statistical measure of how spread out or dispersed the values are from the average. A small standard deviation means values are clustered close to the mean; large means they are spread out."},
{q:"What does the LARGE function do in MS Excel, and give an example?",opts:["LARGE finds the most frequently occurring value — =LARGE(A1:A10,3) finds the value that appears 3 times","LARGE returns the largest value in a range — =LARGE(A1:A10,3) is identical to =MAX(A1:A10)","LARGE finds the Nth largest value — =LARGE(A1:A10,3) finds the third largest number in A1:A10","LARGE sums the top N values — =LARGE(A1:A10,3) sums the three largest values in the range"],ans:2,exp:"LARGE finds the Nth largest value in a range. Syntax: =LARGE(range, n). Example: =LARGE(A1:A10,3) returns the third largest number in A1:A10. This is different from MAX which only finds the absolute largest (equivalent to LARGE with n=1)."},
{q:"What does the SMALL function do in MS Excel?",opts:["SMALL returns the arithmetic mean of the smallest values in a range","SMALL finds the Nth smallest value in a range — opposite of the LARGE function","SMALL returns only the minimum value — identical in result to the MIN function always","SMALL counts the number of values that are below the average of the range"],ans:1,exp:"SMALL finds the Nth smallest value in a range. Syntax: =SMALL(range, n). Example: =SMALL(A1:A10,2) returns the second smallest value. SMALL is the opposite of LARGE. SMALL with n=1 gives the same result as MIN."},
{q:"What is the formula bar in MS Excel and what does it display?",opts:["A toolbar at the top of the screen containing the most frequently used formatting buttons","A bar at the bottom of the screen showing the current page number and zoom level","A display area that shows the data or formula stored in the currently active cell","A bar on the right side of the screen showing the scroll position in a large worksheet"],ans:2,exp:"The formula bar is located above the worksheet grid. It displays the data or formula stored in the active cell. When you click a cell containing a formula, the formula bar shows the formula (e.g. =SUM(A1:A10)) while the cell itself displays the result."},
{q:"How many columns and rows does Excel 2007 support compared to Excel 2003?",opts:["Excel 2007 has 512 columns and 131,072 rows — double the capacity of Excel 2003","Excel 2007 has the same 256 columns and 65,536 rows as Excel 2003 — capacity did not change","Excel 2003: 256 columns, 65,536 rows. Excel 2007: 16,384 columns, 1,048,576 rows","Excel 2007 has 1,024 columns and 524,288 rows — four times the capacity of Excel 2003"],ans:2,exp:"Excel 2003: 256 columns and 65,536 rows. Excel 2007 massively increased this to 16,384 columns (up to column XFD) and 1,048,576 rows — a dramatic expansion enabling much larger datasets."},
{q:"What is Sort Ascending and Sort Descending in MS Excel?",opts:["Sort Ascending arranges records from largest to smallest — Sort Descending arranges from smallest to largest","Sort Ascending arranges records from Z to A or largest to smallest — Sort Descending from A to Z","Sort Ascending arranges records from A to Z or smallest to largest — Sort Descending from Z to A or largest to smallest","Sort Ascending is for text only — Sort Descending is for numbers only in MS Excel"],ans:2,exp:"Sort Ascending arranges data from A to Z (alphabetically) or smallest to largest (numerically). Sort Descending arranges from Z to A or largest to smallest. Sorting organises or rearranges data in a logical sequence."},
{q:"What is the Fill Handle in MS Excel and what can it be used for?",opts:["The Fill Handle is the AutoSum button in the toolbar — used to automatically add a column of numbers","The Fill Handle is the Name Box on the left of the formula bar — used to identify the active cell","The Fill Handle is a small black box at the lower right corner of a selected cell — used to copy data, copy formulas to adjacent cells, and create a series","The Fill Handle is the cell border that turns green when a formula contains an error"],ans:2,exp:"The Fill Handle is the small black square at the lower right corner of a selected cell. Drag it to: copy data to adjacent cells, copy formulas (with auto-adjusted references), or create a series (e.g. drag 1,2 to continue 3,4,5...). It is one of Excel's most time-saving features."},
{q:"What is a Worksheet Tab in MS Excel?",opts:["A tab at the top of the screen showing which Ribbon tab is currently active","A label at the bottom of the screen that identifies each open worksheet in the workbook, located in the lower left corner","A bookmark feature that marks important cells for quick navigation during editing","A toolbar that appears when a chart is selected, containing chart-specific formatting tools"],ans:1,exp:"A Worksheet Tab identifies each worksheet in the workbook — it appears at the bottom of the Excel screen in the lower left corner. By default they are named Sheet1, Sheet2, Sheet3. You can double-click a tab to rename it."},
{q:"What does Sorting do in MS Excel and what are the two directions?",opts:["Sorting applies conditional formatting to highlight cells that meet a specified condition","Sorting filters rows to show only data that meets a criteria — hiding all non-matching rows","Sorting organises or rearranges data in either ascending or descending order — A to Z or smallest to largest, and Z to A or largest to smallest","Sorting groups related rows together and inserts subtotals between each group automatically"],ans:2,exp:"Sorting organises data in a logical sequence. Ascending: A to Z (text) or smallest to largest (numbers). Descending: Z to A or largest to smallest. Sorting is applied from the Data tab or the Sort & Filter button in the Home tab."},
{q:"What are charts in MS Excel used for?",opts:["Charts are used to protect worksheet data by hiding it inside a graphical format","Charts are formatting templates applied to cells to change their colour and border style","Charts are graphic representations used to compare and contrast worksheet data visually","Charts are report layouts that automatically format printed output for professional presentation"],ans:2,exp:"Charts in MS Excel are graphic representations used to compare and contrast worksheet data. They make it easier to identify trends, patterns, and comparisons visually. Types include bar, column, line, pie, and scatter charts."}
];
let order=[],cur=0,picks={},playerName='',score=0;
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function goBack(){if(confirm('Quit quiz and return to subjects?'))window.location.href='index.html';}
function startQuiz(){const inp=document.getElementById('name-input').value.trim();playerName=inp||'Anonymous';order=shuffle(BANK.map((_,i)=>i));cur=0;picks={};score=0;document.getElementById('q-total').textContent=BANK.length;show('quiz-screen');render();}
function render(){const idx=order[cur],q=BANK[idx],total=BANK.length;document.getElementById('q-num').textContent=cur+1;document.getElementById('q-score').textContent=score;document.getElementById('q-label').textContent=`Question ${cur+1} of ${total}`;document.getElementById('q-text').textContent=q.q;document.getElementById('progress-fill').style.width=((cur/total)*100)+'%';document.getElementById('explanation').className='explanation';document.getElementById('explanation').textContent='';document.getElementById('next-btn').className='next-btn';document.getElementById('quit-btn').className='quit-btn';const letters=['A','B','C','D'],optEl=document.getElementById('options');optEl.innerHTML='';shuffle([0,1,2,3]).forEach((oi,li)=>{const btn=document.createElement('button');btn.className='opt-btn';btn.dataset.opt=oi;btn.innerHTML=`<span class="opt-letter">${letters[li]}</span><span>${q.opts[oi]}</span>`;btn.onclick=()=>selectAnswer(oi,idx);optEl.appendChild(btn);});}
function selectAnswer(chosen,idx){const q=BANK[idx],correct=chosen===q.ans;picks[idx]=chosen;if(correct)score++;document.getElementById('q-score').textContent=score;document.querySelectorAll('.opt-btn').forEach(btn=>{btn.disabled=true;const oi=parseInt(btn.dataset.opt);if(oi===q.ans)btn.classList.add('correct');else if(oi===chosen&&!correct)btn.classList.add('wrong');});if(!correct){const e=document.getElementById('explanation');e.textContent='✗ '+q.exp;e.classList.add('show');}const nb=document.getElementById('next-btn');nb.classList.add('show');nb.textContent=cur+1<BANK.length?'Next Question →':'See Results →';document.getElementById('quit-btn').classList.add('show');}
function nextQuestion(){cur++;if(cur>=BANK.length)showResults();else{render();window.scrollTo(0,0);}}
function showResults(){show('results-screen');const total=BANK.length,pct=Math.round((score/total)*100),passed=pct>=70;document.getElementById('result-name').textContent=playerName;document.getElementById('ring-pct').textContent=pct+'%';document.getElementById('ring-pct').style.color=passed?'var(--green)':'var(--red)';document.getElementById('ring-fill').style.stroke=passed?'var(--green)':'var(--red)';setTimeout(()=>{document.getElementById('ring-fill').style.strokeDashoffset=439.82-(439.82*pct/100);},100);document.getElementById('res-title').textContent=pct>=90?'Excellent!':pct>=70?'Passed!':'Needs Work';document.getElementById('res-sub').textContent=`${score} correct out of ${total} questions`;const v=document.getElementById('res-verdict');if(passed){v.textContent='✓ You passed — score above 70%';v.className='result-verdict pass';}else{v.textContent='✗ Below 70% — please retake the quiz';v.className='result-verdict fail';}const rv=document.getElementById('review');rv.innerHTML='<h3>Review</h3>';order.forEach(idx=>{const q=BANK[idx],ua=picks[idx],ok=ua===q.ans;const d=document.createElement('div');d.className='rv-item '+(ok?'ok':'miss');d.innerHTML=`<div class="rv-q">${q.q}</div><div class="rv-a">${ok?`<span class="c">✓ Correct: ${q.opts[q.ans]}</span>`:`<span class="w">✗ You chose: ${ua!==undefined?q.opts[ua]:'Skipped'}</span><br><span class="c">✓ Correct: ${q.opts[q.ans]}</span><br><span style="color:var(--muted)">${q.exp}</span>`}</div>`;rv.appendChild(d);});}
function retryQuiz(){order=shuffle(order);cur=0;picks={};score=0;document.getElementById('q-score').textContent=0;show('quiz-screen');render();}
document.getElementById('name-input').addEventListener('keydown',e=>{if(e.key==='Enter')startQuiz();});
</script>
