<!DOCTYPE html>

<title>Introduction to Computer Advanced — July 2026 Exam</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap');
  :root{--bg:#080810;--surface:#11111f;--border:#1e1e35;--purple:#7c3aed;--purple-l:#9d5bf0;--green:#22c55e;--red:#ef4444;--text:#e8e8f0;--muted:#7070a0;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:.4;pointer-events:none;z-index:0;}
  .screen{position:relative;z-index:1;width:100%;max-width:660px;margin:0 auto;padding:24px 20px 48px;display:none;}
  .screen.active{display:block;}
  #name-screen{text-align:center;padding-top:80px;}
  .back-link{display:inline-flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);text-decoration:none;letter-spacing:1px;margin-bottom:48px;transition:color .2s;}
  .back-link:hover{color:var(--purple-l);}
  .subject-tag{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--purple-l);margin-bottom:12px;}
  #name-screen h1{font-size:clamp(22px,5vw,36px);font-weight:800;line-height:1.15;margin-bottom:8px;background:linear-gradient(135deg,#fff 30%,var(--purple-l));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  #name-screen p{color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;margin-bottom:40px;}
  .name-box{display:flex;flex-direction:column;align-items:center;gap:12px;}
  .name-box input{width:100%;max-width:320px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Syne',sans-serif;font-size:15px;outline:none;text-align:center;transition:border-color .2s;}
  .name-box input:focus{border-color:var(--purple);}
  .name-box input::placeholder{color:var(--muted);}
  .btn-primary{padding:12px 32px;background:var(--purple);color:#fff;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:background .2s,transform .1s;letter-spacing:.5px;}
  .btn-primary:hover{background:var(--purple-l);transform:translateY(-1px);}
  .quiz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
  .quiz-meta{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
  .quiz-meta span{color:var(--purple-l);font-weight:500;}
  .quiz-back{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);background:none;border:1px solid var(--border);padding:5px 10px;border-radius:6px;cursor:pointer;transition:color .2s,border-color .2s;}
  .quiz-back:hover{color:var(--text);border-color:var(--purple);}
  .progress-bar{width:100%;height:3px;background:var(--border);border-radius:2px;margin-bottom:32px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--purple-l));border-radius:2px;transition:width .3s ease;}
  .question-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--purple-l);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
  .question-text{font-size:clamp(15px,3vw,18px);font-weight:600;line-height:1.5;margin-bottom:28px;color:var(--text);}
  .options{display:flex;flex-direction:column;gap:10px;}
  .opt-btn{display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;font-weight:400;cursor:pointer;text-align:left;transition:border-color .15s,background .15s;width:100%;}
  .opt-btn:hover:not(:disabled){border-color:var(--purple);background:#16162a;}
  .opt-btn .opt-letter{flex-shrink:0;width:26px;height:26px;border-radius:6px;background:var(--border);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);transition:background .15s,color .15s;}
  .opt-btn:hover:not(:disabled) .opt-letter{background:var(--purple);color:#fff;}
  .opt-btn.correct{border-color:var(--green);background:rgba(34,197,94,.1);}
  .opt-btn.correct .opt-letter{background:var(--green);color:#fff;}
  .opt-btn.wrong{border-color:var(--red);background:rgba(239,68,68,.1);}
  .opt-btn.wrong .opt-letter{background:var(--red);color:#fff;}
  .opt-btn:disabled{cursor:default;}
  .explanation{display:none;margin-top:16px;padding:14px 16px;background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.25);border-left:3px solid var(--purple);border-radius:8px;font-size:13px;line-height:1.6;color:#c4b5fd;font-family:'DM Mono',monospace;}
  .explanation.show{display:block;}
  .action-row{display:flex;gap:10px;margin-top:24px;}
  .next-btn{flex:1;padding:13px;background:var(--purple);color:#fff;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;display:none;transition:background .2s;letter-spacing:.5px;}
  .next-btn:hover{background:var(--purple-l);}
  .next-btn.show{display:block;}
  .quit-btn{padding:13px 18px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;display:none;transition:color .2s,border-color .2s;white-space:nowrap;}
  .quit-btn:hover{color:var(--text);border-color:var(--purple);}
  .quit-btn.show{display:block;}
  #results-screen{text-align:center;padding-top:40px;}
  .result-name{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);margin-bottom:32px;}
  .score-ring{position:relative;width:160px;height:160px;margin:0 auto 28px;}
  .score-ring svg{transform:rotate(-90deg);}
  .score-ring .ring-bg{fill:none;stroke:var(--border);stroke-width:10;}
  .score-ring .ring-fill{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1s ease,stroke .5s;}
  .score-ring .ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .ring-pct{font-size:34px;font-weight:800;line-height:1;}
  .ring-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:4px;letter-spacing:1px;}
  .result-title{font-size:24px;font-weight:800;margin-bottom:8px;}
  .result-sub{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);margin-bottom:8px;}
  .result-verdict{font-family:'DM Mono',monospace;font-size:12px;padding:8px 20px;border-radius:20px;display:inline-block;margin-bottom:32px;}
  .result-verdict.pass{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.3);}
  .result-verdict.fail{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.3);}
  .result-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:40px;}
  .btn-outline{padding:11px 24px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:border-color .2s,color .2s;}
  .btn-outline:hover{border-color:var(--purple);color:var(--text);}
  .review{text-align:left;}
  .review h3{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:16px;font-family:'DM Mono',monospace;}
  .rv-item{padding:14px 16px;border-radius:8px;margin-bottom:10px;border:1px solid var(--border);}
  .rv-item.ok{border-color:rgba(34,197,94,.25);background:rgba(34,197,94,.05);}
  .rv-item.miss{border-color:rgba(239,68,68,.25);background:rgba(239,68,68,.05);}
  .rv-q{font-size:13px;font-weight:600;margin-bottom:8px;line-height:1.4;}
  .rv-a{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);line-height:1.6;}
  .rv-a .c{color:var(--green);}
  .rv-a .w{color:var(--red);}
</style>
</head>

<script>
const BANK=[
{q:"What is Data in the context of computing?",opts:["Data is information that has already been processed and is meaningful and useful to the person receiving it","Data is the final output of any computer operation sent to a printer or display for the user to read","Data refers to raw or unprocessed facts about anything — it does not make sense until it is processed","Data is the set of instructions written by a programmer that tells the computer what operations to perform"],ans:2,exp:"Data refers to raw or unprocessed facts about anything. Data does not make sense on its own — for example, individual letters e, t, g, r or hours worked by an employee are data. The singular of data is datum."},
{q:"What is Information in the context of computing?",opts:["Information is raw unprocessed facts entered into the computer through an input device such as a keyboard","Information is the set of program instructions stored in ROM that the computer follows during startup","Information is data that has been processed in such a way that it is meaningful and useful to the person who receives it","Information is the physical storage medium — such as a hard disk or USB drive — that holds processed data"],ans:2,exp:"Information is data that has been processed to become meaningful and useful. For example, a pay slip showing gross pay, tax, and net pay is information — it was produced by processing the raw data of hours worked and pay rates. Information is also known as output."},
{q:"What is another name for Data when it enters a computer, and what is another name for Information when it leaves?",opts:["Data is called a program and information is called a function — these are the standard computing terms used","Data is also referred to as input, and information is also referred to as output","Data is called a field and information is called a record — based on database terminology","Data is called a bit and information is called a byte — based on the binary measurement system"],ans:1,exp:"Data may also be referred to as input — it enters the computer through an input device. Information is referred to as output — it is the end product of data processing, delivered through an output device such as a printer or monitor."},
{q:"Which early calculating device was developed by the Chinese as early as 500 BC?",opts:["The Slide Rule — an analog calculating device invented using the principle of John Napier's Table of Logarithm","The Difference Machine — developed by Charles Babbage for calculating and printing mathematical tables","The Abacus — an early calculating device developed by the Chinese as early as 500 BC","The Analytical Engine — developed by Charles Babbage containing memory, arithmetic and logical units"],ans:2,exp:"The Abacus was developed by the Chinese as early as 500 BC and is one of the earliest known calculating devices. It uses beads on rods to perform arithmetic calculations."},
{q:"Who invented the Table of Logarithm and what was it used for?",opts:["Charles Babbage (1792–1871) invented it for calculating and printing large mathematical tables automatically","William Oughtred (1574–1760) invented it as an analog slide rule for quick multiplication and division","John Napier (1550–1617) invented it as a machine for easy calculation, multiplication, and division of large numbers","Blaise Pascal (1623–1662) invented it at age 19 to assist with addition and subtraction of columns of figures"],ans:2,exp:"John Napier (1550–1617) invented the Table of Logarithm — a machine designed for easy calculation, multiplication, and division of large numbers. William Oughtred later used Napier's principles to create the Slide Rule."},
{q:"Who invented the Slide Rule, and what principle was it based on?",opts:["Charles Babbage invented it based on the principle of binary number representation using 0s and 1s","Blaise Pascal invented it based on mechanical gear rotation for carrying digits in addition operations","John Napier invented it based on his own Table of Logarithm as an analogue calculating device","William Oughtred invented it between 1574–1760 in 1620, using the principle of John Napier's Table of Logarithm"],ans:3,exp:"The Slide Rule was invented by William Oughtred between 1574–1760 in 1620. It is an analog calculating device based on the principle of John Napier's Table of Logarithm."},
{q:"Who introduced the first Digital Calculating Machine, at what age, and what could it do?",opts:["Charles Babbage introduced it at age 40 — it could perform multiplication, division, and square root calculations","John Napier introduced it at age 25 — it could calculate logarithmic tables for navigation and astronomy","William Oughtred introduced it at age 30 — it could add, subtract, multiply, and divide numbers automatically","Blaise Pascal (1623–1662) introduced it at age 19 — it could assist in the addition and subtraction of columns of figures"],ans:3,exp:"Blaise Pascal, a French man (1623–1662), introduced the first Digital Calculating Machine at the age of 19. It was designed to assist in the addition and subtraction of columns of figures."},
{q:"Why is Charles Babbage known as the Father of Modern Computers?",opts:["Because he invented the first electronic vacuum tube computer that processed binary data at high speed","Because he developed the Slide Rule which became the foundation for all modern analog computing devices","Because in 1833 he developed the Analytical Engine containing computer components: memory, arithmetic and logical unit, and input/output devices","Because he invented the first programming language that allowed humans to communicate instructions to machines"],ans:2,exp:"Charles Babbage is known as the Father of Modern Computers because in 1833 he modified his Difference Machine into the Analytical Engine — which contained key computer components: memory, an arithmetic and logical unit, input devices, and output devices, with instructions coded on cards."},
{q:"What were the key characteristics of First Generation computers (1945–1949)?",opts:["They used transistors, were smaller and faster, made use of high level languages, and emitted less heat","They used microprocessors, were roughly a hundred times smaller, and were the most powerful of all generations","They used integrated circuits (ICs), gave rise to more developments in hardware, and were faster than previous generations","They used electronic vacuum tubes (valves), occupied large space, generated a lot of heat, were slow, and had memory"],ans:3,exp:"First Generation computers (1945–1949) used electronic valves (vacuum tubes) for their circuits. They had memory but occupied a large space, generated a lot of heat, required a lot of energy, and were slow compared to later generations."},
{q:"What technology did Second Generation computers (1950–1960) use, and how did they improve on the first?",opts:["They used integrated circuits (ICs) replacing vacuum tubes, giving rise to more developments in hardware technology","They used vacuum tubes but with improved cooling systems that reduced heat generation significantly","They used transistors — they were smaller, faster, less expensive, emitted less heat, used high level languages, and had higher processing speed","They used microprocessors — they were a hundred times smaller, more powerful, and introduced the personal computer concept"],ans:2,exp:"Second Generation computers (1950–1960) used transistors. They were smaller, faster, less expensive, and emitted less heat than vacuum tubes. They also made use of high level programming languages and had higher processing speeds than first generation computers."},
{q:"What technology did Third Generation computers (late 1960s–early 1970s) use?",opts:["Transistors replacing vacuum tubes — making computers smaller, faster, and less expensive than before","Microprocessors and microcomputers — the era of personal computing and fourth generation evolution","Integrated circuits (ICs) replacing transistors — making computers more durable and faster than first generation","Artificial intelligence and neural networks — making computers capable of learning from their own experience"],ans:2,exp:"Third Generation computers (late 1960s–early 1970s) used integrated circuits (ICs), which replaced transistors. This led to more developments in hardware technology and made computers more durable and faster than first generation computers."},
{q:"What were Fourth Generation computers (1975–1990) known for?",opts:["Using vacuum tubes that had been miniaturised to fit inside chips no larger than a fingernail","Using transistors arranged in parallel to achieve processing speeds far beyond second generation computers","Using microprocessors — the era of micro computers, roughly a hundred times smaller yet more powerful than previous generations","Using integrated circuits combined with laser memory storage for unprecedented data retrieval speeds"],ans:2,exp:"Fourth Generation computers (1975–1990) were the era of microprocessors and micro computers. They were roughly a hundred times smaller than previous generations yet more powerful. This is when personal computers (PCs) emerged."},
{q:"What are Supercomputers used for, and give an example?",opts:["They are used for personal home computing, word processing, and basic internet browsing by individual users","They are scaled-down versions of mainframes used in small businesses to support up to 200 simultaneous users","They are the fastest computers — used for weather forecasting, biomedical research, and aircraft design. An example is Paragon from International Corporation in USA","They are mid-range computers used by banks and insurance companies for record keeping and account balancing"],ans:2,exp:"Supercomputers are at the top of the computer range — the fastest computers, performing hundreds of calculations per second. They were initially used for designing weapons, and are now used for weather forecasting, biomedical research, and aircraft design. Example: Paragon from International Corporation in USA."},
{q:"What are Mainframe Computers and what are their limitations?",opts:["They are the smallest and cheapest computers — limitations include limited processing speed and maximum 10 simultaneous users","They are powerful computers that operate at high speed, have large storage, and support hundreds to thousands of simultaneous users — limitations: very expensive, not portable, generate a lot of heat","They are personal computers used at home or in the office — limitations include being less durable than supercomputers","They are mid-range computers designed for up to 200 users — limitations include high cost and inability to run standard software"],ans:1,exp:"Mainframe computers are more powerful than minicomputers, operating at very high speed with large storage capacity — they can support hundreds or thousands of simultaneous users. Limitations: they are very expensive, not portable, and generate a lot of heat."},
{q:"How many users can a Minicomputer typically support simultaneously?",opts:["Only one user at a time — minicomputers are single-user systems designed for dedicated workstation use","Up to ten users simultaneously — making them suitable for small departmental workgroups","Up to two hundred (200) users simultaneously — they are scaled-down mainframes larger than PCs","Unlimited users simultaneously — because minicomputers use distributed processing architecture"],ans:2,exp:"Minicomputers can support more than one user at a time — usually up to two hundred (200) users. They are considered scaled-down versions of mainframe computers and are larger and more costly than personal computers (PCs)."},
{q:"What are the three types of Microcomputer (Personal Computer)?",opts:["Mainframe, Minicomputer, and Supercomputer — the three standard categories of personal computing devices","Server, Workstation, and Terminal — the three roles a microcomputer can play in a networked environment","Desktop, Laptop, and Palmtop — the three types of microcomputer available for personal use","Tower, Slim, and All-in-One — the three physical form factors for desktop personal computers"],ans:2,exp:"The three types of Microcomputer (Personal Computer) are: Desktop, Laptop, and Palmtop. Microcomputers are called personal computers because they can be used at home or in an office environment."},
{q:"What is a Special Purpose Computer?",opts:["A computer designed to run only one operating system — it cannot be upgraded to run any alternative software","A computer designed for a particular job or to solve problems of a restricted nature — such as air traffic control or road traffic systems","A computer designed exclusively for scientific research that cannot be used for any commercial or business application","A computer that requires a specialist operator — it cannot be used by untrained members of the general public"],ans:1,exp:"A Special Purpose Computer is designed for a particular job or to solve problems of a restricted nature — for example, computers designed for Air Traffic Control or Road Traffic management. They cannot be used for general tasks."},
{q:"What is an Analogue Computer, and give three examples?",opts:["A computer that processes only numbers — examples are calculator, mobile handset, and microcomputer","A computer used for commercial data processing — examples are desktop PC, laptop, and mainframe computer","A computer used in scientific and engineering work to measure physical quantities — it has no memory. Examples: stopwatch, thermometer, speedometer","A computer that combines both digital and analogue functions — examples are modern television sets, robots, and medical scanners"],ans:2,exp:"Analogue computers are used in scientific and engineering work to measure physical quantities proportional to variables such as temperature, pressure, and voltage. They do not have memory facilities. Examples: stopwatch, thermometer, speedometer, electric meter, stabiliser, and regulator."},
{q:"What is a Hybrid Computer and give an example?",opts:["A computer that processes only binary data using electronic circuits — used exclusively for scientific calculations","A portable computer combining the features of a laptop and a tablet — operated by both keyboard and touch screen","A computer that combines the properties of both digital and analogue computers — an example is a modern television set or a Robot used in an industrial environment","A computer that operates using two different operating systems simultaneously — allowing the user to switch between them"],ans:2,exp:"A Hybrid Computer combines the properties of both digital and analogue computers. Example: a modern television set — selecting a channel is digital, storing the station is analogue. A Robot used in an industrial environment is another example."},
{q:"What are the three components of the CPU and what does each do?",opts:["Input Unit (IU), Output Unit (OU), and Storage Unit (SU) — handling data entry, result delivery, and permanent data storage","Memory Unit (MU), Control Unit (CU), and Arithmetic Logical Unit (ALU) — providing fast memory access, retrieving and decoding instructions, and carrying out arithmetic calculations","Processing Unit (PU), Display Unit (DU), and Communication Unit (CU) — processing data, displaying results, and managing network connections","Central Unit (CU), Peripheral Unit (PU), and Relay Unit (RU) — managing the main processor, connecting devices, and transferring signals"],ans:1,exp:"The three CPU components are: Memory Unit (MU) — provides very fast access to operations; Control Unit (CU) — locates and retrieves instructions from memory one at a time; Arithmetic Logical Unit (ALU) — carries out all arithmetic and logical calculations."},
{q:"What is Cold Booting?",opts:["Restarting the computer by pressing the reset button or using the keyboard shortcut Ctrl+Alt+Delete","Starting the computer from a previously saved state using hibernate or sleep mode recovery","Starting the computer from its state of rest by pressing both the CPU and VDU power buttons — the computer has been completely powered off","Booting the computer from an external USB drive or CD/DVD containing an alternative operating system"],ans:2,exp:"Cold Booting is starting the computer from its state of rest — pressing both power buttons (CPU and VDU) when the system is completely powered off. It is the normal startup process when the computer has been fully shut down."},
{q:"What is Warm Booting?",opts:["Starting the computer after a cold restart by pressing the CPU power button only — the VDU remains on","Turning on the monitor only while the CPU remains in sleep mode to resume from where work left off","Pressing the reset button to restart, or using the keyboard shortcut Ctrl+Alt+Delete to restart the computer without fully powering it off","Booting the computer using a disc or USB drive that contains a full operating system environment"],ans:2,exp:"Warm Booting is restarting the computer without fully powering it off — either by pressing the reset button or using the keyboard shortcut Ctrl+Alt+Delete. The system restarts without going through a complete cold start."},
{q:"What is a Computer Virus?",opts:["A hardware fault caused by overheating that corrupts stored data and causes random system errors","A type of application software that protects the computer from unauthorised access and data theft","An actively infectious computer program that destroys valuable data and programs by placing copies of itself into other applications and programs","A network configuration error that prevents the computer from connecting to the internet or local network"],ans:2,exp:"A computer virus is an actively infectious computer program that destroys valuable data and programs. It places copies of itself into other applications and programs, spreading the infection. Once an infected program is executed, the virus reaches RAM and infects subsequent programs."},
{q:"Which of the following are effects of a Computer Virus?",opts:["It speeds up processing, increases available memory, and automatically updates the operating system","It corrupts data in files, causes improper display on the VDU, deletes files, increases file sizes, slows the computer, and causes abnormal system behaviour","It encrypts all files and makes them read-only, preventing any further modifications by the user","It disables the keyboard and mouse, preventing any user input while displaying a ransom message"],ans:1,exp:"Effects of a virus include: corrupting data in files, causing improper VDU display, deleting files from the disk, increasing file sizes, making the computer very slow, and causing abnormal system behaviour such as tripping off the system."},
{q:"What is Anti-virus software and give three examples?",opts:["Software that speeds up internet browsing by removing unnecessary cookies and temporary files from the browser","Software that detects and cleans only the viruses it has been programmed to detect — examples: Avast, Norton, Kaspersky","Software that creates encrypted backup copies of all files to protect against accidental deletion or disk failure","Software that monitors network traffic and blocks unauthorised external access to the computer system"],ans:1,exp:"Anti-virus software detects and cleans only viruses it has been programmed to detect — it can only identify viruses known at the time it was written. Examples include: Avast, Norton (Kaspersky), and Avira."},
{q:"In which area of human life is computer used for diagnosing patients, performing operations, and keeping patient records?",opts:["Engineering — where computers assist with structural designs and precise measurements for construction projects","Government — where computers are used for census data compilation, budget planning, and economic forecasting","Law profession — where records of past cases are stored for easy access and reference by lawyers","Medicine — where computers are used for diagnosing patients, assisting in operations, and maintaining patient records"],ans:3,exp:"In Medicine, computers are used for diagnosing patients, assisting in operations, and keeping records of patients. Computer-aided diagnosis helps doctors identify conditions more accurately and quickly than manual methods alone."},
{q:"How are computers used in the Law profession?",opts:["Lawyers use computers only for word processing and printing documents — all legal research is still done manually","Computers are used for court scheduling and case assignment — they have no role in legal research or case preparation","Records of past cases are stored in the computer for easy and fast access and reference — helping lawyers prepare new cases","Computers are used in courts to present evidence electronically but cannot store case records permanently"],ans:2,exp:"In the Law profession, records of past cases are stored in computers for easy and fast access. Lawyers can quickly reference stored cases to help them prepare and argue new cases more effectively."},
{q:"How are computers used in Government?",opts:["Governments use computers only for printing official documents and correspondence between ministries","Computers are used in government only for payroll processing of civil servants — no other government function uses them","Computers are used in the field of census — compiling census and survey data, budget planning, economic planning, and forecasting","Governments use computers exclusively for national security purposes such as encryption and surveillance"],ans:2,exp:"The government applies computers in the field of census — compiling census and survey data quickly and accurately. Computers are also used for budget planning, economic planning, and forecasting — making these processes faster and more reliable."},
{q:"What is a VDU and what are the two types of monitor?",opts:["VDU stands for Virtual Display Unit — the two types are CRT (cathode ray tube) and TFT (thin film transistor)","VDU stands for Visual Display Unit — the two types are Monochrome (black and white only) and Multi-Media Colour monitors","VDU stands for Video Data Unit — the two types are interlaced and non-interlaced based on scan frequency","VDU stands for Visual Data Uplink — the two types are input monitors and output monitors based on data direction"],ans:1,exp:"VDU stands for Visual Display Unit — another name for the monitor. The two types are: Monochrome Monitors (display text and images in black and white only) and Multi-Media Colour Monitors (display in both colour and black and white). Colour monitors include CGA, EGA, and SVGA types."},
{q:"What are the four main functions of the CPU?",opts:["Accept input, display output, store data, and connect to the internet — the four primary operational roles","Hold program instructions, carry out data processing on input data, update master files, and produce output information by transmitting to the output device","Read discs, write data, format storage, and transfer files — the four storage management roles","Boot the system, run applications, manage users, and monitor hardware temperature — the four system management roles"],ans:1,exp:"The four main functions of the CPU are: (1) Hold program instructions, (2) Carry out data processing on input data according to instructions, (3) Update master files that need changing as a result of processing, (4) Produce output information by transmitting to the output device."},
{q:"What is the difference between a Deskjet printer and a Laserjet printer?",opts:["A Deskjet printer is faster and produces higher quality output than a Laserjet for all types of printing tasks","A Deskjet printer can print both colour and black and white — a Laserjet printer prints only black and white","A Laserjet printer uses ink cartridges while a Deskjet printer uses toner powder for its printing process","A Deskjet printer is used only for photographs while a Laserjet printer is used only for text documents"],ans:1,exp:"A Deskjet printer can print in both colour and black and white. A Laserjet printer prints only in black and white. Both are types of output devices that transfer text and graphics from a computer to paper (hard copy)."}
];
let order=[],cur=0,picks={},playerName='',score=0;
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function goBack(){if(confirm('Quit quiz and return to subjects?'))window.location.href='index.html';}
function startQuiz(){const inp=document.getElementById('name-input').value.trim();playerName=inp||'Anonymous';order=shuffle(BANK.map((_,i)=>i));cur=0;picks={};score=0;document.getElementById('q-total').textContent=BANK.length;show('quiz-screen');render();}
function render(){const idx=order[cur],q=BANK[idx],total=BANK.length;document.getElementById('q-num').textContent=cur+1;document.getElementById('q-score').textContent=score;document.getElementById('q-label').textContent=`Question ${cur+1} of ${total}`;document.getElementById('q-text').textContent=q.q;document.getElementById('progress-fill').style.width=((cur/total)*100)+'%';document.getElementById('explanation').className='explanation';document.getElementById('explanation').textContent='';document.getElementById('next-btn').className='next-btn';document.getElementById('quit-btn').className='quit-btn';const letters=['A','B','C','D'],optEl=document.getElementById('options');optEl.innerHTML='';shuffle([0,1,2,3]).forEach((oi,li)=>{const btn=document.createElement('button');btn.className='opt-btn';btn.dataset.opt=oi;btn.innerHTML=`<span class="opt-letter">${letters[li]}</span><span>${q.opts[oi]}</span>`;btn.onclick=()=>selectAnswer(oi,idx);optEl.appendChild(btn);});}
function selectAnswer(chosen,idx){const q=BANK[idx],correct=chosen===q.ans;picks[idx]=chosen;if(correct)score++;document.getElementById('q-score').textContent=score;document.querySelectorAll('.opt-btn').forEach(btn=>{btn.disabled=true;const oi=parseInt(btn.dataset.opt);if(oi===q.ans)btn.classList.add('correct');else if(oi===chosen&&!correct)btn.classList.add('wrong');});if(!correct){const e=document.getElementById('explanation');e.textContent='✗ '+q.exp;e.classList.add('show');}const nb=document.getElementById('next-btn');nb.classList.add('show');nb.textContent=cur+1<BANK.length?'Next Question →':'See Results →';document.getElementById('quit-btn').classList.add('show');}
function nextQuestion(){cur++;if(cur>=BANK.length)showResults();else{render();window.scrollTo(0,0);}}
function showResults(){show('results-screen');const total=BANK.length,pct=Math.round((score/total)*100),passed=pct>=70;document.getElementById('result-name').textContent=playerName;document.getElementById('ring-pct').textContent=pct+'%';document.getElementById('ring-pct').style.color=passed?'var(--green)':'var(--red)';document.getElementById('ring-fill').style.stroke=passed?'var(--green)':'var(--red)';setTimeout(()=>{document.getElementById('ring-fill').style.strokeDashoffset=439.82-(439.82*pct/100);},100);document.getElementById('res-title').textContent=pct>=90?'Excellent!':pct>=70?'Passed!':'Needs Work';document.getElementById('res-sub').textContent=`${score} correct out of ${total} questions`;const v=document.getElementById('res-verdict');if(passed){v.textContent='✓ You passed — score above 70%';v.className='result-verdict pass';}else{v.textContent='✗ Below 70% — please retake the quiz';v.className='result-verdict fail';}const rv=document.getElementById('review');rv.innerHTML='<h3>Review</h3>';order.forEach(idx=>{const q=BANK[idx],ua=picks[idx],ok=ua===q.ans;const d=document.createElement('div');d.className='rv-item '+(ok?'ok':'miss');d.innerHTML=`<div class="rv-q">${q.q}</div><div class="rv-a">${ok?`<span class="c">✓ Correct: ${q.opts[q.ans]}</span>`:`<span class="w">✗ You chose: ${ua!==undefined?q.opts[ua]:'Skipped'}</span><br><span class="c">✓ Correct: ${q.opts[q.ans]}</span><br><span style="color:var(--muted)">${q.exp}</span>`}</div>`;rv.appendChild(d);});}
function retryQuiz(){order=shuffle(order);cur=0;picks={};score=0;document.getElementById('q-score').textContent=0;show('quiz-screen');render();}
document.getElementById('name-input').addEventListener('keydown',e=>{if(e.key==='Enter')startQuiz();});
</script>
