<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap');
  :root{--bg:#080810;--surface:#11111f;--border:#1e1e35;--purple:#7c3aed;--purple-l:#9d5bf0;--green:#22c55e;--red:#ef4444;--text:#e8e8f0;--muted:#7070a0;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:.4;pointer-events:none;z-index:0;}
  .screen{position:relative;z-index:1;width:100%;max-width:660px;margin:0 auto;padding:24px 20px 48px;display:none;}
  .screen.active{display:block;}
  #name-screen{text-align:center;padding-top:80px;}
  .back-link{display:inline-flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);text-decoration:none;letter-spacing:1px;margin-bottom:48px;transition:color .2s;}
  .back-link:hover{color:var(--purple-l);}
  .subject-tag{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--purple-l);margin-bottom:12px;}
  #name-screen h1{font-size:clamp(22px,5vw,36px);font-weight:800;line-height:1.15;margin-bottom:8px;background:linear-gradient(135deg,#fff 30%,var(--purple-l));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  #name-screen p{color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;margin-bottom:40px;}
  .name-box{display:flex;flex-direction:column;align-items:center;gap:12px;}
  .name-box input{width:100%;max-width:320px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Syne',sans-serif;font-size:15px;outline:none;text-align:center;transition:border-color .2s;}
  .name-box input:focus{border-color:var(--purple);}
  .name-box input::placeholder{color:var(--muted);}
  .btn-primary{padding:12px 32px;background:var(--purple);color:#fff;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:background .2s,transform .1s;letter-spacing:.5px;}
  .btn-primary:hover{background:var(--purple-l);transform:translateY(-1px);}
  /* quiz header with back */
  .quiz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
  .quiz-meta{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
  .quiz-meta span{color:var(--purple-l);font-weight:500;}
  .quiz-back{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);background:none;border:1px solid var(--border);padding:5px 10px;border-radius:6px;cursor:pointer;transition:color .2s,border-color .2s;}
  .quiz-back:hover{color:var(--text);border-color:var(--purple);}
  .progress-bar{width:100%;height:3px;background:var(--border);border-radius:2px;margin-bottom:32px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--purple-l));border-radius:2px;transition:width .3s ease;}
  .question-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--purple-l);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
  .question-text{font-size:clamp(15px,3vw,18px);font-weight:600;line-height:1.5;margin-bottom:28px;color:var(--text);}
  .options{display:flex;flex-direction:column;gap:10px;}
  .opt-btn{display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;font-weight:400;cursor:pointer;text-align:left;transition:border-color .15s,background .15s;width:100%;}
  .opt-btn:hover:not(:disabled){border-color:var(--purple);background:#16162a;}
  .opt-btn .opt-letter{flex-shrink:0;width:26px;height:26px;border-radius:6px;background:var(--border);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);transition:background .15s,color .15s;}
  .opt-btn:hover:not(:disabled) .opt-letter{background:var(--purple);color:#fff;}
  .opt-btn.correct{border-color:var(--green);background:rgba(34,197,94,.1);}
  .opt-btn.correct .opt-letter{background:var(--green);color:#fff;}
  .opt-btn.wrong{border-color:var(--red);background:rgba(239,68,68,.1);}
  .opt-btn.wrong .opt-letter{background:var(--red);color:#fff;}
  .opt-btn:disabled{cursor:default;}
  .explanation{display:none;margin-top:16px;padding:14px 16px;background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.25);border-left:3px solid var(--purple);border-radius:8px;font-size:13px;line-height:1.6;color:#c4b5fd;font-family:'DM Mono',monospace;}
  .explanation.show{display:block;}
  /* bottom action row */
  .action-row{display:flex;gap:10px;margin-top:24px;}
  .next-btn{flex:1;padding:13px;background:var(--purple);color:#fff;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;display:none;transition:background .2s;letter-spacing:.5px;}
  .next-btn:hover{background:var(--purple-l);}
  .next-btn.show{display:block;}
  .quit-btn{padding:13px 18px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;display:none;transition:color .2s,border-color .2s;white-space:nowrap;}
  .quit-btn:hover{color:var(--text);border-color:var(--purple);}
  .quit-btn.show{display:block;}
  /* results */
  #results-screen{text-align:center;padding-top:40px;}
  .result-name{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);margin-bottom:32px;}
  .score-ring{position:relative;width:160px;height:160px;margin:0 auto 28px;}
  .score-ring svg{transform:rotate(-90deg);}
  .score-ring .ring-bg{fill:none;stroke:var(--border);stroke-width:10;}
  .score-ring .ring-fill{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1s ease,stroke .5s;}
  .score-ring .ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .ring-pct{font-size:34px;font-weight:800;line-height:1;}
  .ring-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:4px;letter-spacing:1px;}
  .result-title{font-size:24px;font-weight:800;margin-bottom:8px;}
  .result-sub{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);margin-bottom:8px;}
  .result-verdict{font-family:'DM Mono',monospace;font-size:12px;padding:8px 20px;border-radius:20px;display:inline-block;margin-bottom:32px;}
  .result-verdict.pass{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.3);}
  .result-verdict.fail{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.3);}
  .result-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:40px;}
  .btn-outline{padding:11px 24px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:border-color .2s,color .2s;}
  .btn-outline:hover{border-color:var(--purple);color:var(--text);}
  .review{text-align:left;}
  .review h3{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:16px;font-family:'DM Mono',monospace;}
  .rv-item{padding:14px 16px;border-radius:8px;margin-bottom:10px;border:1px solid var(--border);}
  .rv-item.ok{border-color:rgba(34,197,94,.25);background:rgba(34,197,94,.05);}
  .rv-item.miss{border-color:rgba(239,68,68,.25);background:rgba(239,68,68,.05);}
  .rv-q{font-size:13px;font-weight:600;margin-bottom:8px;line-height:1.4;}
  .rv-a{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);line-height:1.6;}
  .rv-a .c{color:var(--green);}
  .rv-a .w{color:var(--red);}
</style>

<script>
const BANK=[{q:"What does PPE stand for in a professional kitchen and give three examples?",opts:["Personal Protective Equipment — items worn to reduce injury risk, including non-slip shoes, cut-resistant gloves, and a chef's apron","Preventive Preparation Equipment — tools used before service to set up workstations safely, including chopping boards, probe thermometers, and side cloths","Professional Presentation Equipment — clothing and accessories worn by kitchen staff to maintain a consistent and hygienic brand appearance for guests","Personal Performance Evaluation — a scoring system used by the Executive Chef to assess the speed and accuracy of each cook during service"],ans:0,exp:"PPE stands for Personal Protective Equipment — worn to reduce the risk of injury. In a kitchen: non-slip safety shoes (prevent falls and protect from dropped knives), cut-resistant gloves (for mandoline and butchery work), chef's apron (protects from spills and heat), oven gloves/cloths (protect from burns), and eye protection (when using deep fryers or blenders)."},{q:"What is the most common cause of slips and falls in a professional kitchen and how are they prevented?",opts:["The most common cause is poor lighting in the kitchen — prevented by installing brighter overhead lighting and ensuring all blind corners have dedicated lights","The most common cause is wet or greasy floors — prevented by using non-slip matting, wearing non-slip footwear, cleaning spills immediately, and using wet floor signs","The most common cause is cluttered workstations — prevented by enforcing strict mise en place standards and removing all unnecessary equipment from the pass","The most common cause is fatigue during long shifts — prevented by mandatory 15-minute rest breaks every two hours throughout the entire working day"],ans:1,exp:"Slips and falls are the most common kitchen accident. Wet or greasy floors from spills, steam, and food waste are the primary cause. Prevention: clean spills immediately, use non-slip rubber mats in high-risk areas, wear non-slip safety shoes, display wet floor signs, keep drainage channels clear, and maintain good housekeeping throughout service."},{q:"What is the correct procedure when carrying hot liquids across a busy kitchen?",opts:["Carry the container at arm's length in front of your body, move quickly to minimise time in the danger zone, and warn others only if you see them directly in your path","Carry the container close to your body with both hands on a stable grip, call out 'Hot!' or 'Behind!' clearly as you move, and use a designated route if available","Ask a colleague to walk in front of you to clear the path while you carry the container, and only carry hot liquids during quiet periods between service stages","Use a wheeled trolley for all hot liquids regardless of quantity, as carrying any hot liquid by hand is a prohibited practice in all professional kitchens"],ans:1,exp:"When carrying hot liquids: use both hands for a stable grip, keep the container close to your centre of gravity, call out 'Hot!' loudly to alert others, choose a clear route, never rush, and never fill a container so full that it risks spilling. A side cloth is not sufficient insulation for very hot pots — use proper oven gloves or pot holders."},{q:"What are the three main types of food contamination and give an example of each?",opts:["Chemical contamination (cleaning agent in food), biological contamination (Salmonella in chicken), and physical contamination (glass in a dessert)","Temperature contamination (food left too warm), time contamination (food prepared too far in advance), and storage contamination (incorrect refrigerator stacking)","Primary contamination (farm-level), secondary contamination (processing-level), and tertiary contamination (kitchen-level) — each requiring different control measures","Intentional contamination (sabotage), accidental contamination (spillage), and environmental contamination (dust and airborne particles entering open food)"],ans:0,exp:"Three types of food contamination: Biological (bacteria, viruses, moulds, parasites — e.g. Salmonella in undercooked chicken), Chemical (cleaning agents, pesticides, allergens — e.g. sanitiser left on a food contact surface), Physical (foreign objects — e.g. glass, bone fragments, metal shards, hair, plasters in food). Each type requires specific prevention controls."},{q:"What is 'food spoilage' and what are the four main causes?",opts:["Food spoilage is the deliberate adulteration of food by a supplier — caused by fraudulent ingredient substitution, incorrect labelling, weight manipulation, and false date marking","Food spoilage is the process by which food becomes unsafe or unpalatable — caused by microbial activity (bacteria, moulds, yeast), enzymatic reactions, oxidation, and moisture changes","Food spoilage is the loss of nutritional value in food — caused only by overcooking, improper reheating, excessive salt use, and prolonged refrigerator storage","Food spoilage is the change in food texture over time — caused exclusively by freezing, thawing, dehydration, and mechanical damage during transportation"],ans:1,exp:"Food spoilage is the deterioration of food making it unacceptable or unsafe. Four main causes: Microbial (bacteria, moulds, yeast — the most common), Enzymatic (natural enzymes in food cause browning and softening), Oxidation (fat rancidity, colour loss when exposed to oxygen), and Moisture changes (drying out or absorbing moisture altering texture and safety)."},{q:"What is the difference between food that is 'unsafe' and food that is 'spoiled'?",opts:["Unsafe food always looks and smells bad, making it easy to identify — spoiled food looks normal but contains harmful levels of bacteria that cannot be detected","Spoiled food may look, smell, or taste unpleasant but not necessarily cause illness — unsafe food contains harmful pathogens or toxins that can cause serious illness even if it looks and smells fine","Unsafe food is any food past its use-by date, while spoiled food is any food past its best-before date — the distinction is purely legal and relates only to date marking","Spoiled food has lost its nutritional value through oxidation and enzymatic activity — unsafe food has been contaminated with chemical cleaning agents during the washing process"],ans:1,exp:"Spoiled food may be obviously off (bad smell, slimy texture, mould) but not necessarily dangerous. Unsafe food may look, smell, and taste completely normal but contain harmful pathogens or toxins — for example, chicken contaminated with Salmonella often has no visible signs. This is why proper cooking temperatures matter even with fresh-looking food."},{q:"What is 'enzymatic browning' in food and give two examples?",opts:["Enzymatic browning is the Maillard reaction that occurs when proteins are exposed to high heat — examples are grilled meat turning brown and toast darkening in a toaster","Enzymatic browning is a chemical reaction where enzymes in food react with oxygen after cutting or bruising — examples are cut apple turning brown and sliced avocado discolouring","Enzymatic browning is the result of bacteria breaking down the surface pigments of food — examples are meat greying in the refrigerator and milk turning yellow after opening","Enzymatic browning is the caramelisation of sugars on the surface of food — examples are roasted onions turning golden and bananas developing brown spots during ripening"],ans:1,exp:"Enzymatic browning occurs when polyphenol oxidase enzymes in cut or bruised fruit and vegetables react with oxygen, producing brown melanin pigments. Examples: cut apple, pear, avocado, banana, and potato turning brown when exposed to air. Prevention: acidulated water (lemon juice), blanching (destroys enzymes), vacuum sealing, or rapid refrigeration."},{q:"What is 'oxidative rancidity' in fats and oils and how is it prevented?",opts:["Oxidative rancidity is the bacterial spoilage of fat-rich foods left in the temperature danger zone — prevented by refrigerating all fat-containing products immediately after use","Oxidative rancidity is the chemical reaction between unsaturated fats and oxygen — producing off-flavours and odours — prevented by storing fats in sealed, opaque containers away from heat and light","Oxidative rancidity is the breakdown of fat during deep frying at excessively high temperatures — prevented by maintaining frying oil at exactly 180°C throughout service","Oxidative rancidity is the absorption of strong odours by butter and cream stored near strong-smelling foods — prevented by keeping dairy in sealed containers in the refrigerator"],ans:1,exp:"Oxidative rancidity occurs when unsaturated fatty acids react with oxygen — producing ketones and aldehydes that give a stale, cardboard, or paint-like off-flavour. Prevention: store oils and fats in sealed, opaque containers away from heat, light, and oxygen. Antioxidants (Vitamin E, rosemary extract) slow the process. Refrigerate butter and high-fat products."},{q:"What is 'mould' in a food safety context and when is mouldy food safe to eat?",opts:["Mould is always harmless in food — it can be wiped off the surface and the remainder of the food is safe to serve without any further action required","Mould is a fungal growth on food that may produce dangerous mycotoxins — soft or liquid foods with any mould must be discarded; some hard cheeses and firm produce can have mould cut away with a wide margin","Mould only grows on food that has already been contaminated with bacteria — if no bacterial contamination is present, mould itself poses no food safety risk","Mould is beneficial in all food contexts — it indicates natural fermentation and the food is always safer to eat once mould has established itself on the surface"],ans:1,exp:"Mould is fungal growth that can produce mycotoxins — invisible poisons that penetrate beyond the visible mould. Discard: soft fruits, bread, yoghurt, soft cheese, cooked food, or any liquid with mould. Can cut away with 2.5cm margin on hard cheeses and firm root vegetables. In a professional kitchen, the safest rule is to discard any mouldy food item entirely."},{q:"What is 'cross-contamination' and describe three ways it can occur in a kitchen?",opts:["Cross-contamination is the mixing of two allergen-free dishes — it occurs when staff swap ingredients between dishes, share cooking pans, or plate dishes on the same surface","Cross-contamination is the transfer of harmful microorganisms from a contaminated source to a safe food — it occurs via unwashed hands, shared equipment, and raw food dripping onto cooked food","Cross-contamination only occurs between raw meat and cooked food — it cannot occur between vegetables and meat, or between different types of raw protein","Cross-contamination is the contamination of food by chemical cleaning agents — occurring when surfaces are sanitised before rinsing, when spray bottles leak, or when staff mix chemicals"],ans:1,exp:"Cross-contamination transfers pathogens to safe food. Three common routes: 1) Hands — cook handles raw chicken then touches ready-to-eat food without washing. 2) Equipment — same chopping board used for raw meat then salad. 3) Storage — raw meat stored above cooked food, juices dripping down. Prevention: colour-coded boards, handwashing, correct refrigerator order, separate equipment."},{q:"What are 'colour-coded chopping boards' and what colour is assigned to each food type?",opts:["Red = raw fish, Blue = raw poultry, Green = raw meat, Yellow = cooked meat, White = vegetables, Brown = dairy — the colours are assigned alphabetically by food name","Red = raw red meat, Blue = raw fish, Yellow = raw poultry, Green = fruit and vegetables, White = dairy and bakery, Brown = cooked meats — a system to prevent cross-contamination","Red = cooked meat, Blue = dairy, Yellow = vegetables, Green = fish, White = bread, Brown = raw poultry — the reverse colour system used in Asian professional kitchens","Red = spicy food, Blue = seafood, Yellow = vegetarian, Green = vegan, White = allergen-free, Brown = gluten-containing — a dietary requirement coding system"],ans:1,exp:"Standard colour-coded board system: Red = raw red meat, Blue = raw fish and seafood, Yellow = raw poultry, Green = fruit and vegetables (including salads), White = dairy products and bakery, Brown = cooked meats. Every kitchen must use this system consistently — using the wrong board is a direct cross-contamination risk."},{q:"What is 'contact contamination' and how is it different from 'indirect contamination'?",opts:["Contact contamination occurs when contaminated food touches safe food directly — indirect contamination occurs when pathogens travel through the air from one food to another","Contact contamination is contamination from a person touching food with bare hands — indirect contamination is contamination that occurs through cooking equipment and utensils only","Contact contamination occurs when food is in contact with a chemical — indirect contamination occurs when food absorbs odours from other foods stored in the same refrigerator","Contact contamination and indirect contamination are identical terms describing the same process — the distinction is used only in academic food safety literature"],ans:0,exp:"Contact (direct) contamination: contaminated food physically touches safe food — raw chicken placed next to a salad, blood dripping from raw meat onto cooked food. Indirect contamination: pathogens transfer via an intermediary — a knife used on raw fish then used on cooked food without washing, a cook's unwashed hands, a cloth used on raw meat then wiped on a clean surface."},{q:"What is a 'food safety hazard' versus a 'food safety risk' in kitchen management?",opts:["A hazard is something that has already caused illness in the kitchen, while a risk is something that might cause illness in the future if controls are not put in place","A hazard is anything with the potential to cause harm (a bacterium, a cleaning chemical, a piece of glass), while risk is the likelihood and severity of that hazard causing harm","A hazard refers only to visible dangers such as wet floors and sharp knives, while risk refers only to invisible biological threats such as bacteria and viruses","A hazard is assessed by the kitchen team during daily operations, while risk is formally evaluated only by external environmental health officers during inspections"],ans:1,exp:"A hazard is anything with the potential to cause harm — Salmonella on raw chicken, bleach near food, a bone in a fillet. Risk = likelihood × severity of the hazard causing harm. HACCP is built on identifying hazards, assessing their risk, and implementing controls to reduce the risk to an acceptable level."},{q:"What are the correct steps for cleaning and sanitising a food contact surface?",opts:["Apply sanitiser first, wipe with a dry cloth, then apply detergent and hot water, rinse, and air dry — the sanitiser must be applied before the detergent to be effective","Remove food debris, wash with hot water and detergent, rinse with clean water, apply sanitiser at the correct concentration, leave for the required contact time, then air dry","Spray the surface with a combined detergent-sanitiser product, wipe immediately with a dry cloth, and return the surface to use — no separate steps are required","Apply boiling water to the surface to kill all bacteria, wipe with a clean disposable cloth, then spray with sanitiser as a secondary precaution before use"],ans:1,exp:"Correct surface cleaning sequence: 1) Remove food debris, 2) Wash with hot water and detergent (removes grease and visible soil), 3) Rinse with clean water (removes detergent residue that neutralises sanitiser), 4) Apply sanitiser at correct concentration, 5) Leave for required contact time, 6) Air dry or use a clean disposable cloth. Never skip the rinse step."},{q:"What is the role of a 'side cloth' (service cloth) in kitchen safety and hygiene?",opts:["A side cloth is used exclusively for wiping plates and garnishing dishes before they leave the pass — it must be changed after every three plates to prevent spreading residue","A side cloth is used for handling hot equipment safely and wiping surfaces — but must never be used on food contact surfaces and must be changed frequently to avoid spreading contamination","A side cloth is a multi-purpose tool used for all kitchen tasks including wiping raw meat, cleaning the floor, and handling hot pans — washed only at the end of service","A side cloth is a decorative item folded over the arm of service staff during FOH service — it has no functional role in BOH kitchen safety or hygiene management"],ans:1,exp:"A side cloth is used for: handling hot pans (pot holder), wiping spills, and gripping equipment. It must NEVER be used on food directly or on food contact surfaces — it quickly becomes heavily contaminated with bacteria. It must be changed frequently (minimum every service), kept dry (wet cloths harbour bacteria), and never used on the floor."},{q:"What is 'pest contamination' in a kitchen and name four common kitchen pests?",opts:["Pest contamination is the introduction of allergens into food by birds or insects landing on uncovered produce during outdoor market delivery or reception areas","Pest contamination is the presence of insects, rodents, or birds that deposit bacteria, droppings, hair, or urine on food or food contact surfaces — common pests: cockroaches, rats, mice, and flies","Pest contamination refers only to chemical pesticides used in agriculture that remain as residues on improperly washed fruit and vegetables after delivery","Pest contamination occurs only in storage areas — once food reaches the preparation area of a professional kitchen, pest contamination is no longer considered a risk"],ans:1,exp:"Pest contamination is serious — pests carry Salmonella, E. coli, and other pathogens and deposit droppings, urine, and hair on food and surfaces. Common kitchen pests: cockroaches (harbour in warm, moist areas), rats and mice (enter through gaps, contaminate stored food), flies (land on food, spread bacteria from waste), and weevils (infest dry goods). Prevention: seal entry points, store food off the floor in sealed containers, maintain cleanliness."},{q:"What is 'allergen cross-contact' and how does it differ from cross-contamination?",opts:["Allergen cross-contact and cross-contamination are identical terms — both describe the transfer of any unwanted substance from one food to another during preparation","Allergen cross-contact is the unintentional transfer of an allergen into a food that should not contain it — unlike cross-contamination (which involves pathogens), even trace amounts of an allergen can trigger a life-threatening reaction","Allergen cross-contact occurs only when two dishes are plated on the same plate at the same time — it does not occur through shared equipment or unwashed hands","Allergen cross-contact is less serious than cross-contamination because allergen reactions are always mild and treatable with antihistamines at the point of service"],ans:1,exp:"Allergen cross-contact is the transfer of an allergen into a food that should be allergen-free — through shared equipment, unwashed hands, airborne flour, or contact with allergen-containing ingredients. Unlike pathogen cross-contamination (which can be killed by cooking), allergens cannot be destroyed by heat. Even trace amounts can cause anaphylaxis in a sensitised individual."},{q:"What are the 14 major allergens that must be declared on menus in professional food service?",opts:["Gluten, crustaceans, eggs, fish, peanuts, soybeans, milk, nuts, celery, mustard, sesame, sulphites, lupin, and molluscs — as defined by food allergen regulations","Salt, sugar, fat, artificial colours, preservatives, flavour enhancers, sweeteners, caffeine, alcohol, yeast, starch, gelatin, carmine, and annatto — common food additives","Beef, chicken, pork, lamb, shellfish, dairy, wheat, corn, rice, potato, tomato, onion, garlic, and chilli — the 14 most common ingredients causing dietary intolerances","Latex, pollen, dust, pet dander, mould, insect venom, penicillin, aspirin, ibuprofen, nickel, fragrance, dye, rubber, and formaldehyde — environmental and drug allergens"],ans:0,exp:"The 14 major allergens (EU/UK regulations): Cereals containing gluten (wheat, rye, barley, oats), Crustaceans, Eggs, Fish, Peanuts, Soybeans, Milk, Nuts (almonds, hazelnuts, walnuts, cashews, pecans, pistachios, macadamia), Celery, Mustard, Sesame seeds, Sulphur dioxide/sulphites, Lupin, and Molluscs. All must be declared when used as ingredients."},{q:"What should a kitchen do if a guest informs them of a severe nut allergy before ordering?",opts:["Inform the guest that the kitchen cannot guarantee allergen-free food and suggest they order only from the salad section which contains no nuts","Alert the kitchen team, identify all dishes containing nuts or nut derivatives, communicate clearly to the chef preparing the order, use dedicated clean equipment, and confirm with the guest before serving","Ask the guest to bring their own EpiPen as a precaution and serve the dish normally — the kitchen cannot be held responsible for allergen reactions once the guest is informed","Note the allergy on the ticket and inform the server — no changes to the kitchen process are needed as long as the allergy is documented on the order"],ans:1,exp:"Allergen protocol: 1) The server or manager informs the kitchen immediately. 2) The head chef identifies all dishes containing the allergen. 3) The order is prepared using dedicated, thoroughly cleaned equipment. 4) Staff change gloves and wash hands before preparing the dish. 5) The dish is confirmed allergen-free before service. 6) The server verbally confirms the allergy dish to the guest. Documented processes are essential."},{q:"What is 'chemical contamination' in a food environment and give three examples?",opts:["Chemical contamination occurs only during food manufacturing — in a professional kitchen, all chemicals used are food-grade and present no contamination risk","Chemical contamination is the presence of harmful chemicals in food — examples include cleaning chemicals left on surfaces, pesticide residues on unwashed produce, and lubricants from faulty equipment","Chemical contamination refers only to the use of artificial food colourings, preservatives, and flavour enhancers in processed food products sold commercially","Chemical contamination occurs only when food is stored in metal containers that leach heavy metals — prevented by using only food-grade plastic or glass storage containers"],ans:1,exp:"Chemical contamination occurs when harmful chemicals enter food. Examples: Cleaning agents (sanitiser left on a surface, detergent residue on equipment), Pesticide residues (unwashed fruit and vegetables), Lubricants (from poorly maintained kitchen machinery), Heavy metals (acidic food stored in unsuitable metal containers), Veterinary drug residues (in meat from treated animals). Always rinse equipment thoroughly after cleaning."},{q:"What is a 'near miss' in kitchen safety terminology and why should it be reported?",opts:["A near miss is a dish that nearly failed quality standards but was corrected at the pass — it must be reported so the recipe can be adjusted to prevent recurrence","A near miss is an incident where someone almost had an accident but was not injured — it must be reported because it identifies hazards that could cause a serious injury next time","A near miss is when a kitchen runs out of a key ingredient during service — reported to the purchasing team so stock levels can be adjusted before the next service","A near miss is a hygiene inspection that almost resulted in a failed score — reported to management so corrective actions can be implemented before the next visit"],ans:1,exp:"A near miss is an unplanned event that did not result in injury or damage but could have — a spilled hot liquid that just missed someone, a knife that fell close to a foot, a wet floor that almost caused a fall. Reporting near misses is critical because they identify real hazards before they cause actual injury. Near miss reporting is the foundation of a proactive kitchen safety culture."},{q:"What is the correct procedure after a food safety incident such as a customer reporting illness?",opts:["Deny any connection to the kitchen, remove the implicated dish from the menu temporarily, and wait to see if further complaints arise before taking any further action","Investigate immediately by checking temperature logs, reviewing production records, preserving samples if possible, reporting to the appropriate authority, and cooperating fully with any investigation","Apologise to the customer privately, offer a complimentary meal, and handle the matter internally without notifying any external authority or documenting the complaint","Remove the dish from service immediately and retrain the specific cook responsible — no external reporting is required unless more than five guests report illness simultaneously"],ans:1,exp:"Procedure after a reported food illness: 1) Take the complaint seriously immediately. 2) Preserve any remaining food samples for testing. 3) Check temperature logs, HACCP records, and production notes for the relevant period. 4) Report to the relevant food safety authority (legal requirement in most countries). 5) Cooperate fully with any investigation. 6) Document everything. Early action can prevent further illness and demonstrates due diligence."},{q:"What is the difference between a 'use-by date' and a 'best-before date' on food products?",opts:["Use-by and best-before dates are identical terms used interchangeably on packaging — both indicate the date after which the food must be discarded for safety reasons","Use-by date is a safety date — food must not be consumed after this date as it may be unsafe. Best-before date is a quality date — food may still be safe after this date but quality may have declined","Use-by date applies only to frozen products while best-before date applies only to ambient and refrigerated products — both indicate the date the product was manufactured","Use-by dates are set by the manufacturer while best-before dates are set by the retailer — only use-by dates have any legal standing in food safety legislation"],ans:1,exp:"Use-by date: a safety date on highly perishable foods (raw meat, fish, dairy). Never use or serve food past its use-by date — it is illegal to sell and potentially dangerous regardless of appearance. Best-before date: a quality indicator on shelf-stable foods. Food may be safe after this date but flavour, texture, or appearance may have declined. In a professional kitchen, always follow use-by dates strictly."},{q:"What is a 'food safety management system' and what is its purpose in a professional kitchen?",opts:["A food safety management system is the software used by the purchasing department to track supplier delivery dates, invoice management, and stock ordering","A documented system of procedures, controls, and records — such as HACCP — that identifies food safety hazards and ensures they are consistently managed throughout all food handling operations","A food safety management system is the cleaning schedule posted in the kitchen that assigns daily and weekly cleaning tasks to individual members of the kitchen brigade","A food safety management system is the set of recipes and standardised procedures used by the kitchen to ensure consistent food quality across all dishes on the menu"],ans:1,exp:"A food safety management system (such as HACCP) is a documented, proactive framework that: identifies food safety hazards, establishes critical control points, sets critical limits, defines monitoring and corrective action procedures, and maintains records. It provides the documented evidence of due diligence required by food safety law in most countries."},{q:"What is 'personal hygiene' as a food safety control and list five key requirements for a food handler?",opts:["Personal hygiene means wearing a clean uniform — the only requirement for food handlers is a clean chef's jacket, apron, and hat during all food handling activities","Personal hygiene covers all practices that prevent a food handler from contaminating food — including regular handwashing, covering cuts with blue plasters, not working when ill, keeping nails short and clean, and tying back hair","Personal hygiene means showering before each shift — food handlers must arrive at work freshly showered and are not required to wash hands during the shift itself","Personal hygiene means applying antiperspirant and avoiding strong perfumes — the primary concern is preventing odour contamination of delicate food preparations"],ans:1,exp:"Food handler personal hygiene requirements: 1) Wash hands thoroughly at correct times (before handling food, after touching raw meat, after using the toilet, after handling waste). 2) Cover cuts and wounds with blue waterproof detectable plasters. 3) Do not work when experiencing vomiting, diarrhoea, or infected skin conditions. 4) Keep nails short, clean, and unvarnished. 5) Tie hair back and wear a hat or hair net. 6) No jewellery except a plain wedding band. 7) Clean uniform each shift."},{q:"What is 'food spoilage by yeast' and give two examples of food affected?",opts:["Yeast spoilage is identical to mould spoilage — both produce visible grey-green fuzzy growth on the surface of food and are treated in exactly the same way","Yeast spoilage is the fermentation of sugars in food by yeast organisms — producing alcohol, carbon dioxide, and off-flavours. Examples: fruit juice turning fizzy and alcoholic, fruit yoghurt developing a fermented smell and bubbly texture","Yeast spoilage only occurs in bakery products because yeast is introduced deliberately — in all other foods, yeast contamination is impossible under normal storage conditions","Yeast spoilage is caused by adding commercial yeast to food during production — it cannot occur naturally in fruit, dairy, or vegetable products during storage"],ans:1,exp:"Yeast spoilage occurs when wild yeast ferments sugars in food, producing alcohol and CO2. Signs: fizzing, alcoholic smell, sour taste, and swollen packaging. Commonly affects: fruit juices and squashes (become fizzy and alcoholic), fruit yoghurts (fermented taste and bubbling), jams (if low sugar or opened), and soft fruit (especially grapes and berries in warm conditions)."},{q:"What is the correct action if a food handler discovers a foreign object (physical contaminant) in food during preparation?",opts:["Remove the foreign object carefully, continue using the food, and document the incident on the end-of-day cleaning report for the supervisor to review the following morning","Stop using the food immediately, set aside the entire batch, inform a supervisor, investigate the source of the contamination, complete an incident report, and do not serve any of the affected food","Remove the foreign object, taste the food to assess whether any contamination occurred, and continue service if the flavour appears normal and no other objects are found","Discard only the portion of food containing the visible foreign object and continue using the remainder — physical contamination is confined to the immediate area around the object"],ans:1,exp:"Foreign object protocol: 1) Stop using the affected food immediately. 2) Set aside and label the entire batch — do not discard yet (needed for investigation). 3) Inform the supervisor immediately. 4) Investigate the source (broken equipment, packaging, ingredient). 5) Complete an incident report. 6) Check whether any food was already served — if so, inform management in case guests are affected. 7) Implement corrective action to prevent recurrence."},{q:"What is 'stock rotation' and how do FIFO and FEFO apply to it?",opts:["Stock rotation is the process of moving older stock to a different storage area to free up space for new deliveries — no date checking is involved in this process","Stock rotation is the practice of using older stock before newer stock — FIFO (First In First Out) ensures older deliveries are used first; FEFO (First Expired First Out) prioritises items with the earliest expiry date","Stock rotation is the weekly counting and reordering of all dry goods in the store — FIFO applies to ambient products only and FEFO applies only to frozen products","Stock rotation is a purchasing strategy for ordering in the same rotation each week — FIFO and FEFO are different names for the same process and are fully interchangeable"],ans:1,exp:"Stock rotation prevents waste and food safety failures. FIFO: new stock goes to the back, older stock comes forward — first in is used first. FEFO: the item with the earliest expiry date is used first, regardless of delivery order (critical for products where expiry varies within the same delivery). Both systems require clear date labelling and disciplined storage practices."},{q:"What is the importance of temperature monitoring logs in a kitchen and how often should they be checked?",opts:["Temperature logs are optional paperwork that demonstrate professionalism but have no direct impact on food safety — they are required only for hotels with more than 50 covers per service","Temperature logs provide documented evidence that critical temperatures are being maintained — refrigerators and freezers should be checked and logged a minimum of twice daily","Temperature logs need to be checked only when a food safety inspector visits — daily monitoring is unnecessary as modern refrigeration equipment maintains set temperatures automatically","Temperature logs are the responsibility of the purchasing department — kitchen staff are required only to maintain cooking temperature records, not storage temperature records"],ans:1,exp:"Temperature monitoring logs are essential HACCP records. Refrigerators and freezers must be checked and logged a minimum of twice daily (opening and closing). Cooking temperatures must be logged at CCPs. These records provide documented evidence of due diligence. If a food safety incident occurs, temperature logs are the first thing an environmental health officer will request — missing or incomplete logs undermine the kitchen's legal defence."}];
let order=[],cur=0,picks={},playerName='',score=0;
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function goBack(){if(confirm('Quit quiz and return to subjects?'))window.location.href='index.html';}
function startQuiz(){const inp=document.getElementById('name-input').value.trim();playerName=inp||'Anonymous';order=shuffle(BANK.map((_,i)=>i));cur=0;picks={};score=0;document.getElementById('q-total').textContent=BANK.length;show('quiz-screen');render();}
function render(){const idx=order[cur],q=BANK[idx],total=BANK.length;document.getElementById('q-num').textContent=cur+1;document.getElementById('q-score').textContent=score;document.getElementById('q-label').textContent=`Question ${cur+1} of ${total}`;document.getElementById('q-text').textContent=q.q;document.getElementById('progress-fill').style.width=((cur/total)*100)+'%';document.getElementById('explanation').className='explanation';document.getElementById('explanation').textContent='';document.getElementById('next-btn').className='next-btn';document.getElementById('quit-btn').className='quit-btn';const letters=['A','B','C','D'],optEl=document.getElementById('options');optEl.innerHTML='';shuffle([0,1,2,3]).forEach((oi,li)=>{const btn=document.createElement('button');btn.className='opt-btn';btn.dataset.opt=oi;btn.innerHTML=`<span class="opt-letter">${letters[li]}</span><span>${q.opts[oi]}</span>`;btn.onclick=()=>selectAnswer(oi,idx);optEl.appendChild(btn);});}
function selectAnswer(chosen,idx){const q=BANK[idx],correct=chosen===q.ans;picks[idx]=chosen;if(correct)score++;document.getElementById('q-score').textContent=score;document.querySelectorAll('.opt-btn').forEach(btn=>{btn.disabled=true;const oi=parseInt(btn.dataset.opt);if(oi===q.ans)btn.classList.add('correct');else if(oi===chosen&&!correct)btn.classList.add('wrong');});if(!correct){const e=document.getElementById('explanation');e.textContent='✗ '+q.exp;e.classList.add('show');}const nb=document.getElementById('next-btn');nb.classList.add('show');nb.textContent=cur+1<BANK.length?'Next Question →':'See Results →';document.getElementById('quit-btn').classList.add('show');}
function nextQuestion(){cur++;if(cur>=BANK.length)showResults();else{render();window.scrollTo(0,0);}}
function showResults(){show('results-screen');const total=BANK.length,pct=Math.round((score/total)*100),passed=pct>=70;document.getElementById('result-name').textContent=playerName;document.getElementById('ring-pct').textContent=pct+'%';document.getElementById('ring-pct').style.color=passed?'var(--green)':'var(--red)';document.getElementById('ring-fill').style.stroke=passed?'var(--green)':'var(--red)';setTimeout(()=>{document.getElementById('ring-fill').style.strokeDashoffset=439.82-(439.82*pct/100);},100);document.getElementById('res-title').textContent=pct>=90?'Excellent!':pct>=70?'Passed!':'Needs Work';document.getElementById('res-sub').textContent=`${score} correct out of ${total} questions`;const v=document.getElementById('res-verdict');if(passed){v.textContent='✓ You passed — score above 70%';v.className='result-verdict pass';}else{v.textContent='✗ Below 70% — please retake the quiz';v.className='result-verdict fail';}const rv=document.getElementById('review');rv.innerHTML='<h3>Review</h3>';order.forEach(idx=>{const q=BANK[idx],ua=picks[idx],ok=ua===q.ans;const d=document.createElement('div');d.className='rv-item '+(ok?'ok':'miss');d.innerHTML=`<div class="rv-q">${q.q}</div><div class="rv-a">${ok?`<span class="c">✓ Correct: ${q.opts[q.ans]}</span>`:`<span class="w">✗ You chose: ${ua!==undefined?q.opts[ua]:'Skipped'}</span><br><span class="c">✓ Correct: ${q.opts[q.ans]}</span><br><span style="color:var(--muted)">${q.exp}</span>`}</div>`;rv.appendChild(d);});}
function retryQuiz(){order=shuffle(order);cur=0;picks={};score=0;document.getElementById('q-score').textContent=0;show('quiz-screen');render();}
document.getElementById('name-input').addEventListener('keydown',e=>{if(e.key==='Enter')startQuiz();});
</script>
