<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen Terminology — Part 1 of 3</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=PT+Serif:wght@400;700&family=PT+Sans:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0D0D0F;color:#F4F3FF;font-family:'PT Sans',sans-serif;min-height:100vh}
.wrap{max-width:640px;margin:0 auto;padding:24px 20px 60px}
.top-label{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#A78BFA;margin-bottom:6px}
h1{font-family:'PT Serif',serif;font-size:24px;font-weight:700;margin-bottom:4px}
.meta{font-size:13px;color:#7B7A8E;margin-bottom:28px;line-height:1.6}
.prog-bar{height:4px;background:#2C2C35;border-radius:4px;margin-bottom:28px;overflow:hidden}
.prog-fill{height:100%;background:#7C3AED;border-radius:4px;transition:width .3s}
.q-num{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#A78BFA;margin-bottom:10px}
.q-text{font-family:'PT Serif',serif;font-size:19px;font-weight:700;line-height:1.45;margin-bottom:22px}
.options{display:flex;flex-direction:column;gap:10px;margin-bottom:28px}
.opt{display:flex;align-items:flex-start;gap:12px;background:#18181C;border:1px solid #2C2C35;border-radius:8px;padding:13px 15px;cursor:pointer;font-size:14px;color:#F4F3FF;text-align:left;transition:border-color .15s,background .15s;width:100%}
.opt:hover{border-color:#3E3E4A;background:#222228}
.opt.correct{border-color:#22C55E;background:rgba(34,197,94,.08)}
.opt.wrong{border-color:#EF4444;background:rgba(239,68,68,.08)}
.opt.dimmed{opacity:.35}
.opt-letter{width:22px;height:22px;border-radius:50%;border:1.5px solid #3E3E4A;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:700;margin-top:1px}
.opt.correct .opt-letter{border-color:#22C55E;background:#22C55E;color:#fff}
.opt.wrong .opt-letter{border-color:#EF4444;background:#EF4444;color:#fff}
.nav{display:flex;gap:10px}
.btn-prev{flex:1;padding:13px;background:#18181C;border:1px solid #2C2C35;border-radius:8px;font-family:'PT Sans',sans-serif;font-size:14px;font-weight:700;color:#F4F3FF;cursor:pointer}
.btn-prev:disabled{opacity:.3;cursor:default}
.btn-next{flex:1;padding:13px;background:#7C3AED;border:none;border-radius:8px;font-family:'PT Sans',sans-serif;font-size:14px;font-weight:700;color:#fff;cursor:pointer}
.btn-next:hover{opacity:.88}
.results{display:none;text-align:center;padding:40px 0}
.ring{width:120px;height:120px;margin:0 auto 20px;position:relative}
.ring svg{transform:rotate(-90deg);display:block}
.ring-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'PT Serif',serif;font-size:26px;font-weight:700}
.res-title{font-family:'PT Serif',serif;font-size:22px;font-weight:700;margin-bottom:6px}
.res-sub{font-size:14px;color:#7B7A8E;margin-bottom:24px}
.btn-retry{display:inline-block;padding:13px 32px;background:#7C3AED;border:none;border-radius:8px;font-family:'PT Sans',sans-serif;font-size:14px;font-weight:700;color:#fff;cursor:pointer;margin-bottom:10px}
.btn-restart{display:block;width:100%;padding:13px;background:#18181C;border:1px solid #2C2C35;border-radius:8px;font-family:'PT Sans',sans-serif;font-size:14px;font-weight:700;color:#F4F3FF;cursor:pointer}
.review{text-align:left;margin-top:32px;border-top:1px solid #2C2C35;padding-top:24px}
.review h3{font-family:'PT Serif',serif;font-size:16px;font-weight:700;margin-bottom:14px}
.rv{background:#18181C;border-radius:8px;padding:13px 15px;margin-bottom:10px;border-left:3px solid #2C2C35}
.rv.ok{border-left-color:#22C55E}
.rv.miss{border-left-color:#EF4444}
.rv-q{font-family:'PT Serif',serif;font-size:14px;font-weight:700;margin-bottom:5px;line-height:1.4}
.rv-a{font-size:12px;color:#7B7A8E}
.rv-a .c{color:#22C55E;font-weight:700}
.rv-a .w{color:#EF4444;font-weight:700}
</style>
</head>
<body>
<div class="wrap">
  <div class="top-label">Kitchen Terminology · Part 1 of 3</div>
  <h1>Working Kitchen Terms</h1>
  <div class="meta">30 questions · order randomized each attempt · covers daily station vocabulary, French kitchen terms, and service communication used by Commis 1 &amp; 2 in international professional kitchens.</div>

  <div id="quiz">
    <div class="prog-bar"><div class="prog-fill" id="prog" style="width:0%"></div></div>
    <div class="q-num" id="qnum">Question 1 of 30</div>
    <div class="q-text" id="qtext"></div>
    <div class="options" id="opts"></div>
    <div class="nav">
      <button class="btn-prev" id="btnPrev" onclick="move(-1)" disabled>← Prev</button>
      <button class="btn-next" id="btnNext" onclick="move(1)">Next →</button>
    </div>
  </div>

  <div class="results" id="results">
    <div class="ring">
      <svg width="120" height="120" viewBox="0 0 120 120">
        <circle cx="60" cy="60" r="50" fill="none" stroke="#2C2C35" stroke-width="10"/>
        <circle cx="60" cy="60" r="50" fill="none" id="arc" stroke="#7C3AED" stroke-width="10" stroke-linecap="round" stroke-dasharray="314" stroke-dashoffset="314"/>
      </svg>
      <div class="ring-num" id="ringNum">0%</div>
    </div>
    <div class="res-title" id="resTitle"></div>
    <div class="res-sub" id="resSub"></div>
    <button class="btn-retry" onclick="retry()">Try Again</button>
    <div class="review" id="review"></div>
  </div>
</div>

<script>
const BANK = [
  {q:"What does 'Mise en Place' mean?",opts:["Everything in its place — all prep done before service","A French dessert made with cream","The chef's daily menu","A method of plating food"],ans:0},
  {q:"When a chef calls out 'Fire table 4!', it means?",opts:["There is an emergency in the kitchen","Begin cooking the order for table 4 right now","Table 4's food is ready to serve","Clean and reset table 4"],ans:1},
  {q:"What does '86'd' mean in kitchen language?",opts:["A table of 86 guests has arrived","An item is no longer available — sold out or off the menu","The kitchen is closing in 86 minutes","A dish that takes 86 seconds to prepare"],ans:1},
  {q:"'A la minute' means?",opts:["Cooked one minute before service","Prepared fresh to order at the moment it is requested","A dish served in exactly one minute","A timing technique for roasting"],ans:1},
  {q:"What does FIFO stand for?",opts:["First In First Out — oldest stock is used before newer stock","Fresh Items For Orders","Food Inspection and Final Output","First Item Final Order"],ans:0},
  {q:"What does 'On the fly' mean during service?",opts:["A dish that needs to be prepared immediately and as fast as possible","Food that is cooked while flying — airline catering","A garnish placed on top of a dish","The chef leaving the kitchen quickly"],ans:0},
  {q:"The term 'Expeditor' or 'Expo' refers to?",opts:["The head pastry chef","The person who coordinates between kitchen and front of house, calling orders and checking plates","A junior commis chef position","The chef responsible for purchasing food"],ans:1},
  {q:"What is a 'Docket' in a professional kitchen?",opts:["A type of sauce made from docked herbs","The printed or written order ticket that comes from the waiter to the kitchen","A small knife used for garnishing","A cleaning schedule for the kitchen"],ans:1},
  {q:"'Behind!' called out in a kitchen means?",opts:["The order is running behind schedule","I am walking behind you — move aside so I do not collide with you","The food is ready behind the pass","A dish needs to go to the table behind table 5"],ans:1},
  {q:"What does 'The Pass' refer to in a kitchen?",opts:["A password to enter the kitchen","The counter or shelf where finished plates are placed for service to collect","The area where chefs pass knives to each other","The kitchen's main entrance"],ans:1},
  {q:"'Corner!' shouted in a kitchen means?",opts:["Clean the corner of the kitchen","I am about to turn a corner — warn others so there is no collision","The food is plated in the corner of the plate","A technique for cutting vegetables at an angle"],ans:1},
  {q:"What is a 'Bain-marie' used for in daily kitchen work?",opts:["Deep frying food at high temperatures","Keeping sauces and foods warm using a hot water bath","A type of pastry shell","Straining stocks and soups"],ans:1},
  {q:"'Covers' in restaurant language means?",opts:["The lids placed on pots and pans","The number of guests or meals served","Table cloths and napkins","Portion sizes for each dish"],ans:1},
  {q:"What does 'Garnish' mean?",opts:["The main protein on a plate","A decorative and complementary addition to a dish that enhances presentation and flavour","A sauce poured over a dish","The side dish served alongside the main"],ans:1},
  {q:"What is 'Plating' in kitchen terminology?",opts:["Washing and stacking plates after service","The process of arranging and presenting food on a plate for service","Covering pots with plate-sized lids","Testing the temperature of a plate before service"],ans:1},
  {q:"The term 'Station' in a kitchen refers to?",opts:["A television station in the staff room","The specific area and role a chef is responsible for during service (e.g., grill station, sauce station)","The kitchen manager's office","Where equipment is stored after service"],ans:1},
  {q:"What does 'Deglaze' mean?",opts:["To remove the glaze from a pastry","Adding liquid to a hot pan to lift caramelized bits from the bottom, adding flavour to a sauce","Cleaning grease off the stovetop","Removing oil from a finished sauce"],ans:1},
  {q:"'Temper' in a kitchen context means?",opts:["The chef losing their patience during service","Gradually raising the temperature of a cold ingredient (like eggs or chocolate) before combining with something hot","Heating a pan to the correct temperature before cooking","Adjusting the seasoning of a sauce"],ans:1},
  {q:"What is 'Brunoise'?",opts:["A French word for a brown sauce","A very fine dice cut of vegetables — 3mm cubes","A method of roasting vegetables","A type of soup from France"],ans:1},
  {q:"What does 'Chiffonade' mean?",opts:["A light French dessert made with whipped cream","Slicing leafy herbs or vegetables into thin ribbon-like strips","A method of deep frying delicate greens","A garnish of fried onions on top of a dish"],ans:1},
  {q:"The term 'Al dente' (used for pasta and vegetables) means?",opts:["Fully cooked until very soft","Cooked until just firm to the bite — not overcooked","Cooked in salted water only","Cooked without any oil or butter"],ans:1},
  {q:"What is a 'Cartouche' used for in cooking?",opts:["A type of rich chocolate cake","A circle of parchment paper placed directly on a liquid to prevent a skin forming and control evaporation","A garnish made from carved vegetables","A French term for a serving platter"],ans:1},
  {q:"'Blanching' a vegetable means?",opts:["Cooking it fully in boiling water until soft","Briefly boiling it then immediately plunging it into ice water to stop cooking and preserve colour","Roasting it at high temperature to remove the skin","Marinating in lemon juice to soften the texture"],ans:1},
  {q:"What does 'Reduce' mean when applied to a sauce or liquid?",opts:["To add water to thin the sauce down","To simmer a liquid so water evaporates, concentrating the flavour and thickening the consistency","To strain out all solid ingredients","To add cream to make the sauce richer"],ans:1},
  {q:"The term 'Nappe' describes a sauce that?",opts:["Is very thin and watery","Coats the back of a spoon — thick enough to leave a clean line when you draw your finger through","Has been strained through a fine sieve","Contains cream and egg yolks"],ans:1},
  {q:"What does 'Saute' literally mean in French?",opts:["To roast slowly","To jump — food is cooked quickly in a small amount of fat over high heat with tossing","To simmer gently","To steam in a covered pan"],ans:1},
  {q:"In kitchen language, 'Waste' refers to?",opts:["The dirty dishes after service","Trim, off-cuts, and unusable parts of ingredients that are discarded or repurposed","Staff meals at the end of service","Leftover sauce poured down the drain"],ans:1},
  {q:"What is 'Portion control'?",opts":["Controlling the number of staff portions at staff meal","Ensuring each dish is served with a consistent, measured amount of each ingredient to maintain cost and quality","Reducing the size of all dishes by half","Weighing every ingredient to the nearest milligram"],ans:1},
  {q:"What does 'FEFO' stand for in food storage?",opts:["First Expired First Out — items expiring soonest are used first","Fresh Eggs For Orders","Food and Equipment Final Output","First Entry Final Order"],ans:0},
  {q:"The term 'Yield' in a kitchen means?",opts:["How fast a chef works during service","The usable amount of an ingredient after trimming, peeling, and preparation — expressed as a percentage","The number of portions a recipe produces after cooking","The total weight of food purchased per week"],ans:1},
];

let order=[], cur=0, picks={};

function shuffle(a){return [...a].sort(()=>Math.random()-.5)}

function start(){
  order=shuffle([...Array(BANK.length).keys()]);
  cur=0; picks={};
  document.getElementById('quiz').style.display='block';
  document.getElementById('results').style.display='none';
  render();
}

function render(){
  const qi=order[cur], q=BANK[qi];
  const pct=Math.round(cur/BANK.length*100);
  document.getElementById('prog').style.width=pct+'%';
  document.getElementById('qnum').textContent='Question '+(cur+1)+' of '+BANK.length;
  document.getElementById('qtext').textContent=q.q;
  const ol=document.getElementById('opts');
  ol.innerHTML='';
  const L=['A','B','C','D'];
  const answered=picks[qi]!==undefined;
  q.opts.forEach((o,i)=>{
    const b=document.createElement('button');
    b.className='opt';
    if(answered){
      if(i===q.ans) b.classList.add('correct');
      else if(i===picks[qi]) b.classList.add('wrong');
      else b.classList.add('dimmed');
    }
    b.innerHTML='<span class="opt-letter">'+L[i]+'</span><span>'+o+'</span>';
    if(!answered) b.onclick=()=>{picks[qi]=i;render();};
    ol.appendChild(b);
  });
  document.getElementById('btnPrev').disabled=cur===0;
  document.getElementById('btnNext').textContent=cur===BANK.length-1?'Finish ✓':'Next →';
}

function move(d){
  if(d===1&&cur===BANK.length-1){finish();return;}
  cur=Math.max(0,Math.min(BANK.length-1,cur+d));
  render();
}

function finish(){
  document.getElementById('quiz').style.display='none';
  const res=document.getElementById('results');
  res.style.display='block';
  const total=BANK.length;
  const correct=Object.entries(picks).filter(([i,a])=>BANK[i].ans===a).length;
  const pct=Math.round(correct/total*100);
  const circ=314;
  document.getElementById('arc').setAttribute('stroke-dashoffset',circ-(circ*pct/100));
  document.getElementById('arc').setAttribute('stroke',pct>=80?'#22C55E':pct>=60?'#7C3AED':'#EF4444');
  document.getElementById('ringNum').textContent=pct+'%';
  document.getElementById('resTitle').textContent=pct>=80?'Excellent!':pct>=60?'Good effort!':'Keep practicing';
  document.getElementById('resSub').textContent=correct+' correct out of '+total+' questions';
  const rv=document.getElementById('review');
  rv.innerHTML='<h3>Review</h3>';
  order.forEach(qi=>{
    const q=BANK[qi], ua=picks[qi], ok=ua===q.ans;
    const L=['A','B','C','D'];
    const d=document.createElement('div');
    d.className='rv '+(ok?'ok':'miss');
    d.innerHTML='<div class="rv-q">'+q.q+'</div><div class="rv-a">'+(ok?'<span class="c">✓ '+L[q.ans]+'. '+q.opts[q.ans]+'</span>':'<span class="w">✗ You: '+(ua!==undefined?L[ua]+'. '+q.opts[ua]:'Skipped')+'</span> &nbsp;|&nbsp; <span class="c">✓ '+L[q.ans]+'. '+q.opts[q.ans]+'</span>')+'</div>';
    rv.appendChild(d);
  });
}

function retry(){
  order=shuffle(order);
  cur=0; picks={};
  document.getElementById('results').style.display='none';
  document.getElementById('quiz').style.display='block';
  render();
}

start();
</script>
</body>
</html>
