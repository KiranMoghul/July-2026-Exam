<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MS PowerPoint — July 2026 Exam</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💻</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap');
  :root{--bg:#080810;--surface:#11111f;--border:#1e1e35;--purple:#7c3aed;--purple-l:#9d5bf0;--green:#22c55e;--red:#ef4444;--text:#e8e8f0;--muted:#7070a0;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:.4;pointer-events:none;z-index:0;}
  .screen{position:relative;z-index:1;width:100%;max-width:660px;margin:0 auto;padding:24px 20px 48px;display:none;}
  .screen.active{display:block;}
  #name-screen{text-align:center;padding-top:80px;}
  .back-link{display:inline-flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);text-decoration:none;letter-spacing:1px;margin-bottom:48px;transition:color .2s;}
  .back-link:hover{color:var(--purple-l);}
  .subject-tag{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--purple-l);margin-bottom:12px;}
  #name-screen h1{font-size:clamp(22px,5vw,36px);font-weight:800;line-height:1.15;margin-bottom:8px;background:linear-gradient(135deg,#fff 30%,var(--purple-l));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  #name-screen p{color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;margin-bottom:40px;}
  .name-box{display:flex;flex-direction:column;align-items:center;gap:12px;}
  .name-box input{width:100%;max-width:320px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Syne',sans-serif;font-size:15px;outline:none;text-align:center;transition:border-color .2s;}
  .name-box input:focus{border-color:var(--purple);}
  .name-box input::placeholder{color:var(--muted);}
  .btn-primary{padding:12px 32px;background:var(--purple);color:#fff;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:background .2s,transform .1s;letter-spacing:.5px;}
  .btn-primary:hover{background:var(--purple-l);transform:translateY(-1px);}
  .quiz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
  .quiz-meta{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
  .quiz-meta span{color:var(--purple-l);font-weight:500;}
  .quiz-back{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);background:none;border:1px solid var(--border);padding:5px 10px;border-radius:6px;cursor:pointer;transition:color .2s,border-color .2s;}
  .quiz-back:hover{color:var(--text);border-color:var(--purple);}
  .progress-bar{width:100%;height:3px;background:var(--border);border-radius:2px;margin-bottom:32px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--purple-l));border-radius:2px;transition:width .3s ease;}
  .question-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--purple-l);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
  .question-text{font-size:clamp(15px,3vw,18px);font-weight:600;line-height:1.5;margin-bottom:28px;color:var(--text);}
  .options{display:flex;flex-direction:column;gap:10px;}
  .opt-btn{display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;font-weight:400;cursor:pointer;text-align:left;transition:border-color .15s,background .15s;width:100%;}
  .opt-btn:hover:not(:disabled){border-color:var(--purple);background:#16162a;}
  .opt-btn .opt-letter{flex-shrink:0;width:26px;height:26px;border-radius:6px;background:var(--border);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);transition:background .15s,color .15s;}
  .opt-btn:hover:not(:disabled) .opt-letter{background:var(--purple);color:#fff;}
  .opt-btn.correct{border-color:var(--green);background:rgba(34,197,94,.1);}
  .opt-btn.correct .opt-letter{background:var(--green);color:#fff;}
  .opt-btn.wrong{border-color:var(--red);background:rgba(239,68,68,.1);}
  .opt-btn.wrong .opt-letter{background:var(--red);color:#fff;}
  .opt-btn:disabled{cursor:default;}
  .explanation{display:none;margin-top:16px;padding:14px 16px;background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.25);border-left:3px solid var(--purple);border-radius:8px;font-size:13px;line-height:1.6;color:#c4b5fd;font-family:'DM Mono',monospace;}
  .explanation.show{display:block;}
  .action-row{display:flex;gap:10px;margin-top:24px;}
  .next-btn{flex:1;padding:13px;background:var(--purple);color:#fff;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;display:none;transition:background .2s;letter-spacing:.5px;}
  .next-btn:hover{background:var(--purple-l);}
  .next-btn.show{display:block;}
  .quit-btn{padding:13px 18px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;display:none;transition:color .2s,border-color .2s;white-space:nowrap;}
  .quit-btn:hover{color:var(--text);border-color:var(--purple);}
  .quit-btn.show{display:block;}
  #results-screen{text-align:center;padding-top:40px;}
  .result-name{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);margin-bottom:32px;}
  .score-ring{position:relative;width:160px;height:160px;margin:0 auto 28px;}
  .score-ring svg{transform:rotate(-90deg);}
  .score-ring .ring-bg{fill:none;stroke:var(--border);stroke-width:10;}
  .score-ring .ring-fill{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1s ease,stroke .5s;}
  .score-ring .ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .ring-pct{font-size:34px;font-weight:800;line-height:1;}
  .ring-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:4px;letter-spacing:1px;}
  .result-title{font-size:24px;font-weight:800;margin-bottom:8px;}
  .result-sub{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);margin-bottom:8px;}
  .result-verdict{font-family:'DM Mono',monospace;font-size:12px;padding:8px 20px;border-radius:20px;display:inline-block;margin-bottom:32px;}
  .result-verdict.pass{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.3);}
  .result-verdict.fail{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.3);}
  .result-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:40px;}
  .btn-outline{padding:11px 24px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:border-color .2s,color .2s;}
  .btn-outline:hover{border-color:var(--purple);color:var(--text);}
  .review{text-align:left;}
  .review h3{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:16px;font-family:'DM Mono',monospace;}
  .rv-item{padding:14px 16px;border-radius:8px;margin-bottom:10px;border:1px solid var(--border);}
  .rv-item.ok{border-color:rgba(34,197,94,.25);background:rgba(34,197,94,.05);}
  .rv-item.miss{border-color:rgba(239,68,68,.25);background:rgba(239,68,68,.05);}
  .rv-q{font-size:13px;font-weight:600;margin-bottom:8px;line-height:1.4;}
  .rv-a{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);line-height:1.6;}
  .rv-a .c{color:var(--green);}
  .rv-a .w{color:var(--red);}
</style>
</head>
<body>
<div class="screen active" id="name-screen">
  <a class="back-link" href="index.html">← Back to subjects</a>
  <div class="subject-tag">Computer · Topic 04</div>
  <h1>MS PowerPoint</h1>
  <p>19 questions · Every point from your syllabus · Order shuffles each attempt</p>
  <div class="name-box">
    <input type="text" id="name-input" placeholder="Enter your name" maxlength="30" autocomplete="off">
    <button class="btn-primary" onclick="startQuiz()">Start Quiz</button>
  </div>
</div>
<div class="screen" id="quiz-screen">
  <div class="quiz-header">
    <div class="quiz-meta">Question <span id="q-num">1</span> of <span id="q-total">19</span></div>
    <div class="quiz-meta">Score <span id="q-score">0</span></div>
    <button class="quiz-back" onclick="goBack()">← Quit</button>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="question-num" id="q-label"></div>
  <div class="question-text" id="q-text"></div>
  <div class="options" id="options"></div>
  <div class="explanation" id="explanation"></div>
  <div class="action-row">
    <button class="quit-btn" id="quit-btn" onclick="goBack()">← Back to subjects</button>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">Next Question →</button>
  </div>
</div>
<div class="screen" id="results-screen">
  <div class="result-name" id="result-name"></div>
  <div class="score-ring">
    <svg viewBox="0 0 160 160" width="160" height="160">
      <circle class="ring-bg" cx="80" cy="80" r="70"/>
      <circle class="ring-fill" id="ring-fill" cx="80" cy="80" r="70" stroke-dasharray="439.82" stroke-dashoffset="439.82" stroke="var(--green)"/>
    </svg>
    <div class="ring-text">
      <div class="ring-pct" id="ring-pct">0%</div>
      <div class="ring-label">SCORE</div>
    </div>
  </div>
  <div class="result-title" id="res-title"></div>
  <div class="result-sub" id="res-sub"></div>
  <div class="result-verdict" id="res-verdict"></div>
  <div class="result-actions">
    <button class="btn-primary" onclick="retryQuiz()">Retry →</button>
    <button class="btn-outline" onclick="window.location.href='index.html'">All Subjects</button>
  </div>
  <div class="review" id="review"></div>
</div>
<script>
const BANK=[
{q:"What is MS PowerPoint primarily used for?",opts:["Creating and editing text documents such as reports, letters, and professional correspondence","Performing numerical calculations, building spreadsheets, and analysing data using formulas","Creating slide-based presentations for audiences, combining text, images, animations, and multimedia","Managing databases, running queries, and generating structured reports from stored data"],ans:2,exp:"MS PowerPoint is used for presentation purposes — creating slide-based presentations with text, images, charts, animations, and multimedia for audiences."},
{q:"What are the file extensions associated with MS PowerPoint?",opts:[".doc and .docx — the word processing file formats used by MS Word across all versions",".xls and .xlsx — the spreadsheet file formats used by MS Excel across all versions",".ppt and .pptx — the presentation file formats used by MS PowerPoint across all versions",".txt and .rtf — the plain text and rich text formats supported by all Office applications"],ans:2,exp:"MS PowerPoint uses .ppt (older versions before 2007) and .pptx (2007 and later) as its file extensions."},
{q:"What is the top bar in MS PowerPoint called, and what is its default file name?",opts:["The Ribbon bar — default name is 'Slide 1' showing the number of the currently active slide","The Menu bar — default name is 'Untitled Presentation' until the file is saved by the user","The Title bar — default name is 'Presentation 1' until the file is saved with a specific name","The Status bar — default name is 'New Presentation' showing the current slide count and view"],ans:2,exp:"The top bar in MS PowerPoint is called the Title bar. Its default name is 'Presentation 1' until the file is saved with a specific name."},
{q:"How do you delete the slide currently displayed in the Slide pane in MS PowerPoint?",opts:["Press the Backspace key while the slide is visible in the main editing area","Press Ctrl+D to duplicate and then immediately delete the currently displayed slide","Select the Delete Slide command — found by right-clicking the slide or in the Home tab","Press Ctrl+Delete to remove the active slide and all its content from the presentation"],ans:2,exp:"To delete the currently displayed slide in MS PowerPoint, use the Delete Slide command — right-click the slide thumbnail in the Slides panel and select Delete Slide, or find it in the Home tab."},
{q:"What happens when you press the Esc key during a PowerPoint slide show?",opts:["It pauses the slide show and displays a black screen until any key is pressed to resume","It skips to the last slide in the presentation and shows the End of Show screen","It ends the slide show and returns you to the normal editing view of the presentation","It opens the slide show settings dialog where you can adjust the presentation options"],ans:2,exp:"During a slide show, pressing the Esc key ends the slide show and returns you to the normal editing view (or the last view you were in before starting the show)."},
{q:"Which keyboard key can be used to start (view) a slide show in MS PowerPoint?",opts:["F1 — which opens the Help panel for MS PowerPoint in all versions of the application","F3 — which activates the Find and Replace dialog for searching text in slides","F5 — which starts the slide show from the very first slide of the presentation","F7 — which runs the spelling and grammar check across all slides in the presentation"],ans:2,exp:"F5 starts the slide show from the beginning (Slide 1) in MS PowerPoint. Shift+F5 starts the show from the currently selected slide."},
{q:"From which menu tab can you add pictures, shapes, tables, sound clips, or movie clips in MS PowerPoint?",opts:["Home tab — which contains text formatting, paragraph alignment, and slide layout options","Design tab — which contains themes, background styles, and slide size settings","Insert tab — which contains pictures, shapes, tables, sound clips, movie clips, and other objects","Transitions tab — which contains slide transition effects and timing settings"],ans:2,exp:"In MS PowerPoint, pictures, shapes, tables, sound clips, and movie clips are all added from the Insert menu tab."},
{q:"What is a 'Layout' in MS PowerPoint?",opts:["The colour scheme and font combination applied uniformly across all slides in the presentation","The visual transition effect that plays when moving from one slide to the next during the show","The arrangement of elements such as title and subtitle text, pictures, and tables on a slide","The master template that controls the background image and branding across all slides"],ans:2,exp:"A Layout in MS PowerPoint is the arrangement of elements on a slide — such as the position of the title, subtitle, content placeholders, pictures, and tables. Different layouts suit different content types."},
{q:"How can you create a uniform appearance by adding a background image to all slides in a presentation?",opts:["By inserting the image on the first slide only — PowerPoint automatically copies it to all other slides","By using the AutoCorrect wizard to detect and apply background images across the presentation","By creating a template or editing the Slide Master — changes to the Slide Master apply to all slides","By copying and pasting the background image manually to each individual slide in the presentation"],ans:2,exp:"To apply a uniform background to all slides: create a template or edit the Slide Master (View → Slide Master). Changes made to the Slide Master automatically apply to every slide in the presentation."},
{q:"What is a Transition in MS PowerPoint?",opts:["An animation effect applied to individual text or objects on a slide to make them appear or move","A pre-designed colour and font combination applied to give all slides a consistent visual style","The visual effect that occurs when you move from one slide to the next during the presentation","A sound effect that plays automatically at the beginning of each slide when presenting to an audience"],ans:2,exp:"A Transition is the visual effect that plays when moving from one slide to the next during a presentation — for example, Fade, Wipe, Push, or Fly. It is applied from the Transitions tab."},
{q:"What is Animation in MS PowerPoint and why is it used?",opts:["A background movement effect applied to the slide canvas to create a sense of depth and motion","A pre-built slide design that includes moving elements to make the presentation look professional","A feature that can make a presentation more dynamic and help make information more memorable by adding motion to objects on a slide","A transition effect that plays between slides to create a smooth flowing visual experience for viewers"],ans:2,exp:"Animation applies motion effects to individual elements on a slide — text, images, charts. It makes presentations more dynamic and helps make information more memorable by controlling when and how content appears."},
{q:"Which key will NOT advance slides during a PowerPoint slide show?",opts:["Spacebar — pressing it moves the presentation forward to the next slide or animation","Enter key — pressing it advances to the next slide or triggers the next animation","Right arrow key — pressing it moves to the next slide or next animation in the sequence","Esc key — pressing it ends the slide show instead of advancing to the next slide"],ans:3,exp:"The Esc key does NOT advance slides — it ends the slide show entirely. Spacebar, Enter, and the Right arrow key all advance to the next slide or animation."},
{q:"What are Placeholders in MS PowerPoint?",opts:["Pre-formatted colour blocks applied to the slide background to create visual zones","Invisible alignment guides that help position objects consistently across multiple slides","Objects on the slide that hold text — dashed bordered boxes where you click to add content","Locked image frames that reserve space for photographs to be added before presenting"],ans:2,exp:"Placeholders are objects on a slide that hold text — they appear as dashed bordered boxes with 'Click to add title' or 'Click to add text' prompts. They define where content goes on each slide layout."},
{q:"What is a Motion Path in MS PowerPoint?",opts:["The route a presenter physically walks while delivering a presentation to a large audience","A pre-defined animation sequence that moves all elements on a slide in a set order","A method of animating items on a slide by defining the path along which they move","A slide transition that sweeps content across the screen in a specific directional pattern"],ans:2,exp:"A Motion Path is an animation type in MS PowerPoint that allows objects on a slide to move along a defined path — for example, a ball bouncing, text flying in from the side, or a logo moving across the screen."},
{q:"Which of the following actions CANNOT be used to create a new presentation in MS PowerPoint?",opts:["Clicking File → New to open a blank presentation or choose from available templates","Selecting a design template from the New Presentation dialog to start with a styled layout","Using the AutoContent Wizard to create a presentation based on pre-defined content outlines","Clicking File → Open — which opens an existing file and cannot create a new presentation"],ans:3,exp:"Clicking File → Open cannot create a new presentation — it is used to open an existing file. New presentations are created using File → New, selecting a template, or using the AutoContent Wizard."},
{q:"What are the special effects used to introduce slides in a presentation called?",opts:["Animations — the motion effects applied to individual objects within a single slide","Layouts — the arrangement of content elements such as text, images, and charts on a slide","Slide Transitions — the special effects that play when moving from one slide to the next","Themes — the pre-designed colour, font, and graphic combinations applied to the whole presentation"],ans:2,exp:"Slide Transitions are the special effects used to introduce slides — they play as you move from one slide to the next during a presentation. Examples include Fade, Wipe, Cube, and Dissolve."},
{q:"What is a Design Template in MS PowerPoint?",opts:["A blank presentation with no formatting that allows the user to build from scratch","A pre-recorded slide show that plays automatically when the file is opened","A template that lets you create new presentations by selecting ready-made font, colour, and graphics effects","A master chart layout that automatically populates slides with data from an Excel spreadsheet"],ans:2,exp:"A Design Template in MS PowerPoint lets you create new presentations by selecting ready-made font colours and graphic effects — giving all slides a consistent, professional appearance from the start."},
{q:"Which of the following is NOT one of PowerPoint's standard views?",opts:["Normal view — the default editing view showing the slide, notes panel, and slide thumbnails","Slide Sorter view — showing all slides as thumbnails for easy reordering and organisation","Reading view — displaying the presentation full screen for review without presenting to an audience","Outline view — this is NOT one of PowerPoint's standard views"],ans:3,exp:"Outline view is NOT one of PowerPoint's standard views. The standard views are: Normal, Slide Sorter, Notes Page, and Reading View. Outline view existed in older versions but was removed as a main view option."},
{q:"For what purpose are PowerPoint presentations widely used by students?",opts:["For creating printed newsletters and multi-column academic journals for classroom distribution","For building spreadsheets and tracking assignment grades and attendance records","For managing email correspondence and scheduling academic project deadlines","For project presentations — students use PowerPoint to present research, assignments, and projects"],ans:3,exp:"PowerPoint presentations are widely used by students for project presentations — combining text, images, charts, and animations to present research, assignments, and academic projects to classmates and teachers."}
];
let order=[],cur=0,picks={},playerName='',score=0;
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function goBack(){if(confirm('Quit quiz and return to subjects?'))window.location.href='index.html';}
function startQuiz(){const inp=document.getElementById('name-input').value.trim();playerName=inp||'Anonymous';order=shuffle(BANK.map((_,i)=>i));cur=0;picks={};score=0;document.getElementById('q-total').textContent=BANK.length;show('quiz-screen');render();}
function render(){const idx=order[cur],q=BANK[idx],total=BANK.length;document.getElementById('q-num').textContent=cur+1;document.getElementById('q-score').textContent=score;document.getElementById('q-label').textContent=`Question ${cur+1} of ${total}`;document.getElementById('q-text').textContent=q.q;document.getElementById('progress-fill').style.width=((cur/total)*100)+'%';document.getElementById('explanation').className='explanation';document.getElementById('explanation').textContent='';document.getElementById('next-btn').className='next-btn';document.getElementById('quit-btn').className='quit-btn';const letters=['A','B','C','D'],optEl=document.getElementById('options');optEl.innerHTML='';shuffle([0,1,2,3]).forEach((oi,li)=>{const btn=document.createElement('button');btn.className='opt-btn';btn.dataset.opt=oi;btn.innerHTML=`<span class="opt-letter">${letters[li]}</span><span>${q.opts[oi]}</span>`;btn.onclick=()=>selectAnswer(oi,idx);optEl.appendChild(btn);});}
function selectAnswer(chosen,idx){const q=BANK[idx],correct=chosen===q.ans;picks[idx]=chosen;if(correct)score++;document.getElementById('q-score').textContent=score;document.querySelectorAll('.opt-btn').forEach(btn=>{btn.disabled=true;const oi=parseInt(btn.dataset.opt);if(oi===q.ans)btn.classList.add('correct');else if(oi===chosen&&!correct)btn.classList.add('wrong');});if(!correct){const e=document.getElementById('explanation');e.textContent='✗ '+q.exp;e.classList.add('show');}const nb=document.getElementById('next-btn');nb.classList.add('show');nb.textContent=cur+1<BANK.length?'Next Question →':'See Results →';document.getElementById('quit-btn').classList.add('show');}
function nextQuestion(){cur++;if(cur>=BANK.length)showResults();else{render();window.scrollTo(0,0);}}
function showResults(){show('results-screen');const total=BANK.length,pct=Math.round((score/total)*100),passed=pct>=70;document.getElementById('result-name').textContent=playerName;document.getElementById('ring-pct').textContent=pct+'%';document.getElementById('ring-pct').style.color=passed?'var(--green)':'var(--red)';document.getElementById('ring-fill').style.stroke=passed?'var(--green)':'var(--red)';setTimeout(()=>{document.getElementById('ring-fill').style.strokeDashoffset=439.82-(439.82*pct/100);},100);document.getElementById('res-title').textContent=pct>=90?'Excellent!':pct>=70?'Passed!':'Needs Work';document.getElementById('res-sub').textContent=`${score} correct out of ${total} questions`;const v=document.getElementById('res-verdict');if(passed){v.textContent='✓ You passed — score above 70%';v.className='result-verdict pass';}else{v.textContent='✗ Below 70% — please retake the quiz';v.className='result-verdict fail';}const rv=document.getElementById('review');rv.innerHTML='<h3>Review</h3>';order.forEach(idx=>{const q=BANK[idx],ua=picks[idx],ok=ua===q.ans;const d=document.createElement('div');d.className='rv-item '+(ok?'ok':'miss');d.innerHTML=`<div class="rv-q">${q.q}</div><div class="rv-a">${ok?`<span class="c">✓ Correct: ${q.opts[q.ans]}</span>`:`<span class="w">✗ You chose: ${ua!==undefined?q.opts[ua]:'Skipped'}</span><br><span class="c">✓ Correct: ${q.opts[q.ans]}</span><br><span style="color:var(--muted)">${q.exp}</span>`}</div>`;rv.appendChild(d);});}
function retryQuiz(){order=shuffle(order);cur=0;picks={};score=0;document.getElementById('q-score').textContent=0;show('quiz-screen');render();}
document.getElementById('name-input').addEventListener('keydown',e=>{if(e.key==='Enter')startQuiz();});
</script>
</body>
</html>
