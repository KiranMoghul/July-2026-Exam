  .rv-item.miss{border-color:rgba(239,68,68,.25);background:rgba(239,68,68,.05);}
  .rv-q{font-size:13px;font-weight:600;margin-bottom:8px;line-height:1.4;}
  .rv-a{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);line-height:1.6;}
  .rv-a .c{color:var(--green);}

</style>

<script>
const BANK = [
  {
    q: "What is a stock in classical culinary terms, and what are its four essential components?",

      "A flavoured liquid produced by simmering bones, mirepoix, a bouquet garni, and water together over several hours to extract gelatin and flavour",

      "A preserved liquid made by combining raw meat juices with vinegar and salt to extend its shelf life for use across multiple services"
    ],
    ans: 0,
    exp: "A stock is a flavoured, unseasoned liquid made by simmering bones (or shells/vegetables), mirepoix, a bouquet garni, and cold water. The four components are: bones, mirepoix, bouquet garni, and water. It is the foundation of professional sauce and soup-making."
  },
  {
    q: "Why is cold water used at the start of stock-making rather than hot or boiling water?",
    opts: [
      "Cold water prevents the bones from cracking when placed in the pot, which would release marrow that clouds the final stock",
      "Cold water allows proteins and impurities to dissolve gradually and rise slowly to the surface as scum, making them easier to skim off",

      "Cold water is used only for brown stocks — white stocks always begin with hot water to prevent the bones from discolouring the liquid"
    ],
    ans: 1,
    exp: "Starting with cold water allows proteins and impurities to dissolve and coagulate slowly as the temperature rises, forming scum that floats to the surface and can be skimmed off cleanly. Hot water causes proteins to seize immediately, trapping impurities inside the liquid and clouding the stock."
  },
  {
    q: "What is the difference between a white stock and a brown stock?",
    opts: [
      "White stock uses raw unroasted bones and vegetables simmered gently in cold water, while brown stock uses roasted bones and caramelised mirepoix for a darker colour and richer flavour",
      "White stock is made from fish and shellfish bones only, while brown stock is made exclusively from beef and veal bones for red meat sauces",
      "White stock is clarified using egg whites before use, while brown stock is left unclarified and used directly for brown sauces and gravies",
      "White stock is simmered for 2 hours maximum, while brown stock requires a minimum of 12 hours to develop its characteristic deep colour"
    ],
    ans: 0,
    exp: "White stock (fond blanc): raw bones placed in cold water, brought gently to a simmer — produces a pale, clean, delicate liquid. Brown stock (fond brun): bones and mirepoix are roasted first until deeply caramelised, then simmered — produces a rich, dark, deeply flavoured liquid through the Maillard reaction."
  },
  {
    q: "What is the correct simmering time for a chicken stock and a veal/beef stock respectively?",
    opts: [
      "Chicken stock: 30–45 minutes; veal/beef stock: 2–3 hours — longer times for poultry produce an overly strong, unpleasant flavour",
      "Chicken stock: 3–4 hours; veal/beef stock: 6–8 hours — larger and denser bones require longer simmering to fully extract gelatin and flavour",
      "Chicken stock: 1–2 hours; veal/beef stock: 3–4 hours — both are simmered gently without boiling to produce a clear, flavourful liquid",
      "Chicken stock: 6 hours; veal/beef stock: 12–24 hours — maximum extraction time is always preferred regardless of bone size or type"
    ],
    ans: 1,
    exp: "Chicken stock: 3–4 hours (smaller bones, less collagen). Fish stock (fumet): 20–30 minutes only — longer makes it bitter. Veal/beef stock: 6–8 hours for full gelatin and flavour extraction from large dense bones. Over-simmering extracts bitter compounds and weakens flavour."
  },
  {
    q: "Why should a stock never be boiled vigorously during cooking?",
    opts: [
      "Boiling causes the fat in the bones to fully render out, making the stock too rich and greasy for use in delicate sauces and soups",
      "Boiling agitates the liquid, breaking up impurities and emulsifying fat into the stock — producing a cloudy, greasy, unpleasant-tasting result",
      "Boiling causes the mirepoix to break down completely, releasing bitter compounds from the onion skins that ruin the flavour of the stock",
      "Boiling destroys the gelatin that has been extracted from the bones, significantly reducing the body and setting quality of the finished stock"

    ans: 1,
    exp: "Boiling agitates the liquid violently, breaking fat globules and impurities into tiny particles that become permanently suspended — producing a cloudy, greasy stock. Always simmer gently (85°C–95°C) with the surface barely moving. Skim regularly to remove fat and scum."
  },
  {
    q: "What is 'gelatin' in the context of stock-making and which bones produce the most?",
    opts: [
      "A fat compound extracted during long simmering that gives stock a rich, glossy appearance and a creamy mouthfeel when served warm",
      "A protein extracted from collagen-rich connective tissue and bones during simmering — it gives stock body and causes it to set to a jelly when chilled",

      "A thickening agent found only in fish bones that must be extracted within 20 minutes before it breaks down and clouds the stock"
    ],
    ans: 1,
    exp: "Gelatin is extracted from collagen — found in connective tissue, cartilage, and bones. High-gelatin bones: veal knuckles, pig's trotters, chicken feet, fish bones. When chilled, a gelatin-rich stock sets to a firm jelly. This body gives sauces their coating consistency and mouthfeel."
  },
  {
    q: "What is a 'fumet' in professional cooking?",
    opts: [
      "A concentrated brown stock made from roasted veal bones reduced to one-third of its original volume for use in rich classical sauces",
      "A delicate, quickly made fish stock produced by simmering fish bones and trimmings in cold water with white wine and aromatics for 20–30 minutes",
      "A aromatic vegetable stock made from leek tops, celery, onion, and fennel simmered for 45 minutes for use in vegetarian preparations",
      "A smoked stock produced by cold-smoking chicken bones before simmering them in water to create a smoky base for barbecue sauces"
    ],
    ans: 1,
    exp: "Fumet (fish stock) is made from fish bones and trimmings (never oily fish), white wine, water, and aromatics — simmered for exactly 20–30 minutes. Longer cooking makes it bitter. Flat fish bones (sole, turbot) produce the finest fumet. It is the base for fish velouté and seafood sauces."
  },
  {
    q: "What is 'glace de viande' and how is it produced?",
    opts: [
      "A clarified, gelatinous veal stock that has been chilled until set, then cut into cubes for convenient portioning and freezing",
      "A highly concentrated, syrupy reduction of brown stock — reduced by approximately 90% — used as a flavour-intensifying glaze or base",
      "A semi-set stock enriched with cream and egg yolks, used as a rich coating sauce for roasted and grilled meats at formal banquet dinners",
      "A cold emulsified butter sauce made from veal stock and cream, used to glaze vegetables and proteins before serving at fine dining service"
    ],
    ans: 1,
    exp: "Glace de viande (meat glaze) is brown stock reduced by approximately 90% to a thick, syrupy, intensely flavoured concentrate. It sets solid when cold and is used in tiny amounts to add depth of flavour to sauces. A small spoonful equals hours of stock-making flavour."
  },
  {
    q: "What is a 'court-bouillon' and what is it used for?",
    opts: [
      "A rich, long-simmered shellfish stock used as the base for bisque and classical seafood sauces in a professional kitchen",
      "A quickly made acidulated poaching liquid of water, white wine or vinegar, vegetables, and aromatics — used for poaching fish and shellfish",
      "A short reduction of white wine, shallots, and herbs used as the base for butter sauces served alongside grilled fish and seafood",
      "A clarified vegetable stock thickened with a light roux and used as a neutral base for cream soups in vegetarian menu preparations"
    ],
    ans: 1,
    exp: "Court-bouillon (short broth) is a quickly made, acidulated poaching liquid — water + white wine or vinegar + sliced onion + carrot + bouquet garni + peppercorns. It is used to poach fish, shellfish, and sometimes offal. The acid in the wine or vinegar firms up the flesh and adds subtle flavour."
  },
  {
    q: "What is a 'consommé' and what process is used to produce it?",
    opts: [
      "A rich, thickened brown soup made from roasted beef bones and root vegetables, clarified by straining through a fine chinois before serving",
      "A crystal-clear, intensely flavoured clarified stock produced by simmering a cloudy stock with a 'clearmeat' raft of lean ground meat, egg whites, and mirepoix",
      "A light vegetable broth clarified by chilling until the fat sets and can be removed, then reheated and seasoned before service",
      "A fish-based clear soup clarified by passing through a fine muslin cloth and then reducing by half to intensify its natural flavour"
    ],
    ans: 1,
    exp: "Consommé is a perfectly clear, intensely flavoured soup. A cloudy stock is combined with a 'clearmeat' (lean minced meat + egg whites + mirepoix + acid). As it heats, egg proteins coagulate and form a raft that traps all impurities. The raft is then strained out, leaving a crystal-clear liquid."
  },
  {
    q: "What is the 'clearmeat' or 'clarification raft' used in making consommé?",
    opts: [
      "A mixture of cream and egg yolks stirred into the stock at the end of cooking to enrich it and produce a silky, velvety clear soup",
      "A mixture of lean minced meat, egg whites, mirepoix, and an acidic ingredient — which coagulates as it heats, trapping impurities and clarifying the stock",
      "A fine muslin cloth stretched over the pot during simmering to catch any fat or foam that rises to the surface of the stock",
      "A mixture of arrowroot and cold water stirred into the stock to bind and remove impurities by precipitation during a brief boil"

    ans: 1,
    exp: "The clearmeat (also called clarification) is a mixture of lean minced meat (which provides flavour), egg whites (which coagulate and trap impurities), mirepoix, acid (tomato or lemon), and herbs. As the stock heats, the mixture forms a solid raft. When the raft is removed and liquid strained, the consommé is clear."
  },
  {
    q: "What is the difference between a 'broth' and a 'stock' in professional culinary terminology?",
    opts: [
      "A broth is made only from vegetables and herbs with no bones, while a stock always requires bones to extract gelatin and body",
      "A broth is a flavoured, lightly seasoned liquid made by simmering meat (not just bones) and is often served as a dish itself, while stock is unseasoned and used as a base",

  },
  {
    q: "What are the main categories of soup in classical French cuisine?",
    opts: [
      "Thin soups and thick soups — with thin soups subdivided into clear soups and broths, and thick soups into cream soups, purées, and bisques",
      "Hot soups and cold soups — with hot soups used only during winter service and cold soups reserved for summer à la carte menus only",
      "Savoury soups and sweet soups — with savoury soups forming the main course and sweet soups served as a dessert alternative",
      "International soups and classical soups — categorised by their country of origin rather than their preparation method or consistency"
    ],
    ans: 0,
    exp: "Classical soup categories: Thin soups (clear) — consommé, broth, bouillon. Thick soups — cream soups (velouté-based, finished with cream), purée soups (starchy vegetables blended), bisques (shellfish-based cream soups). Plus national/speciality soups (minestrone, French onion, gazpacho)."
  },
  {
    q: "What is a 'cream soup' in classical culinary terms and how is it finished?",

      "A soup thickened with a heavy roux and enriched with cream cheese, served only at formal banquets as the first course of a classical menu",

  },
  {

  },

  {

let order=[],cur=0,picks={},playerName='',score=0;
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function startQuiz(){const inp=document.getElementById('name-input').value.trim();playerName=inp||'Anonymous';order=shuffle(BANK.map((_,i)=>i));cur=0;picks={};score=0;document.getElementById('q-total').textContent=BANK.length;show('quiz-screen');render();}
function render(){
  const idx=order[cur],q=BANK[idx],total=BANK.length;
  document.getElementById('q-num').textContent=cur+1;
  document.getElementById('q-score').textContent=score;
  document.getElementById('q-label').textContent=`Question ${cur+1} of ${total}`;
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('progress-fill').style.width=((cur/total)*100)+'%';
  document.getElementById('explanation').className='explanation';
  document.getElementById('explanation').textContent='';
  document.getElementById('next-btn').className='next-btn';
  const letters=['A','B','C','D'],optEl=document.getElementById('options');
  optEl.innerHTML='';
  shuffle([0,1,2,3]).forEach((oi,li)=>{
    const btn=document.createElement('button');
    btn.className='opt-btn';btn.dataset.opt=oi;
    btn.innerHTML=`<span class="opt-letter">${letters[li]}</span><span>${q.opts[oi]}</span>`;
    btn.onclick=()=>selectAnswer(oi,idx);
    optEl.appendChild(btn);
  });
}
function selectAnswer(chosen,idx){
  const q=BANK[idx],correct=chosen===q.ans;
  picks[idx]=chosen;if(correct)score++;
  document.getElementById('q-score').textContent=score;
  document.querySelectorAll('.opt-btn').forEach(btn=>{
    btn.disabled=true;const oi=parseInt(btn.dataset.opt);
    if(oi===q.ans)btn.classList.add('correct');
    else if(oi===chosen&&!correct)btn.classList.add('wrong');
  });
  if(!correct){const e=document.getElementById('explanation');e.textContent='✗ '+q.exp;e.classList.add('show');}
  const nb=document.getElementById('next-btn');nb.classList.add('show');
  nb.textContent=cur+1<BANK.length?'Next Question →':'See Results →';
}
function nextQuestion(){cur++;if(cur>=BANK.length)showResults();else{render();window.scrollTo(0,0);}}
function showResults(){
  show('results-screen');
  const total=BANK.length,pct=Math.round((score/total)*100),passed=pct>=70;
  document.getElementById('result-name').textContent=playerName;
  document.getElementById('ring-pct').textContent=pct+'%';
  document.getElementById('ring-pct').style.color=passed?'var(--green)':'var(--red)';
  document.getElementById('ring-fill').style.stroke=passed?'var(--green)':'var(--red)';
  setTimeout(()=>{document.getElementById('ring-fill').style.strokeDashoffset=439.82-(439.82*pct/100);},100);
  document.getElementById('res-title').textContent=pct>=90?'Excellent!':pct>=70?'Passed!':'Needs Work';
  document.getElementById('res-sub').textContent=`${score} correct out of ${total} questions`;
  const v=document.getElementById('res-verdict');
  if(passed){v.textContent='✓ You passed — score above 70%';v.className='result-verdict pass';}
  else{v.textContent='✗ Below 70% — please retake the quiz';v.className='result-verdict fail';}
  const rv=document.getElementById('review');rv.innerHTML='<h3>Review</h3>';
  order.forEach(idx=>{
    const q=BANK[idx],ua=picks[idx],ok=ua===q.ans;
    const d=document.createElement('div');d.className='rv-item '+(ok?'ok':'miss');
    d.innerHTML=`<div class="rv-q">${q.q}</div><div class="rv-a">${ok
      ?`<span class="c">✓ Correct: ${q.opts[q.ans]}</span>`
      :`<span class="w">✗ You chose: ${ua!==undefined?q.opts[ua]:'Skipped'}</span><br><span class="c">✓ Correct: ${q.opts[q.ans]}</span><br><span style="color:var(--muted)">${q.exp}</span>`
    }</div>`;
    rv.appendChild(d);
  });
}
function retryQuiz(){order=shuffle(order);cur=0;picks={};score=0;document.getElementById('q-score').textContent=0;show('quiz-screen');render();}
document.getElementById('name-input').addEventListener('keydown',e=>{if(e.key==='Enter')startQuiz();});
</script>
